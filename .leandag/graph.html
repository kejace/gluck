<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Blueprint dependency graph</title>
<link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
<script src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root {
  --sidebar-bg: #0f172a;
  --toolbar-bg: #1e293b;
  --surface:    #1a2744;
  --border:     #1e3a5f;
  --text:       #e2e8f0;
  --muted:      #64748b;
  --accent:     #60a5fa;
  --green:      #4ade80;
  --green-bg:   rgba(74,222,128,.12);
  --red:        #f87171;
  --red-bg:     rgba(248,113,113,.12);
  --orange:     #fb923c;
  --orange-bg:  rgba(251,146,60,.12);
  --code-bg:    #090d16;
  --radius:     7px;
  --mono: 'JetBrains Mono','Fira Code','Cascadia Code','Consolas','Monaco',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}

html { margin:0; padding:0; height:100%; overflow:hidden; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--sans); display:flex; flex-direction:column;
       height:100%; background:#f8fafc; color:var(--text); }

/* ── Toolbar ─────────────────────────────────────────────────── */
#toolbar {
  background:var(--toolbar-bg); height:44px; padding:0 16px;
  display:flex; align-items:center; gap:14px; flex-shrink:0;
  border-bottom:1px solid #263045;
}
.brand { font-size:13px; font-weight:700; color:#f1f5f9; letter-spacing:.03em; }
.stat  { font-size:12px; color:#64748b; white-space:nowrap; }
.legend { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.leg-bar {
  width:54px; height:8px; border-radius:4px; display:inline-block;
  background:linear-gradient(90deg,#facc15,#f59e0b,#f97316);
}
.leg-txt { font-size:10px; font-weight:600; color:#94a3b8; }
.sym-legend { padding-left:10px; margin-left:4px; border-left:1px solid #334155; gap:8px; }
.hint { margin-left:auto; font-size:11px; color:#334155; white-space:nowrap; }

/* ── Controls bar ────────────────────────────────────────────── */
#controls {
  background:#16233b; min-height:40px; padding:6px 16px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
  border-bottom:1px solid #263045; flex-wrap:wrap;
}
#controls input[type=text], #controls select {
  background:#0f1f3d; color:var(--text); border:1px solid #1e3a5f;
  border-radius:5px; font-size:12px; padding:5px 8px;
  font-family:var(--sans); outline:none;
}
#controls input[type=text] { width:200px; }
#controls input[type=text]:focus, #controls select:focus { border-color:var(--accent); }
#controls select { max-width:260px; cursor:pointer; }
#controls .chk { font-size:12px; color:#94a3b8; display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; }
.btn {
  background:#1e293b; color:#cbd5e1; border:1px solid #334155;
  border-radius:5px; font-size:12px; padding:5px 12px; cursor:pointer;
}
.btn:hover { background:#263045; }
.pill {
  display:inline-flex; align-items:center; gap:7px;
  background:#172554; color:#93c5fd; border:1px solid #1e3a8a;
  border-radius:12px; font-size:11px; padding:3px 4px 3px 11px; cursor:pointer;
  max-width:280px;
}
.pill .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pill .x { font-weight:700; padding:0 6px; border-radius:9px; }
.pill:hover .x { background:#1e3a8a; }

/* ── Main layout ─────────────────────────────────────────────── */
#main  { display:flex; flex:1; overflow:hidden; min-height:0; position:relative; }
#graph { flex:1; min-height:0; background:#f8fafc; }

/* ── Project-stats overlay ───────────────────────────────────── */
#stats-panel {
  position:absolute; top:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:10px 12px; min-width:188px; backdrop-filter:blur(3px);
  font-size:11px; color:#cbd5e1; box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#stats-panel h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#stats-panel .row { display:flex; justify-content:space-between; gap:14px; line-height:1.7; }
#stats-panel .row .v { font-family:var(--mono); color:#f1f5f9; }
#stats-panel .v.done { color:var(--green); }
#stats-panel .v.work { color:var(--orange); }
#stats-panel .v.inf  { color:var(--red); }
#stats-panel .bar {
  height:6px; border-radius:3px; background:#1e293b; margin:7px 0 3px; overflow:hidden;
}
#stats-panel .bar > span { display:block; height:100%; background:var(--green); }
#stats-panel .sep { border-top:1px solid #1e3a5f; margin:7px 0; }
#graph canvas { display:block; }

/* ── File-view colour legend ─────────────────────────────────── */
#file-legend {
  position:absolute; bottom:12px; left:12px; z-index:5;
  background:rgba(15,23,42,.9); border:1px solid #1e3a5f; border-radius:8px;
  padding:9px 11px; max-width:280px; max-height:42%; overflow-y:auto;
  backdrop-filter:blur(3px); font-size:11px; color:#cbd5e1;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
#file-legend::-webkit-scrollbar { width:4px; }
#file-legend::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
#file-legend h4 {
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:#64748b; margin-bottom:7px;
}
#file-legend .fl-row { display:flex; align-items:center; gap:7px; line-height:1.9; }
#file-legend .fl-sw { width:11px; height:11px; border-radius:3px; flex-shrink:0;
  border:1px solid rgba(255,255,255,.18); }
#file-legend .fl-name {
  font-family:var(--mono); font-size:10px; color:#cbd5e1;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
#file-legend .fl-n { font-family:var(--mono); font-size:10px; color:#64748b; }
#file-legend .fl-empty { font-style:italic; color:#475569; }

/* ── Sidebar ─────────────────────────────────────────────────── */
#sidebar {
  width:340px; flex-shrink:0;
  background:var(--sidebar-bg);
  border-left:1px solid #1e293b;
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar-empty {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
}
#sidebar-empty svg { opacity:.2; }
#sidebar-empty p { font-size:13px; color:#334155; }
#sidebar-content {
  flex:1; overflow-y:auto; padding:10px;
  display:flex; flex-direction:column; gap:8px;
}
#sidebar-content::-webkit-scrollbar { width:4px; }
#sidebar-content::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }

/* ── Cards ───────────────────────────────────────────────────── */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:12px;
}
.card-title {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:10px;
}
.btn-focus {
  width:100%; margin-top:10px; background:#172554; color:#93c5fd;
  border:1px solid #1e3a8a; border-radius:5px; font-size:11px;
  font-weight:600; padding:7px; cursor:pointer; letter-spacing:.02em;
}
.btn-focus:hover { background:#1e3a8a; color:#bfdbfe; }

/* ── Header card ─────────────────────────────────────────────── */
.node-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:.04em;
}
.badge-type    { background:#172554; color:#93c5fd; border:1px solid #1e3a8a44; }
.badge-proved  { background:var(--green-bg);  color:var(--green);  border:1px solid rgba(74,222,128,.25); }
.badge-sorry   { background:var(--orange-bg); color:var(--orange); border:1px solid rgba(251,146,60,.25); }
.badge-unproved{ background:var(--red-bg);    color:var(--red);    border:1px solid rgba(248,113,113,.25); }
.node-title   { font-size:15px; font-weight:600; color:#f1f5f9; line-height:1.35; margin-bottom:5px; }
.node-id      { font-family:var(--mono); font-size:11px; color:#475569; }
.node-chapter { font-size:11px; color:#334155; margin-top:3px; }
.lean-ref     { font-size:11px; color:var(--muted); margin-top:6px; }
.lean-ref code{ font-family:var(--mono); color:var(--accent); }

/* ── Structure card ──────────────────────────────────────────── */
.degrees { display:flex; gap:20px; margin-bottom:10px; }
.degree  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.degree-val   { font-size:22px; font-weight:700; color:#f1f5f9; line-height:1; }
.degree-label { font-size:10px; color:var(--muted); text-align:center; }
.deps-list  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.deps-sub   { font-size:10px; color:var(--muted); margin:6px 0 4px; letter-spacing:.03em; }
.dep-chip {
  font-family:var(--mono); font-size:10px; padding:3px 7px;
  background:#0f1f3d; border:1px solid #1e3a5f;
  border-radius:4px; color:var(--accent); cursor:pointer; transition:background .15s;
}
.dep-chip:hover { background:#172554; }
.no-deps { font-size:12px; color:var(--muted); font-style:italic; }

/* ── Metrics card ────────────────────────────────────────────── */
.metrics-grid {
  display:grid; grid-template-columns:auto 1fr 1fr;
  gap:5px 10px; align-items:center;
}
.col-head { font-size:10px; color:#334155; text-align:right; font-weight:600; }
.m-label  { font-size:11px; color:var(--muted); }
.m-val    { font-family:var(--mono); font-size:12px; color:#94a3b8; text-align:right; }
.m-done   { color:var(--green); font-weight:700; }
.m-inf    { color:var(--red);   font-weight:700; }
.m-work   { color:var(--orange); }

/* ── Section header ──────────────────────────────────────────── */
.sec-hdr {
  display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;
}
.chars-pair { font-family:var(--mono); font-size:10px; color:#334155; }
.chars-inf  { color:var(--red); }
.chars-val  { color:#475569; }

/* ── LaTeX rendered block ────────────────────────────────────── */
.latex-rendered {
  font-family:var(--sans); font-size:13px; line-height:1.7;
  color:#94a3b8; overflow-x:auto; min-height:1.5em;
}
.latex-rendered .katex-display { margin:6px 0; overflow-x:auto; }
.latex-rendered em { font-style:italic; color:#cbd5e1; }
.latex-rendered strong { font-weight:600; color:#cbd5e1; }
.latex-rendered.empty { color:#1e3a5f; font-style:italic; }

/* ── Lean code block ─────────────────────────────────────────── */
.code-block {
  font-family:var(--mono); font-size:11px; line-height:1.6;
  background:var(--code-bg); color:#abb2bf;
  border:1px solid #1a2744; border-radius:5px;
  padding:10px 12px; white-space:pre; overflow:auto;
  max-height:220px;
}
.code-block::-webkit-scrollbar { width:4px; height:4px; }
.code-block::-webkit-scrollbar-thumb { background:#1e3a5f; border-radius:2px; }
.code-block.empty { color:#1e3a5f; font-style:italic; white-space:normal; }

/* ── Lean syntax colours (One Dark palette) ──────────────────── */
.hl-kw      { color:#c678dd; }
.hl-tactic  { color:#61afef; }
.hl-type    { color:#e5c07b; }
.hl-comment { color:#5c6370; font-style:italic; }
.hl-str     { color:#98c379; }
.hl-num     { color:#d19a66; }
</style>
</head>

<div id="toolbar">
  <span class="brand">Blueprint DAG</span>

  <span class="legend"><span class="leg-dot" style="background:#22c55e"></span><span class="leg-txt">done</span><span class="leg-dot" style="background:#3b82f6"></span><span class="leg-txt">mathlib</span><span class="leg-bar"></span><span class="leg-txt">more effort</span><span class="leg-dot" style="background:#ef4444"></span><span class="leg-txt">∞ no proof</span></span>
  <span class="legend sym-legend">
    <span class="leg-txt">✓ Lean proof</span>
    <span class="leg-txt">⚠ sorry</span>
    <span class="leg-txt">ⓜ mathlib</span>
    <span class="leg-txt">λ Lean decl</span>
    <span class="leg-txt">★ LaTeX proof</span>
    <span class="leg-txt">§ statement</span>
  </span>
  <span class="hint">click = highlight cone &middot; double-click = focus &middot; ctrl+scroll = zoom</span>
</div>
<div id="controls">
  <input id="search" type="text" list="node-ids" placeholder="Search node id…" autocomplete="off" spellcheck="false">
  <datalist id="node-ids"></datalist>
  <select id="nodeset" title="Which declarations to include">
    <option value="union">All declarations</option>
    <option value="blueprint">Blueprint only</option>
    <option value="lean">Lean only</option>
  </select>
  <select id="component"><option value="">All components</option></select>
  <select id="chapter"><option value="">All chapters</option></select>
  <select id="fileview" title="Tint the background by source file">
    <option value="off">File view: off</option>
    <option value="lean">File view: Lean files</option>
    <option value="tex">File view: LaTeX files</option>
  </select>
  <label class="chk"><input type="checkbox" id="orphans"> show isolated <span id="iso-count"></span></label>
  <span id="focus-pill" class="pill" style="display:none" title="Clear focus">
    <span class="lbl"></span><span class="x">&times;</span>
  </span>
  <button id="reset" class="btn">Reset view</button>
</div>
<div id="main">
  <div id="graph"></div>
  <div id="stats-panel"></div>
  <div id="file-legend" style="display:none"></div>
  <aside id="sidebar">
    <div id="sidebar-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="#334155" stroke-width="1.2" stroke-linecap="round">
        <path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
        <line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/>
      </svg>
      <p>Click a node to inspect it</p>
    </div>
    <div id="sidebar-content" style="display:none"></div>
  </aside>
</div>

const allNodes  = {"def:is_regular": {"id": "def:is_regular", "type": "definition", "title": "", "chapter": "Plane curves and signed curvature", "statement": "ok\n[Regular curve]\n  \n  \n  A map $\\gamma : \\mathbb{R} \\to \\mathbb{C}$ is a \\emph{regular curve} if it is\n  twice continuously differentiable ($C^2$, encoded \\texttt{ContDiff ℝ 2}) and\n  its velocity never vanishes: $\\gamma'(t) \\neq 0$ for all $t$.", "uses": [], "lean_name": "Gluck.IsRegular", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "def IsRegular (γ : ℝ → ℂ) : Prop :=\n  ContDiff ℝ 2 γ ∧ ∀ t, deriv γ t ≠ 0", "proof_size_lean": 73, "has_sorry": false, "tex_file": "chapters/Gluck_Curve.tex", "lean_file": "Gluck/Curve.lean", "dep_count": 0, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 73, "effort_total": 0}, "def:signed_curvature": {"id": "def:signed_curvature", "type": "definition", "title": "", "chapter": "Plane curves and signed curvature", "statement": "ok\n[Signed curvature]\n  \n  \n  \n  \\textit{Source: DeTurck--Gluck, §4 (defining relations $d\\alpha/ds = (\\cos\\theta,\\sin\\theta)$, $d\\theta/ds = \\kappa$).}\n  The \\emph{signed curvature} of $\\gamma : \\mathbb{R} \\to \\mathbb{C}$ at $t$ is\n  \\[\n    \\kappa_\\gamma(t) \\;=\\;\n      \\frac{\\operatorname{Re}\\gamma'(t)\\,\\operatorname{Im}\\gamma''(t)\n            - \\operatorname{Im}\\gamma'(t)\\,\\operatorname{Re}\\gamma''(t)}\n           {\\lvert \\gamma'(t)\\rvert^{3}} .\n  \\]\n  This is the standard parametrization-invariant formula; for a curve\n  parametrized by its angle of inclination $\\theta$ (so $\\gamma'(\\theta) =\n  e^{i\\theta}/\\kappa(\\theta)$) it reduces to $\\kappa_\\gamma(\\theta) =\n  \\kappa(\\theta)$, recovering the source's defining relation $d\\theta/ds =\n  \\kappa$.\n\n  \\emph{This formula is a $C^2$ notion}: it reads off $\\gamma''$, so it is only\n  meaningful when $\\gamma \\in C^2$ (\\cref{def:is_regular} bakes in\n  \\texttt{ContDiff ℝ 2}). The realized curve of a \\emph{merely continuous}\n  curvature function is only $C^1$, so the final theorem expresses curvature\n  realization through the intrinsic notion \\cref{def:realizes_curvature} below,\n  not through this formula.", "uses": ["def:is_regular"], "lean_name": "Gluck.signedCurvature", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def signedCurvature (γ : ℝ → ℂ) (t : ℝ) : ℝ :=\n  ((deriv γ t).re * (deriv (deriv γ) t).im\n      - (deriv γ t).im * (deriv (deriv γ) t).re) / ‖deriv γ t‖ ^ 3", "proof_size_lean": 170, "has_sorry": false, "tex_file": "chapters/Gluck_Curve.tex", "lean_file": "Gluck/Curve.lean", "dep_count": 1, "rdep_count": 2, "descendant_count": 2, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 243, "effort_total": 0}, "def:realizes_curvature": {"id": "def:realizes_curvature", "type": "definition", "title": "", "chapter": "Plane curves and signed curvature", "statement": "ok\n[Intrinsic curvature realization]\n  \n  \n  \n  A curve $\\gamma : \\mathbb{R} \\to \\mathbb{C}$ \\emph{realizes the curvature\n  function} $\\kappa : \\mathbb{R} \\to \\mathbb{R}$ if $\\gamma$ is $C^1$, regular\n  ($\\gamma'(t) \\neq 0$ for all $t$), and there is a differentiable\n  \\emph{tangent-angle} function $\\varphi : \\mathbb{R} \\to \\mathbb{R}$ such that,\n  for all $t$,\n  \\[\n    \\gamma'(t) \\;=\\; \\lVert \\gamma'(t)\\rVert \\, e^{i\\varphi(t)},\n    \\qquad\n    \\varphi'(t) \\;=\\; \\kappa(t)\\,\\lVert \\gamma'(t)\\rVert .\n  \\]\n  The first equation says $\\varphi(t)$ is the angle of inclination of the unit\n  tangent; the second is the source's defining relation $d\\theta/ds = \\kappa$\n  rewritten via the chain rule with arc length $s$, $ds/dt = \\lVert\\gamma'(t)\n  \\rVert$: $\\varphi'(t) = (d\\varphi/ds)(ds/dt) = \\kappa(t)\\lVert\\gamma'(t)\\rVert$.\n\n  \\emph{Why this is the right notion.} It needs only $\\gamma \\in C^1$ (no\n  $\\gamma''$): the angle $\\varphi$ — not $\\gamma$ — is required to be\n  differentiable, and for the reconstruction curve $\\alpha_\\rho$ (whose velocity\n  is $e^{i\\theta}\\rho(\\theta)$) the tangent angle is exactly the parameter,\n  $\\varphi(\\theta) = \\theta$, which is smooth even when $\\alpha_\\rho$ is only\n  $C^1$. Thus $\\alpha_\\rho$ realizes a merely-continuous $\\kappa$. When $\\kappa >\n  0$, $\\varphi' = \\kappa\\lVert\\gamma'\\rVert > 0$, so the tangent angle turns\n  strictly monotonically: this is the intrinsic form of \\emph{convexity}\n  (rotation index $1$ over a period), replacing the $C^2$ predicate\n  \\cref{def:is_convex_curve} in the final theorem.", "uses": ["def:is_curvature_function"], "lean_name": "Gluck.RealizesCurvature", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "def RealizesCurvature (γ : ℝ → ℂ) (κ : ℝ → ℝ) : Prop :=\n  ContDiff ℝ 1 γ ∧ (∀ t, deriv γ t ≠ 0) ∧\n    ∃ φ : ℝ → ℝ, Differentiable ℝ φ ∧\n      (∀ t, deriv γ t = (↑‖deriv γ t‖ : ℂ) * Complex.exp (↑(φ t) * Complex.I)) ∧\n      (∀ t, deriv φ t = κ t * ‖deriv γ t‖)", "proof_size_lean": 259, "has_sorry": false, "tex_file": "chapters/Gluck_Curve.tex", "lean_file": "Gluck/Curve.lean", "dep_count": 1, "rdep_count": 6, "descendant_count": 10, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 370, "effort_total": 0}, "lem:realizes_curvature_signedCurvature": {"id": "lem:realizes_curvature_signedCurvature", "type": "lemma", "title": "", "chapter": "Plane curves and signed curvature", "statement": "ok\n[Intrinsic realization agrees with the formula on $C^2$ curves]\n  \n  \n  \n  If $\\gamma$ is $C^2$ and regular and realizes $\\kappa$\n  (\\cref{def:realizes_curvature}), then its signed curvature equals $\\kappa$:\n  $\\kappa_\\gamma(t) = \\kappa(t)$ for all $t$. (Bridge between the intrinsic\n  notion and the deriv²-formula; lets the deriv²-formula and the intrinsic\n  realization be used interchangeably on $C^2$ data.)", "uses": ["def:realizes_curvature", "def:signed_curvature", "def:is_regular"], "lean_name": "Gluck.signedCurvature_of_realizesCurvature", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:realizes_curvature, def:signed_curvature}\n  \\leanok\n  Write $v(t) = \\lVert\\gamma'(t)\\rVert$, so $\\gamma'(t) = v(t)e^{i\\varphi(t)}$\n  with $\\varphi$ the tangent angle. Since $\\gamma \\in C^2$ and $\\gamma'$ is\n  nonvanishing, $v$ is $C^1$ and $\\gamma''(t) = v'(t)e^{i\\varphi(t)} + v(t)\n  i\\varphi'(t)e^{i\\varphi(t)}$. Decompose into real/imaginary parts:\n  $\\Re\\gamma' = v\\cos\\varphi$, $\\Im\\gamma' = v\\sin\\varphi$, and\n  $\\Re\\gamma'' = v'\\cos\\varphi - v\\varphi'\\sin\\varphi$,\n  $\\Im\\gamma'' = v'\\sin\\varphi + v\\varphi'\\cos\\varphi$. The signed-curvature\n  numerator is\n  \\[\n    \\Re\\gamma'\\,\\Im\\gamma'' - \\Im\\gamma'\\,\\Re\\gamma''\n      = v^2\\varphi'(\\cos^2\\varphi + \\sin^2\\varphi) = v^2\\varphi',\n  \\]\n  (the $v'$ terms cancel), while $\\lVert\\gamma'\\rVert^3 = v^3$. Hence\n  $\\kappa_\\gamma = v^2\\varphi'/v^3 = \\varphi'/v = \\kappa$ by the realization\n  relation $\\varphi' = \\kappa v$.\n", "lean_source": "theorem signedCurvature_of_realizesCurvature {γ : ℝ → ℂ} {κ : ℝ → ℝ}\n    (hγ2 : ContDiff ℝ 2 γ) (hreg : ∀ t, deriv γ t ≠ 0)\n    (hrc : RealizesCurvature γ κ) :\n    ∀ t, signedCurvature γ t = κ t := by\n  obtain ⟨_, _, φ, hφ, htan, hcurv⟩ := hrc\n  intro t\n\n  set v : ℝ → ℝ := fun s => ‖deriv γ s‖ with hv_def\n  have hv_pos : 0 < v t := norm_pos_iff.mpr (hreg t)\n\n  have hd1 : deriv γ t = (↑(v t) : ℂ) * Complex.exp (↑(φ t) * Complex.I) := htan t\n\n  have hgeq : deriv γ = fun s => (↑(v s) : ℂ) * Complex.exp (↑(φ s) * Complex.I) := by\n    funext s; exact htan s\n\n  have hdγ_diff : DifferentiableAt ℝ (deriv γ) t := hγ2.differentiable_deriv_two t\n  have hv_diff : DifferentiableAt ℝ v t := hdγ_diff.norm ℂ (hreg t)\n\n  set vd : ℝ := deriv v t with hvd_def\n  have hv_hd : HasDerivAt v vd t := hv_diff.hasDerivAt\n  have hvc : HasDerivAt (fun s => (↑(v s) : ℂ)) (↑vd : ℂ) t := hv_hd.ofReal_comp\n  set pd : ℝ := deriv φ t with hpd_def\n  have hφ_hd : HasDerivAt φ pd t := (hφ t).hasDerivAt\n  have hI : HasDerivAt (fun s => (↑(φ s) : ℂ) * Complex.I) ((↑pd : ℂ) * Complex.I) t :=\n    hφ_hd.ofReal_comp.mul_const Complex.I\n  have hexp : HasDerivAt (fun s => Complex.exp ((↑(φ s) : ℂ) * Complex.I))\n      (Complex.exp ((↑(φ t) : ℂ) * Complex.I) * ((↑pd : ℂ) * Complex.I)) t := hI.cexp\n\n  have hprod : HasDerivAt (deriv γ)\n      ((↑vd : ℂ) * Complex.exp ((↑(φ t) : ℂ) * Complex.I)\n        + (↑(v t) : ℂ) *\n            (Complex.exp ((↑(φ t) : ℂ) * Complex.I) * ((↑pd : ℂ) * Complex.I))) t := by\n    rw [hgeq]; exact hvc.mul hexp\n  have hsecond : deriv (deriv γ) t =\n      (↑vd : ℂ) * Complex.exp ((↑(φ t) : ℂ) * Complex.I)\n        + (↑(v t) : ℂ) *\n            (Complex.exp ((↑(φ t) : ℂ) * Complex.I) * ((↑pd : ℂ) * Complex.I)) := hprod.deriv\n\n  have he_re : (Complex.exp (↑(φ t) * Complex.I)).re = Real.cos (φ t) :=\n    Complex.exp_ofReal_mul_I_re _\n  have he_im : (Complex.exp (↑(φ t) * Complex.I)).im = Real.sin (φ t) :=\n    Complex.exp_ofReal_mul_I_im _\n\n  have hvel_re : (deriv γ t).re = v t * Real.cos (φ t) := by\n    rw [hd1]; simp [Complex.mul_re, he_re, he_im]\n  have hvel_im : (deriv γ t).im = v t * Real.sin (φ t) := by\n    rw [hd1]; simp [Complex.mul_im, he_re, he_im]\n  have hsd_re : (deriv (deriv γ) t).re\n      = vd * Real.cos (φ t) - v t * Real.sin (φ t) * pd := by\n    rw [hsecond]\n    simp [Complex.add_re, Complex.mul_re, Complex.mul_im, he_re, he_im]\n    ring\n  have hsd_im : (deriv (deriv γ) t).im\n      = vd * Real.sin (φ t) + v t * Real.cos (φ t) * pd := by\n    rw [hsecond]\n    simp [Complex.add_im, Complex.mul_re, Complex.mul_im, he_re, he_im]\n    ring\n\n  have hpd : pd = κ t * v t := hcurv t\n\n  have hnorm : ‖deriv γ t‖ = v t := rfl\n  have hcs : Real.cos (φ t) ^ 2 + Real.sin (φ t) ^ 2 = 1 := Real.cos_sq_add_sin_sq _\n  unfold signedCurvature\n  rw [hvel_re, hvel_im, hsd_re, hsd_im, hnorm, hpd,\n    div_eq_iff (pow_ne_zero 3 hv_pos.ne')]\n  linear_combination (v t) ^ 3 * κ t * hcs", "proof_size_lean": 2890, "has_sorry": false, "tex_file": "chapters/Gluck_Curve.tex", "lean_file": "Gluck/Curve.lean", "dep_count": 3, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 884, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 3503, "effort_total": 0}, "def:is_closed_curve": {"id": "def:is_closed_curve", "type": "definition", "title": "", "chapter": "Plane curves and signed curvature", "statement": "ok\n[Closed curve]\n  \n  \n  A curve $\\gamma : \\mathbb{R} \\to \\mathbb{C}$ is \\emph{closed} if it is\n  $2\\pi$-periodic: $\\gamma(t + 2\\pi) = \\gamma(t)$ for all $t$.", "uses": [], "lean_name": "Gluck.IsClosedCurve", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "def IsClosedCurve (γ : ℝ → ℂ) : Prop :=\n  Function.Periodic γ (2 * π)", "proof_size_lean": 69, "has_sorry": false, "tex_file": "chapters/Gluck_Curve.tex", "lean_file": "Gluck/Curve.lean", "dep_count": 0, "rdep_count": 1, "descendant_count": 10, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 69, "effort_total": 0}, "def:is_simple_closed": {"id": "def:is_simple_closed", "type": "definition", "title": "", "chapter": "Plane curves and signed curvature", "statement": "ok\n[Simple closed curve]\n  \n  \n  \n  A curve $\\gamma$ is a \\emph{simple closed curve} if it is closed and injective\n  on a fundamental period, i.e. $\\gamma$ restricted to $[0, 2\\pi)$ is injective.\n  Such a $\\gamma$ is the embedding of the circle $S^1 = \\mathbb{R}/2\\pi\\mathbb{Z}$\n  that the converse theorem produces.", "uses": ["def:is_closed_curve"], "lean_name": "Gluck.IsSimpleClosed", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "def IsSimpleClosed (γ : ℝ → ℂ) : Prop :=\n  IsClosedCurve γ ∧ Set.InjOn γ (Set.Ico 0 (2 * π))", "proof_size_lean": 92, "has_sorry": false, "tex_file": "chapters/Gluck_Curve.tex", "lean_file": "Gluck/Curve.lean", "dep_count": 1, "rdep_count": 5, "descendant_count": 9, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 161, "effort_total": 0}, "def:is_convex_curve": {"id": "def:is_convex_curve", "type": "definition", "title": "", "chapter": "Plane curves and signed curvature", "statement": "ok\n[Convex curve]\n  \n  \n  \n  A regular curve $\\gamma$ is \\emph{convex} if its signed curvature is strictly\n  positive everywhere: $\\kappa_\\gamma(t) > 0$ for all $t$. For a simple closed\n  curve this is equivalent to convexity of the enclosed region.", "uses": ["def:signed_curvature"], "lean_name": "Gluck.IsConvexCurve", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "def IsConvexCurve (γ : ℝ → ℂ) : Prop :=\n  IsRegular γ ∧ ∀ t, 0 < signedCurvature γ t", "proof_size_lean": 84, "has_sorry": false, "tex_file": "chapters/Gluck_Curve.tex", "lean_file": "Gluck/Curve.lean", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 327, "effort_total": 0}, "def:is_curvature_function": {"id": "def:is_curvature_function", "type": "definition", "title": "", "chapter": "Curvature functions on the circle", "statement": "ok\n[Curvature function]\n  \n  \n  \\textit{Source: DeTurck--Gluck, §III–4 (strictly positive curvature case).}\n  A \\emph{curvature function} is a map $\\kappa : \\mathbb{R} \\to \\mathbb{R}$ that\n  is continuous, $2\\pi$-periodic ($\\kappa(\\theta + 2\\pi) = \\kappa(\\theta)$), and\n  strictly positive ($\\kappa(\\theta) > 0$ for all $\\theta$). This is exactly the\n  class of preassigned curvatures treated in Gluck's positive case.", "uses": [], "lean_name": "Gluck.IsCurvatureFunction", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "def IsCurvatureFunction (κ : ℝ → ℝ) : Prop :=\n  Continuous κ ∧ Function.Periodic κ (2 * Real.pi) ∧ ∀ θ, 0 < κ θ", "proof_size_lean": 111, "has_sorry": false, "tex_file": "chapters/Gluck_Curvature.tex", "lean_file": "Gluck/Curvature.lean", "dep_count": 0, "rdep_count": 9, "descendant_count": 84, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 111, "effort_total": 0}, "def:radius": {"id": "def:radius", "type": "definition", "title": "", "chapter": "Curvature functions on the circle", "statement": "ok\n[Radius of curvature]\n  \n  \n  \n  \\textit{Source: DeTurck--Gluck, §4 (the reconstruction integral has integrand $1/\\kappa$).}\n  The \\emph{radius of curvature} of a curvature function $\\kappa$ is\n  $\\rho = 1/\\kappa$, i.e. $\\rho(\\theta) = 1/\\kappa(\\theta)$. It is the integrand\n  weight $1/\\kappa(\\theta)$ appearing in the source's reconstruction formula\n  $\\alpha(\\theta) = \\int_0^\\theta e^{i\\theta}\\,d\\theta/\\kappa(\\theta)$.", "uses": ["def:is_curvature_function"], "lean_name": "Gluck.radius", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def radius (κ : ℝ → ℝ) : ℝ → ℝ := fun θ => 1 / κ θ", "proof_size_lean": 64, "has_sorry": false, "tex_file": "chapters/Gluck_Curvature.tex", "lean_file": "Gluck/Curvature.lean", "dep_count": 1, "rdep_count": 4, "descendant_count": 28, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 175, "effort_total": 0}, "lem:radius_props": {"id": "lem:radius_props", "type": "lemma", "title": "", "chapter": "Curvature functions on the circle", "statement": "ok\n[Radius is a positive periodic continuous weight]\n  \n  \n  \n  If $\\kappa$ is a curvature function then $\\rho = 1/\\kappa$ is continuous,\n  $2\\pi$-periodic and strictly positive.", "uses": ["def:radius", "def:is_curvature_function"], "lean_name": "Gluck.radius_pos", "proved": true, "mathlib_ok": false, "proof_tex": "\n\n\\leanok\n  Continuity of $\\rho = 1/\\kappa$ follows from continuity of $\\kappa$ together\n  with $\\kappa$ being everywhere nonzero (indeed positive). Periodicity is\n  inherited from $\\kappa$. Positivity of $1/\\kappa$ follows from positivity of\n  $\\kappa$.\n", "lean_source": "lemma radius_pos {κ : ℝ → ℝ} (hκ : IsCurvatureFunction κ) :\n    Continuous (radius κ) ∧ Function.Periodic (radius κ) (2 * Real.pi) ∧\n      ∀ θ, 0 < radius κ θ := by\n  obtain ⟨hc, hp, hpos⟩ := hκ\n  refine ⟨continuous_const.div hc (fun x => (hpos x).ne'), ?_, ?_⟩\n  · intro θ; simp only [radius]; rw [hp θ]\n  · intro θ; simp only [radius]; exact one_div_pos.mpr (hpos θ)", "proof_size_lean": 368, "has_sorry": false, "tex_file": "chapters/Gluck_Curvature.tex", "lean_file": "Gluck/Curvature.lean", "dep_count": 2, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 252, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 543, "effort_total": 0}, "lem:ivt_hits": {"id": "lem:ivt_hits", "type": "lemma", "title": "", "chapter": "Curvature functions on the circle", "statement": "ok\n[Intermediate value on a closed interval, endpoints in either order]\n  \n  \n  A continuous $f : \\mathbb{R} \\to \\mathbb{R}$ on a closed interval $[p, q]$\n  (with $p \\le q$) attains every value $v$ lying between $f(p)$ and $f(q)$ (in\n  either order): if $v \\in [\\min(f(p), f(q)),\\ \\max(f(p), f(q))]$ then there is\n  $x \\in [p, q]$ with $f(x) = v$.", "uses": [], "lean_name": "Gluck.ivt_hits", "proved": true, "mathlib_ok": false, "proof_tex": "\n\n\\leanok\n  Project-bespoke packaging of the intermediate value theorem. Split on whether\n  $f(p) \\le f(q)$ or $f(q) \\le f(p)$; in each case rewrite the $\\min/\\max$ and\n  apply the monotone, respectively anti-monotone, form of the intermediate value\n  theorem on $[p, q]$.\n", "lean_source": "lemma ivt_hits {f : ℝ → ℝ} (hf : Continuous f) {p q v : ℝ} (hpq : p ≤ q)\n    (hv : v ∈ Set.Icc (min (f p) (f q)) (max (f p) (f q))) :\n    ∃ x ∈ Set.Icc p q, f x = v := by\n  obtain ⟨x, hx, hfx⟩ := intermediate_value_uIcc (f := f) (a := p) (b := q) hf.continuousOn hv\n  rw [Set.uIcc_of_le hpq] at hx\n  exact ⟨x, hx, hfx⟩", "proof_size_lean": 318, "has_sorry": false, "tex_file": "chapters/Gluck_Curvature.tex", "lean_file": "Gluck/Curvature.lean", "dep_count": 0, "rdep_count": 2, "descendant_count": 16, "proof_size_tex": 270, "effort_local": 0, "proof_size_tex_total": 270, "proof_size_lean_total": 318, "effort_total": 0}, "def:four_vertex_condition": {"id": "def:four_vertex_condition", "type": "definition", "title": "", "chapter": "Curvature functions on the circle", "statement": "ok\n[Four-vertex condition]\n  \n  \n  \n  \\textit{Source: DeTurck--Gluck, Converse statement (§III).}\n  A curvature function $\\kappa$ satisfies the \\emph{four-vertex condition} if\n  either\n  \\begin{itemize}\n    \\item $\\kappa$ is constant; or\n    \\item $\\kappa$ has \\emph{two value-separated, alternating local extrema}:\n      there are four points\n      \\[\n        p_1 < q_1 < p_2 < q_2, \\qquad q_2 < p_1 + 2\\pi,\n      \\]\n      lying in a single fundamental period, such that $p_1, p_2$ are local\n      maxima of $\\kappa$, $q_1, q_2$ are local minima of $\\kappa$, and the two\n      minimum values lie strictly below the two maximum values:\n      \\[\n        \\max\\bigl(\\kappa(q_1), \\kappa(q_2)\\bigr) \\;<\\; \\min\\bigl(\\kappa(p_1), \\kappa(p_2)\\bigr).\n      \\]\n  \\end{itemize}\n\n  \\emph{Why the strict value-separation (a project-level correctness refinement\n  of the source's phrasing).} The source says ``at least two local maxima and\n  two local minima.'' A naive formalization --- ``there exist two distinct points\n  that are each a local maximum, and two distinct points that are each a local\n  minimum'' using the topological (non-strict) notion of local extremum --- is\n  \\emph{too weak} and makes the converse theorem false. Counterexample: a\n  trapezoidal wave that is constant $=1$ on a bottom plateau, rises to a top\n  plateau where it is constant $=2$, and falls back, is unimodal yet has\n  infinitely many points that are non-strict local maxima (the whole top\n  plateau) and minima (the bottom plateau). It satisfies the naive condition but\n  has no four points carrying values $a,b,a,b$ with $a<b$ in cyclic order\n  (each level is crossed exactly twice), and indeed is not realizable as a closed\n  curve. The genuine content of ``two local maxima and two local minima'' is that\n  $\\kappa$ oscillates at least twice: two separated humps whose tops strictly\n  exceed the two intervening valleys. The condition above encodes exactly that\n  and is what the realizability proof consumes (it is precisely equivalent, for\n  positive curvature, to the existence of the $a,b,a,b$ interleaving of\n  \\cref{lem:abab_values}).", "uses": ["def:is_curvature_function"], "lean_name": "Gluck.FourVertexCondition", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "def FourVertexCondition (κ : ℝ → ℝ) : Prop :=\n  (∃ c, ∀ θ, κ θ = c) ∨\n    (∃ p₁ q₁ p₂ q₂, p₁ < q₁ ∧ q₁ < p₂ ∧ p₂ < q₂ ∧ q₂ < p₁ + 2 * Real.pi ∧\n      IsLocalMax κ p₁ ∧ IsLocalMax κ p₂ ∧ IsLocalMin κ q₁ ∧ IsLocalMin κ q₂ ∧\n      max (κ q₁) (κ q₂) < min (κ p₁) (κ p₂))", "proof_size_lean": 266, "has_sorry": false, "tex_file": "chapters/Gluck_Curvature.tex", "lean_file": "Gluck/Curvature.lean", "dep_count": 1, "rdep_count": 4, "descendant_count": 19, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 377, "effort_total": 0}, "lem:not_constant_of_separation": {"id": "lem:not_constant_of_separation", "type": "lemma", "title": "Value-separation precludes constancy", "chapter": "Curvature functions on the circle", "statement": "Let $\\kappa : \\mathbb{R} \\to \\mathbb{R}$ be any function and let\n  $p_1, q_1, p_2, q_2$ be points whose extremal values satisfy the strict\n  value-separation\n  \\[\n    \\max\\bigl(\\kappa(q_1), \\kappa(q_2)\\bigr) \\;<\\; \\min\\bigl(\\kappa(p_1), \\kappa(p_2)\\bigr).\n  \\]\n  Then $\\kappa$ is not constant, i.e.\\ there is no $c$ with $\\kappa(\\theta) = c$\n  for all $\\theta$.", "uses": [], "lean_name": "Gluck.not_constant_of_separation", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Suppose, for contradiction, that $\\kappa \\equiv c$ for some constant $c$. Then\n  the four values $\\kappa(p_1), \\kappa(q_1), \\kappa(p_2), \\kappa(q_2)$ are all\n  equal to $c$, so $\\max(\\kappa(q_1), \\kappa(q_2)) = c = \\min(\\kappa(p_1), \\kappa(p_2))$\n  and the separation inequality reads $c < c$, a contradiction.\n", "lean_source": "lemma not_constant_of_separation {κ : ℝ → ℝ} {p₁ q₁ p₂ q₂ : ℝ}\n    (hsep : max (κ q₁) (κ q₂) < min (κ p₁) (κ p₂)) :\n    ¬ ∃ c, ∀ θ, κ θ = c := by\n  rintro ⟨c, hc⟩\n  rw [hc q₁, hc q₂, hc p₁, hc p₂] at hsep\n  simp at hsep", "proof_size_lean": 219, "has_sorry": false, "tex_file": "chapters/Gluck_Curvature.tex", "lean_file": "Gluck/Curvature.lean", "dep_count": 0, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 310, "effort_local": 0, "proof_size_tex_total": 310, "proof_size_lean_total": 219, "effort_total": 0}, "lem:abab_values": {"id": "lem:abab_values", "type": "lemma", "title": "", "chapter": "Curvature functions on the circle", "statement": "ok\n[Four values $a,b,a,b$ around the circle]\n  \n  \n  \n  If a non-constant curvature function $\\kappa$ satisfies the four-vertex\n  condition, then there exist $0 < a < b$ and four points $\\theta_1 < \\theta_2 <\n  \\theta_3 < \\theta_4$ lying in a single fundamental period\n  ($\\theta_4 < \\theta_1 + 2\\pi$) at which $\\kappa$ takes the values\n  $a, b, a, b$ in order around the circle.", "uses": ["def:four_vertex_condition", "def:is_curvature_function", "lem:ivt_hits"], "lean_name": "Gluck.exists_abab_of_fourVertex", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:ivt_hits}\n  \\leanok\n  \n  \n  \n  \\textit{Source: DeTurck--Gluck, §5, p. 11 (the source asserts this; we prove it\n  from the value-separated four-vertex condition).}\n\n  Since $\\kappa$ is non-constant, the four-vertex condition gives its second\n  disjunct: four points $p_1 < q_1 < p_2 < q_2$ in one period, with $q_2 < p_1 +\n  2\\pi$, where $p_1, p_2$ are local maxima, $q_1, q_2$ local minima, and\n  \\[\n    \\max\\bigl(\\kappa(q_1), \\kappa(q_2)\\bigr) \\;<\\; \\min\\bigl(\\kappa(p_1), \\kappa(p_2)\\bigr).\n  \\]\n\n  \\emph{Step 1 (the two levels).} Put\n  \\[\n    a := \\max\\bigl(\\kappa(q_1), \\kappa(q_2)\\bigr), \\qquad\n    b := \\min\\bigl(\\kappa(p_1), \\kappa(p_2)\\bigr).\n  \\]\n  The value-separation hypothesis is exactly $a < b$, and $a > 0$ because\n  $\\kappa > 0$ (so $a \\ge \\kappa(q_1) > 0$).\n\n  \\emph{Step 2 (four sub-arcs, each spanning $[a,b]$).} Consider the four closed\n  sub-arcs\n  \\[\n    [p_1, q_1],\\quad [q_1, p_2],\\quad [p_2, q_2],\\quad [q_2, p_1 + 2\\pi].\n  \\]\n  Each joins a maximum endpoint (value $\\ge b$) to a minimum endpoint (value\n  $\\le a$); for the last sub-arc the right endpoint value is\n  $\\kappa(p_1 + 2\\pi) = \\kappa(p_1) \\ge b$ by periodicity. Hence on each sub-arc\n  the interval $[a,b]$ lies between the two endpoint values, and by the\n  intermediate value theorem (\\cref{lem:ivt_hits}) $\\kappa$ attains \\emph{every}\n  value of $[a,b]$ on each sub-arc.\n\n  \\emph{Step 3 (select the four points).} Choose\n  \\[\n    \\theta_1 \\in [p_1, q_1] \\text{ with } \\kappa(\\theta_1) = a, \\quad\n    \\theta_2 \\in [q_1, p_2] \\text{ with } \\kappa(\\theta_2) = b,\n  \\]\n  \\[\n    \\theta_3 \\in [p_2, q_2] \\text{ with } \\kappa(\\theta_3) = a, \\quad\n    \\theta_4 \\in [q_2, p_1 + 2\\pi] \\text{ with } \\kappa(\\theta_4) = b,\n  \\]\n  all possible by Step 2. The endpoint inclusions give the weak chain\n  \\[\n    p_1 \\le \\theta_1 \\le q_1 \\le \\theta_2 \\le p_2 \\le \\theta_3 \\le q_2 \\le \\theta_4 \\le p_1 + 2\\pi.\n  \\]\n  The assigned values alternate $a, b, a, b$ with $a \\ne b$, so consecutive\n  chosen points carry different $\\kappa$-values, hence are distinct; combined\n  with the weak chain this upgrades it to the strict chain $\\theta_1 < \\theta_2 <\n  \\theta_3 < \\theta_4$.\n\n  \\emph{Step 4 (the points lie in one period).} Since $\\kappa(p_1) \\ge b > a =\n  \\kappa(\\theta_1)$ we have $\\theta_1 \\ne p_1$, so $\\theta_1 > p_1$; together with\n  $\\theta_4 \\le p_1 + 2\\pi$ this gives $\\theta_4 < \\theta_1 + 2\\pi$. Thus the four\n  points lie in a single fundamental period and $\\kappa$ takes the values\n  $a, b, a, b$ on them in order around the circle, with $0 < a < b$, as required.\n", "lean_source": "lemma exists_abab_of_fourVertex {κ : ℝ → ℝ} (hκ : IsCurvatureFunction κ)\n    (hnc : ¬ ∃ c, ∀ θ, κ θ = c) (hfv : FourVertexCondition κ) :\n    ∃ a b, 0 < a ∧ a < b ∧ ∃ θ₁ θ₂ θ₃ θ₄,\n      θ₁ < θ₂ ∧ θ₂ < θ₃ ∧ θ₃ < θ₄ ∧ θ₄ < θ₁ + 2 * Real.pi ∧\n      κ θ₁ = a ∧ κ θ₂ = b ∧ κ θ₃ = a ∧ κ θ₄ = b := by\n  obtain ⟨hcont, hper, hpos⟩ := hκ\n\n  rcases hfv with hconst |\n    ⟨p₁, q₁, p₂, q₂, hp1q1, hq1p2, hp2q2, hq2p1, _hmaxp1, _hmaxp2, _hminq1, _hminq2, hsep⟩\n  · exact absurd hconst hnc\n\n  set a := max (κ q₁) (κ q₂) with ha\n  set b := min (κ p₁) (κ p₂) with hb\n\n  have hab : a < b := hsep\n  have ha_pos : 0 < a := lt_of_lt_of_le (hpos q₁) (le_max_left _ _)\n\n  have hq1a : κ q₁ ≤ a := le_max_left _ _\n  have hq2a : κ q₂ ≤ a := le_max_right _ _\n  have hbp1 : b ≤ κ p₁ := min_le_left _ _\n  have hbp2 : b ≤ κ p₂ := min_le_right _ _\n\n  have hperp1 : κ (p₁ + 2 * Real.pi) = κ p₁ := hper p₁\n\n  have h1 : p₁ ≤ q₁ := hp1q1.le\n  have h2 : q₁ ≤ p₂ := hq1p2.le\n  have h3 : p₂ ≤ q₂ := hp2q2.le\n  have h4 : q₂ ≤ p₁ + 2 * Real.pi := hq2p1.le\n\n  obtain ⟨θ₁, hθ₁mem, hθ₁⟩ := ivt_hits hcont h1 (by\n    rw [Set.mem_Icc]\n    exact ⟨(min_le_right _ _).trans hq1a,\n           (hab.le.trans hbp1).trans (le_max_left _ _)⟩)\n\n  obtain ⟨θ₂, hθ₂mem, hθ₂⟩ := ivt_hits hcont h2 (by\n    rw [Set.mem_Icc]\n    exact ⟨(min_le_left _ _).trans (hq1a.trans hab.le),\n           hbp2.trans (le_max_right _ _)⟩)\n\n  obtain ⟨θ₃, hθ₃mem, hθ₃⟩ := ivt_hits hcont h3 (by\n    rw [Set.mem_Icc]\n    exact ⟨(min_le_right _ _).trans hq2a,\n           (hab.le.trans hbp2).trans (le_max_left _ _)⟩)\n\n  obtain ⟨θ₄, hθ₄mem, hθ₄⟩ := ivt_hits hcont h4 (by\n    rw [Set.mem_Icc]\n    exact ⟨(min_le_left _ _).trans (hq2a.trans hab.le),\n           (hbp1.trans (le_of_eq hperp1.symm)).trans (le_max_right _ _)⟩)\n  refine ⟨a, b, ha_pos, hab, θ₁, θ₂, θ₃, θ₄, ?_, ?_, ?_, ?_, hθ₁, hθ₂, hθ₃, hθ₄⟩\n\n  · refine lt_of_le_of_ne (hθ₁mem.2.trans hθ₂mem.1) ?_\n    intro h; apply (ne_of_lt hab); rw [← hθ₁, ← hθ₂, h]\n  · refine lt_of_le_of_ne (hθ₂mem.2.trans hθ₃mem.1) ?_\n    intro h; apply (ne_of_lt hab); rw [← hθ₃, ← hθ₂, h]\n  · refine lt_of_le_of_ne (hθ₃mem.2.trans hθ₄mem.1) ?_\n    intro h; apply (ne_of_lt hab); rw [← hθ₃, ← hθ₄, h]\n\n  · have hp1θ1 : p₁ < θ₁ := by\n      refine lt_of_le_of_ne hθ₁mem.1 ?_\n      intro h; rw [← h] at hθ₁\n      exact absurd hθ₁ (ne_of_gt (lt_of_lt_of_le hab hbp1))\n    have hθ4le : θ₄ ≤ p₁ + 2 * Real.pi := hθ₄mem.2\n    linarith", "proof_size_lean": 2380, "has_sorry": false, "tex_file": "chapters/Gluck_Curvature.tex", "lean_file": "Gluck/Curvature.lean", "dep_count": 3, "rdep_count": 2, "descendant_count": 4, "proof_size_tex": 2556, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 3075, "effort_total": 0}, "def:reconstruct": {"id": "def:reconstruct", "type": "definition", "title": "", "chapter": "Reconstruction and the closure condition", "statement": "ok\n[Reconstruction curve]\n  \n  \n  \n  \\textit{Source: DeTurck--Gluck, §4, explicit formula for $\\alpha(\\theta)$.}\n  For a weight $\\rho : \\mathbb{R} \\to \\mathbb{R}$, the \\emph{reconstruction\n  curve} is\n  \\[\n    \\alpha_\\rho(\\theta) \\;=\\; \\int_0^\\theta e^{i\\varphi}\\,\\rho(\\varphi)\\,d\\varphi\n      \\;\\in\\; \\mathbb{C},\n  \\]\n  the complex form of the source's $\\alpha(\\theta) = \\int_0^\\theta (\\cos\\varphi,\n  \\sin\\varphi)\\,d\\varphi/\\kappa(\\varphi)$ with $\\rho = 1/\\kappa$. It begins at the\n  origin and has velocity $\\alpha_\\rho'(\\theta) = e^{i\\theta}\\rho(\\theta)$.", "uses": ["def:radius"], "lean_name": "Gluck.reconstruct", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def reconstruct (ρ : ℝ → ℝ) (θ : ℝ) : ℂ :=\n  ∫ φ in (0 : ℝ)..θ, Complex.exp (φ * Complex.I) * (ρ φ : ℂ)", "proof_size_lean": 117, "has_sorry": false, "tex_file": "chapters/Gluck_Closure.tex", "lean_file": "Gluck/Closure.lean", "dep_count": 1, "rdep_count": 7, "descendant_count": 26, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 292, "effort_total": 0}, "lem:reconstruct_const": {"id": "lem:reconstruct_const", "type": "lemma", "title": "", "chapter": "Reconstruction and the closure condition", "statement": "ok\n[Reconstruction of a constant weight is a circle]\n  \n  \n  \n  For a constant weight $\\rho \\equiv r$ the reconstruction curve has the closed\n  form\n  \\[\n    \\alpha_{r}(\\theta) \\;=\\; r\\,i\\,\\bigl(1 - e^{i\\theta}\\bigr),\n  \\]\n  a parametrization (by inclination angle) of the circle of radius $r$ centred at\n  $r\\,i$. This is the explicit curve realizing the constant curvature\n  $\\kappa \\equiv 1/r$, used in the constant case of \\cref{thm:gluck_converse}.", "uses": ["def:reconstruct"], "lean_name": "Gluck.reconstruct_const", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:reconstruct}\n  \\leanok\n  The integrand is $\\varphi \\mapsto e^{i\\varphi}r$, with antiderivative\n  $F(\\theta) = r\\,i\\,(1 - e^{i\\theta})$ (indeed $F'(\\theta) = r\\,i\\cdot(-i\n  e^{i\\theta}) = r\\,e^{i\\theta}$ since $-i\\cdot i = 1$). The fundamental theorem of\n  calculus gives $\\alpha_r(\\theta) = F(\\theta) - F(0) = F(\\theta)$, as\n  $F(0) = 0$.\n", "lean_source": "theorem reconstruct_const (r : ℝ) (θ : ℝ) :\n    reconstruct (fun _ => r) θ\n      = (r : ℂ) * Complex.I * (1 - Complex.exp (θ * Complex.I)) := by\n\n  rw [reconstruct, intervalIntegral.integral_mul_const]\n  simp_rw [mul_comm (_ : ℂ) Complex.I]\n  rw [integral_exp_mul_complex Complex.I_ne_zero]\n  simp only [Complex.ofReal_zero, mul_zero, Complex.exp_zero]\n  rw [div_mul_eq_mul_div, Complex.div_I]\n  ring", "proof_size_lean": 400, "has_sorry": false, "tex_file": "chapters/Gluck_Closure.tex", "lean_file": "Gluck/FourVertex.lean", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 348, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 692, "effort_total": 0}, "lem:reconstruct_deriv": {"id": "lem:reconstruct_deriv", "type": "lemma", "title": "", "chapter": "Reconstruction and the closure condition", "statement": "ok\n[Velocity of the reconstruction]\n  \n  \n  \n  If $\\rho$ is continuous then $\\alpha_\\rho$ is differentiable with\n  $\\alpha_\\rho'(\\theta) = e^{i\\theta}\\,\\rho(\\theta)$ for all $\\theta$.", "uses": ["def:reconstruct"], "lean_name": "Gluck.hasDerivAt_reconstruct", "proved": true, "mathlib_ok": false, "proof_tex": "\n\n\\leanok\n  The integrand $\\varphi \\mapsto e^{i\\varphi}\\rho(\\varphi)$ is continuous, so the\n  fundamental theorem of calculus for the interval integral gives the derivative\n  of $\\theta \\mapsto \\int_0^\\theta$ as the integrand evaluated at $\\theta$.\n", "lean_source": "theorem hasDerivAt_reconstruct {ρ : ℝ → ℝ} (hρ : Continuous ρ) (θ : ℝ) :\n    HasDerivAt (reconstruct ρ) (Complex.exp (θ * Complex.I) * (ρ θ : ℂ)) θ := by\n  have hcont : Continuous fun φ : ℝ => Complex.exp ((φ : ℂ) * Complex.I) * (ρ φ : ℂ) :=\n    (Complex.continuous_exp.comp (Complex.continuous_ofReal.mul continuous_const)).mul\n      (Complex.continuous_ofReal.comp hρ)\n  exact (hcont.integral_hasStrictDerivAt 0 θ).hasDerivAt", "proof_size_lean": 427, "has_sorry": false, "tex_file": "chapters/Gluck_Closure.tex", "lean_file": "Gluck/Closure.lean", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 246, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 719, "effort_total": 0}, "def:error_vector": {"id": "def:error_vector", "type": "definition", "title": "", "chapter": "Reconstruction and the closure condition", "statement": "ok\n[Closure integrals and error vector]\n  \n  \n  \n  The \\emph{error vector} of the weight $\\rho$ is\n  \\[\n    E(\\rho) \\;=\\; \\alpha_\\rho(2\\pi)\n      \\;=\\; \\int_0^{2\\pi} e^{i\\theta}\\,\\rho(\\theta)\\,d\\theta\n      \\;\\in\\; \\mathbb{C}.\n  \\]\n  The curve $\\alpha_\\rho$ closes up into a $2\\pi$-periodic curve exactly when this\n  complex closure defect vanishes, $E(\\rho) = 0$; equivalently both the cosine and\n  sine moments $\\int_0^{2\\pi}\\cos\\theta\\,\\rho$ and $\\int_0^{2\\pi}\\sin\\theta\\,\\rho$\n  vanish.", "uses": ["def:reconstruct"], "lean_name": "Gluck.errorVector", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def errorVector (ρ : ℝ → ℝ) : ℂ :=\n  reconstruct ρ (2 * π)", "proof_size_lean": 72, "has_sorry": false, "tex_file": "chapters/Gluck_Closure.tex", "lean_file": "Gluck/Closure.lean", "dep_count": 1, "rdep_count": 6, "descendant_count": 21, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 364, "effort_total": 0}, "def:four_arc_step_function": {"id": "def:four_arc_step_function", "type": "definition", "title": "", "chapter": "Reduction to a four-arc step function", "statement": "ok\n[Four-arc step curvature]\n  \n  \n  \n  \\textit{Source: DeTurck--Gluck, §5 (step function $\\kappa_0$ with values $a,b,a,b$).}\n  Given $0 < a < b$ and four breakpoint angles $0 \\le \\theta_1 < \\theta_2 <\n  \\theta_3 < \\theta_4 < 2\\pi$, the \\emph{four-arc step curvature} $\\kappa_0 :\n  \\mathbb{R} \\to \\mathbb{R}$ is the $2\\pi$-periodic function taking the value $b$\n  on the arcs $[\\theta_1,\\theta_2)$ and $[\\theta_3,\\theta_4)$ and the value $a$ on\n  the complementary arcs $[\\theta_4, \\theta_1+2\\pi)$ and $[\\theta_2,\\theta_3)$, so\n  that, read cyclically, $\\kappa_0$ takes the values $a, b, a, b$ in succession.\n  It is $2\\pi$-periodic and strictly positive ($\\ge a > 0$) but \\emph{not}\n  continuous: it jumps at the four breakpoints. The associated weight is\n  $\\rho_0 = 1/\\kappa_0$, a step function with values $1/a, 1/b, 1/a, 1/b$.\n\n  In the canonical configuration the four breakpoints are equally spaced\n  ($\\theta_k = (k-1)\\pi/2$), giving four successive arcs of length $\\pi/2$ as in\n  the source; the breakpoints are left as free parameters because the winding\n  argument of \\cref{chap:winding} varies them over a disk of configurations.", "uses": ["def:is_curvature_function"], "lean_name": "Gluck.stepCurvature", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def stepCurvature (a b θ₁ θ₂ θ₃ θ₄ : ℝ) (θ : ℝ) : ℝ :=\n  let t := toIcoMod Real.two_pi_pos θ₁ θ\n  if t < θ₂ ∨ (θ₃ ≤ t ∧ t < θ₄) then b else a", "proof_size_lean": 155, "has_sorry": false, "tex_file": "chapters/Gluck_StepReduction.tex", "lean_file": "Gluck/StepReduction.lean", "dep_count": 1, "rdep_count": 9, "descendant_count": 54, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 266, "effort_total": 0}, "lem:step_curvature_periodic": {"id": "lem:step_curvature_periodic", "type": "lemma", "title": "", "chapter": "Reduction to a four-arc step function", "statement": "ok\n[Step curvature is $2\\pi$-periodic]\n  \n  \n  \n  The four-arc step curvature $\\kappa_0$ (\\cref{def:four_arc_step_function}) is\n  $2\\pi$-periodic: $\\kappa_0(\\theta + 2\\pi) = \\kappa_0(\\theta)$ for all $\\theta$.", "uses": ["def:four_arc_step_function"], "lean_name": "Gluck.stepCurvature_periodic", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:four_arc_step_function}\n  \\leanok\n  $\\kappa_0$ is defined through the reduction of $\\theta$ to its representative in\n  $[\\theta_1, \\theta_1 + 2\\pi)$, which is invariant under adding $2\\pi$; hence the\n  value is unchanged.\n", "lean_source": "lemma stepCurvature_periodic (a b θ₁ θ₂ θ₃ θ₄ : ℝ) :\n    Function.Periodic (stepCurvature a b θ₁ θ₂ θ₃ θ₄) (2 * Real.pi) := by\n  intro θ\n  simp only [stepCurvature]\n  rw [toIcoMod_add_right]", "proof_size_lean": 190, "has_sorry": false, "tex_file": "chapters/Gluck_StepReduction.tex", "lean_file": "Gluck/StepReduction.lean", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 231, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 456, "effort_total": 0}, "lem:step_curvature_canonical_values": {"id": "lem:step_curvature_canonical_values", "type": "lemma", "title": "Canonical step-curvature values on the four arcs", "chapter": "Reduction to a four-arc step function", "statement": "Project-bespoke. The canonical four-arc step curvature with breakpoints\n  $0 < \\pi/2 < \\pi < 3\\pi/2$ and values arranged so that it reads $a, b, a, b$\n  cyclically takes its constant values on the four half-open arcs of $[0,2\\pi)$:\n  it equals $a$ on $[0,\\pi/2)$ and on $[\\pi,3\\pi/2)$, and $b$ on $[\\pi/2,\\pi)$ and\n  on $[3\\pi/2,2\\pi)$.", "uses": ["def:four_arc_step_function"], "lean_name": "Gluck.stepCurvature_canonical_values", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:four_arc_step_function}\n  Fix $\\theta$ in one of the four arcs. Since $0\\le\\theta<2\\pi$, reducing $\\theta$\n  to its representative in $[0,2\\pi)$ leaves it unchanged, so evaluating\n  $\\kappa_0$ at $\\theta$ amounts to deciding which of the two indicator branches\n  of \\cref{def:four_arc_step_function} contains $\\theta$. On $[0,\\pi/2)$ and on\n  $[\\pi,3\\pi/2)$ the selection picks the constant $a$; on $[\\pi/2,\\pi)$ and on\n  $[3\\pi/2,2\\pi)$ it picks the constant $b$. Each case is a direct comparison of\n  $\\theta$ against the breakpoints $0,\\pi/2,\\pi,3\\pi/2$.\n", "lean_source": "private lemma stepCurvature_canonical_values (a b : ℝ) :\n    (∀ θ, 0 ≤ θ → θ < π / 2 → stepCurvature b a 0 (π / 2) π (3 * π / 2) θ = a) ∧\n    (∀ θ, π / 2 ≤ θ → θ < π → stepCurvature b a 0 (π / 2) π (3 * π / 2) θ = b) ∧\n    (∀ θ, π ≤ θ → θ < 3 * π / 2 → stepCurvature b a 0 (π / 2) π (3 * π / 2) θ = a) ∧\n    (∀ θ, 3 * π / 2 ≤ θ → θ < 2 * π → stepCurvature b a 0 (π / 2) π (3 * π / 2) θ = b) := by\n  have hπ : 0 < π := Real.pi_pos\n  refine ⟨?_, ?_, ?_, ?_⟩\n  · intro θ h0 h2\n    have ht : toIcoMod Real.two_pi_pos 0 θ = θ := by\n      rw [toIcoMod_eq_self]; refine ⟨h0, ?_⟩; simp; linarith\n    simp only [stepCurvature, ht]; rw [if_pos]; left; linarith\n  · intro θ h0 h2\n    have ht : toIcoMod Real.two_pi_pos 0 θ = θ := by\n      rw [toIcoMod_eq_self]; refine ⟨by linarith, ?_⟩; simp; linarith\n    simp only [stepCurvature, ht]; rw [if_neg]\n    simp only [not_or, not_and, not_lt]; exact ⟨by linarith, fun h => by linarith⟩\n  · intro θ h0 h2\n    have ht : toIcoMod Real.two_pi_pos 0 θ = θ := by\n      rw [toIcoMod_eq_self]; refine ⟨by linarith, ?_⟩; simp; linarith\n    simp only [stepCurvature, ht]; rw [if_pos]; right; exact ⟨h0, h2⟩\n  · intro θ h0 h2\n    have ht : toIcoMod Real.two_pi_pos 0 θ = θ := by\n      rw [toIcoMod_eq_self]; refine ⟨by linarith, ?_⟩; simp; linarith\n    simp only [stepCurvature, ht]; rw [if_neg]\n    simp only [not_or, not_and, not_lt]; exact ⟨by linarith, fun h => by linarith⟩", "proof_size_lean": 1403, "has_sorry": false, "tex_file": "chapters/Gluck_StepReduction.tex", "lean_file": "Gluck/StepReduction.lean", "dep_count": 1, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 567, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 1669, "effort_total": 0}, "lem:error_vector_lipschitz": {"id": "lem:error_vector_lipschitz", "type": "lemma", "title": "", "chapter": "Reduction to a four-arc step function", "statement": "ok\n[Error vector is $L^1$-Lipschitz in the weight]\n  \n  \n  \n  For any two integrable weights $\\rho, \\rho' : \\mathbb{R} \\to \\mathbb{R}$ on\n  $[0,2\\pi]$,\n  \\[\n    \\bigl\\lVert E(\\rho) - E(\\rho')\\bigr\\rVert\n      \\;\\le\\; \\int_0^{2\\pi} \\bigl\\lvert \\rho(\\theta) - \\rho'(\\theta)\\bigr\\rvert \\, d\\theta\n      \\;=\\; \\lVert \\rho - \\rho'\\rVert_{L^1[0,2\\pi]} .\n  \\]\n  In particular $E$ is continuous in the $L^1$ (hence the close-in-measure, for\n  uniformly bounded weights) topology: if $\\rho$ and $\\rho'$ agree to within\n  $\\delta$ off a set of measure $<\\varepsilon$ and are bounded by $M$, then\n  $\\lVert E(\\rho) - E(\\rho')\\rVert \\le 2\\pi\\delta + 2M\\varepsilon$.", "uses": ["def:error_vector"], "lean_name": "Gluck.dist_errorVector_le", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:error_vector}\n  \\leanok\n  By definition $E(\\rho) - E(\\rho') = \\int_0^{2\\pi} e^{i\\theta}\\,(\\rho(\\theta) -\n  \\rho'(\\theta))\\,d\\theta$ by linearity of the integral. Taking norms and using\n  $\\lVert\\int f\\rVert \\le \\int \\lVert f\\rVert$ together with $\\lvert e^{i\\theta}\n  \\rvert = 1$ gives\n  \\[\n    \\lVert E(\\rho) - E(\\rho')\\rVert\n      \\le \\int_0^{2\\pi} \\lvert e^{i\\theta}\\rvert \\, \\lvert \\rho - \\rho'\\rvert \\, d\\theta\n      = \\int_0^{2\\pi} \\lvert \\rho - \\rho'\\rvert \\, d\\theta .\n  \\]\n  For the close-in-measure consequence, split $[0,2\\pi]$ into the good set (where\n  $\\lvert\\rho-\\rho'\\rvert \\le \\delta$, contributing $\\le 2\\pi\\delta$) and the bad\n  set of measure $<\\varepsilon$ (where $\\lvert\\rho-\\rho'\\rvert \\le 2M$,\n  contributing $\\le 2M\\varepsilon$).\n", "lean_source": "theorem dist_errorVector_le {ρ ρ' : ℝ → ℝ}\n    (hρ : IntervalIntegrable ρ volume 0 (2 * π))\n    (hρ' : IntervalIntegrable ρ' volume 0 (2 * π)) :\n    ‖errorVector ρ - errorVector ρ'‖ ≤ ∫ θ in (0 : ℝ)..(2 * π), |ρ θ - ρ' θ| := by\n\n  have hexp : Continuous fun φ : ℝ => Complex.exp ((φ : ℂ) * Complex.I) :=\n    Complex.continuous_exp.comp (Complex.continuous_ofReal.mul continuous_const)\n  have hρC : IntervalIntegrable (fun φ : ℝ => (ρ φ : ℂ)) volume 0 (2 * π) :=\n    ⟨hρ.1.ofReal, hρ.2.ofReal⟩\n  have hρ'C : IntervalIntegrable (fun φ : ℝ => (ρ' φ : ℂ)) volume 0 (2 * π) :=\n    ⟨hρ'.1.ofReal, hρ'.2.ofReal⟩\n  have hI : IntervalIntegrable\n      (fun φ : ℝ => Complex.exp ((φ : ℂ) * Complex.I) * (ρ φ : ℂ)) volume 0 (2 * π) :=\n    hρC.continuousOn_mul hexp.continuousOn\n  have hI' : IntervalIntegrable\n      (fun φ : ℝ => Complex.exp ((φ : ℂ) * Complex.I) * (ρ' φ : ℂ)) volume 0 (2 * π) :=\n    hρ'C.continuousOn_mul hexp.continuousOn\n\n  have hsub : errorVector ρ - errorVector ρ'\n      = ∫ φ in (0 : ℝ)..(2 * π),\n          Complex.exp ((φ : ℂ) * Complex.I) * ((ρ φ - ρ' φ : ℝ) : ℂ) := by\n    rw [errorVector, errorVector, reconstruct, reconstruct,\n      ← intervalIntegral.integral_sub hI hI']\n    refine intervalIntegral.integral_congr ?_\n    intro φ _\n    push_cast\n    ring\n  rw [hsub]\n\n  have hpi : (0 : ℝ) ≤ 2 * π := by positivity\n  calc ‖∫ φ in (0 : ℝ)..(2 * π),\n            Complex.exp ((φ : ℂ) * Complex.I) * ((ρ φ - ρ' φ : ℝ) : ℂ)‖\n      ≤ ∫ φ in (0 : ℝ)..(2 * π),\n            ‖Complex.exp ((φ : ℂ) * Complex.I) * ((ρ φ - ρ' φ : ℝ) : ℂ)‖ :=\n        intervalIntegral.norm_integral_le_integral_norm hpi\n    _ = ∫ φ in (0 : ℝ)..(2 * π), |ρ φ - ρ' φ| := by\n        refine intervalIntegral.integral_congr ?_\n        intro φ _\n        simp only [norm_mul, Complex.norm_exp_ofReal_mul_I, one_mul, Complex.norm_real,\n          Real.norm_eq_abs]", "proof_size_lean": 1841, "has_sorry": false, "tex_file": "chapters/Gluck_StepReduction.tex", "lean_file": "Gluck/StepReduction.lean", "dep_count": 1, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 764, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 2205, "effort_total": 0}, "lem:kappa_modulus_at": {"id": "lem:kappa_modulus_at", "type": "lemma", "title": "", "chapter": "Reduction to a four-arc step function", "statement": "ok\n[Pointwise modulus of continuity]\n  \n  \n  \n  Project-bespoke. Let $\\kappa$ be continuous and $c\\in\\mathbb{R}$. For every\n  $\\varepsilon>0$ there is $\\eta>0$ such that $\\lvert\\kappa(t)-\\kappa(c)\\rvert\\le\n  \\varepsilon$ whenever $\\lvert t-c\\rvert\\le\\eta$.", "uses": ["def:is_curvature_function"], "lean_name": "Gluck.kappa_modulus_at", "proved": true, "mathlib_ok": false, "proof_tex": "\n\n\\leanok\n  This is the $\\varepsilon$--$\\delta$ characterisation of continuity at $c$\n  (\\texttt{Metric.continuousAt\\_iff}): pick the $\\delta$ it supplies for\n  $\\varepsilon$ and take $\\eta=\\delta/2$, so $\\lvert t-c\\rvert\\le\\eta$ implies\n  $\\mathrm{dist}(t,c)<\\delta$ and hence the bound.\n", "lean_source": "lemma kappa_modulus_at {κ : ℝ → ℝ} (hcont : Continuous κ) (c : ℝ) {ε : ℝ}\n    (hε : 0 < ε) : ∃ η > 0, ∀ t, |t - c| ≤ η → |κ t - κ c| ≤ ε := by\n  obtain ⟨δ, hδ, h⟩ := Metric.continuousAt_iff.1 hcont.continuousAt ε hε\n  refine ⟨δ / 2, by positivity, fun t ht => ?_⟩\n  have : dist t c < δ := by rw [Real.dist_eq]; linarith\n  exact le_of_lt (by simpa [Real.dist_eq] using h this)", "proof_size_lean": 375, "has_sorry": false, "tex_file": "chapters/Gluck_StepReduction.tex", "lean_file": "Gluck/StepReduction.lean", "dep_count": 1, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 286, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 486, "effort_total": 0}, "lem:plateau_density": {"id": "lem:plateau_density", "type": "lemma", "title": "Calibrated continuous plateau density", "chapter": "Reduction to a four-arc step function", "statement": "Project-bespoke. The explicit density is built from a base level plus four\n  periodic unit triangular ``tent'' bumps $\\mathrm{tentBump}$ (realised as\n  $\\arccos(\\cos(\\theta-\\tau))$, giving $2\\pi$-periodicity and continuity for free);\n  the listed satellites compute their support- and cumulative integrals\n  ($\\mathrm{tentBump\\_integral\\_\\ast}$) and off-support vanishing\n  ($\\mathrm{cos\\_le\\_cos\\_half\\ast}$, $\\mathrm{tentBump\\_eq\\_zero\\_of\\_cos\\_le}$),\n  with $\\mathrm{integral\\_affine}$ for the affine pieces.\n  Given crossing points $c_1<c_2<c_3<c_4<c_1+2\\pi$, the offset\n  $m_0=(c_1+c_4)/2-\\pi$, a plateau radius $\\eta>0$ small enough that\n  $\\eta<(c_{k+1}-c_k)/2$ for each $k$ (cyclically), and a race width $0<\\delta<\\pi/2$,\n  there is a \\emph{continuous, strictly positive, $2\\pi$-periodic} speed density\n  $w:\\mathbb{R}\\to\\mathbb{R}$ with period integral $\\int_0^{2\\pi} w = 2\\pi$ such\n  that the cumulative map $h_1(\\theta)=m_0+\\int_0^\\theta w$ satisfies, on the\n  central sub-arc (``plateau'') of each target arc $I_k=[(k-1)\\pi/2,\\,k\\pi/2)$,\n  \\[\n    \\tfrac{\\delta}{2}\\le\\theta-(k-1)\\tfrac{\\pi}{2}\\le\\tfrac{\\pi}{2}-\\tfrac{\\delta}{2}\n    \\;\\Longrightarrow\\; \\bigl\\lvert h_1(\\theta)-c_k\\bigr\\rvert\\le\\eta .\n  \\]", "uses": [], "lean_name": "Gluck.exists_plateau_density, Gluck.integral_affine, Gluck.tentBump, Gluck.tentBump_nonneg, Gluck.tentBump_continuous, Gluck.tentBump_periodic, Gluck.cos_le_cos_half, Gluck.cos_le_cos_half_shift, Gluck.tentBump_eq_zero_of_cos_le, Gluck.tentBump_affine_zero, Gluck.tentBump_integral_right, Gluck.tentBump_integral_left, Gluck.tentBump_integral_center, Gluck.tentBump_integral_support, Gluck.tentBump_integral_zero_of_forall, Gluck.tentBump_integral_full, Gluck.tentBump_integral_none, Gluck.tentBump_integral_boundary, Gluck.tentBump_integral_period, Gluck.tentBump_integral_two_pi", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:kappa_modulus_at}\n  Take $w$ to be the explicit continuous trapezoidal density that is large (a\n  ``race'') on the two flanking sub-arcs of total length $\\delta$ of each $I_k$\n  and small (a ``plateau'') on the central sub-arc of length $\\pi/2-\\delta$,\n  calibrated so the central sub-arc is carried affinely onto $[c_k-\\eta,c_k+\\eta]$\n  and each $I_k$ is carried onto $J_k=[m_{k-1},m_k)$. Positivity holds because all\n  levels are positive; $2\\pi$-periodicity by matching the values at the period\n  endpoints; the period integral telescopes to $\\sum_k\\lvert J_k\\rvert=2\\pi$. On\n  the central plateau $h_1$ is affine with image $[c_k-\\eta,c_k+\\eta]$, giving the\n  stated bound. The construction is elementary but lengthy (an explicit $12$-piece\n  continuous piecewise-linear density with per-arc calibration); it is isolated as\n  a single obligation so the surrounding \\cref{lem:exists_preliminary_reparam} can\n  be proved unconditionally.\n", "lean_source": "lemma exists_plateau_density {c₁ c₂ c₃ c₄ m₀ η δ : ℝ}\n    (h12 : c₁ < c₂) (h23 : c₂ < c₃) (h34 : c₃ < c₄) (h41 : c₄ < c₁ + 2 * π)\n    (hm₀ : m₀ = (c₁ + c₄) / 2 - π)\n    (hη : 0 < η) (hδ : 0 < δ) (hδ' : δ < π / 2)\n    (hfit₁ : η < (c₂ - c₁) / 2) (hfit₂ : η < (c₃ - c₂) / 2)\n    (hfit₃ : η < (c₄ - c₃) / 2) (hfit₄ : η < (c₁ + 2 * π - c₄) / 2) :\n    ∃ w : ℝ → ℝ, Continuous w ∧ (∀ x, 0 < w x) ∧ Function.Periodic w (2 * π) ∧\n      (∫ s in (0:ℝ)..(2 * π), w s) = 2 * π ∧\n      (∀ θ, δ / 2 ≤ θ → θ ≤ π / 2 - δ / 2 →\n        |m₀ + (∫ s in (0:ℝ)..θ, w s) - c₁| ≤ η) ∧\n      (∀ θ, π / 2 + δ / 2 ≤ θ → θ ≤ π - δ / 2 →\n        |m₀ + (∫ s in (0:ℝ)..θ, w s) - c₂| ≤ η) ∧\n      (∀ θ, π + δ / 2 ≤ θ → θ ≤ 3 * π / 2 - δ / 2 →\n        |m₀ + (∫ s in (0:ℝ)..θ, w s) - c₃| ≤ η) ∧\n      (∀ θ, 3 * π / 2 + δ / 2 ≤ θ → θ ≤ 2 * π - δ / 2 →\n        |m₀ + (∫ s in (0:ℝ)..θ, w s) - c₄| ≤ η) := by\n  have hπ : 0 < π := Real.pi_pos\n  have hδπ : δ < π := by linarith\n  have hδne : δ ≠ 0 := hδ.ne'\n  have hπne : π ≠ 0 := hπ.ne'\n\n  set p : ℝ := 4 * η / π with hp\n  set A₀ : ℝ := c₁ + 2 * π - c₄ - 2 * η with hA0\n  set A₁ : ℝ := c₂ - c₁ - 2 * η with hA1\n  set A₂ : ℝ := c₃ - c₂ - 2 * η with hA2\n  set A₃ : ℝ := c₄ - c₃ - 2 * η with hA3\n  have hA0pos : 0 < A₀ := by rw [hA0]; linarith\n  have hA1pos : 0 < A₁ := by rw [hA1]; linarith\n  have hA2pos : 0 < A₂ := by rw [hA2]; linarith\n  have hA3pos : 0 < A₃ := by rw [hA3]; linarith\n  have hppos : 0 < p := by rw [hp]; exact div_pos (by linarith) hπ\n\n  set w : ℝ → ℝ := fun θ => p + (2 * A₀ / δ) * tentBump δ 0 θ\n      + (2 * A₁ / δ) * tentBump δ (π / 2) θ + (2 * A₂ / δ) * tentBump δ π θ\n      + (2 * A₃ / δ) * tentBump δ (3 * π / 2) θ with hwdef\n  have ii : ∀ (k τ θ : ℝ), IntervalIntegrable (fun s => k * tentBump δ τ s)\n      MeasureTheory.volume 0 θ :=\n    fun k τ θ => ((tentBump_continuous δ τ).intervalIntegrable _ _).const_mul k\n\n  have hsplit : ∀ θ : ℝ, (∫ s in (0:ℝ)..θ, w s)\n      = p * θ + (2 * A₀ / δ) * (∫ s in (0:ℝ)..θ, tentBump δ 0 s)\n        + (2 * A₁ / δ) * (∫ s in (0:ℝ)..θ, tentBump δ (π / 2) s)\n        + (2 * A₂ / δ) * (∫ s in (0:ℝ)..θ, tentBump δ π s)\n        + (2 * A₃ / δ) * (∫ s in (0:ℝ)..θ, tentBump δ (3 * π / 2) s) := by\n    intro θ\n    have iic : IntervalIntegrable (fun _ : ℝ => p) MeasureTheory.volume 0 θ :=\n      intervalIntegrable_const\n    have i0 : IntervalIntegrable\n        (fun s => p + (2 * A₀ / δ) * tentBump δ 0 s) MeasureTheory.volume 0 θ :=\n      iic.add (ii _ _ _)\n    have i1 : IntervalIntegrable\n        (fun s => p + (2 * A₀ / δ) * tentBump δ 0 s\n          + (2 * A₁ / δ) * tentBump δ (π / 2) s) MeasureTheory.volume 0 θ :=\n      i0.add (ii _ _ _)\n    have i2 : IntervalIntegrable\n        (fun s => p + (2 * A₀ / δ) * tentBump δ 0 s\n          + (2 * A₁ / δ) * tentBump δ (π / 2) s\n          + (2 * A₂ / δ) * tentBump δ π s) MeasureTheory.volume 0 θ :=\n      i1.add (ii _ _ _)\n    simp only [hwdef]\n    rw [intervalIntegral.integral_add i2 (ii _ _ _),\n        intervalIntegral.integral_add i1 (ii _ _ _),\n        intervalIntegral.integral_add i0 (ii _ _ _),\n        intervalIntegral.integral_add iic (ii _ _ _),\n        intervalIntegral.integral_const_mul, intervalIntegral.integral_const_mul,\n        intervalIntegral.integral_const_mul, intervalIntegral.integral_const_mul,\n        intervalIntegral.integral_const]\n    simp only [smul_eq_mul]; ring\n\n  have hfinal : ∀ X : ℝ, |X| ≤ π → |η * X / π| ≤ η := by\n    intro X hX\n    rw [abs_div, abs_of_pos hπ, abs_mul, abs_of_pos hη, div_le_iff₀ hπ]\n    nli
