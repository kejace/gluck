o st\n    have hs0 : (0 : ℝ) ≤ (st.1 : ℝ) := st.1.2.1\n    have hs1 : (st.1 : ℝ) ≤ 1 := st.1.2.2\n    set v : ℂ := (st.1 : ℝ) • (γ' st.2 - γ st.2) with hvdef\n    have hv : ‖v‖ ≤ ‖γ' st.2 - γ st.2‖ := by\n      rw [hvdef, norm_smul, Real.norm_eq_abs, abs_of_nonneg hs0]\n      calc (st.1 : ℝ) * ‖γ' st.2 - γ st.2‖\n            ≤ 1 * ‖γ' st.2 - γ st.2‖ := mul_le_mul_of_nonneg_right hs1 (norm_nonneg _)\n        _ = ‖γ' st.2 - γ st.2‖ := one_mul _\n    have htri : ‖γ st.2‖ - ‖v‖ ≤ ‖γ st.2 + v‖ := by\n      have h := norm_sub_norm_le (γ st.2) (-v)\n      rwa [norm_neg, sub_neg_eq_add] at h\n    have hpos : 0 < ‖γ st.2 + v‖ := by have hp := hpert st.2; linarith\n    have hHval : Hc st = γ st.2 + v := rfl\n    rw [hHval]\n    exact norm_pos_iff.1 hpos\n\n  set H : C(I × I, Circle) :=\n    ⟨fun st => circleProj (Hc st) (hHcne st), by\n      apply Continuous.subtype_mk\n      exact hHccont.div (Complex.continuous_ofReal.comp (continuous_norm.comp hHccont))\n        (fun st => Complex.ofReal_ne_zero.2 (norm_ne_zero_iff.2 (hHcne st)))⟩ with hHdef\n\n  have h0 : ∀ t : I, H (0, t) = normLoop γ hγ t := by\n    intro t\n    change circleProj (Hc (0, t)) (hHcne (0, t)) = circleProj (γ t) (hγ t)\n    apply circleProj_congr\n    change γ t + ((0 : I) : ℝ) • (γ' t - γ t) = γ t\n    rw [Set.Icc.coe_zero, zero_smul, add_zero]\n\n  have h1 : ∀ t : I, H (1, t) = normLoop γ' hγ' t := by\n    intro t\n    change circleProj (Hc (1, t)) (hHcne (1, t)) = circleProj (γ' t) (hγ' t)\n    apply circleProj_congr\n    change γ t + ((1 : I) : ℝ) • (γ' t - γ t) = γ' t\n    rw [Set.Icc.coe_one, one_smul, add_sub_cancel]\n\n  have hloop : ∀ s : I, H (s, 0) = H (s, 1) := by\n    intro s\n    change circleProj (Hc (s, 0)) (hHcne (s, 0)) = circleProj (Hc (s, 1)) (hHcne (s, 1))\n    apply circleProj_congr\n    change γ (0 : I) + (s : ℝ) • (γ' (0 : I) - γ (0 : I))\n      = γ (1 : I) + (s : ℝ) • (γ' (1 : I) - γ (1 : I))\n    rw [hloopγ, hloopγ']\n  have hinv := windingNumber_eq_of_homotopy H h0 h1 hloop\n  rw [windingNumberC, windingNumberC, hinv]", "proof_size_lean": 2625, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 3, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 305, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 8509, "effort_total": 0}, "def:disk_boundary_loop": {"id": "def:disk_boundary_loop", "type": "definition", "title": "", "chapter": "The winding-number argument", "statement": "ok\n[Boundary loop of the unit disk]\n  \n  \n  Project-bespoke. For $F : \\overline{\\mathbb{D}} \\to \\mathbb{C}$, the\n  \\emph{boundary loop} is $t \\mapsto F(e^{2\\pi i t})$.", "uses": [], "lean_name": "Gluck.diskBoundaryLoop", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def diskBoundaryLoop (F : ℂ → ℂ)\n    (hF : ContinuousOn F (Metric.closedBall 0 1)) : C(I, ℂ) :=\n  ⟨fun t => F (Circle.exp (2 * π * t)), by\n    apply hF.comp_continuous\n    · exact continuous_subtype_val.comp\n        (Circle.exp.continuous.comp (continuous_const.mul continuous_subtype_val))\n    · intro t\n      simp only [Metric.mem_closedBall, dist_zero_right]\n      rw [Circle.norm_coe]⟩", "proof_size_lean": 403, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 0, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 403, "effort_total": 0}, "lem:disk_boundary_loop_ne_zero": {"id": "lem:disk_boundary_loop_ne_zero", "type": "lemma", "title": "", "chapter": "The winding-number argument", "statement": "ok\n[Boundary loop is nonvanishing]\n  \n  \n  \n  Project-bespoke. If $F \\ne 0$ on $\\partial\\mathbb{D}$, the boundary loop is\n  nowhere zero.", "uses": ["def:disk_boundary_loop"], "lean_name": "Gluck.diskBoundaryLoop_ne_zero", "proved": true, "mathlib_ok": false, "proof_tex": "\n\n\\leanok\n  Each point $e^{2\\pi i t}$ lies on $\\partial\\mathbb{D}$, where $F \\ne 0$.\n", "lean_source": "theorem diskBoundaryLoop_ne_zero (F : ℂ → ℂ)\n    (hF : ContinuousOn F (Metric.closedBall 0 1))\n    (hbd : ∀ z ∈ Metric.sphere (0 : ℂ) 1, F z ≠ 0) (t : I) :\n    diskBoundaryLoop F hF t ≠ 0 := by\n  apply hbd\n  rw [mem_sphere_zero_iff_norm, Circle.norm_coe]", "proof_size_lean": 254, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 82, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 657, "effort_total": 0}, "def:configuration_space": {"id": "def:configuration_space", "type": "definition", "title": "", "chapter": "The winding-number argument", "statement": "ok\n[Configuration disk]\n  \n  \n  \n  \\textit{Source: DeTurck--Gluck, §6 (the loop of diffeomorphisms, finitised).}\n  Fix $0 < a < b$ and a radius $0 < \\delta \\le \\pi/8$. The \\emph{configuration\n  disk} is the explicit two-parameter family parametrised by the closed unit disk\n  $\\overline{\\mathbb{D}} \\subset \\mathbb{R}^2$ (coordinates $(x,y)$, $x^2+y^2 \\le\n  1$): the two leading breakpoints vary while the trailing two are pinned,\n  \\[\n    \\mathrm{configSpace}(x,y) \\;=\\;\n      \\bigl(\\theta_1,\\theta_2,\\theta_3,\\theta_4\\bigr)\n      \\;=\\;\\Bigl(\\tfrac{\\pi}{4} + \\delta x,\\;\n                 \\tfrac{3\\pi}{4} + \\delta y,\\;\n                 \\tfrac{5\\pi}{4},\\;\\tfrac{7\\pi}{4}\\Bigr).\n  \\]\n  The centre $(x,y)=(0,0)$ is the canonical equally-spaced bicircle (breakpoints\n  $\\tfrac{\\pi}{4},\\tfrac{3\\pi}{4},\\tfrac{5\\pi}{4},\\tfrac{7\\pi}{4}$, four arcs of\n  length $\\pi/2$), which closes up: its chord sum is $V = (e^{3\\pi i/4} - e^{\\pi\n  i/4}) + (e^{7\\pi i/4} - e^{5\\pi i/4}) = -\\sqrt2 + \\sqrt2 = 0$; since the bicircle\n  error vector is a nonzero scalar multiple of this chord sum\n  (\\cref{lem:error_vector_of_bicircle}), the canonical bicircle has zero error\n  vector. The\n  bound $\\delta \\le \\pi/8$ keeps the order constraint $0 < \\theta_1 < \\theta_2 <\n  \\theta_3 < \\theta_4 < \\theta_1 + 2\\pi$ on all of $\\overline{\\mathbb{D}}$ (since\n  $|\\delta x|, |\\delta y| \\le \\delta \\le \\pi/8 < \\pi/4$). $\\mathrm{configSpace}$ is\n  affine, hence continuous, and is a homeomorphism onto its (convex) image.", "uses": ["def:four_arc_step_function"], "lean_name": "Gluck.configSpace", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def configSpace (δ : ℝ) (p : ℝ × ℝ) : ℝ × ℝ × ℝ × ℝ :=\n  (π / 4 + δ * p.1, 3 * π / 4 + δ * p.2, 5 * π / 4, 7 * π / 4)", "proof_size_lean": 131, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 1, "rdep_count": 8, "descendant_count": 45, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 397, "effort_total": 0}, "lem:config_space_props": {"id": "lem:config_space_props", "type": "lemma", "title": "Configuration disk: order", "chapter": "The winding-number argument", "statement": "Project-bespoke. For $0<\\delta\\le\\pi/8$ and $\\lvert x\\rvert,\\lvert y\\rvert\\le 1$,\n  the order constraint $0<\\theta_1<\\theta_2<\\theta_3<\\theta_4<\\theta_1+2\\pi$ holds\n  ($\\mathrm{configSpace\\_ordered}$).", "uses": ["def:configuration_space"], "lean_name": "Gluck.configSpace_ordered", "proved": false, "mathlib_ok": false, "proof_tex": "\n\n  Substitute the formulas $\\theta_1=\\pi/4+\\delta x$, etc.; $\\lvert\\delta\n  x\\rvert,\\lvert\\delta y\\rvert\\le\\delta\\le\\pi/8<\\pi/4$ keeps the four breakpoints\n  strictly ordered within one period (\\texttt{nlinarith}/\\texttt{linarith}).\n", "lean_source": "private theorem configSpace_ordered (δ : ℝ) (hδ : 0 < δ) (hδ' : δ ≤ π / 8)\n    (p : ℝ × ℝ) (hx : |p.1| ≤ 1) (hy : |p.2| ≤ 1) :\n    0 < (configSpace δ p).1 ∧ (configSpace δ p).1 < (configSpace δ p).2.1 ∧\n    (configSpace δ p).2.1 < (configSpace δ p).2.2.1 ∧\n    (configSpace δ p).2.2.1 < (configSpace δ p).2.2.2 ∧\n    (configSpace δ p).2.2.2 < (configSpace δ p).1 + 2 * π := by\n  have hpi : 0 < π := Real.pi_pos\n  obtain ⟨hx1, hx2⟩ := abs_le.mp hx\n  obtain ⟨hy1, hy2⟩ := abs_le.mp hy\n\n  have hdx2 : δ * p.1 ≤ π / 8 := by nlinarith [mul_nonneg hδ.le (by linarith : (0:ℝ) ≤ 1 - p.1)]\n  have hdx1 : -(π / 8) ≤ δ * p.1 := by nlinarith [mul_nonneg hδ.le (by linarith : (0:ℝ) ≤ p.1 + 1)]\n  have hdy2 : δ * p.2 ≤ π / 8 := by nlinarith [mul_nonneg hδ.le (by linarith : (0:ℝ) ≤ 1 - p.2)]\n  have hdy1 : -(π / 8) ≤ δ * p.2 := by nlinarith [mul_nonneg hδ.le (by linarith : (0:ℝ) ≤ p.2 + 1)]\n  simp only [configSpace]\n  refine ⟨by linarith, by linarith, by linarith, by linarith, by linarith⟩", "proof_size_lean": 978, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 1, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 229, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 1375, "effort_total": 0}, "def:error_map": {"id": "def:error_map", "type": "definition", "title": "The error map and its closed form", "chapter": "The winding-number argument", "statement": "Project-bespoke. $\\mathrm{errorMap}(a,b,\\delta)(z) := E_{\\mathrm{bi}}\\bigl(a,b,\n  \\mathrm{configSpace}(\\delta)(z.\\mathrm{re},z.\\mathrm{im})\\bigr)$ is the bicircle\n  error vector of the configuration parametrised by $z\\in\\overline{\\mathbb{D}}$.\n  $\\mathrm{errorMap\\_eq}$ records its closed form $E = s\\cdot(V+\\sqrt2)$ on the\n  disk (from \\cref{lem:error_vector_of_bicircle}), and\n  $\\mathrm{continuousOn\\_errorMap}$ its continuity there.", "uses": ["def:configuration_space", "def:bicircle_error_vector"], "lean_name": "Gluck.errorMap, Gluck.errorMap_eq, Gluck.continuousOn_errorMap", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def errorMap (a b δ : ℝ) (z : ℂ) : ℂ :=\n  bicircleErrorVector a b (π / 4 + δ * z.re) (3 * π / 4 + δ * z.im) (5 * π / 4) (7 * π / 4)\n\nprivate theorem errorMap_eq (a b δ : ℝ) (hδ : 0 < δ) (hδ' : δ ≤ π / 8) {z : ℂ} (hz : ‖z‖ ≤ 1) :\n    errorMap a b δ z\n      = (1 / (Complex.I * (b : ℂ)) - 1 / (Complex.I * (a : ℂ)))\n        * ((Complex.exp (((3 * π / 4 + δ * z.im : ℝ) : ℂ) * Complex.I)\n            - Complex.exp (((π / 4 + δ * z.re : ℝ) : ℂ) * Complex.I))\n          + (Real.sqrt 2 : ℂ)) := by\n  obtain ⟨h1, h12, h23, h34, h4⟩ := errorMap_order δ hδ hδ' hz\n  rw [errorMap, bicircleErrorVector_eq a b _ _ _ _ h1 h12 h23 h34 h4]\n  congr 1\n\n  have hpin : Complex.exp (((7 * π / 4 : ℝ) : ℂ) * Complex.I)\n      - Complex.exp (((5 * π / 4 : ℝ) : ℂ) * Complex.I) = (Real.sqrt 2 : ℂ) := by\n    apply Complex.ext\n    · simp only [Complex.sub_re, Complex.exp_ofReal_mul_I_re, Complex.ofReal_re]\n      rw [show (7 * π / 4 : ℝ) = 2 * π - π / 4 by ring,\n          show (5 * π / 4 : ℝ) = π / 4 + π by ring,\n          Real.cos_two_pi_sub, Real.cos_add_pi, Real.cos_pi_div_four]\n      ring\n    · simp only [Complex.sub_im, Complex.exp_ofReal_mul_I_im, Complex.ofReal_im]\n      rw [show (7 * π / 4 : ℝ) = 2 * π - π / 4 by ring,\n          show (5 * π / 4 : ℝ) = π / 4 + π by ring,\n          Real.sin_two_pi_sub, Real.sin_add_pi, Real.sin_pi_div_four]\n      ring\n  rw [hpin]\n\nprivate theorem continuousOn_errorMap (a b δ : ℝ) (hδ : 0 < δ) (hδ' : δ ≤ π / 8) :\n    ContinuousOn (errorMap a b δ) (Metric.closedBall 0 1) := by\n  apply ContinuousOn.congr\n    (f := fun z : ℂ => (1 / (Complex.I * (b : ℂ)) - 1 / (Complex.I * (a : ℂ)))\n        * ((Complex.exp (((3 * π / 4 + δ * z.im : ℝ) : ℂ) * Complex.I)\n            - Complex.exp (((π / 4 + δ * z.re : ℝ) : ℂ) * Complex.I))\n          + (Real.sqrt 2 : ℂ)))\n  · fun_prop\n  · intro z hz\n    have hz' : ‖z‖ ≤ 1 := by simpa [dist_zero_right] using Metric.mem_closedBall.1 hz\n    exact errorMap_eq a b δ hδ hδ' hz'", "proof_size_lean": 1943, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 2, "rdep_count": 4, "descendant_count": 11, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 2714, "effort_total": 0}, "def:reverse_loop": {"id": "def:reverse_loop", "type": "definition", "title": "Reverse once-around loop primitives", "chapter": "The winding-number argument", "statement": "Project-bespoke reverse-orientation once-around loops:\n  $\\mathrm{negStandardLoop}(t)=\\mathrm{Circle.exp}(-2\\pi t)$, the circle loop\n  $t\\mapsto e^{-2\\pi i t}$, with winding $-1$ (computed directly from the lift\n  $\\varphi(t)=-2\\pi t$ via \\cref{lem:winding_number_eq_div_of_lift}); its\n  $\\mathbb{C}$-valued form\n  $\\mathrm{negCircleExpLoop}$ (nonvanishing) with $W_\\mathbb{C}=-1$, and\n  $\\mathrm{windingNumberC\\_congr}$ (pointwise-equal $\\mathbb{C}$-loops have equal\n  winding). These realise the linear model $L=\\delta e^{-i\\pi/4}e^{-2\\pi i t}$ in\n  the proof of \\cref{lem:error_map_winds_boundary}.", "uses": ["def:winding_number", "def:winding_number_c", "def:norm_loop", "lem:winding_number_eq_div_of_lift", "lem:circle_proj_helpers"], "lean_name": "Gluck.negStandardLoop, Gluck.windingNumber_negStandard, Gluck.negCircleExpLoop, Gluck.negCircleExpLoop_ne, Gluck.windingNumberC_negCircleExp, Gluck.windingNumberC_congr", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "private noncomputable def negStandardLoop : C(I, Circle) :=\n  ⟨fun t => Circle.exp (-(2 * π * (t : ℝ))),\n    Circle.exp.continuous.comp (continuous_const.mul continuous_subtype_val).neg⟩\n\nprivate theorem windingNumber_negStandard : windingNumber negStandardLoop = -1 := by\n  have hlift : ∀ t : I, Circle.exp ((fun t : I => -(2 * π * (t : ℝ))) t) = negStandardLoop t :=\n    fun _ => rfl\n  rw [windingNumber_eq_div_of_lift negStandardLoop\n    ⟨fun t : I => -(2 * π * (t : ℝ)), (continuous_const.mul continuous_subtype_val).neg⟩ hlift]\n  have h2pi : (2 * π : ℝ) ≠ 0 := by positivity\n  simp only [ContinuousMap.coe_mk, Set.Icc.coe_one, Set.Icc.coe_zero, mul_one, mul_zero, neg_zero,\n    sub_zero]\n  field_simp\n\nprivate noncomputable def negCircleExpLoop : C(I, ℂ) :=\n  ⟨fun t : I => ((negStandardLoop t : Circle) : ℂ),\n    continuous_subtype_val.comp negStandardLoop.continuous⟩\n\nprivate theorem negCircleExpLoop_ne (t : I) : negCircleExpLoop t ≠ 0 := by\n  change ((negStandardLoop t : Circle) : ℂ) ≠ 0\n  exact norm_pos_iff.1 (by rw [Circle.norm_coe]; norm_num)\n\nprivate theorem windingNumberC_negCircleExp : windingNumberC negCircleExpLoop negCircleExpLoop_ne = -1 := by\n  have hnl : normLoop negCircleExpLoop negCircleExpLoop_ne = negStandardLoop := by\n    apply ContinuousMap.ext\n    intro t\n    exact circleProj_coe (negStandardLoop t) (negCircleExpLoop_ne t)\n  rw [windingNumberC, hnl, windingNumber_negStandard]\n\ntheorem windingNumberC_congr {γ γ' : C(I, ℂ)} {h : ∀ t, γ t ≠ 0} {h' : ∀ t, γ' t ≠ 0}\n    (he : ∀ t, γ t = γ' t) : windingNumberC γ h = windingNumberC γ' h' := by\n  have hnl : normLoop γ h = normLoop γ' h' := by\n    apply ContinuousMap.ext\n    intro t\n    exact circleProj_congr (h t) (h' t) (he t)\n  rw [windingNumberC, windingNumberC, hnl]", "proof_size_lean": 1746, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 5, "rdep_count": 1, "descendant_count": 8, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 6499, "effort_total": 0}, "lem:error_map_winds_boundary": {"id": "lem:error_map_winds_boundary", "type": "lemma", "title": "The error map winds nontrivially on the boundary", "chapter": "The winding-number argument", "statement": "\\textit{Source: DeTurck--Gluck, §6 (error vectors wind once around the origin).}\n  Let $E : \\overline{\\mathbb{D}} \\to \\mathbb{C}$ send $(x,y)$ to the bicircle error\n  vector of $\\mathrm{configSpace}(x,y)$ (\\cref{def:configuration_space},\n  \\cref{lem:error_vector_of_bicircle}). For all sufficiently small $\\delta > 0$,\n  $E$ is continuous, $E \\ne 0$ on the boundary circle $\\partial\\mathbb{D}$, and the\n  boundary loop $E|_{\\partial\\mathbb{D}}$ has \\emph{nonzero} winding number\n  $W_{\\mathbb{C}}(E|_{\\partial\\mathbb{D}}) = \\pm 1 \\ne 0$ about the origin.\n\n  \\emph{(Only nonvanishing of the winding number is used downstream\n  (\\cref{thm:existence_of_zero}); the sign $-1$ here merely reflects the\n  orientation of the chosen parametrisation.)}", "uses": ["def:configuration_space", "def:error_map", "def:reverse_loop", "lem:error_vector_of_bicircle", "def:winding_number_c"], "lean_name": "Gluck.errorMap_winding_eq_one, Gluck.errorMap_order, Gluck.Vpart, Gluck.Lpart, Gluck.Lpart_norm, Gluck.pert_lt, Gluck.Vpart_ne, Gluck.remainder_identity, Gluck.remainder_norm_le, Gluck.continuous_Vpart_boundary, Gluck.errVloop, Gluck.errSVloop, Gluck.errLloop, Gluck.errLloop_eq_Lpart", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:error_vector_of_bicircle, def:configuration_space, def:winding_number_c,\n        lem:winding_number_eq_of_homotopy, def:reverse_loop}\n  By \\cref{lem:error_vector_of_bicircle}, $E(x,y) = s\\cdot V(x,y)$ with the nonzero\n  constant scalar $s = \\tfrac{1}{ib} - \\tfrac{1}{ia}$ (nonzero since $a \\ne b$) and\n  chord sum\n  \\[\n    V(x,y) = \\bigl(e^{i\\theta_2} - e^{i\\theta_1}\\bigr) + \\sqrt2,\n    \\qquad \\theta_1 = \\tfrac{\\pi}{4}+\\delta x,\\ \\theta_2 = \\tfrac{3\\pi}{4}+\\delta y,\n  \\]\n  (using $e^{i\\theta_4}-e^{i\\theta_3} = e^{7\\pi i/4}-e^{5\\pi i/4} = \\sqrt2$ for the\n  pinned trailing breakpoints). $E$ is a composition of continuous maps, hence\n  continuous. Multiplying a loop by the fixed nonzero scalar $s$ does not change its\n  winding number, so $W_{\\mathbb{C}}(E|_{\\partial\\mathbb{D}}) =\n  W_{\\mathbb{C}}(V|_{\\partial\\mathbb{D}})$; it remains to compute the winding of $V$.\n\n  \\emph{Linear model.} The first-order Taylor expansion of $V$ at the centre is the\n  invertible $\\mathbb{R}$-linear map\n  \\[\n    L(x,y) = \\tfrac{\\delta}{\\sqrt2}\\bigl[(x-y) - i\\,(x+y)\\bigr],\n  \\]\n  obtained from $\\partial_x V = \\delta(-i\\,e^{i\\pi/4}) = \\tfrac{\\delta}{\\sqrt2}(1-i)$\n  and $\\partial_y V = \\delta(i\\,e^{3\\pi i/4}) = \\tfrac{\\delta}{\\sqrt2}(-1-i)$. As a\n  matrix $L = \\delta\\,U$ with $U = \\tfrac{1}{\\sqrt2}\\bigl(\\begin{smallmatrix} 1 & -1\n  \\\\ -1 & -1\\end{smallmatrix}\\bigr)$ orthogonal ($\\det U = -1$); hence $\\lVert\n  L(x,y)\\rVert =\n  \\delta$ for every $(x,y)$ on the unit circle, and $V(0,0)=0$ so $V = L + R$ with\n  remainder $R$ vanishing to second order: $\\lVert R(x,y)\\rVert \\le C\\delta^2$ on\n  $\\partial\\mathbb{D}$ (the map $(x,y) \\mapsto e^{i\\theta_2}-e^{i\\theta_1}$ is smooth\n  with second derivatives bounded by $\\delta^2$, so the linear-Taylor error is\n  $O(\\delta^2)$ with an absolute constant $C$).\n\n  \\emph{Homotopy to the linear model.} Choose $\\delta$ small enough that $C\\delta^2\n  < \\delta$, i.e.\\ $\\delta < 1/C$ (and $\\delta \\le \\pi/8$ as in\n  \\cref{def:configuration_space}). Then on $\\partial\\mathbb{D}$, $\\lVert R\\rVert \\le\n  C\\delta^2 < \\delta = \\lVert L\\rVert$, so the straight-line homotopy $V_\\tau = L +\n  \\tau R$ ($\\tau\\in[0,1]$) is nowhere zero on $\\partial\\mathbb{D}$ (since $\\lVert\n  V_\\tau\\rVert \\ge \\lVert L\\rVert - \\lVert R\\rVert > 0$). By\n  \\cref{lem:winding_number_eq_of_homotopy} (applied to the induced homotopy of\n  normalised circle loops), $W_{\\mathbb{C}}(V|_{\\partial\\mathbb{D}}) =\n  W_{\\mathbb{C}}(L|_{\\partial\\mathbb{D}})$.\n\n  \\emph{Winding of the linear model.} $L = \\delta U$ is an invertible\n  $\\mathbb{R}$-linear map; the further straight-line homotopy of $U$ to the standard\n  reflection through invertible matrices (any invertible matrix is path-connected\n  within $\\mathrm{GL}_2$ to $\\pm$ a rotation, the path stays invertible so the loop\n  stays nonzero) carries $L|_{\\partial\\mathbb{D}}$ to a once-around loop, with the\n  reflection $\\det U = -1$ fixing the reverse orientation; by \\cref{def:reverse_loop}\n  (the reverse once-around loop $t\\mapsto e^{-2\\pi i t}$ has winding $-1$) its winding\n  is $-1$. In particular it is nonzero. This is\n  the planar analogue of ``a degree-one polynomial winds once''\n  (\\cref{thm:existence_of_zero}'s FTA analogy).\n", "lean_source": "theorem errorMap_winding_eq_one (a b δ : ℝ) (ha : 0 < a) (hb : 0 < b) (hab : a ≠ b)\n    (hδ : 0 < δ) (hδ' : δ ≤ π / 8) :\n    ∃ (hF : ContinuousOn (errorMap a b δ) (Metric.closedBall 0 1))\n      (hbd : ∀ z ∈ Metric.sphere (0 : ℂ) 1, errorMap a b δ z ≠ 0),\n      windingNumberC (diskBoundaryLoop (errorMap a b δ) hF)\n        (diskBoundaryLoop_ne_zero (errorMap a b δ) hF hbd) = -1 := by\n\n  have hs : (1 / (Complex.I * (b : ℂ)) - 1 / (Complex.I * (a : ℂ))) ≠ 0 := by\n    have hkey : (1 : ℂ) / (Complex.I * (b : ℂ)) - 1 / (Complex.I * (a : ℂ))\n        = -Complex.I * (1 / (b : ℂ) - 1 / (a : ℂ)) := by\n      rw [one_div, one_div, mul_inv, mul_inv, Complex.inv_I]; ring\n    rw [hkey]\n    apply mul_ne_zero (neg_ne_zero.mpr Complex.I_ne_zero)\n    rw [sub_ne_zero, one_div, one_div, ne_eq, inv_inj]\n    intro h; exact hab (by exact_mod_cast h.symm)\n\n  have hcc : ((δ : ℂ) * Complex.exp ((↑(-(π / 4)) : ℂ) * Complex.I)) ≠ 0 :=\n    mul_ne_zero (by exact_mod_cast hδ.ne') (Complex.exp_ne_zero _)\n\n  have hztcs : ∀ t : I, (((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ)).re ^ 2\n      + (((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ)).im ^ 2 = 1 := by\n    intro t\n    have h2 := Complex.sq_norm ((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ)\n    rw [Circle.norm_coe, Complex.normSq_apply] at h2; nlinarith [h2]\n\n  have hV : ∀ t : I, errVloop δ t ≠ 0 := fun t => Vpart_ne δ hδ hδ' (hztcs t)\n  have hbd : ∀ z ∈ Metric.sphere (0 : ℂ) 1, errorMap a b δ z ≠ 0 := by\n    intro z hz\n    rw [mem_sphere_zero_iff_norm] at hz\n    have hcs : z.re ^ 2 + z.im ^ 2 = 1 := by\n      have h2 := Complex.sq_norm z\n      rw [hz, Complex.normSq_apply] at h2; nlinarith [h2]\n    rw [errorMap_eq a b δ hδ hδ' (le_of_eq hz)]\n    exact mul_ne_zero hs (Vpart_ne δ hδ hδ' hcs)\n  refine ⟨continuousOn_errorMap a b δ hδ hδ', hbd, ?_⟩\n\n  have hloopL : errLloop δ 0 = errLloop δ 1 := by\n    change ((δ : ℂ) * _) * negCircleExpLoop 0 = ((δ : ℂ) * _) * negCircleExpLoop 1\n    have e0 : negCircleExpLoop 0 = 1 := by\n      change ((negStandardLoop 0 : Circle) : ℂ) = 1\n      change ((Circle.exp (-(2 * π * ((0 : I) : ℝ))) : Circle) : ℂ) = 1\n      norm_num\n    have e1 : negCircleExpLoop 1 = 1 := by\n      change ((negStandardLoop 1 : Circle) : ℂ) = 1\n      change ((Circle.exp (-(2 * π * ((1 : I) : ℝ))) : Circle) : ℂ) = 1\n      rw [Set.Icc.coe_one, show -(2 * π * 1) = -(2 * π) by ring, Circle.exp_neg,\n        Circle.exp_two_pi]\n      norm_num\n    rw [e0, e1]\n  have hloopV : errVloop δ 0 = errVloop δ 1 := by\n    change Vpart δ (((Circle.exp (2 * π * ((0 : I) : ℝ)) : Circle) : ℂ))\n      = Vpart δ (((Circle.exp (2 * π * ((1 : I) : ℝ)) : Circle) : ℂ))\n    have hz0 : ((Circle.exp (2 * π * ((0 : I) : ℝ)) : Circle) : ℂ) = 1 := by norm_num\n    have hz1 : ((Circle.exp (2 * π * ((1 : I) : ℝ)) : Circle) : ℂ) = 1 := by\n      rw [Set.Icc.coe_one, mul_one, Circle.exp_two_pi]; norm_num\n    rw [hz0, hz1]\n  have hpert : ∀ t : I, ‖errVloop δ t - errLloop δ t‖ < ‖errLloop δ t‖ := by\n    intro t\n    rw [errLloop_eq_Lpart δ t]\n    change ‖Vpart δ _ - Lpart δ _‖ < ‖Lpart δ _‖\n    exact pert_lt δ hδ hδ' (hztcs t)\n  calc windingNumberC (diskBoundaryLoop (errorMap a b δ) (continuousOn_errorMap a b δ hδ hδ'))\n          (diskBoundaryLoop_ne_zero (errorMap a b δ) _ hbd)\n      = windingNumberC (errSVloop a b δ) (fun t => mul_ne_zero hs (hV t)) := by\n        apply windingNumberC_congr\n        intro t\n        change errorMap a b δ (((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ))\n          = (1 / (Complex.I * (b : ℂ)) - 1 / (Complex.I * (a : ℂ)))\n              * Vpart δ (((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ))\n        exact errorMap_eq a b δ hδ hδ' (le_of_eq (Circle.norm_coe _))\n    _ = windingNumberC (errVloop δ) hV :=\n        windingNumberC_const_mul _ hs (errVloop δ) hV\n    _ = windingNumberC (errLloop δ)\n          (fun t => mul_ne_zero hcc (negCircleExpLoop_ne t)) :=\n        (windingNumberC_eq_of_perturb (errLloop δ) (errVloop δ)\n          (fun t => mul_ne_zero hcc (negCircleExpLoop_ne t)) hV hloopL hloopV hpert).symm\n    _ = -1 :=\n        (windingNumberC_const_mul _ hcc negCircleExpLoop negCircleExpLoop_ne).trans\n          windingNumberC_negCircleExp\n\nprivate theorem errorMap_order (δ : ℝ) (hδ : 0 < δ) (hδ' : δ ≤ π / 8) {z : ℂ} (hz : ‖z‖ ≤ 1) :\n    (0 : ℝ) ≤ π / 4 + δ * z.re ∧ π / 4 + δ * z.re < 3 * π / 4 + δ * z.im ∧\n    3 * π / 4 + δ * z.im < 5 * π / 4 ∧ 5 * π / 4 < 7 * π / 4 ∧ (7 * π / 4 : ℝ) < 2 * π := by\n  have hpi : 0 < π := Real.pi_pos\n  have hx : |z.re| ≤ 1 := le_trans (Complex.abs_re_le_norm z) hz\n  have hy : |z.im| ≤ 1 := le_trans (Complex.abs_im_le_norm z) hz\n  obtain ⟨h0, h12, h23, _, _⟩ := configSpace_ordered δ hδ hδ' (z.re, z.im) hx hy\n  simp only [configSpace] at h0 h12 h23\n  exact ⟨h0.le, h12, h23, by linarith, by linarith⟩\n\nprivate noncomputable def Vpart (δ : ℝ) (z : ℂ) : ℂ :=\n  (Complex.exp (((3 * π / 4 + δ * z.im : ℝ) : ℂ) * Complex.I)\n      - Complex.exp (((π / 4 + δ * z.re : ℝ) : ℂ) * Complex.I)) + (Real.sqrt 2 : ℂ)\n\nprivate noncomputable def Lpart (δ : ℝ) (z : ℂ) : ℂ :=\n  (δ : ℂ) * Complex.exp ((↑(-(π / 4)) : ℂ) * Complex.I) * ((z.re : ℂ) - (z.im : ℂ) * Complex.I)\n\nprivate theorem Lpart_norm (δ : ℝ) (hδ : 0 < δ) {z : ℂ} (hz : z.re ^ 2 + z.im ^ 2 = 1) :\n    ‖Lpart δ z‖ = δ := by\n  rw [Lpart, norm_mul, norm_mul, Complex.norm_exp_ofReal_mul_I, mul_one, Complex.norm_real,\n    Real.norm_eq_abs, abs_of_pos hδ]\n  have hone : ‖(z.re : ℂ) - (z.im : ℂ) * Complex.I‖ = 1 := by\n    rw [sub_eq_add_neg, ← neg_mul, ← Complex.ofReal_neg, Complex.norm_add_mul_I, neg_sq, hz,\n      Real.sqrt_one]\n  rw [hone, mul_one]\n\nprivate theorem pert_lt (δ : ℝ) (hδ : 0 < δ) (hδ' : δ ≤ π / 8) {z : ℂ}\n    (hz : z.re ^ 2 + z.im ^ 2 = 1) : ‖Vpart δ z - Lpart δ z‖ < ‖Lpart δ z‖ := by\n  have hpi4 : π < 4 := Real.pi_lt_four\n  have hδ1 : δ < 1 := by nlinarith\n  have hsub : Vpart δ z - Lpart δ z\n      = -Complex.exp ((↑(π / 4) : ℂ) * Complex.I)\n          * (Complex.exp ((↑(δ * z.re) : ℂ) * Complex.I) - 1 - (↑(δ * z.re) : ℂ) * Complex.I)\n        + Complex.exp ((↑(3 * π / 4) : ℂ) * Complex.I)\n          * (Complex.exp ((↑(δ * z.im) : ℂ) * Complex.I) - 1 - (↑(δ * z.im) : ℂ) * Complex.I) :=\n    remainder_identity δ z.re z.im\n  rw [hsub, Lpart_norm δ hδ hz]\n  calc ‖_‖ ≤ δ ^ 2 := remainder_norm_le δ z.re z.im hδ hδ' hz\n    _ < δ := by nlinarith\n\nprivate theorem Vpart_ne (δ : ℝ) (hδ : 0 < δ) (hδ' : δ ≤ π / 8) {z : ℂ}\n    (hz : z.re ^ 2 + z.im ^ 2 = 1) : Vpart δ z ≠ 0 := by\n  have hp := pert_lt δ hδ hδ' hz\n  have htri : ‖Lpart δ z‖ - ‖Vpart δ z - Lpart δ z‖ ≤ ‖Vpart δ z‖ := by\n    have h := norm_sub_norm_le (Lpart δ z) (Lpart δ z - Vpart δ z)\n    have he : Lpart δ z - (Lpart δ z - Vpart δ z) = Vpart δ z := by ring\n    rw [he, norm_sub_rev (Lpart δ z) (Vpart δ z)] at h; linarith\n  have : 0 < ‖Vpart δ z‖ := by linarith\n  exact norm_pos_iff.1 this\n\nprivate theorem remainder_identity (δ C S : ℝ) :\n    ((Complex.exp (((3 * π / 4 + δ * S : ℝ) : ℂ) * Complex.I)\n        - Complex.exp (((π / 4 + δ * C : ℝ) : ℂ) * Complex.I)) + (Real.sqrt 2 : ℂ))\n      - (δ : ℂ) * Complex.exp ((↑(-(π / 4)) : ℂ) * Complex.I) * ((C : ℂ) - (S : ℂ) * Complex.I)\n    = -Complex.exp ((↑(π / 4) : ℂ) * Complex.I)\n        * (Complex.exp ((↑(δ * C) : ℂ) * Complex.I) - 1 - (↑(δ * C) : ℂ) * Complex.I)\n      + Complex.exp ((↑(3 * π / 4) : ℂ) * Complex.I)\n        * (Complex.exp ((↑(δ * S) : ℂ) * Complex.I) - 1 - (↑(δ * S) : ℂ) * Complex.I) := by\n  have e14 : Complex.exp ((↑(π / 4) : ℂ) * Complex.I)\n      = (↑(Real.sqrt 2 / 2) : ℂ) + (↑(Real.sqrt 2 / 2) : ℂ) * Complex.I := by\n    rw [Complex.exp_mul_I, ← Complex.ofReal_cos, ← Complex.ofReal_sin, Real.cos_pi_div_four,\n      Real.sin_pi_div_four]\n  have e34 : Complex.exp ((↑(3 * π / 4) : ℂ) * Complex.I)\n      = -(↑(Real.sqrt 2 / 2) : ℂ) + (↑(Real.sqrt 2 / 2) : ℂ) * Complex.I := by\n    rw [Complex.exp_mul_I, ← Complex.ofReal_cos, ← Complex.ofReal_sin,\n      show (3 * π / 4 : ℝ) = π - π / 4 by ring, Real.cos_pi_sub, Real.sin_pi_sub,\n      Real.cos_pi_div_four, Real.sin_pi_div_four]\n    push_cast; ring\n  have eneg14 : Complex.exp ((↑(-(π / 4)) : ℂ) * Complex.I)\n      = (↑(Real.sqrt 2 / 2) : ℂ) - (↑(Real.sqrt 2 / 2) : ℂ) * Complex.I := by\n    rw [Complex.exp_mul_I, ← Complex.ofReal_cos, ← Complex.ofReal_sin, Real.cos_neg, Real.sin_neg,\n      Real.cos_pi_div_four, Real.sin_pi_div_four]\n    push_cast; ring\n  have hθ1 : Complex.exp (((π / 4 + δ * C : ℝ) : ℂ) * Complex.I)\n      = Complex.exp ((↑(π / 4) : ℂ) * Complex.I) * Complex.exp ((↑(δ * C) : ℂ) * Complex.I) := by\n    rw [← Complex.exp_add]; congr 1; push_cast; ring\n  have hθ2 : Complex.exp (((3 * π / 4 + δ * S : ℝ) : ℂ) * Complex.I)\n      = Complex.exp ((↑(3 * π / 4) : ℂ) * Complex.I)\n        * Complex.exp ((↑(δ * S) : ℂ) * Complex.I) := by\n    rw [← Complex.exp_add]; congr 1; push_cast; ring\n  rw [hθ1, hθ2, e14, e34, eneg14]\n  apply Complex.ext <;>\n    simp only [Complex.add_re, Complex.add_im, Complex.sub_re, Complex.sub_im, Complex.mul_re,\n      Complex.mul_im, Complex.neg_re, Complex.neg_im, Complex.ofReal_re, Complex.ofReal_im,\n      Complex.one_re, Complex.one_im, Complex.I_re, Complex.I_im] <;> ring\n\nprivate theorem remainder_norm_le (δ C S : ℝ) (hδ : 0 < δ) (hδ' : δ ≤ π / 8)\n    (hCS : C ^ 2 + S ^ 2 = 1) :\n    ‖-Complex.exp ((↑(π / 4) : ℂ) * Complex.I)\n        * (Complex.exp ((↑(δ * C) : ℂ) * Complex.I) - 1 - (↑(δ * C) : ℂ) * Complex.I)\n      + Complex.exp ((↑(3 * π / 4) : ℂ) * Complex.I)\n        * (Complex.exp ((↑(δ * S) : ℂ) * Complex.I) - 1 - (↑(δ * S) : ℂ) * Complex.I)‖ ≤ δ ^ 2 := by\n  have hpi4 : π < 4 := Real.pi_lt_four\n  have hδ1 : δ ≤ 1 := by nlinarith\n  have hC1 : C ^ 2 ≤ 1 := by nlinarith [sq_nonneg S]\n  have hS1 : S ^ 2 ≤ 1 := by nlinarith [sq_nonneg C]\n  have normx : ∀ x : ℝ, ‖(↑x : ℂ) * Complex.I‖ = |x| := by\n    intro x; rw [norm_mul, Complex.norm_I, mul_one, Complex.norm_real, Real.norm_eq_abs]\n  have hxC : ‖(↑(δ * C) : ℂ) * Complex.I‖ ≤ 1 := by\n    rw [normx, abs_mul, abs_of_pos hδ]; nlinarith [abs_nonneg C, sq_abs C, hC1]\n  have hxS : ‖(↑(δ * S) : ℂ) * Complex.I‖ ≤ 1 := by\n    rw [normx, abs_mul, abs_of_pos hδ]; nlinarith [abs_nonneg S, sq_abs S, hS1]\n  have bC := Complex.norm_exp_sub_one_sub_id_le hxC\n  have bS := Complex.norm_exp_sub_one_sub_id_le hxS\n  rw [normx] at bC bS\n  have n14 : ‖Complex.exp ((↑(π / 4) : ℂ) * Complex.I)‖ = 1 := Complex.norm_exp_ofReal_mul_I _\n  have n34 : ‖Complex.exp ((↑(3 * π / 4) : ℂ) * Complex.I)‖ = 1 := Complex.norm_exp_ofReal_mul_I _\n  calc ‖_‖\n      ≤ ‖-Complex.exp ((↑(π / 4) : ℂ) * Complex.I)\n            * (Complex.exp ((↑(δ * C) : ℂ) * Complex.I) - 1 - (↑(δ * C) : ℂ) * Complex.I)‖\n        + ‖Complex.exp ((↑(3 * π / 4) : ℂ) * Complex.I)\n            * (Complex.exp ((↑(δ * S) : ℂ) * Complex.I) - 1 - (↑(δ * S) : ℂ) * Complex.I)‖ :=\n        norm_add_le _ _\n    _ = ‖Complex.exp ((↑(δ * C) : ℂ) * Complex.I) - 1 - (↑(δ * C) : ℂ) * Complex.I‖\n        + ‖Complex.exp ((↑(δ * S) : ℂ) * Complex.I) - 1 - (↑(δ * S) : ℂ) * Complex.I‖ := by\n        rw [norm_mul, norm_neg, n14, one_mul, norm_mul, n34, one_mul]\n    _ ≤ |δ * C| ^ 2 + |δ * S| ^ 2 := by gcongr\n    _ = δ ^ 2 * (C ^ 2 + S ^ 2) := by rw [sq_abs, sq_abs]; ring\n    _ = δ ^ 2 := by rw [hCS]; ring\n\nprivate theorem continuous_Vpart_boundary (δ : ℝ) :\n    Continuous (fun t : I => Vpart δ (((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ))) := by\n  have hz : Continuous (fun t : I => ((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ)) :=\n    continuous_subtype_val.comp\n      (Circle.exp.continuous.comp (continuous_const.mul continuous_subtype_val))\n  simp only [Vpart]\n  fun_prop\n\nprivate noncomputable def errVloop (δ : ℝ) : C(I, ℂ) :=\n  ⟨fun t => Vpart δ (((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ)), continuous_Vpart_boundary δ⟩\n\nprivate noncomputable def errSVloop (a b δ : ℝ) : C(I, ℂ) :=\n  ⟨fun t => (1 / (Complex.I * (b : ℂ)) - 1 / (Complex.I * (a : ℂ))) * errVloop δ t,\n    continuous_const.mul (errVloop δ).continuous⟩\n\nprivate noncomputable def errLloop (δ : ℝ) : C(I, ℂ) :=\n  ⟨fun t => ((δ : ℂ) * Complex.exp ((↑(-(π / 4)) : ℂ) * Complex.I)) * negCircleExpLoop t,\n    continuous_const.mul negCircleExpLoop.continuous⟩\n\nprivate theorem errLloop_eq_Lpart (δ : ℝ) (t : I) :\n    errLloop δ t = Lpart δ (((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ)) := by\n  have hneg : negCircleExpLoop t\n      = ((((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ).re : ℂ)\n          - (((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ).im : ℂ) * Complex.I) := by\n    change ((negStandardLoop t : Circle) : ℂ) = _\n    change ((Circle.exp (-(2 * π * (t : ℝ))) : Circle) : ℂ) = _\n    rw [Circle.coe_exp, Circle.coe_exp, Complex.exp_ofReal_mul_I_re, Complex.exp_ofReal_mul_I_im,\n      Complex.exp_mul_I, ← Complex.ofReal_cos, ← Complex.ofReal_sin, Real.cos_neg, Real.sin_neg]\n    push_cast; ring\n  change ((δ : ℂ) * Complex.exp ((↑(-(π / 4)) : ℂ) * Complex.I)) * negCircleExpLoop t = _\n  rw [hneg, Lpart]", "proof_size_lean": 12680, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 5, "rdep_count": 3, "descendant_count": 7, "proof_size_tex": 3200, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 25568, "effort_total": 0}, "thm:existence_of_zero": {"id": "thm:existence_of_zero", "type": "theorem", "title": "", "chapter": "The winding-number argument", "statement": "ok\n[Nonzero boundary winding forces an interior zero]\n  \n  \n  \n  \\textit{Source: DeTurck--Gluck, §7 (winding-number/FTA principle).}\n  Let $F : \\overline{\\mathbb{D}} \\to \\mathbb{C}$ be continuous on the closed unit\n  $2$-disk, with $F \\ne 0$ on the boundary circle $\\partial\\mathbb{D}$ and the\n  boundary loop $F|_{\\partial\\mathbb{D}}$ having winding number $\\ne 0$ about the\n  origin. Then $F$ has a zero in the interior of $\\mathbb{D}$.", "uses": ["lem:error_map_winds_boundary"], "lean_name": "Gluck.exists_zero_of_boundary_winding", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:error_map_winds_boundary}\n  \\leanok\n  Suppose, for contradiction, that $F(z) \\ne 0$ for all $z \\in\n  \\overline{\\mathbb{D}}$. Then $G = F/\\lvert F\\rvert : \\overline{\\mathbb{D}} \\to\n  S^1$ is continuous and extends $g = F|_{\\partial\\mathbb{D}}/\\lvert\n  F|_{\\partial\\mathbb{D}}\\rvert$ to the whole disk. The boundary circle\n  $\\partial\\mathbb{D}$ is contractible inside $\\overline{\\mathbb{D}}$ (shrink to\n  the centre), so $g$ is null-homotopic as a map into $S^1$; therefore its degree\n  --- which is the winding number of $F|_{\\partial\\mathbb{D}}$ about $0$ --- is\n  zero, contradicting the hypothesis. Hence $F$ vanishes somewhere in\n  $\\overline{\\mathbb{D}}$; the boundary hypothesis $F \\ne 0$ on\n  $\\partial\\mathbb{D}$ forces the zero into the interior.\n\n  This is the planar degree principle the source invokes by analogy with the\n  topological proof of the Fundamental Theorem of Algebra (\\S7): a loop with\n  nonzero winding cannot bound a non-vanishing map. Mathlib has no off-the-shelf\n  form, so the winding number of a continuous loop $S^1 \\to \\mathbb{C}\\setminus\n  \\{0\\}$, its homotopy invariance, and this null-homotopy argument are built\n  project-side (see \\cref{chap:winding}'s Lean file).\n", "lean_source": "theorem exists_zero_of_boundary_winding (F : ℂ → ℂ)\n    (hF : ContinuousOn F (Metric.closedBall 0 1))\n    (hbd : ∀ z ∈ Metric.sphere (0 : ℂ) 1, F z ≠ 0)\n    (hw : windingNumberC (diskBoundaryLoop F hF)\n      (diskBoundaryLoop_ne_zero F hF hbd) ≠ 0) :\n    ∃ z ∈ Metric.ball (0 : ℂ) 1, F z = 0 := by\n  by_contra hcon\n  simp only [not_exists, not_and] at hcon\n\n  have hne : ∀ z ∈ Metric.closedBall (0 : ℂ) 1, F z ≠ 0 := by\n    intro z hz\n    have hnorm : ‖z‖ ≤ 1 := by simpa [dist_zero_right] using Metric.mem_closedBall.1 hz\n    rcases lt_or_eq_of_le hnorm with h | h\n    · exact hcon z (by simpa [Metric.mem_ball, dist_zero_right] using h)\n    · exact hbd z (by rw [mem_sphere_zero_iff_norm]; exact h)\n  have hF0 : F 0 ≠ 0 := hne 0 (by simp)\n\n  set pt : I × I → ℂ :=\n    fun st => ((st.1 : ℝ) : ℂ) * (Circle.exp (2 * π * (st.2 : ℝ)) : ℂ) with hptdef\n  have hptcont : Continuous pt := by\n    rw [hptdef]\n    exact (Complex.continuous_ofReal.comp (continuous_subtype_val.comp continuous_fst)).mul\n      (continuous_subtype_val.comp (Circle.exp.continuous.comp\n        (continuous_const.mul (continuous_subtype_val.comp continuous_snd))))\n  have hptmem : ∀ st : I × I, pt st ∈ Metric.closedBall (0 : ℂ) 1 := by\n    intro st\n    rw [hptdef]\n    simp only [Metric.mem_closedBall, dist_zero_right, norm_mul, Circle.norm_coe, mul_one,\n      Complex.norm_real, Real.norm_eq_abs, abs_of_nonneg st.1.2.1]\n    exact st.1.2.2\n  have hFptcont : Continuous fun st => F (pt st) := hF.comp_continuous hptcont hptmem\n  have hFptne : ∀ st, F (pt st) ≠ 0 := fun st => hne _ (hptmem st)\n\n  set Hmap : C(I × I, Circle) :=\n    ⟨fun st => circleProj (F (pt st)) (hFptne st), by\n      apply Continuous.subtype_mk\n      exact hFptcont.div (Complex.continuous_ofReal.comp (continuous_norm.comp hFptcont))\n        (fun st => Complex.ofReal_ne_zero.2 (norm_ne_zero_iff.2 (hFptne st)))⟩ with hHmapdef\n\n  have h0 : ∀ t, Hmap (0, t) = (ContinuousMap.const I (circleProj (F 0) hF0)) t := by\n    intro t\n    change circleProj (F (pt (0, t))) (hFptne (0, t)) = circleProj (F 0) hF0\n    apply circleProj_congr\n    have hpt0 : pt (0, t) = 0 := by rw [hptdef]; simp\n    rw [hpt0]\n\n  have h1 : ∀ t, Hmap (1, t) =\n      (normLoop (diskBoundaryLoop F hF) (diskBoundaryLoop_ne_zero F hF hbd)) t := by\n    intro t\n    change circleProj (F (pt (1, t))) (hFptne (1, ough the common node value $V$ at the centre\n      $\\theta_k$ --- concretely $w_z$ is affine from $m_{k-1}(z)$ at\n      $\\theta_k-\\eta$ to $V$ at $\\theta_k$ and affine from $V$ at $\\theta_k$ to\n      $m_k(z)$ at $\\theta_k+\\eta$.\n  \\end{itemize}\n  The plateau height $m_k(z)$ is solved so that the arc integral is exactly\n  $\\pi/2$: with $\\int_{\\theta_k}^{\\theta_{k+1}}w_z =\n  m_k(z)\\,(L_k-2\\eta) + \\tfrac{\\eta}{2}(V+m_k(z)) + \\tfrac{\\eta}{2}(m_k(z)+V)\n  = m_k(z)(L_k-\\eta) + \\eta V$, setting this to $\\pi/2$ gives\n  \\[\n    m_k(z) \\;=\\; \\frac{\\pi/2-\\eta V}{L_k-\\eta}.\n  \\]\n  Since $L_k\\in[\\tfrac\\pi4,\\tfrac{3\\pi}4]$, $\\eta=\\pi/16$ and $V=2/3$, the numerator\n  $\\pi/2-\\eta V = \\pi/2-\\pi/24>0$ and the denominator $L_k-\\eta\\in[\\tfrac{3\\pi}{16},\\tfrac{11\\pi}{16}]$,\n  so each $m_k(z)$ is a continuous, strictly positive function of $z$. Since $w_z$\n  is a convex combination of the node value $V$ and the plateau heights $m_k(z)$\n  (it is affine between them on the ramps), $w_z(\\theta)\\in[c_-,c_+]\\subset(0,\\infty)$\n  with $c_-=\\min(V,\\min_k m_k)$ and $c_+=\\max(V,\\max_k m_k)$. A direct computation\n  over $L_k\\in[\\tfrac\\pi4,\\tfrac{3\\pi}4]$ gives $\\min_k m_k=2/3$ (at $L_k=3\\pi/4$)\n  and $\\max_k m_k=22/9$ (at $L_k=\\pi/4$), so $c_-=2/3$ and $c_+=22/9$; we set the\n  uniform slope bound $K:=\\max(c_+,1/c_-)=22/9$ (so $1/K\\le w_z\\le K$). This is the\n  same kind of explicit continuous trapezoidal-density construction already carried\n  out (for a different calibration) in the preliminary reparametrization of\n  \\cref{chap:stepreduction}; the present density is self-contained and depends on\n  none of that chapter's lemmas.\n\n  \\emph{Lean realization.} Each ramp/plateau pulse is the periodic trapezoid\n  $\\mathrm{clampTent}(\\eta,L,\\tau)(\\theta)=\\min(1,\\max(0,(L/2-\\arccos\\cos(\\theta-\\tau))/\\eta))$\n  (height $1$, centre $\\tau$, width $L$, ramp $\\eta$), built on the\n  $\\arccos\\cos$ idiom of \\cref{chap:stepreduction} for free $2\\pi$-periodicity and\n  continuity; $w_z=\\mathrm{alignDensity}$ is the constant $V$ plus a $z$-continuous\n  combination of four such pulses with heights $m_k(z)=\\mathrm{alignHt}(L_k)$ at the\n  four nodes $\\mathrm{alignN}_k(z)$ / arc lengths $\\mathrm{alignL}_k(z)$ / centres\n  $\\mathrm{alignC}_k(z)$.  These named pieces (and their continuity helpers) carry the\n  dependency edges; their properties are collected in \\cref{lem:align_density_props}\n  and \\cref{lem:align_density_arc_integral}.", "uses": ["def:configuration_space"], "lean_name": "Gluck.alignDensity, Gluck.clampTent, Gluck.arccos_cos_abs, Gluck.alignN1, Gluck.alignN2, Gluck.alignN3, Gluck.alignN4, Gluck.alignL1, Gluck.alignL2, Gluck.alignL3, Gluck.alignL4, Gluck.alignC1, Gluck.alignC2, Gluck.alignC3, Gluck.alignC4, Gluck.alignHt, Gluck.alignHt_eq", "proved": false, "mathlib_ok": false, "proof_tex": "", "lean_source": "private noncomputable def alignDensity (δ : ℝ) (z : ℂ) (θ : ℝ) : ℝ :=\n  2 / 3\n  + (alignHt (alignL1 δ z) - 2 / 3) * clampTent (π / 16) (alignL1 δ z) (alignC1 δ z) θ\n  + (alignHt (alignL2 δ z) - 2 / 3) * clampTent (π / 16) (alignL2 δ z) (alignC2 δ z) θ\n  + (alignHt (alignL3 δ z) - 2 / 3) * clampTent (π / 16) (alignL3 δ z) (alignC3 δ z) θ\n  + (alignHt (alignL4 δ z) - 2 / 3) * clampTent (π / 16) (alignL4 δ z) (alignC4 δ z) θ\n\nnoncomputable def clampTent (η L τ θ : ℝ) : ℝ :=\n  min 1 (max 0 ((L / 2 - Real.arccos (Real.cos (θ - τ))) / η))\n\nprivate lemma arccos_cos_abs {u : ℝ} (h : |u| ≤ π) : Real.arccos (Real.cos u) = |u| := by\n  rw [← Real.cos_abs]; exact Real.arccos_cos (abs_nonneg u) h\n\nprivate noncomputable def alignN1 (δ : ℝ) (z : ℂ) : ℝ := π / 4 + δ * z.re\n\nprivate noncomputable def alignN2 (δ : ℝ) (z : ℂ) : ℝ := 3 * π / 4 + δ * z.im\n\nprivate noncomputable def alignN3 (_δ : ℝ) (_z : ℂ) : ℝ := 5 * π / 4\n\nprivate noncomputable def alignN4 (_δ : ℝ) (_z : ℂ) : ℝ := 7 * π / 4\n\nprivate noncomputable def alignL1 (δ : ℝ) (z : ℂ) : ℝ   $\\mathrm{integralReparam}\\,w\\,c$ is strictly increasing.", "uses": ["def:integral_reparam"], "lean_name": "Gluck.strictMono_integralReparam", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:integral_reparam}\n  For $x<y$,\n  $\\mathrm{integralReparam}\\,w\\,c\\,(y)-\\mathrm{integralReparam}\\,w\\,c\\,(x)\n  =\\int_x^y w>0$, since the integrand is strictly positive on the nondegenerate\n  interval $[x,y]$.\n", "lean_source": "lemma strictMono_integralReparam {w : ℝ → ℝ} (hw : Continuous w) (hpos : ∀ s, 0 < w s)\n    (c : ℝ) : StrictMono (integralReparam w c) := by\n  intro x y hxy\n  have hsub : integralReparam w c y - integralReparam w c x = ∫ t in x..y, w t := by\n    simp only [integralReparam]\n    rw [← intervalIntegral.integral_add_adjacent_intervals\n      (hw.intervalIntegrable 0 x) (hw.intervalIntegrable x y)]; ring\n  rw [← sub_pos, hsub]\n  exact intervalIntegral.intervalIntegral_pos_of_pos_on (hw.intervalIntegrable x y)\n    (fun t _ => hpos t) hxy", "proof_size_lean": 535, "has_sorry": false, "tex_file": "chapters/Gluck_Reduction.tex", "lean_file": "Gluck/Reduction.lean", "dep_count": 1, "rdep_count": 2, "descendant_count": 7, "proof_size_tex": 215, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 637, "effort_total": 0}, "lem:integral_reparam_add_two_pi": {"id": "lem:integral_reparam_add_two_pi", "type": "lemma", "title": "Quasi-periodicity of the running integral", "chapter": "Closing the $\\kappa$-curve: the reduction is justified", "statement": "If $w$ is continuous, $2\\pi$-periodic, with full-period integral\n  $\\int_0^{2\\pi} w = 2\\pi$, then\n  $\\mathrm{integralReparam}\\,w\\,c\\,(s+2\\pi)=\\mathrm{integralReparam}\\,w\\,c\\,(s)+2\\pi$.", "uses": ["def:integral_reparam"], "lean_name": "Gluck.integralReparam_add_two_pi", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:integral_reparam}\n  Split $\\int_0^{s+2\\pi}=\\int_0^{s}+\\int_{s}^{s+2\\pi}$; by $2\\pi$-periodicity of $w$\n  the second integral equals the full-period integral $\\int_0^{2\\pi} w = 2\\pi$.\n", "lean_source": "lemma integralReparam_add_two_pi {w : ℝ → ℝ} (hw : Continuous w)\n    (hper : Function.Periodic w (2 * π)) (hint : (∫ t in (0 : ℝ)..(2 * π), w t) = 2 * π)\n    (c s : ℝ) : integralReparam w c (s + 2 * π) = integralReparam w c s + 2 * π := by\n  simp only [integralReparam]\n  have hadd : (∫ t in (0 : ℝ)..s, w t) + (∫ t in s..(s + 2 * π), w t)\n      = ∫ t in (0 : ℝ)..(s + 2 * π), w t :=\n    intervalIntegral.integral_add_adjacent_intervals (hw.intervalIntegrable _ _)\n      (hw.intervalIntegrable _ _)\n  have hshift : (∫ t in s..(s + 2 * π), w t) = ∫ t in (0 : ℝ)..(0 + 2 * π), w t :=\n    hper.intervalIntegral_add_eq s 0\n  rw [zero_add] at hshift\n  rw [← hadd, hshift, hint]; ring", "proof_size_lean": 678, "has_sorry": false, "tex_file": "chapters/Gluck_Reduction.tex", "lean_file": "Gluck/Reduction.lean", "dep_count": 1, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 192, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 780, "effort_total": 0}, "lem:integral_reparam_change_of_var": {"id": "lem:integral_reparam_change_of_var", "type": "lemma", "title": "Change of variables for the running integral", "chapter": "Closing the $\\kappa$-curve: the reduction is justified", "statement": "For a continuous, strictly-positive weight $w$ and any integrand $G$, writing\n  $g=\\mathrm{integralReparam}\\,w\\,c$,\n  \\[\n    \\int_{g(0)}^{g(2\\pi)} G(x)\\,dx \\;=\\; \\int_0^{2\\pi} w(x)\\,G\\bigl(g(x)\\bigr)\\,dx .\n  \\]", "uses": ["def:integral_reparam", "lem:has_deriv_integral_reparam", "lem:continuous_integral_reparam", "lem:strict_mono_integral_reparam"], "lean_name": "Gluck.integralReparam_changeOfVar", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:has_deriv_integral_reparam, lem:continuous_integral_reparam,\n        lem:strict_mono_integral_reparam}\n  $g$ is strictly monotone (\\cref{lem:strict_mono_integral_reparam}), hence\n  injective, and $C^1$ with derivative $w$ (\\cref{lem:has_deriv_integral_reparam});\n  being continuous (\\cref{lem:continuous_integral_reparam}) and monotone it maps\n  $[0,2\\pi]$ onto $[g(0),g(2\\pi)]$. The one-dimensional substitution rule\n  $\\int_{g(I)}G=\\int_I |g'|\\,(G\\circ g)$ applies, and $|g'|=w>0$ drops the absolute\n  value.\n", "lean_source": "lemma integralReparam_changeOfVar {w : ℝ → ℝ} (hw : Continuous w) (hpos : ∀ s, 0 < w s)\n    (c : ℝ) (G : ℝ → ℝ) :\n    (∫ x in Set.Icc (integralReparam w c 0) (integralReparam w c (2 * π)), G x)\n      = ∫ x in Set.Icc (0 : ℝ) (2 * π), w x * G (integralReparam w c x) := by\n  have hmono := strictMono_integralReparam hw hpos c\n  have himg : integralReparam w c '' Set.Icc 0 (2 * π)\n      = Set.Icc (integralReparam w c 0) (integralReparam w c (2 * π)) :=\n    ContinuousOn.image_Icc_of_monotoneOn (by positivity)\n      (continuous_integralReparam hw c).continuousOn (hmono.monotone.monotoneOn _)\n  have hcov := MeasureTheory.integral_image_eq_integral_deriv_smul_of_monotoneOn\n    (s := Set.Icc (0 : ℝ) (2 * π)) measurableSet_Icc\n    (fun x _ => (hasDerivAt_integralReparam hw c x).hasDerivWithinAt)\n    (hmono.monotone.monotoneOn _) G\n  rw [himg] at hcov\n  simp only [smul_eq_mul] at hcov\n  rw [hcov]", "proof_size_lean": 898, "has_sorry": false, "tex_file": "chapters/Gluck_Reduction.tex", "lean_file": "Gluck/Reduction.lean", "dep_count": 4, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 520, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 2024, "effort_total": 0}, "def:align_reparam": {"id": "def:align_reparam", "type": "definition", "title": "", "chapter": "Closing the $\\kappa$-curve: the reduction is justified", "statement": "ok\n[Breakpoint-aligning reparametrization family]\n  \n  \n  \n  Project-bespoke. For $0<\\delta\\le\\pi/8$ and $z\\in\\overline{\\mathbb{D}}$ define\n  $g_z := \\mathrm{alignReparam}(\\delta)(z) : \\mathbb{R}\\to\\mathbb{R}$ as the running\n  integral of the calibrated density $w_z$ (\\cref{def:align_density}) anchored so\n  that $g_z(\\theta_1)=\\pi/2$:\n  \\[\n    g_z(\\theta) \\;:=\\; \\tfrac{\\pi}{2} + \\int_{\\theta_1}^{\\theta} w_z(t)\\,dt .\n  \\]\n  $g_z$ is the orientation-preserving circle homeomorphism that sends the four\n  breakpoints of the $z$-configuration\n  \\[\n    \\theta_1=\\tfrac{\\pi}{4}+\\delta z.\\mathrm{re},\\quad\n    \\theta_2=\\tfrac{3\\pi}{4}+\\delta z.\\mathrm{im},\\quad\n    \\theta_3=\\tfrac{5\\pi}{4},\\quad\n    \\theta_4=\\tfrac{7\\pi}{4}\n  \\]\n  to the canonical breakpoints $\\tfrac{\\pi}{2},\\pi,\\tfrac{3\\pi}{2},2\\pi$\n  respectively (\\cref{lem:align_reparam_node_values}), is strictly increasing with\n  slope $g_z'=w_z\\in[c_-,c_+]\\subset(0,\\infty)$, and is quasi-periodic\n  ($g_z(\\theta+2\\pi)=g_z(\\theta)+2\\pi$) because the full-period integral of $w_z$ is\n  $2\\pi$ (\\cref{lem:align_density_arc_integral}). We write $K=22/9$ for the uniform\n  slope bound ($1/K\\le w_z\\le K$; see \\cref{def:align_density}).", "uses": ["def:align_density", "def:configuration_space", "def:four_arc_step_function"], "lean_name": "Gluck.alignReparam", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "private noncomputable def alignReparam (δ : ℝ) (z : ℂ) : ℝ → ℝ :=\n  fun θ => π / 2 + ∫ t in (alignN1 δ z)..θ, alignDensity δ z t", "proof_size_lean": 128, "has_sorry": false, "tex_file": "chapters/Gluck_Reduction.tex", "lean_file": "Gluck/Reduction.lean", "dep_count": 3, "rdep_count": 12, "descendant_count": 36, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 2438, "effort_total": 0}, "lem:align_reparam_eq": {"id": "lem:align_reparam_eq", "type": "lemma", "title": "$g_z$ is an instance of the generic family", "chapter": "Closing the $\\kappa$-curve: the reduction is justified", "statement": "For every $\\delta,z$,\n  \\[\n    \\mathrm{alignReparam}(\\delta)(z)\n      = \\mathrm{integralReparam}\\,(w_z)\\    = stepCurvature b a 0 (π / 2) π (3 * π / 2) (alignReparam δ z θ) := by\n    intro θ\n    set t₀ := toIcoMod Real.two_pi_pos (alignN1 δ z) θ with ht₀def\n    have hmem := toIcoMod_mem_Ico Real.two_pi_pos (alignN1 δ z) θ\n    have htic : toIcoMod Real.two_pi_pos (alignN1 δ z) t₀ = t₀ :=\n      (toIcoMod_eq_self Real.two_pi_pos).mpr hmem\n\n    have hscθ : stepCurvature a b (alignN1 δ z) (alignN2 δ z) (alignN3 δ z) (alignN4 δ z) θ\n        = stepCurvature a b (alignN1 δ z) (alignN2 δ z) (alignN3 δ z) (alignN4 δ z) t₀ := by\n      simp only [stepCurvature, htic, ← ht₀def]\n    have hgθ : stepCurvature b a 0 (π / 2) π (3 * π / 2) (alignReparam δ z θ)\n        = stepCurvature b a 0 (π / 2) π (3 * π / 2) (alignReparam δ z t₀) := by\n      have hsub := hper.sub_zsmul_eq (x := t₀) (- toIcoDiv Real.two_pi_pos (alignN1 δ z) θ)\n      simp only [neg_smul, sub_neg_eq_add] at hsub\n      have hθ : alignReparam δ z θ\n          = alignReparam δ z (t₀ + toIcoDiv Real.two_pi_pos (alignN1 δ z) θ • (2 * π)) := by\n        congr 1\n        exact (toIcoMod_add_toIcoDiv_zsmul Real.two_pi_pos (alignN1 δ z) θ).symm\n      rw [hθ]\n      exact hsub\n    rw [hscθ, hgθ]\n\n    obtain ⟨hlo, hhi⟩ := hmem\n    have e1 : alignN1 δ z = π / 4 + δ * z.re := rfl\n    have e2 : alignN2 δ z = 3 * π / 4 + δ * z.im := rfl\n    have e3 : alignN3 δ z = 5 * π / 4 := rfl\n    have e4 : alignN4 δ z = 7 * π / 4 := rfl\n    have hg5 : alignReparam δ z (alignN1 δ z + 2 * π) = 5 * π / 2 := by\n      rw [alignReparam_add_two_pi δ hδ hδ' hz, hn1]; ring\n    rcases lt_or_ge t₀ (alignN2 δ z) with hc2 | hc2\n    · \n      have hLHS : stepCurvature a b (alignN1 δ z) (alignN2 δ z) (alignN3 δ z) (alignN4 δ z) t₀ = b := by\n        simp only [stepCurvature, htic]; exact if_pos (Or.inl hc2)\n      have hga : π / 2 ≤ alignReparam δ z t₀ := hn1 ▸ hmono.le_iff_le.mpr hlo\n      have hgb : alignReparam δ z t₀ < π := hn2 ▸ hmono hc2\n      have hRHS : stepCurvature b a 0 (π / 2) π (3 * π / 2) (alignReparam δ z t₀) = b := by\ ": false, "tex_file": "chapters/Gluck_Reduction.tex", "lean_file": "Gluck/Reduction.lean", "dep_count": 7, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 705, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 95578, "effort_total": 0}, "lem:reduction_justified": {"id": "lem:reduction_justified", "type": "lemma", "title": "", "chapter": "Closing the $\\kappa$-curve: the reduction is justified", "statement": "ok\n[Reduction is justified]\n  \n  \n  \n  \\textit{Source: DeTurck--Gluck, §6 (robustness of the winding argument).}\n  Let $\\kappa$ be a curvature function satisfying the four-vertex condition. Then\n  there is a reparametrization $h$ of the circle (\\texttt{StrictMono},\n  \\texttt{Continuous}, $h(\\theta+2\\pi)=h(\\theta)+2\\pi$) such that $\\kappa\\circ h$ is\n  again a curvature function whose reconstruction weight $\\rho = 1/(\\kappa\\circ h)$\n  has $E(\\rho)=0$; so by \\cref{lem:reconstruct_periodic} the reconstruction curve\n  $\\alpha_\\rho$ closes up. Moreover $h$ is a $C^1$ circle diffeomorphism with\n  strictly positive derivative: there is a continuous $v>0$ with\n  $h'(\\theta)=v(\\theta)$ for all $\\theta$. This $C^1$ regularity is what lets the\n  closed curve be reparametrized back by $h^{-1}$ to realize the original $\\kappa$\n  in \\cref{thm:gluck_converse}.", "uses": ["lem:abab_values", "lem:exists_preliminary_reparam", "def:kappa_error_map", "lem:kappa_error_map_continuous", "lem:kappa_error_map_close", "lem:exists_reparam_close", "lem:error_map_winds_boundary", "thm:existence_of_zero"], "lean_name": "Gluck.reduction_justified", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:abab_values, lem:exists_preliminary_reparam, lem:exists_reparam_close,\n        lem:kappa_error_map_continuous, lem:kappa_error_map_close,\n        lem:error_map_winds_boundary, thm:existence_of_zero,\n        lem:has_deriv_align_reparam, lem:align_density_props}\n        \\leanok\n  \\emph{Step 1 (fix the winding margin).} Fix the configuration-disk radius\n  $0<\\delta\\le\\pi/8$ so that \\cref{lem:error_map_winds_boundary} holds: the\n  bicircle error map $E_{\\mathrm{bi}} = \\mathrm{errorMap}(a,b,\\delta)$ is\n  continuous, nonvanishing on $\\partial\\mathbb{D}$ with winding $\\pm1$, and (from\n  the explicit linear model, $\\lVert V\\rVert\\approx\\delta$) there is a margin\n  $\\mu := \\tfrac12\\min_{\\partial\\mathbb{D}}\\lVert E_{\\mathrm{bi}}\\rVert > 0$.\n\n  \\emph{Step 2 (precondition $\\kappa$).} Let $M=1/\\min\\kappa$ (finite, $\\kappa>0$\n  continuous on the compact circle). With $K$ the constant of\n  \\cref{lem:kappa_error_map_close}, choose $\\varepsilon>0$ with $K M^2\\varepsilon<\\mu$\n  and apply \\cref{lem:exists_preliminary_reparam} (with the crossing data\n  $0<a<b$, $c_1<\\dots<c_4$ from \\cref{lem:abab_values}) to obtain $h_1$.\n\n  \\emph{Step 3 (transfer the winding).} Form $E_\\kappa$ (\\cref{def:kappa_error_map}),\n  continuous on $\\overline{\\mathbb{D}}$ (\\cref{lem:kappa_error_map_continuous}). By\n  \\cref{lem:kappa_error_map_close}, $\\lVert E_\\kappa(z)-E_{\\mathrm{bi}}(z)\\rVert\\le\n  K M^2\\varepsilon<\\mu$ for all $z$, in particular on $\\partial\\mathbb{D}$. Hence\n  on $\\partial\\mathbb{D}$, $\\lVert E_\\kappa\\rVert\\ge\\lVert E_{\\mathrm{bi}}\\rVert-\\mu\n  \\ge\\mu>0$, so $E_\\kappa\\ne0$ there and the straight-line homotopy\n  $E_{\\mathrm{bi}}+\\tau(E_\\kappa-E_{\\mathrm{bi}})$ is nonvanishing on\n  $\\partial\\mathbb{D}$ for $\\tau\\in[0,1]$; winding is a homotopy invariant, so\n  $E_\\kappa$ also winds $\\pm1\\ne0$ on $\\partial\\mathbb{D}$.\n\n  \\emph{Step 4 (extract the zero).} By the planar degree theorem\n  \\cref{thm:existence_of_zero}, $E_\\kappa$ has an interior zero $z_0$:\n  $\\mathrm{errorVector}(\\mathrm{radius}(\\kappa\\circ h_1\\circ g_{z_0}))=0$. Set\n  $h = h_1\\circ g_{z_0}$; then $\\kappa\\circ h$ is a curvature function (composition\n  of a curvature function with orientation-preserving circle homeomorphisms) with\n  $E(\\mathrm{radius}(\\kappa\\circ h))=0$, which is the claim. (By\n  \\cref{lem:reconstruct_periodic} the reconstruction $\\alpha_{1/(\\kappa\\circ h)}$ then closes\n  up; reparametrizing back as in \\cref{thm:gluck_converse} realizes $\\kappa$.)\n\n  \\emph{$C^1$ regularity of $h$.} Both factors are $C^1$ with strictly positive\n  derivative: $h_1'=v_1>0$ by \\cref{lem:exists_reparam_close} (forwarding\n  \\cref{lem:exists_preliminary_reparam}), and $g_{z_0}'=w_{z_0}\\ge 2/3>0$ by\n  \\cref{lem:has_deriv_align_reparam} with the density bounds of\n  \\cref{lem:align_density_props}. By the chain rule\n  $h'(\\theta)=v_1(g_{z_0}(\\theta))\\,w_{z_0}(\\theta)=:v(\\theta)$, a product of two\n  continuous strictly positive functions, so $v$ is continuous and $v>0$ and\n  $h\\in C^1$ as claimed.\n\n  \\emph{The robustness is exactly $L^1$/measure continuity of $E$\n  (\\cref{lem:error_vector_lipschitz}), not $C^1$-closeness of curves.}\n", "lean_source": "theorem reduction_justified {κ : ℝ → ℝ} (hκ : IsCurvatureFunction κ)\n    (hnc : ¬ ∃ c, ∀ θ, κ θ = c) (hfv : FourVertexCondition κ) :\n    ∃ h : ℝ → ℝ, StrictMono h ∧ Continuous h ∧\n      (∀ θ, h (θ + 2 * π) = h θ + 2 * π) ∧\n      errorVector (radius (fun θ => κ (h θ))) = 0 ∧\n      (∃ v : ℝ → ℝ, Continuous v ∧ (∀ θ, 0 < v θ) ∧\n        ∀ θ, HasDerivAt h (v θ) θ) := by\n  obtain ⟨hκcont, hκper, hκpos⟩ := hκ\n\n  obtain ⟨a, b, ha, hab, θ₁, θ₂, θ₃, θ₄, h12, h23, h34, h41, hc₁, hc₂, hc₃, hc₄⟩ :=\n    exists_abab_of_fourVertex ⟨hκcont, hκper, hκpos⟩ hnc hfv\n  have hb : 0 < b := lt_trans ha hab\n  have hab' : a ≠ b := ne_of_lt hab\n\n  set δ : ℝ := π / 8 with hδdef\n  have hδ : 0 < δ := by rw [hδdef]; positivity\n  have hδ' : δ ≤ π / 8 := le_of_eq hδdef\n\n  obtain ⟨hF, hbd, hw⟩ := errorMap_winding_eq_one a b δ ha hb hab' hδ hδ'\n\n  have hsc : IsCompact (Metric.sphere (0 : ℂ) 1) := isCompact_sphere 0 1\n  have hsne : (Metric.sphere (0 : ℂ) 1).Nonempty := by\n    rw [NormedSpace.sphere_nonempty]; norm_num\n  have )) : Circle) : ℂ) = 1 := by norm_num\n  have hexp1 : ((Circle.exp (2 * π * ((1 : I) : ℝ)) : Circle) : ℂ) = 1 := by\n    rw [Set.Icc.coe_one, mul_one, Circle.exp_two_pi]; norm_num\n  have hloopE : γE 0 = γE 1 := by\n    simp only [hγEdef, diskBoundaryLoop, ContinuousMap.coe_mk]\n    rw [hexp0, hexp1]\n  have hloopK : γK 0 = γK 1 := by\n    simp only [hγKdef, diskBoundaryLoop, ContinuousMap.coe_mk]\n    rw [hexp0, hexp1]\n  have hpert : ∀ t : I, ‖γK t - γE t‖ < ‖γE t‖ := by\n    intro t\n    have hwnorm : ‖((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ)‖ = 1 := Circle.norm_coe _\n    have hwsph : ((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ) ∈ Metric.sphere (0 : ℂ) 1 := by\n      rw [mem_sphere_zero_iff_norm]; exact hwnorm\n    change ‖kappaErrorMap κ h₁ δ ((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ)\n        - errorMap a b δ ((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ)‖\n      < ‖errorMap a b δ ((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ)‖\n    calc ‖kappaErrorMap κ h₁ δ ((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ)\n            - errorMap a b δ ((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ)‖\n        < μ := hclose _ hwnorm.le\n      _ ≤ ‖errorMap a b δ ((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ)‖ := hμle _ hwsph\n  have hwind : windingNumberC γE hγEne = windingNumberC γK hγKne :=\n    windingNumberC_eq_of_perturb γE γK hγEne hγKne hloopE hloopK hpert\n  have hwE : windingNumberC γE hγEne = -1 := hw\n  have hwne : windingNumberC γK hγKne ≠ 0 := by rw [← hwind, hwE]; norm_num\n\n  obtain ⟨z₀, hz₀ball, hz₀zero⟩ :=\n    exists_zero_of_boundary_winding (kappaErrorMap κ h₁ δ) hkF hkbd hwne\n  have hz0le : ‖z₀‖ ≤ 1 := by\n    have : ‖z₀‖ < 1 := by simpa [Metric.mem_ball, dist_zero_right] using hz₀ball\n    linarith\n\n  refine ⟨fun θ => h₁ (alignReparam δ z₀ θ), ?_, ?_, ?_, ?_, ?_⟩\n  · exact h1mono.comp (strictMono_alignReparam δ hδ hδ' hz0le)\n  · exact h1cont.comp (continuous_alignReparam δ z₀)\n  · intro θ\n    change h₁ (alignReparam δ z₀ (θ + 2 * π)) = h₁ (alignRep _1 \\le \\theta_2$,\n  \\[\n    \\alpha_\\rho(\\theta_2) - \\alpha_\\rho(\\theta_1)\n      = \\int_{\\theta_1}^{\\theta_2} e^{i\\varphi}\\rho(\\varphi)\\,d\\varphi .\n  \\]\n  Because $\\rho$ is $2\\pi$-periodic and $E(\\rho) = \\int_0^{2\\pi}\n  e^{i\\varphi}\\rho\\,d\\varphi = 0$, the integral of $e^{i\\varphi}\\rho$ over\n  \\emph{any} interval of length $2\\pi$ vanishes; equivalently, $\\alpha_\\rho$ is\n  $2\\pi$-periodic (this is \\cref{lem:reconstruct_periodic}).\n\n  Suppose $\\alpha_\\rho(\\theta_1) = \\alpha_\\rho(\\theta_2)$ with $0 \\le \\theta_1 <\n  \\theta_2 < 2\\pi$. Set $L = \\theta_2 - \\theta_1 \\in (0, 2\\pi)$. The plane is cut\n  by these two parameters into two complementary arcs of the period: the arc\n  $A = [\\theta_1, \\theta_2]$ of angular length $L$, and the arc $B =\n  [\\theta_2, \\theta_1 + 2\\pi]$ of angular length $2\\pi - L$. The chord integrals\n  over the two arcs are\n  \\[\n    \\int_A e^{i\\varphi}\\rho\\,d\\varphi = \\alpha_\\rho(\\theta_2) -\n      \\alpha_\\rho(\\theta_1) = 0,\n    \\qquad\n    \\int_B e^{i\\varphi}\\rho\\,d\\varphi = \\alpha_\\rho(\\theta_1 + 2\\pi) -\n      \\alpha_\\rho(\\theta_2) = 0,\n  \\]\n  the second using $\\alpha_\\rho(\\theta_1 + 2\\pi) = \\alpha_\\rho(\\theta_1) =\n  \\alpha_\\rho(\\theta_2)$.\n\n  Since $L + (2\\pi - L) = 2\\pi$, at least one of the two arcs has angular length\n  $\\le \\pi$; call it $[c, d]$ with $d - c \\le \\pi$ and $\\int_c^d\n  e^{i\\varphi}\\rho\\,d\\varphi = 0$. Let $\\psi = (c + d)/2$ be its midpoint and test\n  the chord integral against the direction $e^{i\\psi}$:\n  \\[\n    0 = \\operatorname{Re}\\!\\Bigl(e^{-i\\psi}\\int_c^d e^{i\\varphi}\\rho(\\varphi)\\,\n      d\\varphi\\Bigr)\n      = \\int_c^d \\cos(\\varphi - \\psi)\\,\\rho(\\varphi)\\,d\\varphi .\n  \\]\n  For $\\varphi \\in [c, d]$ we have $\\varphi - \\psi \\in [-(d-c)/2, (d-c)/2]\n  \\subseteq [-\\pi/2, \\pi/2]$, so $\\cos(\\varphi - \\psi) \\ge 0$, with strict\n  positivity on the open interval $(c, d)$ (the cosine vanishes only at the two\n  endpoints, a set of measure zero). As $\\rho > 0$ is continuous, the integrand\n  $\\cos(\\varphi - \\psi)\\rho(\\varphi)$ is $\\ge 0$ everywhere and strictly positive\n  on $(c, d)$, forcing $\\int_c^d \\cos(\\varphi - \\psi)\\rho\\,d\\varphi > 0$. This\n  contradicts the displayed equality $= 0$. Hence no such pair $\\theta_1 \\ne\n  \\theta_2$ exists, i.e. $\\alpha_\\rho$ is injective on $[0, 2\\pi)$.\n", "lean_source": "theorem injOn_reconstruct_of_closed {ρ : ℝ → ℝ} (hcont : Continuous ρ)\n    (hper : Function.Periodic ρ (2 * π)) (hpos : ∀ θ, 0 < ρ θ)\n    (hE : errorVector ρ = 0) :\n    Set.InjOn (reconstruct ρ) (Set.Ico 0 (2 * π)) := by\n\n  have hg : Continuous fun φ : ℝ => Complex.exp ((φ : ℂ) * Complex.I) * (ρ φ : ℂ) := by\n    fun_prop\n\n  have hαper : Function.Periodic (reconstruct ρ) (2 * π) :=\n    reconstruct_periodic hcont hper hE\n\n  have hchord : ∀ a b : ℝ,\n      (∫ φ in a..b, Complex.exp ((φ : ℂ) * Complex.I) * (ρ φ : ℂ))\n        = reconstruct ρ b - reconstruct ρ a := by\n    intro a b\n    have hadj := intervalIntegral.integral_add_adjacent_intervals\n      (hg.intervalIntegrable (μ := MeasureTheory.volume) 0 a)\n      (hg.intervalIntegrable (μ := MeasureTheory.volume) a b)\n    rw [reconstruct, reconstruct]\n    exact (eq_sub_of_add_eq' hadj)\n\n  have main : ∀ a b : ℝ, 0 ≤ a → a < b → b < 2 * π →\n      reconstruct ρ a ≠ reconstruct ρ b := by\n    intro a b ha hab hb heq2\n\n    have hA : (∫ φ in a..b, Complex.exp ((φ : ℂ) * Complex.I) * (ρ φ : ℂ)) = 0 := by\n      rw [hchord a b, heq2, sub_self]\n\n    have hB : (∫ φ in b..(a + 2 * π), Complex.exp ((φ : ℂ) * Complex.I) * (ρ φ : ℂ)) = 0 := by\n      rw [hchord b (a + 2 * π)]\n      have : reconstruct ρ (a + 2 * π) = reconstruct ρ a := hαper a\n      rw [this, heq2, sub_self]\n    by_cases hL : b - a ≤ π\n    · \n      exact chord_integral_ne_zero hcont hpos hab hL hA\n    · \n      have hL : π < b - a := not_le.mp hL\n      have hcd : b < a + 2 * π := by linarith\n      have hlen : (a + 2 * π) - b ≤ π := by linarith\n      exact chord_integral_ne_zero hcont hpos hcd hlen hB\n\n  intro θ₁ hθ₁ θ₂ hθ₂ heq\n  rcases lt_trichotomy θ₁ θ₂ with h | h | h\n  · exact absurd heq (main θ₁ θ₂ hθ₁.1 h hθ₂.2)\n  · exact h\n  · exact absurd heq.symm (main θ₂ θ₁ hθ₂.1 h hθ₁.2)", "proof_size_lean": 1802, "has_sorry": false, "tex_file": "chapters/Gluck_Simplicity.tex", "lean_file": "Gluck/Simplicity.lean", "dep_count": 3, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 2456, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 3391, "effort_total": 0}, "lem:reconstruct_periodic": {"id": "lem:reconstruct_periodic", "type": "lemma", "title": "", "chapter": "Simplicity of the reconstructed curve", "statement": "ok\n[Reconstruction of a closed weight is periodic]\n  \n  \n  \n  Project-bespoke. If $\\rho$ is continuous, $2\\pi$-periodic and $E(\\rho) = 0$,\n  then $\\alpha_\\rho$ is $2\\pi$-periodic: $\\alpha_\\rho(\\theta + 2\\pi) =\n  \\alpha_\\rho(\\theta)$ for all $\\theta$.", "uses": ["def:reconstruct", "def:error_vector"], "lean_name": "Gluck.reconstruct_periodic", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:reconstruct, def:error_vector}\n  \\leanok\n  $\\alpha_\\rho(\\theta + 2\\pi) - \\alpha_\\rho(\\theta) = \\int_\\theta^{\\theta+2\\pi}\n  e^{i\\varphi}\\rho\\,d\\varphi$, which equals $\\int_0^{2\\pi} e^{i\\varphi}\\rho =\n  E(\\rho) = 0$ because the integrand $e^{i\\varphi}\\rho(\\varphi)$ is $2\\pi$-periodic.\n", "lean_source": "theorem reconstruct_periodic {ρ : ℝ → ℝ} (hcont : Continuous ρ)\n    (hper : Function.Periodic ρ (2 * π)) (hE : errorVector ρ = 0) :\n    Function.Periodic (reconstruct ρ) (2 * π) := by\n\n  have hg : Continuous fun φ : ℝ => Complex.exp ((φ : ℂ) * Complex.I) * (ρ φ : ℂ) := by\n    fun_prop\n  have hgper : Function.Periodic\n      (fun φ : ℝ => Complex.exp ((φ : ℂ) * Complex.I) * (ρ φ : ℂ)) (2 * π) := by\n    intro φ\n    simp only\n    rw [hper φ]\n    congr 1\n    have h2 : ((φ + 2 * π : ℝ) : ℂ) * Complex.I\n        = (φ : ℂ) * Complex.I + 2 * (π : ℂ) * Complex.I := by push_cast; ring\n    rw [h2, Complex.exp_add, Complex.exp_two_pi_mul_I, mul_one]\n  intro x\n\n  have h1 : reconstruct ρ x\n      + (∫ φ in x..(x + 2 * π), Complex.exp ((φ : ℂ) * Complex.I) * (ρ φ : ℂ))\n      = reconstruct ρ (x + 2 * π) := by\n    rw [reconstruct, reconstruct]\n    exact intervalIntegral.integral_add_adjacent_intervals\n      (hg.intervalIntegrable 0 x) (hg.intervalIntegrable x (x + 2 * π))\n  have h2 : (∫ φ in x..(x + 2 * π), Complex.exp ((φ : ℂ) * Complex.I) * (ρ φ : ℂ))\n      = errorVector ρ := by\n    have hp := hgper.intervalIntegral_add_eq x 0\n    simp only [zero_add] at hp\n    rw [hp, errorVector, reconstruct]\n  rw [← h1, h2, hE, add_zero]", "proof_size_lean": 1225, "has_sorry": false, "tex_file": "chapters/Gluck_Simplicity.tex", "lean_file": "Gluck/Simplicity.lean", "dep_count": 2, "rdep_count": 2, "descendant_count": 2, "proof_size_tex": 293, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 1589, "effort_total": 0}, "lem:chord_integral_ne_zero": {"id": "lem:chord_integral_ne_zero", "type": "lemma", "title": "", "chapter": "Simplicity of the reconstructed curve", "statement": "ok\n[A short chord integral of a positive weight is nonzero]\n  \n  \n  \n  Project-bespoke. If $\\rho$ is continuous and strictly positive, and $c < d$ with\n  $d - c \\le \\pi$, then $\\int_c^d e^{i\\varphi}\\rho(\\varphi)\\,d\\varphi \\ne 0$.", "uses": ["def:error_vector"], "lean_name": "Gluck.chord_integral_ne_zero", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:error_vector}\n  \\leanok\n  Project the integral onto the midpoint direction $e^{i\\psi}$, $\\psi = (c+d)/2$:\n  $\\operatorname{Re}\\!\\bigl(e^{-i\\psi}\\int_c^d e^{i\\varphi}\\rho\\bigr) = \\int_c^d\n  \\cos(\\varphi-\\psi)\\rho\\,d\\varphi$. For $\\varphi \\in (c,d)$ we have $\\varphi-\\psi\n  \\in (-\\pi/2, \\pi/2)$, so $\\cos(\ $, the bridge\n  \\cref{lem:realizes_curvature_signedCurvature} also gives signed curvature\n  $\\kappa$.\n\n  \\textbf{Non-constant case (winding number argument).} Parametrize curves by the\n  angle of inclination $\\theta$ and reconstruct via $\\alpha$\n  (\\cref{def:reconstruct}); the failure to close is the error vector $E$\n  (\\cref{def:error_vector}), a \\emph{linear} functional of the weight\n  $\\rho = 1/\\kappa$. The entire winding/degree argument (Steps 1--4 of\n  DeTurck--Gluck §4--6: reduce to a four-arc step function, build a\n  finite-dimensional disk $D$ of breakpoint configurations, transfer the boundary\n  winding $\\pm1$ from the bicircle error map to $E_\\kappa$, and extract an interior\n  zero by the planar degree theorem) is packaged as\n  \\cref{lem:reduction_justified}. It yields a circle reparametrization $h$ ---\n  strictly increasing, continuous, $h(\\theta+2\\pi)=h(\\theta)+2\\pi$, and (crucially)\n  $C^1$ with a continuous strictly positive derivative $h'=v>0$ --- such that the\n  reconstruction weight $\\rho := \\mathrm{radius}(\\kappa\\circ h) = 1/(\\kappa\\circ h)$\n  has error vector $E(\\rho)=0$. The remaining four steps assemble the realizing\n  curve from $h$.\n  \\begin{enumerate}\n    \\item \\emph{$\\kappa\\circ h$ is again a curvature function.} $\\kappa\\circ h$ is\n      continuous (composition), strictly positive, and $2\\pi$-periodic\n      ($\\kappa(h(\\theta+2\\pi))=\\kappa(h(\\theta)+2\\pi)=\\kappa(h(\\theta))$). Hence\n      $\\rho=1/(\\kappa\\circ h)$ is continuous, $2\\pi$-periodic, strictly positive.\n    \\item \\emph{The inclination-parametrized curve closes, is simple, and realizes\n      $\\kappa\\circ h$.} Set $\\Gamma := \\alpha_\\rho = \\mathrm{reconstruct}(\\rho)$.\n      Since $E(\\rho)=0$, by \\cref{cor:positive_curvature_implies_simple} $\\Gamma$ is\n      a simple closed curve. By \\cref{lem:realizes_curvature_reconstruct} $\\Gamma$\n      realizes $\\kappa\\circ h$ intrinsically: its tangent angle is t ": {"id": "lem:hasderivat_dahlberg_curve", "type": "lemma", "title": "", "chapter": "Arc-length curvature representation (Dahlberg)", "statement": "ok\n[Velocity of the arc-length curve]\n  \n  \n  \n  If $K$ is continuous then for every $t$, $\\gamma_K$ is differentiable at $t$\n  with $\\gamma_K'(t)=e^{i\\alpha_K(t)}$; moreover $\\gamma_K\\in C^1$.", "uses": ["def:dahlberg_curve", "def:dahlberg_angle", "lem:continuous_dahlberg_angle", "lem:continuous_eiangle"], "lean_name": "Gluck.hasDerivAt_dahlbergCurve", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:dahlberg_curve, lem:continuous_dahlberg_angle, lem:continuous_eiangle}\n  \\leanok\n  $\\alpha_K$ is continuous (\\cref{lem:continuous_dahlberg_angle}), hence\n  $s\\mapsto e^{i\\alpha_K(s)}$ is continuous (\\cref{lem:continuous_eiangle}).\n  By the fundamental theorem of calculus for the interval integral\n  $\\gamma_K(t)=\\int_0^t e^{i\\alpha_K(s)}\\,ds$, $\\gamma_K$ has derivative\n  $e^{i\\alpha_K(t)}$ at every $t$, and since this derivative is continuous in $t$,\n  $\\gamma_K\\in C^1$.\n", "lean_source": "theorem hasDerivAt_dahlbergCurve {K : ℝ → ℝ} (hK : Continuous K) :\n    (∀ t, HasDerivAt (dahlbergCurve K)\n        (Complex.exp ((dahlbergAngle K t : ℂ) * Complex.I)) t) ∧\n      ContDiff ℝ 1 (dahlbergCurve K) := by\n  have hg : Continuous fun s => Complex.exp ((dahlbergAngle K s : ℂ) * Complex.I) :=\n    continuous_eiAngle hK\n  have hderiv : ∀ t, HasDerivAt (dahlbergCurve K)\n      (Complex.exp ((dahlbergAngle K t : ℂ) * Complex.I)) t := fun t =>\n    intervalIntegral.integral_hasDerivAt_right\n      (hg.intervalIntegrable 0 t)\n      (hg.stronglyMeasurableAtFilter _ _)\n      hg.continuousAt\n  refine ⟨hderiv, ?_⟩\n  rw [contDiff_one_iff_deriv]\n  refine ⟨fun t => (hderiv t).differentiableAt, ?_⟩\n  have hdeq : deriv (dahlbergCurve K)\n      = fun t => Complex.exp ((dahlbergAngle K t : ℂ) * Complex.I) := by\n    funext t; exact (hderiv t).deriv\n  rw [hdeq]; exact hg", "proof_size_lean": 865, "has_sorry": false, "tex_file": "chapters/Gluck_ArcLength.tex", "lean_file": "Gluck/ArcLength.lean", "dep_count": 4, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 484, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 1791, "effort_total": 0}, "lem:realizes_curvature_dahlberg": {"id": "lem:realizes_curvature_dahlberg", "type": "lemma", "title": "", "chapter": "Arc-length curvature representation (Dahlberg)", "statement": "ok\n[The arc-length curve realizes $K$ --- unification with \\cref{def:realizes_curvature}]\n  \n  \n  \n  For \\emph{any} continuous $K : \\mathbb{R}\\to\\mathbb{R}$ (no positivity required),\n  the arc-length curve realizes $K$ in the intrinsic sense:\n  \\[\n    \\mathrm{RealizesCurvature}\\,(\\gamma_K)\\,(K).\n  \\]\n  This is the structural unification: the arc-length representation and the\n  positive-case inclination reconstruction (\\cref{lem:realizes_curvature_reconstruct})\n  satisfy the \\emph{same} predicate \\cref{def:realizes_curvature}; there are not\n  two parallel curvature notions.", "uses": ["def:dahlberg_curve", "def:realizes_curvature", "lem:hasderivat_dahlberg_curve"], "lean_name": "Gluck.realizesCurvature_dahlbergCurve", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:hasderivat_dahlberg_curve, def:realizes_curvature}\n  \\leanok\n  By \\cref{lem:hasderivat_dahlberg_curve} $\\gamma_K\\in C^1$ with\n  $\\gamma_K'(t)=e^{i\\alpha_K(t)}\\neq 0$, so $\\gamma_K$ is regular. Take the\n  tangent-angle function $\\varphi=\\alpha_K$, which is differentiable with\n  $\\varphi'(t)=\\alpha_K'(t)=K(t)$. Then $\\lVert\\gamma_K'(t)\\rVert=\n  \\lVert e^{i\\alpha_K(t)}\\rVert=1$, so the tangent equation\n  $\\gamma_K'(t)=\\lVert\\gamma_K'(t)\\rVert\\,e^{i\\varphi(t)}=e^{i\\alpha_K(t)}$ holds,\n  and the curvature equation $\\varphi'(t)=K(t)=K(t)\\cdot 1=K(t)\\,\n  \\lVert\\gamma_K'(t)\\rVert$ holds. Thus $\\mathrm{RealizesCurvature}\\,(\\gamma_K)\\,(K)$.\n", "lean_source": "theorem
