), (1.2) closes the curve, (1.3) makes it\n  simple.", "uses": ["def:dahlberg_angle", "def:dahlberg_curve"], "lean_name": "Gluck.ArcLengthCurvature", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "def ArcLengthCurvature (K : ℝ → ℝ) : Prop :=\n  (∫ s in (0 : ℝ)..(2 * π), K s) = 2 * π ∧\n    dahlbergCurve K (2 * π) = 0 ∧\n    ∀ t τ : ℝ, 0 ≤ t → t < τ → τ < 2 * π → dahlbergCurve K τ ≠ dahlbergCurve K t", "proof_size_lean": 202, "has_sorry": false, "tex_file": "chapters/Gluck_ArcLength.tex", "lean_file": "Gluck/ArcLength.lean", "dep_count": 2, "rdep_count": 5, "descendant_count": 9, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 414, "effort_total": 0}, "lem:eiangle_periodic": {"id": "lem:eiangle_periodic", "type": "lemma", "title": "", "chapter": "Arc-length curvature representation (Dahlberg)", "statement": "ok\n[Periodicity of the unit tangent]\n  \n  \n  \n  If $K$ is continuous, $2\\pi$-periodic, and satisfies (1.1)\n  $\\int_0^{2\\pi}K=2\\pi$, then $s\\mapsto e^{i\\alpha_K(s)}$ is $2\\pi$-periodic.", "uses": ["def:dahlberg_angle", "def:arclength_curvature"], "lean_name": "Gluck.eiAngle_periodic", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:dahlberg_angle}\n  \\leanok\n  For any $s$, $\\alpha_K(s+2\\pi)-\\alpha_K(s)=\\int_s^{s+2\\pi}K$. Since $K$ is\n  $2\\pi$-periodic this period integral equals $\\int_0^{2\\pi}K=2\\pi$ by (1.1).\n  Hence $\\alpha_K(s+2\\pi)=\\alpha_K(s)+2\\pi$ and $e^{i\\alpha_K(s+2\\pi)}=\n  e^{i\\alpha_K(s)}\\,e^{2\\pi i}=e^{i\\alpha_K(s)}$.\n", "lean_source": "theorem eiAngle_periodic {K : ℝ → ℝ} (hK : Continuous K)\n    (hper : Function.Periodic K (2 * π))\n    (h11 : (∫ s in (0 : ℝ)..(2 * π), K s) = 2 * π) :\n    Function.Periodic\n      (fun s => Complex.exp ((dahlbergAngle K s : ℂ) * Complex.I)) (2 * π) := by\n  intro s\n\n  have hadj : dahlbergAngle K s + (∫ t in s..(s + 2 * π), K t) = dahlbergAngle K (s + 2 * π) := by\n    rw [dahlbergAngle, dahlbergAngle]\n    exact intervalIntegral.integral_add_adjacent_intervals\n      (hK.intervalIntegrable 0 s) (hK.intervalIntegrable s (s + 2 * π))\n  have hper_int : (∫ t in s..(s + 2 * π), K t) = 2 * π := by\n    have h := hper.intervalIntegral_add_eq s 0\n    simp only [zero_add] at h\n    rw [h, h11]\n  have hα : dahlbergAngle K (s + 2 * π) = dahlbergAngle K s + 2 * π := by\n    rw [← hadj, hper_int]\n  change Complex.exp ((dahlbergAngle K (s + 2 * π) : ℂ) * Complex.I)\n      = Complex.exp ((dahlbergAngle K s : ℂ) * Complex.I)\n  rw [hα]\n  push_cast\n  rw [add_mul, Complex.exp_add, Complex.exp_two_pi_mul_I, mul_one]", "proof_size_lean": 1002, "has_sorry": false, "tex_file": "chapters/Gluck_ArcLength.tex", "lean_file": "Gluck/ArcLength.lean", "dep_count": 2, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 312, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 1416, "effort_total": 0}, "lem:dahlberg_curve_periodic": {"id": "lem:dahlberg_curve_periodic", "type": "lemma", "title": "", "chapter": "Arc-length curvature representation (Dahlberg)", "statement": "ok\n[Closure: $\\gamma_K$ is $2\\pi$-periodic]\n  \n  \n  \n  If $K$ is continuous, $2\\pi$-periodic, and satisfies (1.1) and (1.2), then\n  $\\gamma_K$ is $2\\pi$-periodic (closed).", "uses": ["def:dahlberg_curve", "def:arclength_curvature", "lem:eiangle_periodic"], "lean_name": "Gluck.dahlbergCurve_periodic", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:eiangle_periodic, def:dahlberg_curve}\n  \\leanok\n  $\\gamma_K(t+2\\pi)-\\gamma_K(t)=\\int_t^{t+2\\pi}e^{i\\alpha_K(s)}\\,ds$. By\n  \\cref{lem:eiangle_periodic} the integrand is $2\\pi$-periodic, so the integral\n  over any period equals $\\int_0^{2\\pi}e^{i\\alpha_K(s)}\\,ds=0$ by (1.2). Hence\n  $\\gamma_K(t+2\\pi)=\\gamma_K(t)$.\n", "lean_source": "theorem dahlbergCurve_periodic {K : ℝ → ℝ} (hK : Continuous K)\n    (hper : Function.Periodic K (2 * π))\n    (h11 : (∫ s in (0 : ℝ)..(2 * π), K s) = 2 * π)\n    (h12 : dahlbergCurve K (2 * π) = 0) :\n    Function.Periodic (dahlbergCurve K) (2 * π) := by\n  have hg : Continuous fun s => Complex.exp ((dahlbergAngle K s : ℂ) * Complex.I) :=\n    continuous_eiAngle hK\n  have hgper := eiAngle_periodic hK hper h11\n  intro t\n  have hadj : dahlbergCurve K t\n      + (∫ s in t..(t + 2 * π), Complex.exp ((dahlbergAngle K s : ℂ) * Complex.I))\n      = dahlbergCurve K (t + 2 * π) := by\n    rw [dahlbergCurve, dahlbergCurve]\n    exact intervalIntegral.integral_add_adjacent_intervals\n      (hg.intervalIntegrable 0 t) (hg.intervalIntegrable t (t + 2 * π))\n  have hint : (∫ s in t..(t + 2 * π), Complex.exp ((dahlbergAngle K s : ℂ) * Complex.I))\n      = dahlbergCurve K (2 * π) := by\n    have h := hgper.intervalIntegral_add_eq t 0\n    simp only [zero_add] at h\n    rw [h, dahlbergCurve]\n  rw [hint, h12, add_zero] at hadj\n  change dahlbergCurve K (t + 2 * π) = dahlbergCurve K t\n  rw [← hadj]", "proof_size_lean": 1079, "has_sorry": false, "tex_file": "chapters/Gluck_ArcLength.tex", "lean_file": "Gluck/ArcLength.lean", "dep_count": 3, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 323, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 2495, "effort_total": 0}, "lem:injon_dahlberg_curve": {"id": "lem:injon_dahlberg_curve", "type": "lemma", "title": "", "chapter": "Arc-length curvature representation (Dahlberg)", "statement": "ok\n[Simplicity: $\\gamma_K$ is injective on $[0,2\\pi)$]\n  \n  \n  \n  If $K$ satisfies (1.3) then $\\gamma_K$ is injective on $[0,2\\pi)$.", "uses": ["def:dahlberg_curve", "def:arclength_curvature"], "lean_name": "Gluck.injOn_dahlbergCurve", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:dahlberg_curve}\n  \\leanok\n  Let $t,\\tau\\in[0,2\\pi)$ with $\\gamma_K(t)=\\gamma_K(\\tau)$ and suppose $t\\neq\\tau$;\n  WLOG $t<\\tau$. Then $\\gamma_K(\\tau)-\\gamma_K(t)=\\int_t^\\tau e^{i\\alpha_K(s)}\\,ds\n  =0$, contradicting (1.3) (which applies since $0\\le t<\\tau<2\\pi$). Hence\n  $t=\\tau$.\n", "lean_source": "theorem injOn_dahlbergCurve {K : ℝ → ℝ}\n    (h13 : ∀ t τ : ℝ, 0 ≤ t → t < τ → τ < 2 * π →\n      dahlbergCurve K τ ≠ dahlbergCurve K t) :\n    Set.InjOn (dahlbergCurve K) (Set.Ico 0 (2 * π)) := by\n  intro a ha b hb hab\n  rcases lt_trichotomy a b with h | h | h\n  · exact absurd hab.symm (h13 a b ha.1 h hb.2)\n  · exact h\n  · exact absurd hab (h13 b a hb.1 h ha.2)", "proof_size_lean": 361, "has_sorry": false, "tex_file": "chapters/Gluck_ArcLength.tex", "lean_file": "Gluck/ArcLength.lean", "dep_count": 2, "rdep_count": 1, "descendant_count": 5, "proof_size_tex": 290, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 775, "effort_total": 0}, "lem:issimpleclosed_dahlberg_curve": {"id": "lem:issimpleclosed_dahlberg_curve", "type": "lemma", "title": "", "chapter": "Arc-length curvature representation (Dahlberg)", "statement": "ok\n[$\\gamma_K$ is a simple closed curve]\n  \n  \n  \n  If $K$ is continuous, $2\\pi$-periodic, and satisfies (1.1)--(1.3), then\n  $\\gamma_K$ is a simple closed curve.", "uses": ["lem:dahlberg_curve_periodic", "lem:injon_dahlberg_curve", "def:is_simple_closed"], "lean_name": "Gluck.isSimpleClosed_dahlbergCurve", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:dahlberg_curve_periodic, lem:injon_dahlberg_curve}\n  \\leanok\n  Combine closure (\\cref{lem:dahlberg_curve_periodic}) and injectivity on\n  $[0,2\\pi)$ (\\cref{lem:injon_dahlberg_curve}); this is exactly\n  \\cref{def:is_simple_closed}.\n", "lean_source": "theorem isSimpleClosed_dahlbergCurve {K : ℝ → ℝ} (hK : Continuous K)\n    (hper : Function.Periodic K (2 * π)) (hALC : ArcLengthCurvature K) :\n    IsSimpleClosed (dahlbergCurve K) := by\n  obtain ⟨h11, h12, h13⟩ := hALC\n  exact ⟨dahlbergCurve_periodic hK hper h11 h12, injOn_dahlbergCurve h13⟩", "proof_size_lean": 291, "has_sorry": false, "tex_file": "chapters/Gluck_ArcLength.tex", "lean_file": "Gluck/ArcLength.lean", "dep_count": 3, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 239, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 3308, "effort_total": 0}, "thm:arclength_converse": {"id": "thm:arclength_converse", "type": "theorem", "title": "", "chapter": "Arc-length curvature representation (Dahlberg)", "statement": "ok\n[Arc-length converse: (1.1)--(1.3) realize $K$ by a simple closed curve]\n  \n  \n  \n  If $K$ is continuous, $2\\pi$-periodic, and an arc-length curvature function\n  (satisfies (1.1)--(1.3)), then\n  \\[\n    \\exists\\,\\gamma,\\ \\mathrm{IsSimpleClosed}\\,\\gamma \\,\\wedge\\,\n       \\mathrm{RealizesCurvature}\\,\\gamma\\,K.\n  \\]\n  Witness: $\\gamma=\\gamma_K$.", "uses": ["def:arclength_curvature", "lem:realizes_curvature_dahlberg", "lem:issimpleclosed_dahlberg_curve"], "lean_name": "Gluck.arcLengthConverse", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:realizes_curvature_dahlberg, lem:issimpleclosed_dahlberg_curve}\n  \\leanok\n  Take $\\gamma=\\gamma_K$. Simplicity and closure are\n  \\cref{lem:issimpleclosed_dahlberg_curve}; realization is\n  \\cref{lem:realizes_curvature_dahlberg}. Note this uses the \\emph{same}\n  conclusion predicate as \\cref{thm:gluck_converse}, so positive and mixed-sign\n  cases share one curvature notion.\n", "lean_source": "theorem arcLengthConverse {K : ℝ → ℝ} (hK : Continuous K)\n    (hper : Function.Periodic K (2 * π)) (hALC : ArcLengthCurvature K) :\n    ∃ γ : ℝ → ℂ, IsSimpleClosed γ ∧ RealizesCurvature γ K :=\n  ⟨dahlbergCurve K, isSimpleClosed_dahlbergCurve hK hper hALC,\n    realizesCurvature_dahlbergCurve hK⟩", "proof_size_lean": 294, "has_sorry": false, "tex_file": "chapters/Gluck_ArcLength.tex", "lean_file": "Gluck/ArcLength.lean", "dep_count": 3, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 384, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 6279, "effort_total": 0}, "def:non_normalised_curvature": {"id": "def:non_normalised_curvature", "type": "definition", "title": "", "chapter": "Arc-length curvature representation (Dahlberg)", "statement": "ok\n[Non-normalised curvature function (1.4)]\n  \n  \n  \n  \\textit{Source: Dahlberg, §1, (1.4).}\n  A continuous, $2\\pi$-periodic $\\kappa : \\mathbb{R}\\to\\mathbb{R}$ is a\n  \\emph{non-normalised curvature function} if $I=\\int_0^{2\\pi}\\kappa\\,dt\\neq 0$ and\n  $K=\\frac{2\\pi}{I}\\kappa$ satisfies (1.2) and (1.3). (Note $K$ then satisfies\n  (1.1) automatically: $\\int_0^{2\\pi}K=\\frac{2\\pi}{I}\\cdot I=2\\pi$.)", "uses": ["def:arclength_curvature"], "lean_name": "Gluck.NonNormalisedCurvature", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "def NonNormalisedCurvature (κ : ℝ → ℝ) : Prop :=\n  let I := ∫ t in (0 : ℝ)..(2 * π), κ t\n  I ≠ 0 ∧\n    dahlbergCurve (fun s => (2 * π / I) * κ s) (2 * π) = 0 ∧\n    ∀ t τ : ℝ, 0 ≤ t → t < τ → τ < 2 * π →\n      dahlbergCurve (fun s => (2 * π / I) * κ s) τ ≠\n        dahlbergCurve (fun s => (2 * π / I) * κ s) t", "proof_size_lean": 308, "has_sorry": false, "tex_file": "chapters/Gluck_ArcLength.tex", "lean_file": "Gluck/ArcLength.lean", "dep_count": 1, "rdep_count": 2, "descendant_count": 3, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 722, "effort_total": 0}, "lem:realizes_curvature_smul": {"id": "lem:realizes_curvature_smul", "type": "lemma", "title": "", "chapter": "Arc-length curvature representation (Dahlberg)", "statement": "ok\n[Realization scales]\n  \n  \n  \n  If $\\mathrm{RealizesCurvature}\\,\\gamma\\,\\mu$ and $c>0$ is a real constant, then\n  $\\mathrm{RealizesCurvature}\\,(c\\,\\gamma)\\,(\\mu/c)$.", "uses": ["def:realizes_curvature"], "lean_name": "Gluck.realizesCurvature_smul", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:realizes_curvature}\n  \\leanok\n  $(c\\gamma)'=c\\,\\gamma'$, so $\\lVert(c\\gamma)'\\rVert=c\\lVert\\gamma'\\rVert$ and the\n  tangent angle $\\varphi$ is unchanged; the tangent equation rescales by $c>0$.\n  For curvature, $\\varphi'=\\mu\\lVert\\gamma'\\rVert=(\\mu/c)\\,(c\\lVert\\gamma'\\rVert)\n  =(\\mu/c)\\,\\lVert(c\\gamma)'\\rVert$. Regularity and $C^1$ are preserved by the\n  nonzero scalar.\n", "lean_source": "theorem realizesCurvature_smul {γ : ℝ → ℂ} {μ : ℝ → ℝ} {c : ℝ} (hc : 0 < c)\n    (h : RealizesCurvature γ μ) :\n    RealizesCurvature (fun t => (c : ℂ) * γ t) (fun t => μ t / c) := by\n  obtain ⟨hC1, hreg, φ, hφ, htan, hcurv⟩ := h\n  have hcne : (c : ℂ) ≠ 0 := by exact_mod_cast hc.ne'\n  have hcne' : c ≠ 0 := hc.ne'\n  have hγdiff : ∀ t, DifferentiableAt ℝ γ t := fun t =>\n    (hC1.differentiable (by norm_num)).differentiableAt\n  have hderiv_δ : ∀ t, deriv (fun t => (c : ℂ) * γ t) t = (c : ℂ) * deriv γ t := fun t =>\n    deriv_const_mul _ (hγdiff t)\n  have hnorm_δ : ∀ t, ‖deriv (fun t => (c : ℂ) * γ t) t‖ = c * ‖deriv γ t‖ := by\n    intro t; rw [hderiv_δ, norm_mul, Complex.norm_real, Real.norm_eq_abs, abs_of_pos hc]\n  refine ⟨contDiff_const.mul hC1, ?_, φ, hφ, ?_, ?_⟩\n  · intro t; rw [hderiv_δ]; exact mul_ne_zero hcne (hreg t)\n  · intro t\n    rw [hnorm_δ, hderiv_δ]\n    conv_lhs => rw [htan t]\n    push_cast; ring\n  · intro t\n    rw [hnorm_δ, hcurv t]\n    field_simp", "proof_size_lean": 970, "has_sorry": false, "tex_file": "chapters/Gluck_ArcLength.tex", "lean_file": "Gluck/ArcLength.lean", "dep_count": 1, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 382, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 1340, "effort_total": 0}, "lem:issimpleclosed_smul": {"id": "lem:issimpleclosed_smul", "type": "lemma", "title": "", "chapter": "Arc-length curvature representation (Dahlberg)", "statement": "ok\n[Simplicity scales]\n  \n  \n  \n  If $\\gamma$ is a simple closed curve and $c\\neq 0$ is a real (or complex\n  nonzero) constant, then $c\\,\\gamma$ is a simple closed curve.", "uses": ["def:is_simple_closed"], "lean_name": "Gluck.isSimpleClosed_smul", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:is_simple_closed}\n  \\leanok\n  Periodicity passes through the linear map $z\\mapsto cz$; injectivity on\n  $[0,2\\pi)$ is preserved because $z\\mapsto cz$ is injective ($c\\neq 0$).\n", "lean_source": "theorem isSimpleClosed_smul {γ : ℝ → ℂ} {c : ℂ} (hc : c ≠ 0)\n    (h : IsSimpleClosed γ) :\n    IsSimpleClosed (fun t => c * γ t) := by\n  obtain ⟨hclosed, hinj⟩ := h\n  refine ⟨?_, ?_⟩\n  · intro t; change c * γ (t + 2 * π) = c * γ t; rw [hclosed t]\n  · intro a ha b hb hab\n    exact hinj ha hb (mul_left_cancel₀ hc hab)", "proof_size_lean": 316, "has_sorry": false, "tex_file": "chapters/Gluck_ArcLength.tex", "lean_file": "Gluck/ArcLength.lean", "dep_count": 1, "rdep_count": 1, "descendant_count": 3, "proof_size_tex": 185, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 477, "effort_total": 0}, "thm:realizes_of_non_normalised": {"id": "thm:realizes_of_non_normalised", "type": "theorem", "title": "", "chapter": "Arc-length curvature representation (Dahlberg)", "statement": "ok\n[Reduction: a non-normalised reparametrisation realizes $\\kappa$]\n  \n  \n  \n  \\textit{Source: Dahlberg, §1, reduction paragraph after (1.4).}\n  Let $\\kappa : \\mathbb{R}\\to\\mathbb{R}$ be continuous and $2\\pi$-periodic. Suppose\n  there is a $C^1$ orientation-preserving circle diffeomorphism $\\varphi$ (with\n  $C^1$ inverse $\\psi$, $\\varphi(t+2\\pi)=\\varphi(t)+2\\pi$) such that\n  $\\kappa\\circ\\varphi$ is a non-normalised curvature function \\emph{with positive\n  total curvature} $I=\\int_0^{2\\pi}\\kappa\\circ\\varphi\\,dt>0$. Then\n  \\[\n    \\exists\\,\\gamma,\\ \\mathrm{IsSimpleClosed}\\,\\gamma \\,\\wedge\\,\n       \\mathrm{RealizesCurvature}\\,\\gamma\\,\\kappa.\n  \\]\n  (The hypothesis $I>0$ is exactly what Phase D-B delivers: there\n  $\\kappa\\circ\\varphi=a(1-f)+bf+e$ with $a,b>0$ and $e$ of small integral, so\n  $I\\approx\\int(a(1-f)+bf)>0$. The bare $I\\neq 0$ of (1.4) suffices for\n  $K=\\frac{2\\pi}{I}\\kappa\\circ\\varphi$ to satisfy (1.1); the sign is pinned by the\n  construction.)", "uses": ["def:non_normalised_curvature", "thm:arclength_converse", "lem:realizes_curvature_smul", "lem:issimpleclosed_smul", "lem:realizes_curvature_comp", "lem:is_simple_closed_comp"], "lean_name": "Gluck.realizesCurvature_of_nonNormalised", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:arclength_converse, lem:realizes_curvature_smul, lem:issimpleclosed_smul, lem:realizes_curvature_comp, lem:is_simple_closed_comp}\n  \\leanok\n  Set $I=\\int_0^{2\\pi}\\kappa\\circ\\varphi\\,dt$ ($\\neq 0$) and $K=\\frac{2\\pi}{I}\n  \\kappa\\circ\\varphi$, an arc-length curvature function by hypothesis and\n  \\cref{def:non_normalised_curvature}. By \\cref{thm:arclength_converse} the curve\n  $\\gamma_K$ is simple closed and realizes $K$. Since $I>0$ the constant\n  $c=\\tfrac{2\\pi}{I}>0$, so \\cref{lem:realizes_curvature_smul} (which needs $c>0$)\n  applies: $c\\,\\gamma_K$ realizes\n  $K/c=\\tfrac{I}{2\\pi}K=\\tfrac{I}{2\\pi}\\cdot\\tfrac{2\\pi}{I}\\,\\kappa\\circ\\varphi\n  =\\kappa\\circ\\varphi$, and by\n  \\cref{lem:issimpleclosed_smul} $c\\,\\gamma_K$ is simple closed. Finally\n  reparametrise by $\\psi=\\varphi^{-1}$: by\n  \\cref{lem:realizes_curvature_comp} (realization transfers under an\n  orientation-preserving $C^1$ reparametrisation), $(c\\,\\gamma_K)\\circ\\psi$\n  realizes $(\\kappa\\circ\\varphi)\\circ\\psi=\\kappa\\circ(\\varphi\\circ\\psi)=\\kappa$,\n  and by \\cref{lem:is_simple_closed_comp} $(c\\,\\gamma_K)\\circ\\psi$ is simple\n  closed. Take $\\gamma=(c\\,\\gamma_K)\\circ\\psi$. This is Dahlberg's\n  $\\Gamma(t)=\\frac{2\\pi}{I}\\gamma_K(\\psi(t))$.\n", "lean_source": "theorem realizesCurvature_of_nonNormalised {κ φ ψ : ℝ → ℝ}\n    (hκ : Continuous κ) (hκper : Function.Periodic κ (2 * π))\n    (hφ : ContDiff ℝ 1 φ) (hφpos : ∀ t, 0 < deriv φ t)\n    (hφper : ∀ t, φ (t + 2 * π) = φ t + 2 * π)\n    (hψ : ContDiff ℝ 1 ψ) (hψpos : ∀ t, 0 < deriv ψ t)\n    (hψper : ∀ t, ψ (t + 2 * π) = ψ t + 2 * π)\n    (hleft : Function.LeftInverse ψ φ) (hright : Function.RightInverse ψ φ)\n    (hNN : NonNormalisedCurvature (κ ∘ φ))\n    (hIpos : 0 < ∫ t in (0 : ℝ)..(2 * π), (κ ∘ φ) t) :\n    ∃ γ : ℝ → ℂ, IsSimpleClosed γ ∧ RealizesCurvature γ κ := by\n\n  obtain ⟨hI0, hNN12, hNN13⟩ := hNN\n  set I := ∫ t in (0 : ℝ)..(2 * π), (κ ∘ φ) t with hIdef\n  set K : ℝ → ℝ := fun s => (2 * π / I) * (κ ∘ φ) s with hKdef\n\n  have hφcont : Continuous φ := hφ.continuous\n  have hκφcont : Continuous (κ ∘ φ) := hκ.comp hφcont\n  have hKcont : Continuous K := continuous_const.mul hκφcont\n  have hcpos : (0 : ℝ) < 2 * π / I := div_pos (by positivity) hIpos\n  have hcne : 2 * π / I ≠ 0 := hcpos.ne'\n  have hKper : Function.Periodic K (2 * π) := by\n    intro t\n    simp only [hKdef, Function.comp]\n    rw [hφper t, hκper (φ t)]\n\n  have h11 : (∫ s in (0 : ℝ)..(2 * π), K s) = 2 * π := by\n    simp only [hKdef]\n    rw [intervalIntegral.integral_const_mul, ← hIdef]\n    field_simp\n\n  have hALC : ArcLengthCurvature K := ⟨h11, hNN12, hNN13⟩\n\n  have hsc : IsSimpleClosed (dahlbergCurve K) :=\n    isSimpleClosed_dahlbergCurve hKcont hKper hALC\n  have hrc : RealizesCurvature (dahlbergCurve K) K :=\n    realizesCurvature_dahlbergCurve hKcont\n\n  have hrc_scaled :\n      RealizesCurvature (fun t => ((2 * π / I : ℝ) : ℂ) * dahlbergCurve K t)\n        (fun t => K t / (2 * π / I)) := realizesCurvature_smul hcpos hrc\n  have hsc_scaled :\n      IsSimpleClosed (fun t => ((2 * π / I : ℝ) : ℂ) * dahlbergCurve K t) :=\n    isSimpleClosed_smul (by exact_mod_cast hcne) hsc\n\n  have hfun : (fun t => K t / (2 * π / I)) = (κ ∘ φ) := by\n    funext t\n    simp only [hKdef]\n    field_simp\n  rw [hfun] at hrc_scaled\n\n  have hψderiv : ∀ t, HasDerivAt ψ (deriv ψ t) t :=\n    fun t => (hψ.differentiable (by norm_num)).differentiableAt.hasDerivAt\n  have hψmono : StrictMono ψ := strictMono_of_hasDerivAt_pos hψderiv hψpos\n  refine ⟨fun t => ((2 * π / I : ℝ) : ℂ) * dahlbergCurve K (ψ t), ?_, ?_⟩\n  · \n    exact isSimpleClosed_comp hsc_scaled hψ.continuous hψmono hψper\n  · \n\n    have hcomp := realizesCurvature_comp hrc_scaled hψ hψpos\n    have hkeq : (κ ∘ φ) ∘ ψ = κ := by\n      funext t\n      simp only [Function.comp_apply]\n      rw [hright t]\n    rw [hkeq] at hcomp\n    exact hcomp", "proof_size_lean": 2549, "has_sorry": false, "tex_file": "chapters/Gluck_ArcLength.tex", "lean_file": "Gluck/ArcLength.lean", "dep_count": 6, "rdep_count": 1, "descendant_count": 2, "proof_size_tex": 1218, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 14919, "effort_total": 0}, "def:dahlberg_f": {"id": "def:dahlberg_f", "type": "definition", "title": "", "chapter": "Dahlberg Step 1: the preliminary diffeomorphism (Phase D-B)", "statement": "ok\n[Two-arc indicator $f$]\n  \n  \n  \\textit{Source: Dahlberg, §3, definition of $f$.}\n  Let $f : \\mathbb{R}\\to\\mathbb{R}$ be the $2\\pi$-periodic function with\n  $f(\\theta)=1$ when $|\\theta-\\tfrac{\\pi}{2}|<\\tfrac{\\pi}{4}$ or\n  $|\\theta-\\tfrac{3\\pi}{2}|<\\tfrac{\\pi}{4}$ (i.e.\\ on the open arcs\n  $(\\tfrac{\\pi}{4},\\tfrac{3\\pi}{4})$ and $(\\tfrac{5\\pi}{4},\\tfrac{7\\pi}{4})$) and\n  $f(\\theta)=0$ elsewhere on $[0,2\\pi)$.", "uses": [], "lean_name": "Gluck.dahlbergF", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def dahlbergF : ℝ → ℝ :=\n  Set.indicator\n    (⋃ k : ℤ, Set.Ioo (π / 4 + 2 * π * (k : ℝ)) (3 * π / 4 + 2 * π * (k : ℝ)) ∪\n              Set.Ioo (5 * π / 4 + 2 * π * (k : ℝ)) (7 * π / 4 + 2 * π * (k : ℝ)))\n    (fun _ => 1)", "proof_size_lean": 234, "has_sorry": false, "tex_file": "chapters/Gluck_DahlbergStep1.tex", "lean_file": "Gluck/DahlbergStep1.lean", "dep_count": 0, "rdep_count": 4, "descendant_count": 28, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 234, "effort_total": 0}, "def:clean_bicircle": {"id": "def:clean_bicircle", "type": "definition", "title": "", "chapter": "Dahlberg Step 1: the preliminary diffeomorphism (Phase D-B)", "statement": "ok\n[Clean bicircle $a(1-f)+bf$]\n  \n  \n  \n  For reals $a,b$ the \\emph{clean bicircle} is the $2\\pi$-periodic step function\n  \\[\n    k_{a,b}(\\theta) \\;=\\; a\\bigl(1-f(\\theta)\\bigr) + b\\,f(\\theta)\n      \\;=\\;\n    \\begin{cases}\n      b, & \\theta\\in(\\tfrac{\\pi}{4},\\tfrac{3\\pi}{4})\\cup(\\tfrac{5\\pi}{4},\\tfrac{7\\pi}{4}),\\\\\n      a, & \\text{otherwise on }[0,2\\pi).\n    \\end{cases}\n  \\]", "uses": ["def:dahlberg_f"], "lean_name": "Gluck.cleanBicircle", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def cleanBicircle (a b : ℝ) : ℝ → ℝ :=\n  fun θ => a * (1 - dahlbergF θ) + b * dahlbergF θ", "proof_size_lean": 103, "has_sorry": false, "tex_file": "chapters/Gluck_DahlbergStep1.tex", "lean_file": "Gluck/DahlbergStep1.lean", "dep_count": 1, "rdep_count": 8, "descendant_count": 27, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 337, "effort_total": 0}, "lem:clean_bicircle_basic": {"id": "lem:clean_bicircle_basic", "type": "lemma", "title": "Periodicity and integrability of $f$ and $k_{a,b}$", "chapter": "Dahlberg Step 1: the preliminary diffeomorphism (Phase D-B)", "statement": "The indicator $f$ is $2\\pi$-periodic and interval-integrable on every $[c,d]$;\n  consequently the clean bicircle $k_{a,b}=a(1-f)+bf$ is $2\\pi$-periodic and\n  interval-integrable, and satisfies the two-sided bound $a\\le k_{a,b}\\le b$ when\n  $a\\le b$.", "uses": ["def:dahlberg_f", "def:clean_bicircle"], "lean_name": "Gluck.dahlbergF_periodic, Gluck.dahlbergF_intervalIntegrable, Gluck.cleanBicircle_periodic, Gluck.cleanBicircle_intervalIntegrable, Gluck.cleanBicircle_bounds", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:dahlberg_f, def:clean_bicircle}\n  $f$ is the indicator of a $2\\pi$-periodic union of arcs, hence $2\\pi$-periodic and\n  bounded measurable, so interval-integrable; the bound $0\\le f\\le 1$ gives\n  $a\\le a(1-f)+bf\\le b$. Periodicity and integrability of $k_{a,b}$ follow by linear\n  combination. (Lean helpers: \\texttt{dahlbergF\\_periodic},\n  \\texttt{dahlbergF\\_intervalIntegrable}, \\texttt{cleanBicircle\\_periodic},\n  \\texttt{cleanBicircle\\_intervalIntegrable}, \\texttt{cleanBicircle\\_bounds}.)\n", "lean_source": "private lemma dahlbergF_periodic : Function.Periodic dahlbergF (2 * π) := by\n  intro θ\n  unfold dahlbergF\n  have hmem : ∀ x : ℝ,\n      (x + 2 * π ∈ (⋃ k : ℤ,\n          Set.Ioo (π / 4 + 2 * π * (k : ℝ)) (3 * π / 4 + 2 * π * (k : ℝ)) ∪\n          Set.Ioo (5 * π / 4 + 2 * π * (k : ℝ)) (7 * π / 4 + 2 * π * (k : ℝ)))) ↔\n      (x ∈ (⋃ k : ℤ,\n          Set.Ioo (π / 4 + 2 * π * (k : ℝ)) (3 * π / 4 + 2 * π * (k : ℝ)) ∪\n          Set.Ioo (5 * π / 4 + 2 * π * (k : ℝ)) (7 * π / 4 + 2 * π * (k : ℝ)))) := by\n    intro x\n    simp only [Set.mem_iUnion, Set.mem_union, Set.mem_Ioo]\n    constructor\n    · rintro ⟨k, hk⟩\n      refine ⟨k - 1, ?_⟩\n      push_cast\n      rcases hk with hk | hk\n      · left; constructor <;> [linarith [hk.1]; linarith [hk.2]]\n      · right; constructor <;> [linarith [hk.1]; linarith [hk.2]]\n    · rintro ⟨k, hk⟩\n      refine ⟨k + 1, ?_⟩\n      push_cast\n      rcases hk with hk | hk\n      · left; constructor <;> [linarith [hk.1]; linarith [hk.2]]\n      · right; constructor <;> [linarith [hk.1]; linarith [hk.2]]\n  by_cases h : θ ∈ (⋃ k : ℤ,\n      Set.Ioo (π / 4 + 2 * π * (k : ℝ)) (3 * π / 4 + 2 * π * (k : ℝ)) ∪\n      Set.Ioo (5 * π / 4 + 2 * π * (k : ℝ)) (7 * π / 4 + 2 * π * (k : ℝ)))\n  · rw [Set.indicator_of_mem ((hmem θ).mpr h), Set.indicator_of_mem h]\n  · rw [Set.indicator_of_notMem (fun hc => h ((hmem θ).mp hc)), Set.indicator_of_notMem h]\n\nprivate lemma dahlbergF_intervalIntegrable (p q : ℝ) :\n    IntervalIntegrable dahlbergF volume p q := by\n  have hSmeas : MeasurableSet (⋃ k : ℤ,\n      Set.Ioo (π / 4 + 2 * π * (k : ℝ)) (3 * π / 4 + 2 * π * (k : ℝ)) ∪\n      Set.Ioo (5 * π / 4 + 2 * π * (k : ℝ)) (7 * π / 4 + 2 * π * (k : ℝ))) :=\n    MeasurableSet.iUnion (fun _ => measurableSet_Ioo.union measurableSet_Ioo)\n  rw [intervalIntegrable_iff]\n  unfold dahlbergF\n  rw [MeasureTheory.integrableOn_indicator_iff hSmeas]\n  exact MeasureTheory.integrableOn_const\n    (lt_of_le_of_lt (measure_mono Set.inter_subset_right) measure_Ioc_lt_top).ne\n\nlemma cleanBicircle_periodic (a b : ℝ) :\n    Function.Periodic (cleanBicircle a b) (2 * π) := by\n  intro θ\n  simp only [cleanBicircle, dahlbergF_periodic θ]\n\nprivate lemma cleanBicircle_intervalIntegrable (a b p q : ℝ) :\n    IntervalIntegrable (cleanBicircle a b) volume p q := by\n  unfold cleanBicircle\n  have h1 : IntervalIntegrable (fun θ => a * (1 - dahlbergF θ)) volume p q :=\n    (IntervalIntegrable.sub intervalIntegrable_const (dahlbergF_intervalIntegrable p q)).const_mul a\n  have h2 : IntervalIntegrable (fun θ => b * dahlbergF θ) volume p q :=\n    (dahlbergF_intervalIntegrable p q).const_mul b\n  exact h1.add h2\n\nlemma cleanBicircle_bounds (a b θ : ℝ) (hab : a ≤ b) :\n    a ≤ cleanBicircle a b θ ∧ cleanBicircle a b θ ≤ b := by\n  have hd : dahlbergF θ = 0 ∨ dahlbergF θ = 1 := by\n    unfold dahlbergF\n    by_cases h : θ ∈ (⋃ k : ℤ,\n        Set.Ioo (π / 4 + 2 * π * (k : ℝ)) (3 * π / 4 + 2 * π * (k : ℝ)) ∪\n        Set.Ioo (5 * π / 4 + 2 * π * (k : ℝ)) (7 * π / 4 + 2 * π * (k : ℝ)))\n    · right; rw [Set.indicator_of_mem h]\n    · left; rw [Set.indicator_of_notMem h]\n  unfold cleanBicircle\n  rcases hd with hd | hd <;> rw [hd] <;> constructor <;> nlinarith", "proof_size_lean": 3129, "has_sorry": false, "tex_file": "chapters/Gluck_DahlbergStep1.tex", "lean_file": "Gluck/DahlbergStep1.lean", "dep_count": 2, "rdep_count": 0, "descendant_count": 0, "proof_size_tex": 502, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 3466, "effort_total": 0}, "lem:clean_bicircle_integral": {"id": "lem:clean_bicircle_integral", "type": "lemma", "title": "On-period value of $f$ and the period integrals", "chapter": "Dahlberg Step 1: the preliminary diffeomorphism (Phase D-B)", "statement": "On $[0,2\\pi]$, $f$ is the indicator of the two base arcs\n  $(\\tfrac{\\pi}{4},\\tfrac{3\\pi}{4})\\cup(\\tfrac{5\\pi}{4},\\tfrac{7\\pi}{4})$, so\n  $\\int_0^{2\\pi}f=\\pi$ and $\\int_0^{2\\pi}k_{a,b}=a\\!\\cdot\\!\\pi+b\\!\\cdot\\!\\pi=(a+b)\\pi$.", "uses": ["def:dahlberg_f", "def:clean_bicircle"], "lean_name": "Gluck.integral_cleanBicircle, Gluck.dahlbergF_on_period, Gluck.integral_dahlbergF", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:dahlberg_f, def:clean_bicircle}\n  Each value-$1$ arc has length $\\pi/2$, total $\\pi$ (Lean:\n  \\texttt{dahlbergF\\_on\\_period}, \\texttt{integral\\_dahlbergF}); integrate the linear\n  combination $a(1-f)+bf$ to get $(a+b)\\pi$.\n", "lean_source": "private lemma integral_cleanBicircle (a b : ℝ) :\n    (∫ t in (0 : ℝ)..(2 * π), cleanBicircle a b t) = (a + b) * π := by\n  have hpi := Real.pi_pos\n  unfold cleanBicircle\n  have h1 : IntervalIntegrable (fun θ => a * (1 - dahlbergF θ)) volume 0 (2 * π) :=\n    (IntervalIntegrable.sub intervalIntegrable_const\n      (dahlbergF_intervalIntegrable 0 (2 * π))).const_mul a\n  have h2 : IntervalIntegrable (fun θ => b * dahlbergF θ) volume 0 (2 * π) :=\n    (dahlbergF_intervalIntegrable 0 (2 * π)).const_mul b\n  have h3 : IntervalIntegrable dahlbergF volume 0 (2 * π) := dahlbergF_intervalIntegrable 0 (2 * π)\n  rw [intervalIntegral.integral_add h1 h2,\n      intervalIntegral.integral_const_mul, intervalIntegral.integral_const_mul,\n      intervalIntegral.integral_sub intervalIntegrable_const h3,\n      integral_dahlbergF, intervalIntegral.integral_const, smul_eq_mul]\n  ring\n\nprivate lemma dahlbergF_on_period {t : ℝ} (h0 : 0 ≤ t) (h2 : t ≤ 2 * π) :\n    dahlbergF t =\n      (Set.Ioo (π / 4) (3 * π / 4) ∪ Set.Ioo (5 * π / 4) (7 * π / 4)).indicator\n        (fun _ => (1 : ℝ)) t := by\n  have hpi := Real.pi_pos\n  have hiff : t ∈ (⋃ k : ℤ,\n        Set.Ioo (π / 4 + 2 * π * (k : ℝ)) (3 * π / 4 + 2 * π * (k : ℝ)) ∪\n        Set.Ioo (5 * π / 4 + 2 * π * (k : ℝ)) (7 * π / 4 + 2 * π * (k : ℝ))) ↔\n      t ∈ Set.Ioo (π / 4) (3 * π / 4) ∪ Set.Ioo (5 * π / 4) (7 * π / 4) := by\n    simp only [Set.mem_iUnion, Set.mem_union, Set.mem_Ioo]\n    constructor\n    · rintro ⟨k, hk⟩\n      rcases hk with hk | hk\n      · have hk0 : k = 0 := by\n          have ha1 : (k : ℝ) < 1 := by nlinarith [hk.1, h2, hpi]\n          have ha2 : (-1 : ℝ) < (k : ℝ) := by nlinarith [hk.2, h0, hpi]\n          have hb1 : k < 1 := by exact_mod_cast ha1\n          have hb2 : -1 < k := by exact_mod_cast ha2\n          omega\n        subst hk0; left; push_cast at hk; constructor <;> linarith [hk.1, hk.2]\n      · have hk0 : k = 0 := by\n          have ha1 : (k : ℝ) < 1 := by nlinarith [hk.1, h2, hpi]\n          have ha2 : (-1 : ℝ) < (k : ℝ) := by nlinarith [hk.2, h0, hpi]\n          have hb1 : k < 1 := by exact_mod_cast ha1\n          have hb2 : -1 < k := by exact_mod_cast ha2\n          omega\n        subst hk0; right; push_cast at hk; constructor <;> linarith [hk.1, hk.2]\n    · rintro (hm | hm)\n      · exact ⟨0, by left; push_cast; constructor <;> linarith [hm.1, hm.2]⟩\n      · exact ⟨0, by right; push_cast; constructor <;> linarith [hm.1, hm.2]⟩\n  unfold dahlbergF\n  by_cases hmem : t ∈ Set.Ioo (π / 4) (3 * π / 4) ∪ Set.Ioo (5 * π / 4) (7 * π / 4)\n  · rw [Set.indicator_of_mem hmem, Set.indicator_of_mem (hiff.mpr hmem)]\n  · rw [Set.indicator_of_notMem hmem, Set.indicator_of_notMem (fun hc => hmem (hiff.mp hc))]\n\nset_option maxHeartbeats 1600000 in\n\nprivate lemma integral_dahlbergF : (∫ t in (0 : ℝ)..(2 * π), dahlbergF t) = π := by\n  have hpi := Real.pi_pos\n  set S : Set ℝ := ⋃ k : ℤ,\n      Set.Ioo (π / 4 + 2 * π * (k : ℝ)) (3 * π / 4 + 2 * π * (k : ℝ)) ∪\n      Set.Ioo (5 * π / 4 + 2 * π * (k : ℝ)) (7 * π / 4 + 2 * π * (k : ℝ)) with hSdef\n  have hSmeas : MeasurableSet S :=\n    MeasurableSet.iUnion (fun _ => measurableSet_Ioo.union measurableSet_Ioo)\n  have hinter : S ∩ Set.Ioc 0 (2 * π) =\n      Set.Ioo (π / 4) (3 * π / 4) ∪ Set.Ioo (5 * π / 4) (7 * π / 4) := by\n    ext x\n    simp only [hSdef, Set.mem_inter_iff, Set.mem_iUnion, Set.mem_union, Set.mem_Ioo, Set.mem_Ioc]\n    constructor\n    · rintro ⟨⟨k, hk⟩, hx0, hx2⟩\n      rcases hk with hk | hk\n      · have hk0 : k = 0 := by\n          have h1 : (k : ℝ) < 1 := by nlinarith [hk.1]\n          have h2 : (-1 : ℝ) < (k : ℝ) := by nlinarith [hk.2]\n          have hh1 : k < 1 := by exact_mod_cast h1\n          have hh2 : -1 < k := by exact_mod_cast h2\n          omega\n        subst hk0; left; push_cast at hk; constructor <;> linarith [hk.1, hk.2]\n      · have hk0 : k = 0 := by\n          have h1 : (k : ℝ) < 1 := by nlinarith [hk.1]\n          have h2 : (-1 : ℝ) < (k : ℝ) := by nlinarith [hk.2]\n          have hh1 : k < 1 := by exact_mod_cast h1\n          have hh2 : -1 < k := by exact_mod_cast h2\n          omega\n        subst hk0; right; push_cast at hk; constructor <;> linarith [hk.1, hk.2]\n    · rintro (hx | hx)\n      · exact ⟨⟨0, by left; push_cast; constructor <;> linarith [hx.1, hx.2]⟩,\n          by linarith [hx.1], by linarith [hx.2]⟩\n      · exact ⟨⟨0, by right; push_cast; constructor <;> linarith [hx.1, hx.2]⟩,\n          by linarith [hx.1], by linarith [hx.2]⟩\n  have hd : Disjoint (Set.Ioo (π / 4) (3 * π / 4)) (Set.Ioo (5 * π / 4) (7 * π / 4)) := by\n    rw [Set.disjoint_left]; intro y hy hz\n    simp only [Set.mem_Ioo] at hy hz; linarith [hy.2, hz.1]\n  rw [intervalIntegral.integral_of_le (by linarith)]\n  unfold dahlbergF\n  rw [← hSdef, MeasureTheory.integral_indicator hSmeas, MeasureTheory.setIntegral_const,\n      smul_eq_mul, mul_one, MeasureTheory.measureReal_restrict_apply hSmeas, hinter,\n      measureReal_def, measure_union hd measurableSet_Ioo,\n      Real.volume_Ioo, Real.volume_Ioo,\n      ← ENNReal.ofReal_add (by linarith) (by linarith), ENNReal.toReal_ofReal (by linarith)]\n  ring", "proof_size_lean": 5028, "has_sorry": false, "tex_file": "chapters/Gluck_DahlbergStep1.tex", "lean_file": "Gluck/DahlbergStep1.lean", "dep_count": 2, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 232, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 5365, "effort_total": 0}, "lem:exists_kappa_bound": {"id": "lem:exists_kappa_bound", "type": "lemma", "title": "", "chapter": "Dahlberg Step 1: the preliminary diffeomorphism (Phase D-B)", "statement": "ok\n[Uniform bound of a continuous periodic curvature]\n  \n  \n  A continuous $2\\pi$-periodic $\\kappa:\\mathbb{R}\\to\\mathbb{R}$ is uniformly bounded:\n  there is $N$ with $|\\kappa(\\theta)|\\le N$ for all $\\theta$.", "uses": [], "lean_name": "Gluck.exists_kappa_bound", "proved": true, "mathlib_ok": false, "proof_tex": "\n\n\\leanok\n  Compactness of one period $[0,2\\pi]$ bounds $\\kappa$ there; periodicity\n  (via the $\\mathrm{toIcoMod}$ representative) extends the bound to all of $\\mathbb{R}$.\n", "lean_source": "private lemma exists_kappa_bound {κ : ℝ → ℝ} (hcont : Continuous κ)\n    (hper : Function.Periodic κ (2 * π)) : ∃ N, ∀ x, |κ x| ≤ N := by\n  obtain ⟨N, hN⟩ := (hper.isBounded_of_continuous Real.two_pi_pos.ne' hcont).exists_norm_le\n  exact ⟨N, fun x => by simpa [Real.norm_eq_abs] using hN (κ x) (Set.mem_range_self x)⟩", "proof_size_lean": 316, "has_sorry": false, "tex_file": "chapters/Gluck_DahlbergStep1.tex", "lean_file": "Gluck/DahlbergStep1.lean", "dep_count": 0, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 170, "effort_local": 0, "proof_size_tex_total": 170, "proof_size_lean_total": 316, "effort_total": 0}, "def:mixed_sign_four_vertex": {"id": "def:mixed_sign_four_vertex", "type": "definition", "title": "", "chapter": "Dahlberg Step 1: the preliminary diffeomorphism (Phase D-B)", "statement": "ok\n[Mixed-sign four-vertex condition]\n  \n  \n  \n  \\textit{Source: Dahlberg, §1, Theorem 1.1 hypothesis.}\n  A continuous, $2\\pi$-periodic, non-constant $\\kappa:\\mathbb{R}\\to\\mathbb{R}$\n  satisfies the \\emph{mixed-sign four-vertex condition} if there are points\n  $p_1<q_1<p_2<q_2<p_1+2\\pi$ in one fundamental period with $p_1,p_2$ local\n  maxima, $q_1,q_2$ local minima, the value separation\n  $\\max(\\kappa(q_1),\\kappa(q_2))<\\min(\\kappa(p_1),\\kappa(p_2))$, \\emph{and}\n  positivity at the maxima $0<\\min(\\kappa(p_1),\\kappa(p_2))$. This is the\n  in-tree value-separated \\cref{def:four_vertex_condition} strengthened only by\n  the maxima-positivity clause; the minima $\\kappa(q_1),\\kappa(q_2)$ may be\n  $\\le 0$.", "uses": ["def:four_vertex_condition"], "lean_name": "Gluck.MixedSignFourVertex", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "def MixedSignFourVertex (κ : ℝ → ℝ) : Prop :=\n  Continuous κ ∧ Function.Periodic κ (2 * π) ∧\n    ∃ p₁ q₁ p₂ q₂, p₁ < q₁ ∧ q₁ < p₂ ∧ p₂ < q₂ ∧ q₂ < p₁ + 2 * π ∧\n      IsLocalMax κ p₁ ∧ IsLocalMax κ p₂ ∧ IsLocalMin κ q₁ ∧ IsLocalMin κ q₂ ∧\n      max (κ q₁) (κ q₂) < min (κ p₁) (κ p₂) ∧ 0 < min (κ p₁) (κ p₂)", "proof_size_lean": 305, "has_sorry": false, "tex_file": "chapters/Gluck_DahlbergStep1.tex", "lean_file": "Gluck/DahlbergStep1.lean", "dep_count": 1, "rdep_count": 4, "descendant_count": 12, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 682, "effort_total": 0}, "lem:mixed_sign_four_vertex_of_is_curvature_function": {"id": "lem:mixed_sign_four_vertex_of_is_curvature_function", "type": "lemma", "title": "Strictly positive four-vertex curvature is mixed-sign", "chapter": "Dahlberg Step 1: the preliminary diffeomorphism (Phase D-B)", "statement": "Let $\\kappa$ be a curvature function (\\cref{def:is_curvature_function}: continuous,\n  $2\\pi$-periodic and \\emph{strictly positive}) which is non-constant and satisfies\n  the four-vertex condition (\\cref{def:four_vertex_condition}). Then $\\kappa$\n  satisfies the mixed-sign four-vertex condition\n  (\\cref{def:mixed_sign_four_vertex}). In particular the mixed-sign hypothesis\n  subsumes the non-constant strictly-positive case, so the mixed-sign converse\n  applies to every non-constant positive curvature function meeting the four-vertex\n  condition.", "uses": ["def:is_curvature_function", "def:four_vertex_condition", "def:mixed_sign_four_vertex"], "lean_name": "Gluck.mixedSignFourVertex_of_isCurvatureFunction", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:is_curvature_function, def:four_vertex_condition, def:mixed_sign_four_vertex}\n  Since $\\kappa$ is non-constant, the constant branch of the four-vertex condition\n  is excluded, so \\cref{def:four_vertex_condition} supplies the four\n  value-separated alternating extrema $p_1<q_1<p_2<q_2<p_1+2\\pi$ with $p_1,p_2$\n  local maxima, $q_1,q_2$ local minima, and\n  $\\max(\\kappa(q_1),\\kappa(q_2))<\\min(\\kappa(p_1),\\kappa(p_2))$. These data, together\n  with continuity and $2\\pi$-periodicity, are exactly the requirements of the\n  mixed-sign condition except for the extra positivity-at-the-maxima clause\n  $0<\\min(\\kappa(p_1),\\kappa(p_2))$. But that clause is automatic: $\\kappa$ is\n  everywhere strictly positive, so $0<\\kappa(p_1)$ and $0<\\kappa(p_2)$, whence\n  $0<\\min(\\kappa(p_1),\\kappa(p_2))$. Thus $\\kappa$ satisfies\n  \\cref{def:mixed_sign_four_vertex}.\n", "lean_source": "theorem mixedSignFourVertex_of_isCurvatureFunction {κ : ℝ → ℝ}\n    (hκ : IsCurvatureFunction κ) (hfv : FourVertexCondition κ)\n    (hnc : ¬ ∃ c, ∀ θ, κ θ = c) : MixedSignFourVertex κ := by\n  obtain ⟨hcont, hper, hpos⟩ := hκ\n  rcases hfv with hconst | ⟨p₁, q₁, p₂, q₂, h1, h2, h3, h4, h5, h6, h7, h8, h9⟩\n  · exact absurd hconst hnc\n  · exact ⟨hcont, hper, p₁, q₁, p₂, q₂, h1, h2, h3, h4, h5, h6, h7, h8, h9,\n      lt_min (hpos p₁) (hpos p₂)⟩", "proof_size_lean": 440, "has_sorry": false, "tex_file": "chapters/Gluck_DahlbergStep1.tex", "lean_file": "Gluck/DahlbergStep1.lean", "dep_count": 3, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 859, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 1122, "effort_total": 0}, "lem:dahlberg_alignment_data": {"id": "lem:dahlberg_alignment_data", "type": "lemma", "title": "", "chapter": "Dahlberg Step 1: the preliminary diffeomorphism (Phase D-B)", "statement": "ok\n[Mixed-sign level extraction]\n  \n  \n  \n  \\textit{Source: Dahlberg, §3, ``by continuity there are points $r_j$\\ldots''.}\n  Let $\\kappa$ satisfy the mixed-sign four-vertex condition\n  (\\cref{def:mixed_sign_four_vertex}). Then there exist constants $0<a<b$ and four\n  points $r_1<r_2<r_3<r_4<r_1+2\\pi$, ordered counterclockwise, with\n  \\[\n    \\kappa(r_1)=\\kappa(r_3)=a,\\qquad \\kappa(r_2)=\\kappa(r_4)=b.\n  \\]", "uses": ["def:mixed_sign_four_vertex", "lem:ivt_hits"], "lean_name": "Gluck.exists_alignmentData", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:ivt_hits, def:mixed_sign_four_vertex}\n  \\leanok\n  Write $m=\\max(\\kappa(q_1),\\kappa(q_2))$ and $M=\\min(\\kappa(p_1),\\kappa(p_2))$;\n  by hypothesis $m<M$ and $0<M$. Pick two levels with\n  $\\max(0,m)<a<b<M$ (possible since the interval $(\\max(0,m),M)$ is non-empty:\n  $\\max(0,m)<M$ holds because $m<M$ and $0<M$). The four flanks are the closed\n  arcs $[p_1,q_1]$, $[q_1,p_2]$, $[p_2,q_2]$, $[q_2,p_1+2\\pi]$; on each, $\\kappa$\n  runs monotonically (in value, not assumed monotone --- the IVT only needs the\n  endpoint values to straddle the target) between a maximum value $\\ge M>b>a$ and\n  a minimum value $\\le m<a<b$. Apply the intermediate value theorem\n  \\cref{lem:ivt_hits} four times:\n  \\begin{itemize}\n    \\item on the descent $[p_1,q_1]$ pick $r_1$ with $\\kappa(r_1)=a$\n      (between $\\kappa(q_1)\\le m<a$ and $\\kappa(p_1)\\ge M>a$);\n    \\item on the ascent $[q_1,p_2]$ pick $r_2$ with $\\kappa(r_2)=b$;\n    \\item on the descent $[p_2,q_2]$ pick $r_3$ with $\\kappa(r_3)=a$;\n    \\item on the ascent $[q_2,p_1+2\\pi]$ pick $r_4$ with $\\kappa(r_4)=b$\n      (using $\\kappa(p_1+2\\pi)=\\kappa(p_1)$ by periodicity).\n  \\end{itemize}\n  Then $p_1\\le r_1\\le q_1\\le r_2\\le p_2\\le r_3\\le q_2\\le r_4\\le p_1+2\\pi$ gives the\n  ordering $r_1<r_2<r_3<r_4<r_1+2\\pi$ (the inequalities are strict because the\n  values $a\\ne b$ differ across each interior endpoint $q_i,p_i$), and the value\n  pattern is $a,b,a,b$ as required. This is the same four-fold IVT skeleton as\n  \\cref{lem:abab_values}; only the choice of the levels $a,b$ (interior, rather\n  than the extreme values) and the use of maxima-positivity differ.\n", "lean_source": "private lemma exists_alignmentData {κ : ℝ → ℝ} (h : MixedSignFourVertex κ) :\n    ∃ a b, 0 < a ∧ a < b ∧ ∃ r₁ r₂ r₃ r₄,\n      r₁ < r₂ ∧ r₂ < r₃ ∧ r₃ < r₄ ∧ r₄ < r₁ + 2 * π ∧\n      κ r₁ = a ∧ κ r₂ = b ∧ κ r₃ = a ∧ κ r₄ = b := by\n  obtain ⟨hcont, hper, p₁, q₁, p₂, q₂, hp1q1, hq1p2, hp2q2, hq2p1,\n    _hmax1, _hmax2, _hmin1, _hmin2, hsep, hMpos⟩ := h\n\n  set m := max (κ q₁) (κ q₂) with hm\n  set M := min (κ p₁) (κ p₂) with hMdef\n  have hmM : m < M := hsep\n  have hM : 0 < M := hMpos\n  have hc0 : (0 : ℝ) ≤ max 0 m := le_max_left _ _\n  have hcm : m ≤ max 0 m := le_max_right _ _\n  have hcM : max 0 m < M := max_lt hM hmM\n  have hg : 0 < M - max 0 m := by linarith\n\n  set a := max 0 m + (M - max 0 m) / 3 with hadef\n  set b := max 0 m + 2 * (M - max 0 m) / 3 with hbdef\n  have ha_pos : 0 < a := by rw [hadef]; linarith\n  have hca : max 0 m < a := by rw [hadef]; linarith\n  have hab : a < b := by rw [hadef, hbdef]; linarith\n  have haM : a < M := by rw [hadef]; linarith\n  have hbM : b < M := by rw [hbdef]; linarith\n\n  have hq1c : κ q₁ ≤ max 0 m := le_trans (le_max_left _ _) hcm\n  have hq2c : κ q₂ ≤ max 0 m := le_trans (le_max_right _ _) hcm\n  have hMp1 : M ≤ κ p₁ := min_le_left _ _\n  have hMp2 : M ≤ κ p₂ := min_le_right _ _\n  have hq1a : κ q₁ ≤ a := le_trans hq1c hca.le\n  have hq2a : κ q₂ ≤ a := le_trans hq2c hca.le\n  have hq1b : κ q₁ ≤ b := le_trans hq1a hab.le\n  have hq2b : κ q₂ ≤ b := le_trans hq2a hab.le\n  have hap1 : a ≤ κ p₁ := le_trans haM.le hMp1\n  have hap2 : a ≤ κ p₂ := le_trans haM.le hMp2\n  have hbp1 : b ≤ κ p₁ := le_trans hbM.le hMp1\n  have hbp2 : b ≤ κ p₂ := le_trans hbM.le hMp2\n  have hperp1 : κ (p₁ + 2 * π) = κ p₁ := hper p₁\n  have h1 : p₁ ≤ q₁ := hp1q1.le\n  have h2 : q₁ ≤ p₂ := hq1p2.le\n  have h3 : p₂ ≤ q₂ := hp2q2.le\n  have h4 : q₂ ≤ p₁ + 2 * π := hq2p1.le\n\n  obtain ⟨r₁, hr1mem, hr1⟩ := ivt_hits hcont h1 (by\n    rw [Set.mem_Icc]\n    exact ⟨(min_le_right _ _).trans hq1a, hap1.trans (le_max_left _ _)⟩)\n  obtain ⟨r₂, hr2mem, hr2⟩ := ivt_hits hcont h2 (by\n    rw [Set.mem_Icc]\n    exact ⟨(min_le_left _ _).trans hq1b, hbp2.trans (le_max_right _ _)⟩)\n  obtain ⟨r₃, hr3mem, hr3⟩ := ivt_hits hcont h3 (by\n    rw [Set.mem_Icc]\n    exact ⟨(min_le_right _ _).trans hq2a, hap2.trans (le_max_left _ _)⟩)\n  obtain ⟨r₄, hr4mem, hr4⟩ := ivt_hits hcont h4 (by\n    rw [Set.mem_Icc]\n    exact ⟨(min_le_left _ _).trans hq2b,\n           (hbp1.trans (le_of_eq hperp1.symm)).trans (le_max_right _ _)⟩)\n  refine ⟨a, b, ha_pos, hab, r₁, r₂, r₃, r₄, ?_, ?_, ?_, ?_, hr1, hr2, hr3, hr4⟩\n  · refine lt_of_le_of_ne (hr1mem.2.trans hr2mem.1) ?_\n    intro heq; apply ne_of_lt hab; rw [← hr1, ← hr2, heq]\n  · refine lt_of_le_of_ne (hr2mem.2.trans hr3mem.1) ?_\n    intro heq; apply ne_of_lt hab; rw [← hr3, ← hr2, heq]\n  · refine lt_of_le_of_ne (hr3mem.2.trans hr4mem.1) ?_\n    intro heq; apply ne_of_lt hab; rw [← hr3, ← hr4, heq]\n  · have hp1r1 : p₁ < r₁ := by\n      refine lt_of_le_of_ne hr1mem.1 ?_\n      intro heq; rw [← heq] at hr1\n      exact absurd hr1 (ne_of_gt (lt_of_lt_of_le haM hMp1))\n    have hr4le : r₄ ≤ p₁ + 2 * π := hr4mem.2\n    linarith", "proof_size_lean": 3055, "has_sorry": false, "tex_file": "chapters/Gluck_DahlbergStep1.tex", "lean_file": "Gluck/DahlbergStep1.lean", "dep_count": 2, "rdep_count": 2, "descendant_count": 10, "proof_size_tex": 1606, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 4055, "effort_total": 0}, "thm:exists_preliminary_diffeo": {"id": "thm:exists_preliminary_diffeo", "type": "theorem", "title": "", "chapter": "Dahlberg Step 1: the preliminary diffeomorphism (Phase D-B)", "statement": "ok\n[Step 1: preliminary diffeomorphism]\n  \n  \n  \n  \n  \n  \n  \n  \n  \\textit{Source: Dahlberg, §3, Step 1.}\n  Let $\\kappa$ be continuous, $2\\pi$-periodic, non-constant and satisfy the\n  mixed-sign four-vertex condition (\\cref{def:mixed_sign_four_vertex}). There are\n  constants $0<a<b$ (the levels\n  of \\cref{lem:dahlberg_alignment_data}) and, for every $\\varepsilon>0$, a $C^1$\n  (in fact $C^\\infty$) orientation-preserving circle diffeomorphism $\\eta$\n  ($\\eta(t+2\\pi)=\\eta(t)+2\\pi$, $\\eta'>0$) and an interval-integrable,\n  $2\\pi$-periodic error $e$ with\n  \\[\n    \\kappa\\circ\\eta \\;=\\; a(1-f) + b\\,f + e,\n    \\qquad \\int_0^{2\\pi} |e(t)|\\,dt \\;<\\; C\\,\\varepsilon,\n  \\]\n  where the constant $C$ does not depend on $\\varepsilon$. Consequently the total\n  curvature $I=\\int_0^{2\\pi}\\kappa\\circ\\eta$ satisfies\n  $I = (a+b)\\pi + \\int_0^{2\\pi}e$, so $|I-(a+b)\\pi|<C\\varepsilon$ and in\n  particular $I>0$ once $\\varepsilon$ is small (since $a,b>0$).", "uses": ["def:dahlberg_f", "def:clean_bicircle", "lem:dahlberg_alignment_data", "def:mixed_sign_four_vertex"], "lean_name": "Gluck.exists_preliminaryDiffeo", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:dahlberg_alignment_data, lem:step_curvature_periodic, lem:exists_eta_clean_L1, lem:clean_bicircle_basic, lem:clean_bicircle_integral}\n  \\leanok\n  Take $a,b$ and the points $r_j$ from \\cref{lem:dahlberg_alignment_data}.\n  Following Dahlberg, fix the model breakpoints $\\theta_j=(j-1)\\tfrac{\\pi}{2}$ and\n  the shrunken arcs $A_j=\\{\\theta:|\\theta-\\theta_j|<\\tfrac{\\pi}{4}-\\varepsilon\\}$.\n  By continuity of $\\kappa$ choose closed arcs $B_j\\ni r_j$ with\n  $|\\kappa(w)-\\kappa(r_j)|<\\varepsilon$ for $w\\in B_j$. Let $\\eta$ be any smooth\n  orientation-preserving circle diffeomorphism carrying $A_j$ into $B_j$ for\n  $j=1,\\dots,4$ (such an $\\eta$ exists: prescribe $\\eta$ on the four model arcs to\n  land in $B_j$ and interpolate monotonically and smoothly on the four\n  complementary transition gaps, each of length $2\\varepsilon$).\n\n  On the bulk $A_j$ the composite $\\kappa\\circ\\eta$ is within $\\varepsilon$ of the\n  constant $\\kappa(r_j)$, which equals the clean-bicircle value $a$ (for\n  $j=1,3$) or $b$ (for $j=2,4$). Hence the error $e=\\kappa\\circ\\eta-(a(1-f)+bf)$\n  satisfies $|e|<\\varepsilon$ on $\\bigcup_j A_j$, a set of total measure\n  $2\\pi-8\\varepsilon$, contributing less than $2\\pi\\varepsilon$ to\n  $\\int|e|$. On the four transition gaps (total measure $8\\varepsilon$) the error\n  is bounded by $2M$, where $M=\\sup|\\kappa|+\\max(a,b)$ is a fixed bound\n  independent of $\\varepsilon$; this contributes less than $16M\\varepsilon$. Thus\n  $\\int_0^{2\\pi}|e|<(2\\pi+16M)\\varepsilon=:C\\varepsilon$ with $C$ independent of\n  $\\varepsilon$.\n\n  Finally $\\int_0^{2\\pi}(a(1-f)+bf)=a\\cdot(2\\pi-2\\cdot\\tfrac{\\pi}{2})+b\\cdot(2\\cdot\\tfrac{\\pi}{2})\n  =a\\pi+b\\pi=(a+b)\\pi$ (each value-$b$ arc has length $\\tfrac{\\pi}{2}$, two of\n  them), so $I=(a+b)\\pi+\\int e$ and the stated bound on $I$ follows from\n  $|\\int e|\\le\\int|e|<C\\varepsilon$.\n", "lean_source": "theorem exists_preliminaryDiffeo {κ : ℝ → ℝ} (h : MixedSignFourVertex κ) :\n    ∃ a b, 0 < a ∧ a < b ∧ ∃ C, 0 < C ∧ ∀ ε > 0, ∃ η e : ℝ → ℝ,\n      (∃ v, Continuous v ∧ (∀ θ, 0 < v θ) ∧ ∀ θ, HasDerivAt η (v θ) θ) ∧\n      (∀ t, η (t + 2 * π) = η t + 2 * π) ∧\n      IntervalIntegrable e volume 0 (2 * π) ∧ Function.Periodic e (2 * π) ∧\n      (∀ θ, κ (η θ) = cleanBicircle a b θ + e θ) ∧\n      (∫ t in (0 : ℝ)..(2 * π), |e t|) < C * ε ∧\n      |(∫ t in (0 : ℝ)..(2 * π), κ (η t)) - (a + b) * π| < C * ε := by\n\n  obtain ⟨a, b, ha, hab, hcore⟩ := exists_eta_clean_L1 h\n  refine ⟨a, b, ha, hab, 1, one_pos, ?_⟩\n  intro ε hε\n  obtain ⟨η, ⟨v, hvc, hvpos, hvderiv⟩, hηper, hL1⟩ := hcore ε hε\n\n  have hκcont : Continuous κ := h.1\n  have hκper : Function.Periodic κ (2 * π) := h.2.1\n  have hηdiff : Differentiable ℝ η := fun θ => (hvderiv θ).differentiableAt\n  have hηcont : Continuous η := hηdiff.continuous\n  have hκηcont : Continuous (fun θ => κ (η θ)) := hκcont.comp hηcont\n  have hκηii : IntervalIntegrable (fun θ => κ (η θ)) volume 0 (2 * π) :=\n    hκηcont.intervalIntegrable 0 (2 * π)\n  have hcleanii : IntervalIntegrable (cleanBicircle a b) volume 0 (2 * π) :=\n    cleanBicircle_intervalIntegrable a b 0 (2 * π)\n  refine ⟨η, fun θ => κ (η θ) - cleanBicircle a b θ,\n    ⟨v, hvc, hvpos, hvderiv⟩, hηper, hκηii.sub hcleanii, ?_, ?_, ?_, ?_⟩\n  · \n    intro θ\n    simp only\n    rw [hηper θ, hκper (η θ), cleanBicircle_periodic a b θ]\n  · \n    intro θ; ring\n  · \n    rw [one_mul]; exact hL1\n  · \n    rw [one_mul]\n    have hsub : (∫ t in (0 : ℝ)..(2 * π), κ (η t)) -\n        (∫ t in (0 : ℝ)..(2 * π), cleanBicircle a b t)\n        = ∫ t in (0 : ℝ)..(2 * π), (κ (η t) - cleanBicircle a b t) :=\n      (intervalIntegral.integral_sub hκηii hcleanii).symm\n    rw [integral_cleanBicircle] at hsub\n    have hgoal : (∫ t in (0 : ℝ)..(2 * π), κ (η t)) - (a + b) * π\n        = ∫ t in (0 : ℝ)..(2 * π), (κ (η t) - cleanBicircle a b t) := by linarith\n    rw [hgoal]\n    calc |∫ t in (0 : ℝ)..(2 * π), (κ (η t) - cleanBicircle a b t)|\n        ≤ ∫ t in (0 : ℝ)..(2 * π), |κ (η t) - cleanBicircle a b t| :=\n          intervalIntegral.abs_integral_le_integral_abs (by positivity)\n      _ < ε := hL1", "proof_size_lean": 2167, "has_sorry": false, "tex_file": "chapters/Gluck_DahlbergStep1.tex", "lean_file": "Gluck/DahlbergStep1.lean", "dep_count": 4, "rdep_count": 2, "descendant_count": 8, "proof_size_tex": 1837, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 6559, "effort_total": 0}, "lem:exists_eta_clean_L1": {"id": "lem:exists_eta_clean_L1", "type": "lemma", "title": "", "chapter": "Dahlberg Step 1: the preliminary diffeomorphism (Phase D-B)", "statement": "ok\n[Analytic core: the $L^1$ $\\eta$-construction]\n  \n  \n  \n  The genuinely-new analytic content of \\cref{thm:exists_preliminary_diffeo},\n  isolated: for $\\kappa$ continuous $2\\pi$-periodic and the levels/crossing points\n  $r_1<r_2<r_3<r_4$ of \\cref{lem:dahlberg_alignment_data}, and every\n  $\\varepsilon>0$, there is a $C^1$ orientation-preserving quasiperiodic $\\eta$\n  (explicit continuous positive derivative) with\n  $\\int_0^{2\\pi}|\\kappa(\\eta\\,t)-k_{a,b}(t)|\\,dt<\\varepsilon$.\n  \\cref{thm:exists_preliminary_diffeo} is a routine wrapper around this lemma.", "uses": ["lem:dahlberg_alignment_data", "def:clean_bicircle", "lem:clean_bicircle_integral", "lem:exists_kappa_bound"], "lean_name": "Gluck.exists_eta_clean_L1", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:dahlberg_alignment_data, lem:exists_kappa_bound}\n  \\leanok\n  Take $\\eta(\\theta)=h_1(\\theta+\\tfrac{\\pi}{4})$ with $h_1(\\theta)=m_0+\\int_0^\\theta w$,\n  $w$ the plateau density of $\\mathrm{exists\\_plateau\\_density}$ at the crossing\n  points $r_j$; the $+\\tfrac{\\pi}{4}$ shift aligns the four model plateaus (centred\n  at $0,\\tfrac{\\pi}{2},\\pi,\\tfrac{3\\pi}{2}$) with the constancy arcs of $k_{a,b}$.\n  $\\eta$ is $C^1$ with $v=w(\\cdot+\\tfrac{\\pi}{4})>0$ (chain rule) and quasiperiodic\n  ($\\eta(t+2\\pi)=\\eta(t)+2\\pi$). Recalibrating\n  $\\delta=\\min(\\varepsilon'/8,\\pi/4,\\varepsilon/(8(N{+}b{+}1)))$ with $N$ the uniform\n  $\\kappa$-bound (\\cref{lem:exists_kappa_bound}), the $L^1$ estimate splits $[0,2\\pi]$\n  into five plateau pieces (integrand $\\le\\varepsilon'$, clean value via the on-period\n  form of $k_{a,b}$) and four transition gaps (integrand $\\le N+b$, total gap measure\n  $<\\varepsilon/2$); combining via $\\mathrm{integral\\_add\\_adjacent\\_intervals}$ and\n  $\\mathrm{integral\\_mono\\_on}$ gives $\\int_0^{2\\pi}|\\kappa\\circ\\eta-k_{a,b}|<\\varepsilon$.\n", "lean_source": "private lemma exists_eta_clean_L1 {κ : ℝ → ℝ} (h : MixedSignFourVertex κ) :\n    ∃ a b, 0 < a ∧ a < b ∧ ∀ ε > 0, ∃ η : ℝ → ℝ,\n      (∃ v, Continuous v ∧ (∀ θ, 0 < v θ) ∧ ∀ θ, HasDerivAt η (v θ) θ) ∧\n      (∀ t, η (t + 2 * π) = η t + 2 * π) ∧\n      (∫ t in (0 : ℝ)..(2 * π), |κ (η t) - cleanBicircle a b t|) < ε := by\n  obtain ⟨a, b, ha, hab, r₁, r₂, r₃, r₄, h12, h23, h34, h41,\n    hr1, hr2, hr3, hr4⟩ := exists_alignmentData h\n  refine ⟨a, b, ha, hab, ?_⟩\n  intro ε hε\n  have hκcont : Continuous κ := h.1\n  have hπ : 0 < π := Real.pi_pos\n\n  set ε' : ℝ := ε / (4 * π) with hε'def\n  have hε' : 0 < ε' := by rw [hε'def]; positivity\n\n  obtain ⟨ρ₁, hρ₁, hm1⟩ := kappa_modulus_at hκcont r₁ hε'\n  obtain ⟨ρ₂, hρ₂, hm2⟩ := kappa_modulus_at hκcont r₂ hε'\n  obtain ⟨ρ₃, hρ₃, hm3⟩ := kappa_modulus_at hκcont r₃ hε'\n  obtain ⟨ρ₄, hρ₄, hm4⟩ := kappa_modulus_at hκcont r₄ hε'\n\n  have hgap₁ : 0 < (r₂ - r₁) / 2 := by linarith\n  have hgap₂ : 0 < (r₃ - r₂) / 2 := by linarith\n  have hgap₃ : 0 < (r₄ - r₃) / 2 := by linarith\n  have hgap₄ : 0 < (r₁ + 2 * π - r₄) / 2 := by linarith\n\n  set M : ℝ := min (min (min ρ₁ ρ₂) (min ρ₃ ρ₄))\n      (min (min ((r₂ - r₁) / 2) ((r₃ - r₂) / 2))\n           (min ((r₄ - r₃) / 2) ((r₁ + 2 * π - r₄) / 2))) with hMdef\n  have hMle₁ : M ≤ ρ₁ := le_trans (min_le_left _ _) (le_trans (min_le_left _ _) (min_le_left _ _))\n  have hMle₂ : M ≤ ρ₂ := le_trans (min_le_left _ _) (le_trans (min_le_left _ _) (min_le_right _ _))\n  have hMle₃ : M ≤ ρ₃ := le_trans (min_le_left _ _) (le_trans (min_le_right _ _) (min_le_left _ _))\n  have hMle₄ : M ≤ ρ₄ := le_trans (min_le_left _ _) (le_trans (min_le_right _ _) (min_le_right _ _))\n  have hMg₁ : M ≤ (r₂ - r₁) / 2 :=\n    le_trans (min_le_right _ _) (le_trans (min_le_left _ _) (min_le_left _ _))\n  have hMg₂ : M ≤ (r₃ - r₂) / 2 :=\n    le_trans (min_le_right _ _) (le_trans (min_le_left _ _) (min_le_right _ _))\n  have hMg₃ : M ≤ (r₄ - r₃) / 2 :=\n    le_trans (min_le_right _ _) (le_trans (min_le_right _ _) (min_le_left _ _))\n  have hMg₄ : M ≤ (r₁ + 2 * π - r₄) / 2 :=\n    le_trans (min_le_right _ _) (le_trans (min_le_right _ _) (min_le_right _ _))\n  have hMpos : 0 < M := by\n    rw [hMdef]\n    exact lt_min (lt_min (lt_min hρ₁ hρ₂) (lt_min hρ₃ hρ₄))\n      (lt_min (lt_min hgap₁ hgap₂) (lt_min hgap₃ hgap₄))\n\n  obtain ⟨N, hN⟩ := exists_kappa_bound hκcont h.2.1\n  have hNnn : 0 ≤ N := le_trans (abs_nonneg _) (hN 0)\n  have hNb1 : 0 < N + b + 1 := by linarith [ha, hab]\n\n  set ρ : ℝ := M / 2 with hρdef\n\n  set δ : ℝ := min (min (ε' / 8) (π / 4)) (ε / (8 * (N + b + 1))) with hδdef\n  have hρpos : 0 < ρ := by rw [hρdef]; linarith\n  have hδpos : 0 < δ := by\n    rw [hδdef]; exact lt_min (lt_min (by linarith) (by linarith)) (by positivity)\n  have hδlt : δ < π / 2 := by\n    rw [hδdef]\n    exact lt_of_le_of_lt (le_trans (min_le_left _ _) (min_le_right _ _)) (by linarith)\n  have hδgap : δ ≤ ε / (8 * (N + b + 1)) := by rw [hδdef]; exact min_le_right _ _\n  have hδeps : δ ≤ ε' / 8 := by\n    rw [hδdef]; exact le_trans (min_le_left _ _) (min_le_left _ _)\n  have hfit₁ : ρ < (r₂ - r₁) / 2 := by rw [hρdef]; linarith\n  have hfit₂ : ρ < (r₃ - r₂) / 2 := by rw [hρdef]; linarith\n  have hfit₃ : ρ < (r₄ - r₃) / 2 := by rw [hρdef]; linarith\n  have hfit₄ : ρ < (r₁ + 2 * π - r₄) / 2 := by rw [hρdef]; linarith\n  have hρle₁ : ρ ≤ ρ₁ := by rw [hρdef]; linarith\n  have hρle₂ : ρ ≤ ρ₂ := by rw [hρdef]; linarith\n  have hρle₃ : ρ ≤ ρ₃ := by rw [hρdef]; linarith\n  have hρle₄ : ρ ≤ ρ₄ := by rw [hρdef]; linarith\n\n  obtain ⟨w, hw, hwpos, hwper, hwint, hpl1, hpl2, hpl3, hpl4⟩ :=\n    exists_plateau_density (m₀ := (r₁ + r₄) / 2 - π) h12 h23 h34 h41 rfl\n      hρpos hδpos hδlt hfit₁ hfit₂ hfit₃ hfit₄\n  set m₀ : ℝ := (r₁ + r₄) / 2 - π with hm₀def\n\n  set h₁ : ℝ → ℝ := fun θ => m₀ + ∫ s in (0:ℝ)..θ, w s with hh₁def\n  have hh₁deriv : ∀ θ, HasDerivAt h₁ (w θ) θ := fun θ => by\n    have hd : HasDerivAt (fun θ : ℝ => ∫ s in (0:ℝ)..θ  + closingLen3 a b δ z\n      + closingLen4 a b δ z + closingLen5 a b δ z = 2 * π := by\n  have hb : 0 < b := lt_trans ha hab\n  have hpi : 0 < π := Real.pi_pos\n  have hlam : closingLambda a b δ z = closingLambdaRaw a b δ z :=\n    closingLambda_eq_raw a b δ ha hb hδ hδ' hz\n  have hraw_ne : closingLambdaRaw a b δ z ≠ 0 := by\n    rw [← hlam]; exact (closingLambda_pos a b δ ha hb z).ne'\n  unfold closingLen1 closingLen2 closingLen3 closingLen4 closingLen5\n    closingDelta1 closingDelta2 closingDelta3 closingDelta4 closingDelta5\n  rw [hlam]\n  rw [eq_comm, ← sub_eq_zero]\n  field_simp\n  simp only [closingLambdaRaw]\n  field_simp\n  ring\n\nprivate lemma closingLen_bound_aux (ramp Δ lamκ ub : ℝ)\n    (hramp : 0 < ramp) (hΔlo : 0 < Δ) (hlamκ_pos : 0 < lamκ) (hub : lamκ ≤ ub)\n    (hlb : 3 / 8 ≤ lamκ) (h2 : 2 * ramp * ub ≤ Δ) (hΔhi : Δ ≤ 3 * π / 4) :\n    0 < Δ / lamκ ∧ 2 * ramp ≤ Δ / lamκ ∧ Δ / lamκ ≤ 2 * π := by\n  have hpi : 0 < π := Real.pi_pos\n  refine ⟨div_pos hΔlo hlamκ_pos, ?_, ?_⟩\n  · rw [le_div_iff₀ hlamκ_pos]\n    calc 2 * ramp * lamκ ≤ 2 * ramp * ub := by\n            apply mul_le_mul_of_nonneg_left hub; linarith\n      _ ≤ Δ := h2\n  · rw [div_le_iff₀ hlamκ_pos]\n    nlinarith [mul_le_mul_of_nonneg_left hlb (by positivity : (0 : ℝ) ≤ 2 * π)]\n\nset_option maxHeartbeats 1000000 in", "proof_size_lean": 7010, "has_sorry": false, "tex_file": "chapters/Gluck_DahlbergStep2.tex", "lean_file": "Gluck/DahlbergStep2.lean", "dep_count": 2, "rdep_count": 4, "descendant_count": 13, "proof_size_tex": 831, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 16970, "effort_total": 0}, "lem:closing_family_props": {"id": "lem:closing_family_props", "type": "lemma", "title": "Basic interface of the node-placing family", "chapter": "Dahlberg Step 2: the closing parameter and the converse (Phase D-C)", "statement": "The family $g_z=\\mathrm{closingFamily}\\,a\\,b\\,\\delta\\,z$ satisfies: $g_z(0)=0$;\n  quasiperiodicity $g_z(s+2\\pi)=g_z(s)+2\\pi$ (h egralReparam (continuous_closingDensity_s a b δ z) 0 s\n\nprivate lemma closingDensity_pos (a b δ : ℝ) (ha : 0 < a) (hab : a < b) (hδ : 0 < δ)\n    (hδ' : δ ≤ π / 8) {z : ℂ} (hz : ‖z‖ ≤ 1) (s : ℝ) : 0 < closingDensity a b δ z s := by\n  have hb : 0 < b := lt_trans ha hab\n  have hpi : 0 < π := Real.pi_pos\n  have hlam : 0 < closingLambda a b δ z := closingLambda_pos a b δ ha hb z\n  have hlamne : closingLambda a b δ z ≠ 0 := hlam.ne'\n\n  have hx : |z.re| ≤ 1 := le_trans (Complex.abs_re_le_norm z) hz\n  have hy : |z.im| ≤ 1 := le_trans (Complex.abs_im_le_norm z) hz\n  obtain ⟨hx1, hx2⟩ := abs_le.mp hx\n  obtain ⟨hy1, hy2⟩ := abs_le.mp hy\n  have hdx2 : δ * z.re ≤ π / 8 := by nlinarith [mul_nonneg hδ.le (by linarith : (0:ℝ) ≤ 1 - z.re)]\n  have hdy2 : δ * z.im ≤ π / 8 := by nlinarith [mul_nonneg hδ.le (by linarith : (0:ℝ) ≤ 1 - z.im)]\n  have hdy1 : -(π / 8) ≤ δ * z.im := by\n    nlinarith [mul_nonneg hδ.le (by linarith : (0:ℝ) ≤ z.im + 1)]\n  have hdimre2 : δ * (z.im - z.re) ≤ π / 4 := by\n    nlinarith [mul_nonneg hδ.le (by linarith : (0:ℝ) ≤ 2 - (z.im - z.re))]\n\n  have hbase : 0 < closingBase a b δ z := by\n    unfold closingBase; exact div_pos (mul_pos hlam ha) (by norm_num)\n  have hramp : 0 < closingRamp a b := closingRamp_pos a b ha hb\n  have hden : ∀ L : ℝ, 0 < max (closingRamp a b) (L - closingRamp a b) :=\n    fun L => lt_of_lt_of_le hramp (le_max_left _ _)\n\n  have hbL1 : closingBase a b δ z * closingLen1 a b δ z = closingDelta1 δ z / 2 := by\n    unfold closingBase closingLen1\n    rw [mul_comm (closingLambda a b δ z) a]\n    field_simp\n  have hbL2 : closingBase a b δ z * closingLen2 a b δ z = a * closingDelta2 δ z / (2 * b) := by\n    unfold closingBase closingLen2; field_simp\n  have hbL3 : closingBase a b δ z * closingLen3 a b δ z = closingDelta3 δ z / 2 := by\n    unfold closingBase closingLen3\n    rw [mul_comm (closingLambda a b δ z) a]\n    field_simp\n  have hbL4 : closingBase a b δ z * closingLen4 a b δ z = a * closingDelta4 δ z / (2 * b) := by\n    unfold closingBase closingLen4; field_simp\n  have hbL5 : closingBase a b δ z * closingLen5 a b δ z = closingDelta5 δ z / 2 := by\n    unfold closingBase closingLen5\n    rw [mul_comm (closingLambda a b δ z) a]\n    field_simp\n\n  have hh1 : 0 ≤ closingHeight (closingBase a b δ z) (π / 4) (closingLen1 a b δ z)\n      (closingRamp a b) := by\n    unfold closingHeight\n    refine div_nonneg ?_ (hden _).le\n    rw [hbL1]; unfold closingDelta1; linarith\n  have hh2 : 0 ≤ closingHeight (closingBase a b δ z) (π / 2) (closingLen2 a b δ z)\n      (closingRamp a b) := by\n    unfold closingHeight\n    refine div_nonneg ?_ (hden _).le\n    rw [hbL2, sub_nonneg, div_le_iff₀ (by positivity)]\n    unfold closingDelta2; nlinarith\n  have hh3 : 0 ≤ closingHeight (closingBase a b δ z) (π / 2) (closingLen3 a b δ z)\n      (closingRamp a b) := by\n    unfold closingHeight\n    refine div_nonneg ?_ (hden _).le\n    rw [hbL3]; unfold closingDelta3; linarith\n  have hh4 : 0 ≤ closingHeight (closingBase a b δ z) (π / 2) (closingLen4 a b δ z)\n      (closingRamp a b) := by\n    unfold closingHeight\n    refine div_nonneg ?_ (hden _).le\n    rw [hbL4, sub_nonneg, div_le_iff₀ (by positivity)]\n    unfold closingDelta4; nlinarith\n  have hh5 : 0 ≤ closingHeight (closingBase a b δ z) (π / 4) (closingLen5 a b δ z)\n      (closingRamp a b) := by\n    unfold closingHeight\n    refine div_nonneg ?_ (hden _).le\n    rw [hbL5]; unfold closingDelta5; linarith\n\n  unfold closingDensity\n  have ht1 := mul_nonneg hh1 (clampTent_nonneg (closingRamp a b) (closingLen1 a b δ z)\n    (closingMid1 a b δ z) s)\n  have ht2 := mul_nonneg hh2 (clampTent_nonneg (closingRamp a b) (closingLen2 a b δ z)\n    (closingMid2 a b δ z) s)\n  have ht3 := mul_nonneg hh3 (clampTent_nonneg (closingRamp a b) (closingLen3 a b δ z)\n    (closingMid3 a b δ z) s)\n  have ht4 := mul_nonneg hh4 (clampTent_nonneg (closingRamp a b) (closingLen4 a b δ z)\n    (closingMid4 a b δ z) s)\n  have ht5 := mul_nonneg hh5 (clampTent_nonneg (closingRamp a b) (closingLen5 a b δ z)\n    (closingMid5 a b δ z) s)\n  linarith\n\nprivate lemma closingFamily_slope_bounds (a b δ : ℝ) (ha : 0 < a) (hab : a < b) (hδ : 0 < δ)\n    (hδ' : δ ≤ π / 8) :\n    ∃ m₀ M₀ : ℝ, 0 < m₀ ∧ ∀ z : ℂ, ‖z‖ ≤ 1 → ∀ s : ℝ,\n      m₀ ≤ closingDensity a b δ z s ∧ closingDensity a b δ z s ≤ M₀ := by\n  have hb : 0 < b := lt_trans ha hab\n  have hpitwo : (0 : ℝ) < 2 * π := by positivity\n\n  set K : Set (ℂ × ℝ) := (Metric.closedBall (0 : ℂ) 1) ×ˢ Set.Icc (0 : ℝ) (2 * π) with hKdef\n  have hKcompact : IsCompact K := (isCompact_closedBall _ _).prod isCompact_Icc\n  have hKne : K.Nonempty :=\n    ⟨(0, 0), ⟨by simp [Metric.mem_closedBall], ⟨le_refl _, hpitwo.le⟩⟩⟩\n  have hf : Continuous (fun p : ℂ × ℝ => closingDensity a b δ p.1 p.2) :=\n    continuous_uncurry_closingDensity a b δ ha hb\n  obtain ⟨pm, hpmK, hpmmin⟩ := IsCompact.exists_isMinOn hKcompact hKne hf.continuousOn\n  obtain ⟨pM, hpMK, hpMmax⟩ := IsCompact.exists_isMaxOn hKcompact hKne hf.continuousOn\n  have hpmle := isMinOn_iff.mp hpmmin\n  have hpMge := isMaxOn_iff.mp hpMmax\n  refine ⟨closingDensity a b δ pm.1 pm.2, closingDensity a b δ pM.1 pM.2, ?_, ?_⟩\n  · have hz : ‖pm.1‖ ≤ 1 := by\n      simpa [Metric.mem_closedBall, dist_zero_right] using hpmK.1\n    exact closingDensity_pos a b δ ha hab hδ hδ' hz pm.2\n  · intro z hz s\n\n    have hper := closingDensity_periodic a b δ z\n    have hval : closingDensity a b δ z s\n        = closingDensity a b δ z (toIcoMod hpitwo 0 s) := by\n      have hx : toIcoMod hpitwo 0 s = s - toIcoDiv hpitwo 0 s • (2 * π) :=\n        eq_sub_of_add_eq (toIcoMod_add_toIcoDiv_zsmul hpitwo 0 s)\n      rw [hx, hper.sub_zsmul_eq (toIcoDiv hpitwo 0 s)]\n    have hs'mem : toIcoMod hpitwo 0 s ∈ Set.Ico 0 (2 * π) := by\n      have := toIcoMod_mem_Ico hpitwo 0 s; rwa [zero_add] at this\n    have hmemK : (z, toIcoMod hpitwo 0 s) ∈ K :=\n      ⟨by simpa [Metric.mem_closedBall, dist_zero_right] using hz,\n        ⟨hs'mem.1, le_of_lt hs'mem.2⟩⟩\n    rw [h inuous_closingLen2 (a b δ : ℝ) (ha : 0 < a) (hb : 0 < b) :\n    Continuous (fun z => closingLen2 a b δ z) :=\n  continuous_lenAux a b δ b ha hb hb.ne' (closingDelta2 δ) (by unfold closingDelta2; fun_prop)\n\nprivate lemma continuous_closingLen3 (a b δ : ℝ) (ha : 0 < a) (hb : 0 < b) :\n    Continuous (fun z => closingLen3 a b δ z) :=\n  continuous_lenAux a b δ a ha hb ha.ne' (closingDelta3 δ) (by unfold closingDelta3; fun_prop)\n\nprivate lemma continuous_closingLen4 (a b δ : ℝ) (ha : 0 < a) (hb : 0 < b) :\n    Continuous (fun z => closingLen4 a b δ z) :=\n  continuous_lenAux a b δ b ha hb hb.ne' (closingDelta4 δ) (by unfold closingDelta4; fun_prop)\n\nprivate lemma continuous_closingLen5 (a b δ : ℝ) (ha : 0 < a) (hb : 0 < b) :\n    Continuous (fun z => closingLen5 a b δ z) :=\n  continuous_lenAux a b δ a ha hb ha.ne' (closingDelta5 δ) (by unfold closingDelta5; fun_prop)\n\nprivate lemma continuous_closingMid1 (a b δ : ℝ) (ha : 0 < a) (hb : 0 < b) :\n    Continuous (fun z => closingMid1 a b δ z) := by\n  unfold closingMid1; exact (continuous_closingLen1 a b δ ha hb).div_const 2\n\nprivate lemma continuous_closingMid2 (a b δ : ℝ) (ha : 0 < a) (hb : 0 < b) :\n    Continuous (fun z => closingMid2 a b δ z) := by\n  unfold closingMid2 closingS1\n  exact (continuous_closingLen1 a b δ ha hb).add ((continuous_closingLen2 a b δ ha hb).div_const 2)\n\nprivate lemma continuous_closingMid3 (a b δ : ℝ) (ha : 0 < a) (hb : 0 < b) :\n    Continuous (fun z => closingMid3 a b δ z) := by\n  unfold closingMid3 closingS2\n  exact ((continuous_closingLen1 a b δ ha hb).add (continuous_closingLen2 a b δ ha hb)).add\n    ((continuous_closingLen3 a b δ ha hb).div_const 2)\n\nprivate lemma continuous_closingMid4 (a b δ : ℝ) (ha : 0 < a) (hb : 0 < b) :\n    Continuous (fun z => closingMid4 a b δ z) := by\n  unfold closingMid4 closingS3\n  exact (((continuous_closingLen1 a b δ ha hb).add (continuous_closingLen2 a b δ ha hb)).add\n    (continuous_closingLen3 a b δ ha hb)).add ((continuous_closing tep2.lean", "dep_count": 3, "rdep_count": 4, "descendant_count": 14, "proof_size_tex": 803, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 27451, "effort_total": 0}, "lem:closing_family_nodes": {"id": "lem:closing_family_nodes", "type": "lemma", "title": "Node-mapping of the closing family onto the canonical clean arcs", "chapter": "Dahlberg Step 2: the closing parameter and the converse (Phase D-C)", "statement": "For $0<a<b$, $0<\\delta\\le\\pi/8$ and $z\\in\\overline{\\mathbb{D}}$, the node-placing\n  family sends each arc-length breakpoint to the corresponding canonical\n  clean-bicircle breakpoint:\n  \\[\n    \\mathrm{closingFamily}\\,a\\,b\\,\\delta\\,z\\,(s_j)=c_j,\\qquad j=0,\\dots,5,\n  \\]\n  where $s_j=\\sum_{k\\le j}L_k(z)$ ($s_0=0$, $s_5=2\\pi$) and\n  $(c_0,\\dots,c_5)=(0,\\tfrac{\\pi}{4},\\tfrac{3\\pi}{4},\\tfrac{5\\pi}{4},\\tfrac{7\\pi}{4},2\\pi)$.\n  Equivalently the per-arc density integral is\n  $\\int_{s_{j-1}}^{s_j}w_z=w_j$ (the canonical arc width\n  $w_j=c_j-c_{j-1}$). Consequently $g_z$ maps the open arc $(s_{j-1},s_j)$\n  strictly monotonically onto $(c_{j-1},c_j)$, so $k_{a,b}\\circ g_z=\\hat\\kappa_j$\n  a.e.\\ on $(s_{j-1},s_j)$.", "uses": ["def:closing_family", "lem:closing_family_props", "lem:closing_lambda_pos", "lem:closing_len_bounds"], "lean_name": "Gluck.closingFamily_node, Gluck.closingDensity_arcs, Gluck.closingDensity_integral_split, Gluck.closingHeight_mul, Gluck.half_le_arccos_cos_wide, Gluck.clampTent_integral_eq_zero_wide", "proved": false, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:closing_family, lem:closing_family_props, def:clean_bicircle}\n  By \\cref{def:closing_family} the density is $w_z=m+\\sum_{k=1}^5 h_k\\,T_k$, where\n  $m=\\mathrm{closingBase}=\\tfrac{\\lambda a}{2}$ is the baseline, $T_k=\\mathrm{clampTent}$\n  is the unit-height trapezoidal clamped tent $\\mathrm{clampTent}\\,\\eta\\,L_k\\,C_k$\n  centred on the $k$-th arc midpoint $C_k=s_{k-1}+L_k/2$, with one-period support\n  window $[s_{k-1},s_k]$ (the full $k$-th arc, value $0$ at the endpoints), ramps\n  of width $\\eta$, plateau $[s_{k-1}+\\eta,s_k-\\eta]$ of width $L_k-2\\eta$, and\n  trapezoidal area $\\int T_k=L_k-\\eta$; and\n  $h_k=\\dfrac{w_k-m\\,L_k}{\\max(\\eta,L_k-\\eta)}=\\dfrac{w_k-m\\,L_k}{L_k-\\eta}$ the\n  calibrated pulse height (the clamp is inactive: $2\\eta\\le L_k$ on the disk, so\n  $\\max(\\eta,L_k-\\eta)=L_k-\\eta$). The support windows of distinct $T_k$ meet only\n  at shared arc endpoints (where the pulse value is $0$), so on the \\emph{open} arc\n  $(s_{j-1},s_j)$ only the $j$-th pulse is nonzero and\n  \\[\n    \\int_{s_{j-1}}^{s_j}w_z=m\\,L_j+h_j\\bigl(\\textstyle\\int_{s_{j-1}}^{s_j}T_j\\bigr)\n      =m\\,L_j+h_j\\,(L_j-\\eta)=m\\,L_j+(w_j-m\\,L_j)=w_j .\n  \\]\n  Here the per-arc tent integral $\\int_{s_{j-1}}^{s_j}T_j=L_j-\\eta$ is the\n  trapezoidal \\emph{area} (NOT the support width $L_j$): plateau of width\n  $L_j-2\\eta$ at height $1$ plus two unit-height ramps of base $\\eta$ contribute\n  $(L_j-2\\eta)+2\\cdot\\tfrac{\\eta}{2}=L_j-\\eta$. The vanishing of the \\emph{other}\n  pulses $T_k$ ($k\\neq j$) on $(s_{j-1},s_j)$ is the in-tree periodic\n  off-support-zero fact; the existing helper assumes support half-width below\n  $\\pi/2$ (i.e.\\ $L<\\pi$), but for the node-placing family $L_k$ can exceed $\\pi$\n  (e.g.\\ $L_3\\le5\\pi/3$ as $b/a\\to\\infty$), so the periodic copies must be excluded\n  for the full range $0<L<2\\pi$. This generalised off-support zero is provable from\n  \\texttt{Real.arccos\\_cos} by the case split $y\\le\\pi$ / $y>\\pi$ (a $\\sim 30$-line\n  helper). Telescoping the running integral,\n  $g_z(s_j)=\\int_0^{s_j}w_z=\\sum_{k\\le j}w_k=c_j$. Strict monotonicity\n  (\\cref{lem:closing_family_props}) upgrades the endpoint equalities to the\n  open-arc bijection, and the a.e.\\ value $k_{a,b}\\circ g_z=\\hat\\kappa_j$ on\n  $(s_{j-1},s_j)$ then follows since $g_z$ maps that open arc into the canonical\n  clean-bicircle a
