hδ hδ' hz\n  have hne : ∀ᵐ t ∂volume, t ≠ hi := by rw [MeasureTheory.ae_iff]; simp\n  filter_upwards [hne] with t htne htmem\n  rw [Set.uIoc_of_le hlohi.le, Set.mem_Ioc] at htmem\n  have htlt : t < hi := lt_of_le_of_ne htmem.2 htne\n  apply hval\n  rw [← hglo, ← hghi]\n  exact ⟨hmono htmem.1, hmono htlt⟩\n\nprivate lemma clean_arc_int (a b δ : ℝ) (ha : 0 < a) (hab : a < b) (hδ : 0 < δ) (hδ' : δ ≤ π / 8)\n    {z : ℂ} (hz : ‖z‖ ≤ 1) (lo hi clo chi v : ℝ) (hlohi : lo < hi)\n    (hglo : closingFamily a b δ z lo = clo) (hghi : closingFamily a b δ z hi = chi)\n    (hval : ∀ θ ∈ Set.Ioo clo chi, cleanBicircle a b θ = v) :\n    IntervalIntegrable (fun t => cleanBicircle a b (closingFamily a b δ z t)) volume lo hi ∧\n      (∫ t in lo..hi, cleanBicircle a b (closingFamily a b δ z t)) = (hi - lo) * v := by\n  have ae := clean_arc_ae a b δ ha hab hδ hδ' hz lo hi clo chi v hlohi hglo hghi hval\n  have hee : (fun t => cleanBicircle a b (closingFamily a b δ z t))\n      =ᵐ[volume.restrict (Set.uIoc lo hi)] (fun _ => v) :=\n    (MeasureTheory.ae_restrict_iff' measurableSet_uIoc).mpr ae\n  refine ⟨intervalIntegrable_iff.mpr\n      ((intervalIntegrable_iff.mp (intervalIntegrable_const (c := v))).congr_fun_ae hee.symm), ?_⟩\n  rw [intervalIntegral.integral_congr_ae ae, intervalIntegral.integral_const, smul_eq_mul]", "proof_size_lean": 10652, "has_sorry": false, "tex_file": "chapters/Gluck_DahlbergStep2.tex", "lean_file": "Gluck/DahlbergStep2.lean", "dep_count": 5, "rdep_count": 4, "descendant_count": 10, "proof_size_tex": 610, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 64043, "effort_total": 0}, "lem:arclength_arc_integral": {"id": "lem:arclength_arc_integral", "type": "lemma", "title": "", "chapter": "Dahlberg Step 2: the closing parameter and the converse (Phase D-C)", "statement": "ok\n[Arc-length arc integral on a constant-curvature arc]\n  \n  \n  \n  Let $K:\\mathbb{R}\\to\\mathbb{R}$ be \\emph{globally interval-integrable}\n  ($\\forall p\\,q,\\ \\mathrm{IntervalIntegrable}\\,K\\,\\mathrm{volume}\\,p\\,q$) and\n  constant $K\\equiv m$ on the open arc $(c,d)$ ($c\\le d$) with $m\\neq0$, and write\n  $\\alpha_K(s)=\\int_0^s K$ for the arc-length tangent angle (\\cref{def:dahlberg_angle}).\n  Then\n  \\[\n    \\int_c^d e^{\\,i\\,\\alpha_K(s)}\\,ds\n      =\\frac{1}{m}\\,(-i)\\,\\bigl(e^{\\,i\\,\\alpha_K(d)}-e^{\\,i\\,\\alpha_K(c)}\\bigr).\n  \\]\n  This is the arc-length analogue of the inclination-variable building block\n  $\\mathrm{bicircle\\_arc\\_integral}$ of \\cref{lem:error_vector_of_bicircle}. The\n  global interval-integrability hypothesis (not merely integrability on $[c,d]$) is\n  needed because $\\alpha_K$ integrates from $0$, so the split passes through $0$; it\n  is met at the use site ($K_z$ is globally interval-integrable).", "uses": ["def:dahlberg_angle"], "lean_name": "Gluck.arcLengthArcIntegral", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:dahlberg_angle}\n  \\leanok\n  For $s\\in[c,d]$, $\\alpha_K(s)=\\alpha_K(c)+\\int_c^s K=\\alpha_K(c)+m\\,(s-c)$ because\n  $K=m$ a.e.\\ on $(c,d)$ (the two endpoints are a null set). Hence on $[c,d]$ the\n  integrand is $e^{i\\alpha_K(s)}=e^{i\\alpha_K(c)}\\,e^{\\,i\\,m\\,(s-c)}$. The map\n  $s\\mapsto \\tfrac{1}{im}\\,e^{i\\alpha_K(c)}\\,e^{\\,i\\,m\\,(s-c)}$ has derivative\n  $e^{i\\alpha_K(s)}$ on $[c,d]$, so by the fundamental theorem of calculus the\n  integral equals\n  $\\tfrac{1}{im}\\,e^{i\\alpha_K(c)}\\bigl(e^{\\,i\\,m\\,(d-c)}-1\\bigr)\n   =\\tfrac{1}{m}(-i)\\bigl(e^{i\\alpha_K(d)}-e^{i\\alpha_K(c)}\\bigr)$\n  (using $1/i=-i$ and $\\alpha_K(d)=\\alpha_K(c)+m(d-c)$). No global $C^1$ structure\n  of $\\alpha_K$ is used --- only constancy of $K$ on the single arc.\n", "lean_source": "private lemma arcLengthArcIntegral (K : ℝ → ℝ) (m c d : ℝ) (hcd : c ≤ d)\n    (hKint : ∀ p q : ℝ, IntervalIntegrable K volume p q) (hm : m ≠ 0)\n    (hK : ∀ s ∈ Set.Ioo c d, K s = m) :\n    (∫ s in c..d, Complex.exp ((dahlbergAngle K s : ℂ) * Complex.I))\n      = (1 / (m : ℂ)) * (-Complex.I)\n        * (Complex.exp ((dahlbergAngle K d : ℂ) * Complex.I)\n            - Complex.exp ((dahlbergAngle K c : ℂ) * Complex.I)) := by\n  have hmc : (m : ℂ) ≠ 0 := by exact_mod_cast hm\n  have hImne : Complex.I * (m : ℂ) ≠ 0 := mul_ne_zero Complex.I_ne_zero hmc\n  set A : ℝ := dahlbergAngle K c with hA\n  have hangle : ∀ s, c ≤ s → s ≤ d → dahlbergAngle K s = A + m * (s - c) := by\n    intro s hcs hsd\n    have hsplit : dahlbergAngle K s = dahlbergAngle K c + ∫ t in c..s, K t := by\n      simp only [dahlbergAngle]\n      rw [← intervalIntegral.integral_add_adjacent_intervals (hKint 0 c) (hKint c s)]\n    have hms : (∫ t in c..s, K t) = m * (s - c) := by\n      have hcong : (∫ t in c..s, K t) = ∫ _t in c..s, m := by\n        apply intervalIntegral.integral_congr_ae\n        have hd : ∀ᵐ t ∂volume, t ≠ s := by\n          rw [MeasureTheory.ae_iff]; simp\n        filter_upwards [hd] with t hts htmem\n        rw [Set.uIoc_of_le hcs, Set.mem_Ioc] at htmem\n        exact hK t ⟨htmem.1, (lt_of_le_of_ne htmem.2 hts).trans_le hsd⟩\n      rw [hcong, intervalIntegral.integral_const, smul_eq_mul]; ring\n    rw [hsplit, hms, hA]\n  have hEqOn : Set.EqOn (fun s => Complex.exp ((dahlbergAngle K s : ℂ) * Complex.I))\n      (fun s => Complex.exp (((A + m * (s - c) : ℝ) : ℂ) * Complex.I)) (Set.uIcc c d) := by\n    intro s hs\n    rw [Set.uIcc_of_le hcd, Set.mem_Icc] at hs\n    simp only [hangle s hs.1 hs.2]\n  rw [intervalIntegral.integral_congr hEqOn]\n  have hderiv : ∀ x ∈ Set.uIcc c d,\n      HasDerivAt (fun s => (1 / (Complex.I * (m : ℂ)))\n          * Complex.exp (((A + m * (s - c) : ℝ) : ℂ) * Complex.I))\n        (Complex.exp (((A + m * (x - c) : ℝ) : ℂ) * Complex.I)) x := by\n    intro x _\n    have hg0 : HasDerivAt (fun s : ℝ => A + m * (s - c)) m x := by\n      simpa using (((hasDerivAt_id x).sub_const c).const_mul m).const_add A\n    have h1 : HasDerivAt (fun s : ℝ => ((A + m * (s - c) : ℝ) : ℂ) * Complex.I)\n        ((m : ℂ) * Complex.I) x := by\n      simpa using (hg0.ofReal_comp).mul_const Complex.I\n    have h2 := (h1.cexp).const_mul (1 / (Complex.I * (m : ℂ)))\n    have heq : (1 / (Complex.I * (m : ℂ)))\n        * (Complex.exp (((A + m * (x - c) : ℝ) : ℂ) * Complex.I) * ((m : ℂ) * Complex.I))\n        = Complex.exp (((A + m * (x - c) : ℝ) : ℂ) * Complex.I) := by\n      field_simp\n    rw [heq] at h2\n    exact h2\n  have hcont : IntervalIntegrable\n      (fun s => Complex.exp (((A + m * (s - c) : ℝ) : ℂ) * Complex.I)) volume c d :=\n    Continuous.intervalIntegrable (by fun_prop) c d\n  rw [intervalIntegral.integral_eq_sub_of_hasDerivAt hderiv hcont]\n  have hcoef : (1 : ℂ) / (Complex.I * (m : ℂ)) = (1 / (m : ℂ)) * (-Complex.I) := by\n    have hinvI : Complex.I⁻¹ = -Complex.I := by\n      apply inv_eq_of_mul_eq_one_right\n      rw [mul_neg, Complex.I_mul_I, neg_neg]\n    rw [one_div, mul_inv_rev, hinvI, one_div]\n  rw [show (A + m * (d - c)) = dahlbergAngle K d from (hangle d (by linarith) le_rfl).symm,\n      show (A + m * (c - c)) = A from by ring]\n  simp only [hcoef]\n  ring\n\nset_option maxHeartbeats 2400000 in", "proof_size_lean": 3298, "has_sorry": false, "tex_file": "chapters/Gluck_DahlbergStep2.tex", "lean_file": "Gluck/DahlbergStep2.lean", "dep_count": 1, "rdep_count": 1, "descendant_count": 6, "proof_size_tex": 742, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 3381, "effort_total": 0}, "lem:arclength_error_clean_eq_errorMap": {"id": "lem:arclength_error_clean_eq_errorMap", "type": "lemma", "title": "", "chapter": "Dahlberg Step 2: the closing parameter and the converse (Phase D-C)", "statement": "ok\n[Arc-length closure of the clean bicircle $=$ positive multiple of \\texttt{errorMap}]\n  \n  \n  \n  For $0<a<b$, $0<\\delta\\le\\pi/8$ and $z\\in\\overline{\\mathbb{D}}$, the clean\n  arc-length error map $F(z)=\\mathrm{arcLengthErrorMap}\\,(k_{a,b})\\,a\\,b\\,\\delta\\,z$\n  is a \\emph{positive} (configuration-dependent) real multiple of the in-tree error\n  map:\n  \\[\n    F(z)=c(z)\\cdot\\mathrm{errorMap}\\,a\\,b\\,\\delta\\,z,\\qquad c(z)=\\frac1{\\lambda(z)}>0 .\n  \\]\n  In particular $F(z)=0\\iff\\mathrm{errorMap}\\,a\\,b\\,\\delta\\,z=0$, and for any loop in\n  $\\overline{\\mathbb{D}}\\setminus\\{F=0\\}$ the two maps have the same winding number\n  around $0$ (positive-scalar-field invariance, \\cref{lem:clean_error_winds}).", "uses": ["def:arclength_error_map", "def:error_map", "lem:error_vector_of_bicircle", "lem:clean_prefactor", "lem:arclength_arc_integral", "lem:clean_arclength_nodes"], "lean_name": "Gluck.arcLengthError_clean_eq_errorMap", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:error_map, lem:error_vector_of_bicircle, lem:clean_prefactor, lem:arclength_arc_integral, lem:clean_arclength_nodes}\n  \\leanok\n  Write $K_z=\\mathrm{arcLengthNorm}\\,(k_{a,b})\\,a\\,b\\,\\delta\\,z$, so\n  $F(z)=\\int_0^{2\\pi}e^{i\\alpha_{K_z}(s)}\\,ds$.\n\n  \\emph{Arc structure and node landing.} By \\cref{lem:clean_arclength_nodes} there\n  are breakpoints $0=s_0<s_1<\\dots<s_5=2\\pi$ with $K_z$ constant $\\hat\\kappa_j\\lambda(z)$\n  on each open arc $(s_{j-1},s_j)$ (values $a,b,a,b,a$ scaled by $\\lambda$), and the\n  cumulative angle landing $\\alpha_{K_z}(s_j)=\\theta_j$, where $\\theta_0=0$,\n  $\\theta_5=2\\pi$ and $(\\theta_1,\\theta_2,\\theta_3,\\theta_4)=\\mathrm{configSpace}\\,\\delta\\,(z.\\mathrm{re},z.\\mathrm{im})$.\n\n  \\emph{Arc-length split.} Splitting $F(z)$ at $s_1,\\dots,s_4$ and applying\n  \\cref{lem:arclength_arc_integral} with $m=\\hat\\kappa_j\\lambda(z)$ on each arc\n  (the global interval-integrability of $K_z$ holds since $K_z$ is a bounded a.e.-step\n  function),\n  \\[\n    F(z)=\\sum_{j=1}^{5}\\frac{1}{\\hat\\kappa_j\\lambda(z)}\\,(-i)\\,\n      \\bigl(e^{\\,i\\,\\theta_j}-e^{\\,i\\,\\theta_{j-1}}\\bigr)\n      =\\frac1{\\lambda(z)}\\sum_{j=1}^{5}\\frac{1}{\\hat\\kappa_j}\\,(-i)\\,\n      \\bigl(e^{\\,i\\,\\theta_j}-e^{\\,i\\,\\theta_{j-1}}\\bigr).\n  \\]\n\n  \\emph{Match.} By the arc-by-arc evaluation of \\cref{lem:error_vector_of_bicircle}\n  ($\\mathrm{bicircleErrorVector\\_eq}$, whose $\\mathrm{bicircle\\_arc\\_integral}$\n  building block contributes exactly $\\tfrac1{\\hat\\kappa_j}(-i)(e^{i\\theta_j}-e^{i\\theta_{j-1}})$\n  on the arc $(\\theta_{j-1},\\theta_j)$ of value $\\hat\\kappa_j$), the sum\n  $\\sum_{j}\\tfrac{1}{\\hat\\kappa_j}(-i)(e^{i\\theta_j}-e^{i\\theta_{j-1}})$ with the same\n  nodes $\\theta_j$ and the same arc values $a,b,a,b,a$ is precisely\n  $\\mathrm{bicircleErrorVector}\\,a\\,b\\,\\theta_1\\theta_2\\theta_3\\theta_4\n   =\\mathrm{errorMap}\\,a\\,b\\,\\delta\\,z$ (\\cref{def:error_map}). Therefore\n  $F(z)=\\tfrac1{\\lambda(z)}\\,\\mathrm{errorMap}\\,a\\,b\\,\\delta\\,z=c(z)\\,\\mathrm{errorMap}\\,a\\,b\\,\\delta\\,z$\n  with $c(z)>0$ (\\cref{lem:clean_prefactor}). The vanishing equivalence is immediate;\n  the equal-winding claim is \\cref{lem:clean_error_winds}.\n", "lean_source": "private lemma arcLengthError_clean_eq_errorMap (a b δ : ℝ) (ha : 0 < a) (hab : a < b)\n    (hδ : 0 < δ) (hδ' : δ ≤ π / 8) (z : ℂ) (hz : ‖z‖ ≤ 1) :\n    arcLengthErrorMap (cleanBicircle a b) a b δ z\n      = ((1 / closingLambda a b δ z : ℝ) : ℂ) * errorMap a b δ z := by\n\n  have hb : 0 < b := lt_trans ha hab\n  have hpi : 0 < π := Real.pi_pos\n  have hlampos := closingLambda_pos a b δ ha hb z\n  have hlamne := hlampos.ne'\n  obtain ⟨⟨hL1p, _, _⟩, ⟨hL2p, _, _⟩, ⟨hL3p, _, _⟩, ⟨hL4p, _, _⟩, ⟨hL5p, _, _⟩⟩ :=\n    closingLen_bounds a b δ ha hab hδ hδ' hz\n  have hsum := closingLen_sum a b δ ha hab hδ hδ' hz\n  obtain ⟨hg1, hg2, hg3, hg4⟩ := closingFamily_node a b δ ha hab hδ hδ' hz\n  obtain ⟨cv1, cv2, cv3, cv4, cv5⟩ := cleanBicircle_arcs a b\n  obtain ⟨hα1, hα2, hα3, hα4⟩ := cleanArcLength_node_values a b δ ha hab hδ hδ' hz\n  have hg0 : closingFamily a b δ z 0 = 0 := closingFamily_zero a b δ z\n  have hg5 : closingFamily a b δ z (2 * π) = 2 * π := closingFamily_two_pi a b δ ha hab hδ hδ' hz\n  have hmono := strictMono_closingFamily a b δ ha hab hδ hδ' hz\n\n  have hx : |z.re| ≤ 1 := le_trans (Complex.abs_re_le_norm z) hz\n  have hy : |z.im| ≤ 1 := le_trans (Complex.abs_im_le_norm z) hz\n  obtain ⟨hx1, hx2⟩ := abs_le.mp hx\n  obtain ⟨hy1, hy2⟩ := abs_le.mp hy\n  have hdx2 : δ * z.re ≤ π / 8 := by nlinarith [mul_nonneg hδ.le (by linarith : (0:ℝ) ≤ 1 - z.re)]\n  have hdx1 : -(π / 8) ≤ δ * z.re := by nlinarith [mul_nonneg hδ.le (by linarith : (0:ℝ) ≤ z.re + 1)]\n  have hdy2 : δ * z.im ≤ π / 8 := by nlinarith [mul_nonneg hδ.le (by linarith : (0:ℝ) ≤ 1 - z.im)]\n  have hdy1 : -(π / 8) ≤ δ * z.im := by nlinarith [mul_nonneg hδ.le (by linarith : (0:ℝ) ≤ z.im + 1)]\n\n  have h01 : (0 : ℝ) < closingS1 a b δ z := by simp only [closingS1]; exact hL1p\n  have h12 : closingS1 a b δ z < closingS2 a b δ z := by simp only [closingS2, closingS1]; linarith\n  have h23 : closingS2 a b δ z < closingS3 a b δ z := by simp only [closingS3, closingS2]; linarith\n  have h34 : closingS3 a b δ z < closingS4 a b δ z := by simp only [closingS4, closingS3]; linarith\n  have h45 : closingS4 a b δ z < 2 * π := by simp only [closingS4]; linarith [hsum, hL5p]\n\n  have hI := cleanTotalCurvature_eq a b δ ha hab hδ hδ' hz\n  have hfac : 2 * π / (∫ t in (0 : ℝ)..(2 * π), cleanBicircle a b (closingFamily a b δ z t))\n      = closingLambda a b δ z := by rw [hI]; field_simp\n  have hKeq : ∀ s, arcLengthNorm (cleanBicircle a b) a b δ z s\n      = closingLambda a b δ z * cleanBicircle a b (closingFamily a b δ z s) := by\n    intro s; rw [arcLengthNorm, hfac]\n  have hKfun : arcLengthNorm (cleanBicircle a b) a b δ z\n      = fun s => closingLambda a b δ z * cleanBicircle a b (closingFamily a b δ z s) := funext hKeq\n\n  have hcgz_per : Function.Periodic (fun t => cleanBicircle a b (closingFamily a b δ z t)) (2 * π) := by\n    intro s\n    simp only\n    rw [closingFamily_add_two_pi a b δ ha hab hδ hδ' hz s, cleanBicircle_periodic]\n  obtain ⟨jj1, _⟩ := clean_arc_int a b δ ha hab hδ hδ' hz 0 (closingS1 a b δ z) 0 ( anishing nor the\n  winding number: the loops $t\\mapsto\\mathrm{errorMap}(t)$ and\n  $t\\mapsto c(t)\\,\\mathrm{errorMap}(t)$ are homotopic through\n  $(u,t)\\mapsto\\bigl((1-u)+u\\,c(t)\\bigr)\\,\\mathrm{errorMap}(t)$, whose scalar factor\n  $(1-u)+u\\,c(t)>0$ is positive throughout (so the homotopy avoids $0$), and a\n  positive-scalar reparametrisation of a loop preserves its winding number. Hence $F$\n  is nonvanishing on $\\partial\\mathbb{D}$ with winding $-1\\neq0$. (This is the\n  in-tree breakpoint-disk version of Dahlberg's Prop 2.3, with the unit circle in\n  place of his \"sufficiently small circle\".)\n", "lean_source": "private lemma cleanError_winds_boundary (a b δ : ℝ) (ha : 0 < a) (hb : 0 < b) (hab : a < b)\n    (hδ : 0 < δ) (hδ' : δ ≤ π / 8) :\n    ∃ (hF : ContinuousOn (arcLengthErrorMap (cleanBicircle a b) a b δ)\n        (Metric.closedBall 0 1))\n      (hbd : ∀ z ∈ Metric.sphere (0 : ℂ) 1,\n        arcLengthErrorMap (cleanBicircle a b) a b δ z ≠ 0),\n      windingNumberC (diskBoundaryLoop (arcLengthErrorMap (cleanBicircle a b) a b δ) hF)\n        (diskBoundaryLoop_ne_zero (arcLengthErrorMap (cleanBicircle a b) a b δ) hF hbd) ≠ 0 := by\n\n  have hbridge : ∀ z : ℂ, ‖z‖ ≤ 1 →\n      arcLengthErrorMap (cleanBicircle a b) a b δ z\n        = ((1 / closingLambda a b δ z : ℝ) : ℂ) * errorMap a b δ z := by\n    intro z hz\n    exact arcLengthError_clean_eq_errorMap a b δ ha hab hδ hδ' z hz\n  obtain ⟨hF₀, hbd₀, hw₀⟩ := errorMap_winding_eq_one a b δ ha hb hab.ne hδ hδ'\n\n  have hF : ContinuousOn (arcLengthErrorMap (cleanBicircle a b) a b δ) (Metric.closedBall 0 1) := by\n    have hc' : ContinuousOn (fun z => ((1 / closingLambda a b δ z : ℝ) : ℂ) * errorMap a b δ z)\n        (Metric.closedBall 0 1) := by\n      refine (Continuous.continuousOn ?_).mul hF₀\n      exact Complex.continuous_ofReal.comp\n        ((continuous_const.div (continuous_closingLambda a b δ)\n          (fun z => closingLambda_ne a b δ ha hb z)))\n    apply hc'.congr\n    intro z hz\n    have : ‖z‖ ≤ 1 := by simpa [dist_zero_right] using Metric.mem_closedBall.1 hz\n    rw [hbridge z this]\n\n  have hbd : ∀ z ∈ Metric.sphere (0 : ℂ) 1,\n      arcLengthErrorMap (cleanBicircle a b) a b δ z ≠ 0 := by\n    intro z hz\n    have hz1 : ‖z‖ = 1 := by rwa [mem_sphere_zero_iff_norm] at hz\n    rw [hbridge z hz1.le]\n    refine mul_ne_zero ?_ (hbd₀ z hz)\n    exact_mod_cast (cleanPrefactor_pos a b δ ha hb z).ne'\n  refine ⟨hF, hbd, ?_⟩\n\n  set wf : unitInterval → ℂ := fun t => ((Circle.exp (2 * π * (t : ℝ)) : Circle) : ℂ) with hwfdef\n  have hwfcont : Continuous wf :=\n    continuous_subtype_val.comp\n      (Circle.exp.continuous.comp (continuous_const.mul continuous_subtype_val))\n  have hwfnorm : ∀ t : unitInterval, ‖wf t‖ = 1 := fun t => Circle.norm_coe _\n\n  set cloop : C(unitInterval, ℝ) :=\n    ⟨fun t => 1 / closingLambda a b δ (wf t),\n      continuous_const.div ((continuous_closingLambda a b δ).comp hwfcont)\n        (fun t => closingLambda_ne a b δ ha hb (wf t))⟩ with hcloopdef\n  have hcpos : ∀ t, 0 < cloop t := fun t => cleanPrefactor_pos a b δ ha hb (wf t)\n\n  set γE : C(unitInterval, ℂ) := diskBoundaryLoop (errorMap a b δ) hF₀ with hγEdef\n  have hγEne : ∀ t, γE t ≠ 0 := diskBoundaryLoop_ne_zero (errorMap a b δ) hF₀ hbd₀\n\n  have hexp0 : wf 0 = 1 := by\n    simp only [hwfdef, Set.Icc.coe_zero, mul_zero, Circle.exp_zero, Circle.coe_one]\n  have hexp1 : wf 1 = 1 := by\n    simp only [hwfdef, Set.Icc.coe_one, mul_one, Circle.exp_two_pi, Circle.coe_one]\n  have hloopγ : γE 0 = γE 1 := by\n    show errorMap a b δ (wf 0) = errorMap a b δ (wf 1)\n    rw [hexp0, hexp1]\n  have hloopc : cloop 0 = cloop 1 := by\n    show 1 / closingLambda a b δ (wf 0) = 1 / closingLambda a b δ (wf 1)\n    rw [hexp0, hexp1]\n\n  have hscaled := windingNumberC_posScalarField cloop hcpos γE hγEne hloopγ hloopc\n\n  have key : windingNumberC (diskBoundaryLoop (arcLengthErrorMap (cleanBicircle a b) a b δ) hF)\n        (diskBoundaryLoop_ne_zero (arcLengthErrorMap (cleanBicircle a b) a b δ) hF hbd)\n      = windingNumberC γE hγEne := by\n    rw [← hscaled]\n    apply windingNumberC_congr\n    intro t\n    show arcLengthErrorMap (cleanBicircle a b) a b δ (wf t)\n        = (cloop t : ℂ) * errorMap a b δ (wf t)\n    rw [hbridge (wf t) (le_of_eq (hwfnorm t))]\n    simp only [hcloopdef, ContinuousMap.coe_mk]\n  rw [key, hw₀]\n  norm_num", "proof_size_lean": 3644, "has_sorry": false, "tex_file": "chapters/Gluck_DahlbergStep2.tex", "lean_file": "Gluck/DahlbergStep2.lean", "dep_count": 4, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 1217, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 115028, "effort_total": 0}, "thm:exists_closing_param": {"id": "thm:exists_closing_param", "type": "theorem", "title": "", "chapter": "Dahlberg Step 2: the closing parameter and the converse (Phase D-C)", "statement": "ok\n[Existence of a closing parameter]\n  \n  \n  \n  Assume $\\kappa$ is continuous (the hypothesis $\\mathrm{Continuous}\\,\\kappa$ is\n  carried in the Lean signature, supplied at the use site by\n  \\cref{def:mixed_sign_four_vertex}). There is $\\varepsilon_0>0$ such that for every\n  $\\varepsilon\\in(0,\\varepsilon_0)$ there is $z^*\\in\\mathbb{D}$ (interior) with\n  $F^*(z^*,\\varepsilon)=0$. Hence\n  $K^*_{z^*}=\\tfrac{2\\pi}{I^*_{z^*}}(\\kappa\\circ\\eta)\\circ g_{z^*}$ satisfies the\n  closure condition (1.2).", "uses": ["def:preliminary_diffeo_data", "lem:clean_error_winds", "lem:arclength_error_tendsto", "lem:arclength_error_continuous", "lem:winding_number_c_perturb", "thm:existence_of_zero"], "lean_name": "Gluck.exists_closingParam", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:clean_error_winds, lem:arclength_error_tendsto, lem:winding_number_c_perturb, thm:existence_of_zero}\n  \\leanok\n  Since $\\kappa$ is continuous and $\\eta$ is $C^1$ (hence continuous, from\n  \\cref{def:preliminary_diffeo_data}), the perturbed weight $\\kappa\\circ\\eta$ is\n  continuous, so \\cref{lem:arclength_error_continuous} applies to both $F$ and\n  $F^*(\\cdot,\\varepsilon)$. By \\cref{lem:clean_error_winds}, $F$ is nonvanishing on\n  $\\partial\\mathbb{D}$ with a positive margin $\\mu=\\min_{|z|=1}\\|F(z)\\|>0$\n  (continuity on the compact circle, \\cref{lem:arclength_error_continuous}) and\n  nonzero boundary winding. By\n  \\cref{lem:arclength_error_tendsto} choose $\\varepsilon_0$ so that for\n  $\\varepsilon<\\varepsilon_0$, $\\sup_z\\|F^*(z,\\varepsilon)-F(z)\\|<\\mu$. Then\n  $F^*(\\cdot,\\varepsilon)$ is also nonvanishing on $\\partial\\mathbb{D}$, and by the\n  perturbation invariance of the winding number\n  (\\cref{lem:winding_number_c_perturb}, applied as in the positive-case\n  \\cref{lem:reduction_justified}) its boundary winding equals that of $F$, hence is\n  nonzero. The planar degree principle \\cref{thm:existence_of_zero}\n  ($\\mathrm{exists\\_zero\\_of\\_boundary\\_winding}$) then produces an interior zero\n  $z^*\\in\\mathbb{D}$ with $F^*(z^*,\\varepsilon)=0$. Finally\n  $F^*(z^*,\\varepsilon)=\\gamma_{K^*_{z^*}}(2\\pi)=0$ is condition (1.2).\n", "lean_source": "private theorem exists_closingParam {κ : ℝ → ℝ} (hκ : Continuous κ) (a b C : ℝ) (ha : 0 < a)\n    (hab : a < b) (hC : 0 < C) (δ : ℝ) (hδ : 0 < δ) (hδ' : δ ≤ π / 8) :\n    ∃ ε₀ > 0, ∀ ε : ℝ, 0 < ε → ε < ε₀ → ∀ η e : ℝ → ℝ,\n      PreliminaryDiffeoData κ a b C ε η e →\n      ∃ z ∈ Metric.ball (0 : ℂ) 1, arcLengthErrorMap (fun t => κ (η t)) a b δ z = 0 := by\n  have hb : 0 < b := lt_trans ha hab\n  have hpi : 0 < π := Real.pi_pos\n\n  obtain ⟨hFcl, hbdcl, hwcl⟩ := cleanError_winds_boundary a b δ ha hb hab hδ hδ'\n\n  have hsc : IsCompact (Metric.sphere (0 : ℂ) 1) := isCompact_sphere 0 1\n  have hsne : (Metric.sphere (0 : ℂ) 1).Nonempty := by\n    rw [NormedSpace.sphere_nonempty]; norm_num\n  have hsubset : Metric.sphere (0 : ℂ) 1 ⊆ Metric.closedBall 0 1 :=\n    Metric.sphere_subset_closedBall\n  have hcontnorm : ContinuousOn (fun z => ‖arcLengthErrorMap (cleanBicircle a b) a b δ z‖)\n      (Metric.sphere (0 : ℂ) 1) := (hFcl.mono hsubset).norm\n  obtain ⟨zm, hzm_mem, hzm_min⟩ := hsc.exists_isMinOn hsne hcontnorm\n  set μ : ℝ := ‖arcLengthErrorMap (cleanBicircle a b) a b δ zm‖ with hμdef\n  have hμ : 0 < μ := by rw [hμdef]; exact norm_pos_iff.mpr (hbdcl zm hzm_mem)\n  have hμle : ∀ z ∈ Metric.sphere (0 : ℂ) 1,\n      μ ≤ ‖arcLengthErrorMap (cleanBicircle a b) a b δ z‖ :=\n    fun z hz => isMinOn_iff.mp hzm_min z hz\n\n  obtain ⟨C', hC'pos, ε₁, hε₁pos, htendsto⟩ := arcLengthErrorMap_tendsto a b C ha hab hC δ hδ hδ'\n  obtain ⟨ε₁tc, hε₁tcpos, htc⟩ := totalCurvature_ne_zero a b C ha hab hC δ hδ hδ'\n\n  set T : ℝ := μ / (2 * π * C') with hTdef\n  have hTpos : 0 < T := by rw [hTdef]; positivity\n  refine ⟨min ε₁ (min ε₁tc T), lt_min hε₁pos (lt_min hε₁tcpos hTpos), ?_⟩\n  intro ε hε hεlt η e hdata\n  have hεlt1 : ε < ε₁ := lt_of_lt_of_le hεlt (min_le_left _ _)\n  have hεlttc : ε < ε₁tc := lt_of_lt_of_le hεlt (le_trans (min_le_right _ _) (min_le_left _ _))\n  have hεltT : ε < T := lt_of_lt_of_le hεlt (le_trans (min_le_right _ _) (min_le_right _ _))\n\n  have h2πC'ε : 2 * π * C' * ε < μ := by\n    have hpos : (0 : ℝ) < 2 * π * C' := by positivity\n    calc 2 * π * C' * ε < 2 * π * C' * T := mul_lt_mul_of_pos_left hεltT hpos\n      _ = μ := by rw [hTdef]; field_simp\n\n  obtain ⟨v, hvcont, hvpos, hη_deriv⟩ := hdata.1\n  have hη_cont : Continuous η :=\n    continuous_iff_continuousAt.mpr (fun x => (hη_deriv x).continuousAt)\n  have hκη_cont : Continuous (fun t => κ (η t)) := hκ.comp hη_cont\n\n  have hI : ∀ z : ℂ, ‖z‖ ≤ 1 →\n      (∫ t in (0 : ℝ)..(2 * π), (fun t => κ (η t)) (closingFamily a b δ z t)) ≠ 0 :=\n    fun z hz => (htc ε hε hεlttc η e hdata z hz).ne'\n  have hF : ContinuousOn (fun z => arcLengthErrorMap (fun t => κ (η t)) a b δ z)\n      (Metric.closedBall 0 1) :=\n    continuous_arcLengthErrorMap (fun t => κ (η t)) hκη_cont a b δ ha hb hI\n\n  have hbd : ∀ z ∈ Metric.sphere (0 : ℂ) 1,\n      arcLengthErrorMap (fun t => κ (η t)) a b δ z ≠ 0 := by\n    intro z hz\n    have hznorm : ‖z‖ = 1 := mem_sphere_zero_iff_norm.mp hz\n    have hd : ‖arcLengthErrorMap (fun t => κ (η t)) a b δ z\n        - arcLengthErrorMap (cleanBicircle a b) a b δ z‖ ≤ 2 * π * C' * ε :=\n      htendsto ε hε hεlt1 η e hdata z hznorm.le\n    have hμz := hμle z hz\n    have hdlt : ‖arcLengthErrorMap (cleanBicircle a b) a b δ z\n        - arcLengthErrorMap (fun t => κ (η t)) a b δ z‖ < μ := by\n      rw [norm_sub_rev]; exact lt_of_le_of_lt hd h2πC'ε\n    have htri : ‖arcLengthErrorMap (cleanBicircle a b) a b δ z‖\n        ≤ ‖arcLengthErrorMap (fun t => κ (η t)) a b δ z‖\n          + ‖arcLengthErrorMap (cleanBicircle a b) a b δ z\n            - arcLengthErrorMap (fun t => κ (η t)) a b δ z‖ := by\n      have h := norm_add_le (arcLengthErrorMap (fun t => κ (η t)) a b δ z)\n        (arcLengthErrorMap (cleanBicircle a b) a b δ z\n          - arcLengthErrorMap (fun t => κ (η t)) a b δ z)\n      simpa using h\n    have : 0 < ‖arcLengthErrorMap (fun t => κ (η t)) a b δ z‖ := by linarith\n    exact norm_pos_iff.mp this\n\n  set γE : C(unitInterval, ℂ) := diskBoundaryLoop (arcLengthErrorMap (cleanBicircle a b) a b δ) hFcl\n    with hγEdef\n  set γK : C(unitInterval, ℂ) := diskBoundaryLoop (arcLengthErrorMap (fun t => κ (η t)) a b δ) hF\n    with hγKdef\n  have hγEne : ∀ t, γE t ≠ 0 :=\n    diskBoundaryLoop_ne_zero (arcLengthErrorMap (cleanBicircle a b) a b δ) hFcl hbdcl\n  have hγKne : ∀ t, γK t ≠ 0 :=\n    diskBoundaryLoop_ne_zero (arcLengthErrorMap (fun t => κ (η t)) a b δ) hF hbd\n  have hexp0 : ((Circle.exp (2 * π * ((0 : unitInterval) : ℝ)) : Circle) : ℂ) = 1 := by norm_num\n  have hexp1 : ((Circle.exp (2 * π * ((1 : unitInterval) : ℝ)) : Circle) : ℂ) = 1 := by\n    rw [Set.Icc.coe_one, mul_one, Circle.exp_two_pi]; norm_num\n  have hloopE : γE 0 = γE 1 := by\n    simp only [hγEdef, diskBoundaryLoop, ContinuousMap.coe_mk]\n    rw [hexp0, hexp1]\n  have hloopK : γK 0 = γK 1 := by\n    simp only [hγKdef, diskBoundaryLoop, ContinuousMap.c 1.1.}\n  Let $\\kappa:\\mathbb{R}\\to\\mathbb{R}$ be continuous, $2\\pi$-periodic and\n  non-constant, satisfying the mixed-sign four-vertex condition\n  (\\cref{def:mixed_sign_four_vertex}). Then there is a simple closed curve realizing\n  $\\kappa$: $\\exists\\,\\gamma,\\ \\mathrm{IsSimpleClosed}\\,\\gamma\\,\\wedge\\,\n       \\mathrm{RealizesCurvature}\\,\\gamma\\,\\kappa$.", "uses": ["def:mixed_sign_four_vertex", "thm:exists_preliminary_diffeo", "def:preliminary_diffeo_data", "thm:exists_closing_param", "lem:total_curvature_ne_zero", "lem:simplicity_transport", "lem:exists_c1_circle_inverse", "lem:closing_family_props", "thm:realizes_of_non_normalised", "def:non_normalised_curvature"], "lean_name": "Gluck.dahlbergConverse", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{thm:exists_preliminary_diffeo, thm:exists_closing_param, lem:simplicity_transport, lem:total_curvature_ne_zero, lem:exists_c1_circle_inverse, lem:closing_family_props, thm:realizes_of_non_normalised}\n  \\leanok\n  From \\cref{def:mixed_sign_four_vertex}, $\\kappa$ is continuous and $2\\pi$-periodic.\n  Fix $\\delta=\\pi/8$. Apply \\cref{thm:exists_preliminary_diffeo} to obtain $0<a<b$\n  and, for a parameter $\\varepsilon$ to be fixed below, the preliminary\n  diffeomorphism $\\eta$ (with continuous positive derivative $v_\\eta$ and\n  $\\eta(t+2\\pi)=\\eta(t)+2\\pi$, \\cref{def:preliminary_diffeo_data}) with\n  $\\kappa\\circ\\eta=a(1-f)+bf+e$, $\\int_0^{2\\pi}|e|<C\\varepsilon$. Shrink $\\varepsilon$\n  below $\\min(\\varepsilon_0,\\varepsilon_1)$ and below the simplicity threshold of\n  \\cref{lem:simplicity_transport}. By \\cref{thm:exists_closing_param} (whose\n  $\\mathrm{Continuous}\\,\\kappa$ hypothesis is supplied by\n  \\cref{def:mixed_sign_four_vertex}) there is an interior $z^*$ with\n  $F^*(z^*,\\varepsilon)=0$, i.e.\\ $K^*_{z^*}$ satisfies (1.2); feeding that same zero\n  to \\cref{lem:simplicity_transport} gives (1.3); and \\cref{lem:total_curvature_ne_zero}\n  gives the total curvature $I^*_{z^*}=\\int_0^{2\\pi}(\\kappa\\circ\\eta)\\circ g_{z^*}>0$.\n\n  \\emph{The composite reparametrisation and its inverse.} Set\n  $\\varphi=\\eta\\circ g_{z^*}$. By the chain rule\n  $\\mathrm{HasDerivAt}\\,\\varphi\\,\\bigl(v_\\eta(g_{z^*}(s))\\cdot w_{z^*}(s)\\bigr)\\,s$,\n  where $w_{z^*}=g_{z^*}'$ is continuous and strictly positive\n  (\\cref{lem:closing_family_props}); the product $v_\\varphi=\n  (v_\\eta\\circ g_{z^*})\\cdot w_{z^*}$ is therefore continuous and strictly positive,\n  so $\\varphi$ is $C^1$ with $\\varphi'>0$. Quasiperiodicity composes:\n  $\\varphi(s+2\\pi)=\\eta(g_{z^*}(s)+2\\pi)=\\eta(g_{z^*}(s))+2\\pi=\\varphi(s)+2\\pi$. By\n  \\cref{lem:exists_c1_circle_inverse} applied to $\\varphi$ (with derivative\n  $v_\\varphi$) there is a $C^1$ orientation-preserving quasiperiodic two-sided\n  inverse $\\psi$ with $\\psi'=1/v_\\varphi\\circ\\psi>0$.\n\n  \\emph{Assembly.} We have $\\kappa\\circ\\varphi=(\\kappa\\circ\\eta)\\circ g_{z^*}=k^*_{z^*}$,\n  and $K^*_{z^*}=\\tfrac{2\\pi}{I^*_{z^*}}\\kappa\\circ\\varphi$ with $I^*_{z^*}>0$ satisfies\n  (1.2) and (1.3); thus $\\kappa\\circ\\varphi$ is a non-normalised curvature function\n  (\\cref{def:non_normalised_curvature}) with positive total curvature. Feeding\n  $\\kappa$, $\\varphi$, $\\psi$ and all the $C^1$/positivity/quasiperiodicity/inverse\n  data to \\cref{thm:realizes_of_non_normalised} yields a simple closed curve $\\gamma$\n  with $\\mathrm{RealizesCurvature}\\,\\gamma\\,\\kappa$, completing the proof. (This is the\n  mixed-sign analogue of \\cref{thm:gluck_converse}, stated through the same\n  realization predicate per the unification directive.)\n", "lean_source": "theorem dahlbergConverse {κ : ℝ → ℝ} (h : MixedSignFourVertex κ) :\n    ∃ γ : ℝ → ℂ, IsSimpleClosed γ ∧ RealizesCurvature γ κ := by\n  have hpi : 0 < π := Real.pi_pos\n\n  have hκcont : Continuous κ := h.1\n  have hκper : Function.Periodic κ (2 * π) := h.2.1\n\n  obtain ⟨a, b, ha, hab, C, hC, hdiffeo⟩ : const katexMacros = {};   // blueprint-defined \newcommand etc.

const $ = id => document.getElementById(id);

// ── Graph structure: adjacency, degree, components ──────────────────────────

const succ = {}, pred = {}, deg = {};
for (const id in allNodes) { succ[id] = []; pred[id] = []; deg[id] = 0; }
for (const e of graphData.edges) {
  if (succ[e.from]) succ[e.from].push(e.to);
  if (pred[e.to])   pred[e.to].push(e.from);
  deg[e.from] = (deg[e.from] || 0) + 1;
  deg[e.to]   = (deg[e.to]   || 0) + 1;
}
const isOrphan = id => !(deg[id] > 0);

// weakly-connected components via union-find (orphans excluded)
const parent = {};
function find(x) { while (parent[x] !== x) x = parent[x] = parent[parent[x]]; return x; }
for (const id in allNodes) parent[id] = id;
for (const e of graphData.edges)
  if (parent[e.from] !== undefined && parent[e.to] !== undefined)
    parent[find(e.from)] = find(e.to);

const compMembers = {};
for (const id in allNodes) {
  if (isOrphan(id)) continue;
  const r = find(id);
  (compMembers[r] = compMembers[r] || []).push(id);
}
const components = Object.values(compMembers).sort((a, b) => b.length - a.length);
const compOf = {};
components.forEach((m, i) => m.forEach(id => compOf[id] = i));

// repulsion); layoutOrphans() grid-places them after each settle instead.
for (const vn of graphData.nodes) if (isOrphan(vn.id)) vn.physics = false;

    <div class="sep"></div>

    <div class="row"><span>Done</span><span class="v done">${fmt(done)}</span></div>
    <div class="row"><span>Remaining ≥</span><span class="v work">${fmt(remLower)}</span></div>
    <div class="row"><span>∞ nodes</span><span class="v inf">${infNodes}</span></div>
  `;
}
renderStats();

// a human label for each component: its highest-degree member
function compRepr(members) {
  let best = members[0];
  for (const id of members) if ((deg[id] || 0) > (deg[best] || 0)) best = id;
  return best.split(":").pop();
}

const chapters = [...new Set(
  Object.values(allNodes).map(n => n.chapter).filter(Boolean)
)].sort();

// ── Populate controls ───────────────────────────────────────────────────────

$("node-ids").innerHTML =
  Object.keys(allNodes).sort().map(id => `<option value="${id}">`).join("");

$("component").insertAdjacentHTML("beforeend",
  components.map((m, i) =>
    `<option value="${i}">#${i + 1} · ${m.length} nodes · ${compRepr(m)}</option>`
  ).join(""));

$("chapter").insertAdjacentHTML("beforeend",
  chapters.map(c => `<option value="${c.replace(/"/g, "&quot;")}">${c}</option>`).join(""));

// ── Visible-set state & computation ─────────────────────────────────────────

const state = { showOrphans: false, focus: null, component: null, chapter: null,
                nodeset: "union", fileview: "off" };

// Which universe a node belongs to. A node "has Lean" if it carries Lean source
// (lean_aux nodes always do; blueprint nodes do once their \lean{} resolved).
const hasLean    = n => n.type === "lean_aux" || !!(n.lean_source && n.lean_source.length);
const inBlueprint = n => n.type !== "lean_aux";
function inNodeset(id) {
  const n = allNodes[id];
  if (state.nodeset === "blueprint") return inBlueprint(n);
  if (state.nodeset === "lean")      return hasLean(n);
  return true;                                   // union
}

function coneOf(id) {
  const out = new Set([id]);
  const walk = (adj, start) => {
    const st = [start];
    while (st.length) {
      const x = st.pop();
      for (const y of (adj[x] || [])) if (!out.has(y)) { out.add(y); st.push(y); }
    }
  };
  walk(pred, id);   // everything this node (transitively) depends on
  walk(succ, id);   // everything that (transitively) depends on it
  return out;
}

// all transitive predecessors of id (its full upstream dependency set)
function ancestorsOf(id) {
  const out = new Set();
  const st = [...(pred[id] || [])];
  while (st.length) {
    const x = st.pop();
    if (!out.has(x)) { out.add(x); for (const y of (pred[x] || [])) st.push(y); }
  }
  return out;
}

function visibleSet() {
  if (state.focus && allNodes[state.focus]) {
    return new Set([...coneOf(state.focus)].filter(inNodeset));
  }
  let ids = Object.keys(allNodes).filter(inNodeset);
  if (!state.showOrphans)      ids = ids.filter(id => !isOrphan(id));
  if (state.component !== null) ids = ids.filter(id => compOf[id] === state.component);
  if (state.chapter)            ids = ids.filter(id => allNodes[id].chapter === state.chapter);
  return new Set(ids);
}

// ── Network ─────────────────────────────────────────────────────────────────

const nodesDS = new vis.DataSet();
const edgesDS = new vis.DataSet();

// Force-directed layout: connected nodes attract, so each declaration settles
// next to what it depends on. Direction is conveyed by the arrows, not columns.
const N_TOTAL = graphData.nodes.length;
const PHYSICS_OPTS = {
  enabled: true,
  solver: "forceAtlas2Based",
  forceAtlas2Based: {
    gravitationalConstant: -45, centralGravity: 0.012,
    springLength: 85, springConstant: 0.08,
    damping: 0.45, avoidOverlap: 0.7,
  },
  stabilization: { enabled: true, iterations: 300, updateInterval: 25, fit: false },
  minVelocity: 0.75, maxVelocity: 30,
};

const network = new vis.Network(
  $("graph"),
  { nodes: nodesDS, edges: edgesDS },
  {
    // physics does the placement; improvedLayout seeds it (skip on huge graphs)
    layout: { improvedLayout: N_TOTAL <= 250 },
    physics: { enabled: false },   // enabled per-apply, then frozen once settled
    edges: {
      smooth: { enabled: false },
      color: { color: "#cbd5e1", highlight: "#64748b" },
      arrows: { to: { scaleFactor: .55 } },
      width: 1,
    },
    nodes: { shape: "dot" },
    interaction: { hover: true, tooltipDelay: 150, zoomView: false },
  }
);

// Once a settle finishes, freeze the simulation (so the view is stable and
// draggable) and frame the result.
network.on("stabilizationIterationsDone", () => {
  network.setOptions({ physics: false });
  layoutOrphans();
  fitFloored();
});

// ── Isolated-node layout ──────────────────────────────────────────────────────
// Isolated nodes (no edges) are excluded from the force simulation — under pure
// repulsion they'd drift to the far edges and vanish at fit-zoom. Instead they
// are parked on a tidy grid beside the connected graph so they stay visible.

function layoutOrphans() {
  if (state.focus || !state.showOrphans) return;
  const ids = nodesDS.getIds().filter(id => isOrphan(id));
  if (!ids.length) return;
  const pos  = network.getPositions();
  const conn = nodesDS.getIds().filter(id => !isOrphan(id));
  const spacing = 46;
  const cols = Math.max(1, Math.ceil(Math.sqrt(ids.length)));
  const gridW = (cols - 1) * spacing;
  let centerX, topY;
  if (conn.length) {
    const xs = conn.map(id => pos[id].x), ys = conn.map(id => pos[id].y);
    centerX = (Math.min(...xs) + Math.max(...xs)) / 2;
    topY    = Math.max(...ys) + 120;     // a tidy block just below the cluster
  } else { centerX = 0; topY = 0; }
  const startX = centerX - gridW / 2;    // centred, so a full fit frames it all
  ids.sort();
  ids.forEach((id, i) =>
    network.moveNode(id, startX + (i % cols) * spacing,
                         topY + Math.floor(i / cols) * spacing));
}

// ── File-view background ──────────────────────────────────────────────────────
// An optional, subtle background tint that groups nodes by their source file.
// Each node seeds its file's colour; every background pixel takes the colour of
// the nearest node — an exact Voronoi map (spatial-hash accelerated) rendered at
// high resolution for clean, anti-aliased borders, then drawn behind the graph
// and extended to the whole viewport. Nodes keep their effort colours on top.

const fileOf = (n, mode) => mode === "lean" ? (n.lean_file || "") : (n.tex_file || "");

// A curated, perceptually-distinct palette (d3 category20-style). A file's
// colour is chosen by hashing its *name*, so it is stable no matter how the
// graph is filtered, focused or re-laid out — and adjacent files stay easy to
// tell apart. Projects with more files than the palette wrap to a darker /
// lighter tier so the wrapped entries remain distinguishable.
const FILE_PALETTE = [
  [31,119,180],[255,127,14],[44,160,44],[214,39,40],[148,103,189],
  [140,86,75],[227,119,194],[188,189,34],[23,190,207],[127,205,187],
  [174,199,232],[255,187,120],[152,223,138],[255,152,150],[197,176,213],
  [196,156,148],[247,182,210],[252,146,114],[219,219,141],[158,218,229],
];
function hashStr(s) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
const _SLOTS = FILE_PALETTE.length * 3;          // 20 hues × 3 lightness tiers
function slotColor(slot) {
  const base = FILE_PALETTE[slot % FILE_PALETTE.length];
  const tier = Math.floor(slot / FILE_PALETTE.length) % 3;   // 0 normal · 1 dark · 2 light
  return tier === 1 ? base.map(v => Math.round(v * 0.68))
       : tier === 2 ? base.map(v => Math.round(v + (255 - v) * 0.45))
       : base.slice();
}
// Per-mode slot assignment: each file's preferred slot is its name-hash; exact
// collisions within the same mode are bumped to the next free slot. So every
// file in a mode gets a distinct colour (up to _SLOTS files), the colour is
// driven by the name, and it never shifts under focus/reset/filtering (the file
// set is fixed for the session, and the map is cached).
const _fileSlots = {};
function ensureFileSlots(mode) {
  if (_fileSlots[mode]) return _fileSlots[mode];
  const files = Object.keys(fileCounts(mode)).sort();
  const used = new Set(), map = {};
  for (const f of files) {
    let slot = hashStr(f) % _SLOTS, t = 0;
    while (used.has(slot) && t < _SLOTS) { slot = (slot + 1) % _SLOTS; t++; }
    used.add(slot); map[f] = slot;
  }
  return (_fileSlots[mode] = map);
}
function colorRGB(file) {
  const map = ensureFileSlots(state.fileview);
  const slot = (file in map) ? map[file] : hashStr(file) % _SLOTS;
  return slotColor(slot);
}

function fileCounts(mode) {
  const counts = {};
  for (const id in allNodes) {
    const f = fileOf(allNodes[id], mode);
    if (f) counts[f] = (counts[f] || 0) + 1;
  }
  return counts;
}

let fileBg = null;            // {canvas, minX, minY, w, h, W, H} in graph coords

function rebuildFileBg(quick) {
  const mode = state.fileview;
  if (mode === "off") { fileBg = null; network.redraw(); renderFileLegend(); return; }

  const pos = network.getPositions();
  const ids = Object.keys(pos).filter(id => allNodes[id] && fileOf(allNodes[id], mode));
  if (!ids.length) { fileBg = null; network.redraw(); renderFileLegend(); return; }

  const xs = ids.map(id => pos[id].x), ys = ids.map(id => pos[id].y);
  const pad = 70;
  const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + pad;
  const minY = Math.min(...ys) - pad, maxY = Math.max(...ys) + pad;
  const wG = Math.max(1, maxX - minX), hG = Math.max(1, maxY - minY);

  // High-res grid → straight, finely anti-aliased borders; a coarser grid is
  // used for the live updates while nodes are still moving, for speed.
  const target = quick ? 224 : 512;
  const scale  = target / Math.max(wG, hG);
  const W = Math.max(1, Math.round(wG * scale)), H = Math.max(1, Math.round(hG * scale));

  const seeds = ids.map(id => {
    const [r, g, b] = colorRGB(fileOf(allNodes[id], mode));
    return { x: pos[id].x, y: pos[id].y, r, g, b };
  });

  // Bucket the seeds so each pixel's nearest-seed search is ~O(1).
  const gcols = Math.max(1, Math.round(Math.sqrt(seeds.length)));
  const grows = gcols;
  const cw = wG / gcols, ch = hG / grows;
  const buckets = Array.from({ length: gcols * grows }, () => []);
  const clampC = (v, hi) => Math.min(hi, Math.max(0, v));
  for (const s of seeds) {
    const cx = clampC(Math.floor((s.x - minX) / cw), gcols - 1);
    const cy = clampC(Math.floor((s.y - minY) / ch), grows - 1);
    buckets[cy * gcols + cx].push(s);
  }
  const cellMin = Math.min(cw, ch), maxR = Math.max(gcols, grows);
  function nearest(wx, wy) {
    const cx = clampC(Math.floor((wx - minX) / cw), gcols - 1);
    const cy = clampC(Math.floor((wy - minY) / ch), grows - 1);
    let best = Infinity, bs = seeds[0];
    for (let r = 0; r <= maxR; r++) {
      const x0 = Math.max(0, cx - r), x1 = Math.min(gcols - 1, cx + r);
      const y0 = Math.max(0, cy - r), y1 = Math.min(grows - 1, cy + r);
      for (let yy = y0; yy <= y1; yy++) {
        const edgeRow = (yy === cy - r || yy === cy + r);
        for (let xx = x0; xx <= x1; xx++) {
          if (r > 0 && !edgeRow && xx !== cx - r && xx !== cx + r) continue;
          for (const s of buckets[yy * gcols + xx]) {
            const dx = s.x - wx, dy = s.y - wy, d = dx * dx + dy * dy;
            if (d < best) { best = d; bs = s; }
          }
        }
      }
      // Stop once the closest hit is nearer than any not-yet-scanned ring.
      if (best < Infinity && Math.sqrt(best) <= r * cellMin) break;
    }
    return bs;
  }

  const cv = document.createElement("canvas");
  cv.width = W; cv.height = H;
  const ctx = cv.getContext("2d");
  const img = ctx.createImageData(W, H), data = img.data;
  for (let gy = 0; gy < H; gy++) {
    const wy = minY + (gy + 0.5) / H * hG;
    for (let gx = 0; gx < W; gx++) {
      const wx = minX + (gx + 0.5) / W * wG;
      const s = nearest(wx, wy);
      const o = (gy * W + gx) * 4;
      data[o] = s.r; data[o + 1] = s.g; data[o + 2] = s.b; data[o + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  fileBg = { canvas: cv, minX, minY, w: wG, h: hG, W, H };
  network.redraw();
  renderFileLegend();
}

// beforeDrawing runs in graph coordinates, so the cached bitmap pans and zooms
// with the view automatically. The seed bbox is filled with the Voronoi map, and
// the colours of its edge pixels are extended outward to cover the *whole*
// viewport — so the tint follows the nearest-node rule everywhere, not just a
// central square.
network.on("beforeDrawing", ctx => {
  if (!fileBg) return;
  const c = fileBg.canvas, W = fileBg.W, H = fileBg.H;
  const x0 = fileBg.minX, y0 = fileBg.minY, x1 = x0 + fileBg.w, y1 = y0 + fileBg.h;
  const tl = network.DOMtoCanvas({ x: 0, y: 0 });
  const br = network.DOMtoCanvas({ x: $("graph").clientWidth, y: $("graph").clientHeight });
  const L = Math.min(tl.x, br.x), R = Math.max(tl.x, br.x);
  const T = Math.min(tl.y, br.y), B = Math.max(tl.y, br.y);

  ctx.save();
  ctx.globalAlpha = 0.32;                 // visible but still a background tint
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(c, x0, y0, fileBg.w, fileBg.h);                          // centre
  if (L < x0) ctx.drawImage(c, 0, 0, 1, H, L, y0, x0 - L, fileBg.h);     // left
  if (R > x1) ctx.drawImage(c, W - 1, 0, 1, H, x1, y0, R - x1, fileBg.h);// right
  if (T < y0) ctx.drawImage(c, 0, 0, W, 1, x0, T, fileBg.w, y0 - T);     // top
  if (B > y1) ctx.drawImage(c, 0, H - 1, W, 1, x0, y1, fileBg.w, B - y1);// bottom
  if (L < x0 && T < y0) ctx.drawImage(c, 0, 0, 1, 1, L, T, x0 - L, y0 - T);
  if (R > x1 && T < y0) ctx.drawImage(c, W - 1, 0, 1, 1, x1, T, R - x1, y0 - T);
  if (L < x0 && B > y1) ctx.drawImage(c, 0, H - 1, 1, 1, L, y1, x0 - L, B - y1);
  if (R > x1 && B > y1) ctx.drawImage(c, W - 1, H - 1, 1, 1, x1, y1, R - x1, B - y1);
  ctx.restore();
});

function renderFileLegend() {
  const panel = $("file-legend"), mode = state.fileview;
  if (mode === "off") { panel.style.display = "none"; return; }
  panel.style.display = "block";
  const label = mode === "lean" ? "Lean" : "LaTeX";
  const counts = fileCounts(mode);
  const files = Object.keys(counts).sort();
  if (!files.length) {
    panel.innerHTML = `<h4>${label} files</h4>` +
      `<div class="fl-empty">no ${label} file info available</div>`;
    return;
  }
  panel.innerHTML = `<h4>${label} files · ${files.length}</h4>` + files.map(f => {
    const [r, g, b] = colorRGB(f);
    return `<div class="fl-row">` +
      `<span class="fl-sw" style="background:rgb(${r},${g},${b})"></span>` +
      `<span class="fl-name" title="${esc(f)}">${esc(f)}</span>` +
      `<span class="fl-n">${counts[f]}</span></div>`;
  }).join("");
}

// Recompute the tint *while* the layout changes, so the regions move with the
// nodes rather than snapping only once at the end: throttled coarse rebuilds
// during stabilization and dragging, then a final full-resolution pass.
let _liveLast = 0;
function liveFileBg() {
  if (state.fileview === "off") return;
  const now = Date.now();
  if (now - _liveLast < 110) return;
  _liveLast = now;
  rebuildFileBg(true);
}
network.on("stabilizationProgress", liveFileBg);
network.on("dragging", liveFileBg);
network.on("dragEnd", () => { if (state.fileview !== "off") rebuildFileBg(); });

// ── Navigation: swipe = pan · Ctrl+scroll / pinch = zoom ─────────────────────

let ZOOM_MIN = 0.05;
const ZOOM_MAX = 3.0;
const FIT_FLOOR = 0.34;          // never auto-zoom below this — keeps nodes legible
let graphBounds = null;

function recomputeBounds() {
  const pts = Object.values(network.getPositions());
  if (pts.length) {
    const pad = 200;
    graphBounds = {
      left:   Math.min(...pts.map(p => p.x)) - pad,
      right:  Math.max(...pts.map(p => p.x)) + pad,
      top:    Math.min(...pts.map(p => p.y)) - pad,
      bottom: Math.max(...pts.map(p => p.y)) + pad,
    };
  } else graphBounds = null;
}

function fitFloored() {
  network.fit({ animation: false });
  const fitScale = network.getScale();
  // The most-zoomed-out limit tracks the graph's actual extent — a little past
  // the scale at which everything fits — instead of a fixed floor. So a small
  // graph can't be shrunk to a speck, and a huge one can still reach overview.
  ZOOM_MIN = Math.max(0.02, Math.min(fitScale * 0.7, ZOOM_MAX));
  // For very large graphs `fit` is sub-pixel; don't *start* there (keeps nodes
  // legible) but still allow zooming out to it. When isolated nodes are shown we
  // fully fit instead, so their (potentially large) block is actually visible.
  if (!state.showOrphans && fitScale < FIT_FLOOR)
    network.moveTo({ scale: FIT_FLOOR, animation: false });
  recomputeBounds();
  rebuildFileBg();   // node positions just changed — refresh the file tint
}

$("graph").addEventListener("wheel", e => {
  e.preventDefault();
  e.stopPropagation();
  const pos = network.getViewPosition();
  const sc  = network.getScale();
  if (e.ctrlKey) {
    const f        = e.deltaY > 0 ? 0.9 : 1 / 0.9;
    const newScale = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, sc * f));
    network.moveTo({ scale: newScale, animation: false });
  } else {
    let nx = pos.x + e.deltaX / sc;
    let ny = pos.y + e.deltaY / sc;
    if (graphBounds) {
      nx = Math.max(graphBounds.left, Math.min(graphBounds.right,  nx));
      ny = Math.max(graphBounds.top,  Math.min(graphBounds.bottom, ny));
    }
    network.moveTo({ position: { x: nx, y: ny }, animation: false });
  }
}, { capture: true, passive: false });

// ── Apply current filter state to the canvas ────────────────────────────────

function apply() {
  const vis   = visibleSet();
  const nodes = graphData.nodes.filter(n => vis.has(n.id));
  const edges = graphData.edges.filter(e => vis.has(e.from) && vis.has(e.to));

  nodesDS.clear(); edgesDS.clear();
  nodesDS.add(nodes); edgesDS.add(edges);

  $("stat").innerHTML =
    `${nodes.length} / ${graphData.nodes.length} nodes &middot; ${edges.length} edges`;

  const pill = $("focus-pill");
  if (state.focus) {
    pill.style.display = "inline-flex";
    pill.querySelector(".lbl").textContent = "focus: " + state.focus.split(":").pop();
  } else {
    pill.style.display = "none";
  }

  // Re-settle the now-visible subset; the stabilization handler freezes and
  // fits when it finishes. With nothing to simulate (a lone node, or only
  // isolated nodes — which are physics:false) we lay out and fit directly.
  const anyPhysics = nodes.some(n => n.physics !== false);
  if (nodes.length > 1 && anyPhysics) {
    network.setOptions({ physics: PHYSICS_OPTS });
  } else {
    setTimeout(() => { layoutOrphans(); fitFloored(); }, 0);
  }
}

function syncControls() {
  $("orphans").checked  = state.showOrphans;
  $("nodeset").value    = state.nodeset;
  $("fileview").value   = state.fileview;
  $("component").value  = state.component === null ? "" : String(state.component);
  $("chapter").value    = state.chapter || "";
}

// ── Reveal-aware navigation ─────────────────────────────────────────────────

function goTo(id) {
  if (!allNodes[id]) return;
  if (!visibleSet().has(id)) {            // relax filters until the node is shown
    state.focus = null;
    state.component = null;
    state.chapter = null;
    if (!inNodeset(id)) state.nodeset = "union";
    if (isOrphan(id)) state.showOrphans = true;
    syncControls();
    apply();
  }
  setTimeout(() => jumpTo(id), 70);
}

function jumpTo(id) {
  if (!allNodes[id]) return;
  network.selectNodes([id]);
  network.focus(id, { scale: 1.2, animation: { duration: 400, easingFunction: "easeInOutQuad" } });
  renderNode(id);
  highlightCone(id);
}

function setFocus(id) {
  if (!allNodes[id]) return;
  state.focus = id;
  apply();
  renderNode(id);
  setTimeout(() => jumpTo(id), 70);
}

function clearFocus() { state.focus = null; apply(); }

function resetView() {
  state.showOrphans = false;
  state.focus = null;
  state.component = null;
  state.chapter = null;
  state.nodeset = "union";
  $("search").value = "";
  syncControls();
  apply();
}

// ── Control wiring ──────────────────────────────────────────────────────────

$("orphans").addEventListener("change", e => {
  state.showOrphans = e.target.checked; state.focus = null; apply();
});
$("nodeset").addEventListener("change", e => {
  state.nodeset = e.target.value; state.focus = null; apply();
});
$("component").addEventListener("change", e => {
  state.component = e.target.value === "" ? null : Number(e.target.value);
  state.focus = null; apply();
});
$("chapter").addEventListener("change", e => {
  state.chapter = e.target.value || null; state.focus = null; apply();
});
$("fileview").addEventListener("change", e => {
  state.fileview = e.target.value; rebuildFileBg();
});
$("search").addEventListener("change", e => {
  const v = e.target.value.trim();
  if (allNodes[v]) goTo(v);
});
$("reset").addEventListener("click", resetView);
$("focus-pill").addEventListener("click", clearFocus);

// ── Lean syntax highlighter ─────────────────────────────────────────────────

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const _KW      = /\b(def|lemma|theorem|instance|class|structure|inductive|abbrev|noncomputable|private|protected|section|namespace|end|open|variable|where|do|let|have|show|suffices|calc|if|then|else|return|for|in|fun|match|with|by|sorry)\b/g;
const _TACTIC  = /\b(simp|ext|rfl|exact|intro|intros|apply|refine|constructor|use|rw|rewrite|rcases|rintro|obtain|push_neg|norm_num|ring|group|linarith|omega|decide|trivial|assumption|congr|tauto|aesop|cases|induction|revert|clear|next|all_goals|repeat|try|first|solve|fin_cases|positivity|gcongr|field_simp)\b/g;
const _TYPE    = /\b(Nat|Int|Bool|String|List|Array|Option|Type|Prop|Sort|True|False|And|Or|Not|Iff|Eq|Subgroup|Group|Ring|Field|Fintype|Finite)\b/g;
const _NUM     = /\b(\d+)\b/g;
const _STR     = /("(?:[^"\\]|\\.)*")/g;

function highlightLean(raw) {
  return raw.split('\n').map(line => {
    let commentAt = -1;
    let inStr = false;
    for (let i = 0; i < line.length - 1; i++) {
      if (line[i] === '"' && (i === 0 || line[i-1] !== '\\')) inStr = !inStr;
      if (!inStr && line[i] === '-' && line[i+1] === '-') { commentAt = i; break; }
    }
    const code    = commentAt >= 0 ? line.slice(0, commentAt) : line;
    const comment = commentAt >= 0 ? line.slice(commentAt)    : '';
    let h = esc(code);
    h = h.replace(_STR,    m => `<span class="hl-str">${m}</span>`);
    h = h.replace(_KW,     m => `<span class="hl-kw">${m}</span>`);
    h = h.replace(_TACTIC, m => `<span class="hl-tactic">${m}</span>`);
    h = h.replace(_TYPE,   m => `<span class="hl-type">${m}</span>`);
    h = h.replace(_NUM,    m => `<span class="hl-num">${m}</span>`);
    const commentHtml = comment ? `<span class="hl-comment">${esc(comment)}</span>` : '';
    return h + commentHtml;
  }).join('\n');
}

// ── LaTeX renderer ───────────────────────────────────────────────────────────

function processNonMath(s) {
  return esc(s)
    .replace(/\\emph\{([^}]*)\}/g,   '<em>$1</em>')
    .replace(/\\textbf\{([^}]*)\}/g, '<strong>$1</strong>')
    .replace(/\\textit\{([^}]*)\}/g, '<em>$1</em>')
    .replace(/\\text\{([^}]*)\}/g,   '$1');
}

function renderLatex(el, text) {
  if (!text || !text.trim()) {
    el.classList.add('empty'); el.textContent = '—'; return;
  }
  // Match every math delimiter style leanblueprint uses: $$…$$ and \[…\]
  // (display) and \(…\) and $…$ (inline). $$ and \[ \] come first so the
  // single-$ branch can't grab a $$ opener.
  const re = /(\$\$[\s\S]*?\$\$|\\\[[\s\S]*?\\\]|\\\([\s\S]*?\\\)|\$(?:[^$\\]|\\.)+?\$)/g;
  let html = '', last = 0, m;
  while ((m = re.exec(text)) !== null) {
    html += processNonMath(text.slice(last, m.index));
    const raw = m[0];
    let disp, math;
    if      (raw.startsWith('$$'))  { disp = true;  math = raw.slice(2, -2); }
    else if (raw.startsWith('\\[')) { disp = true;  math = raw.slice(2, -2); }
    else if (raw.startsWith('\\(')) { disp = false; math = raw.slice(2, -2); }
    else                            { disp = false; math = raw.slice(1, -1); }
    if (window.katex) {
      try {
        html += katex.renderToString(math, {
          displayMode: disp, throwOnError: false, macros: katexMacros,
        });
      }
      catch (_) { html += esc(raw); }
    } else {
      html += `<span style="color:#94a3b8">${esc(raw)}</span>`;
    }
    last = re.lastIndex;
  }
  html += processNonMath(text.slice(last));
  el.innerHTML = html;
}

// ── Sidebar rendering ────────────────────────────────────────────────────────

function charVal(v) {
  if (v === null || v === undefined) return '<span class="m-val m-inf">∞</span>';
  return `<span class="m-val">${v.toLocaleString()}</span>`;
}
function workVal(v) {
  if (v === null || v === undefined) return '<span class="m-val m-inf">∞</span>';
  if (v === 0) return '<span class="m-val m-done">0 ✓</span>';
  return `<span class="m-val m-work">${v.toLocaleString()}</span>`;
}
function charsPair(rel, cum) {
  const f = v => (v === null || v === undefined)
    ? '<span class="chars-inf">∞</span>'
    : `<span class="chars-val">${v}</span>`;
  return `<span class="chars-pair">ℓ<sub>local</sub>=${f(rel)} &nbsp; ℓ<sub>total</sub>=${f(cum)}</span>`;
}

function renderNode(id) {
  const n = allNodes[id];
  if (!n) return;

  $("sidebar-empty").style.display = "none";
  const content = $("sidebar-content");
  content.style.display = "flex";

  const statusBadge = n.proved
    ? '<span class="badge badge-proved">✓ leanok</span>'
    : (n.mathlib_ok
        ? '<span class="badge badge-proved">ⓜ mathlib</span>'
        : (n.has_sorry
            ? '<span class="badge badge-sorry">sorry</span>'
            : '<span class="badge badge-unproved">unproved</span>'));

  const mkChip = u => `<span class="dep-chip" onclick="goTo('${esc(u)}')">${esc(u)}</span>`;
  const depsHtml = n.uses.length
    ? n.uses.map(mkChip).join('')
    : '<span class="no-deps">none — axiom</span>';

  // full transitive upstream, with the direct deps split out
  const anc       = ancestorsOf(id);
  const directSet = new Set(n.uses);
  const indirect  = [...anc].filter(x => !directSet.has(x)).sort();
  const transHtml = indirect.length
    ? indirect.map(mkChip).join('')
    : '<span class="no-deps">none beyond the direct ones</span>';

  const focusLabel = state.focus === id ? 'Clear focus' : 'Focus dependency cone';
  const focusCall  = state.focus === id ? 'clearFocus()' : `setFocus('${esc(id)}')`;

  content.innerHTML = `
    <div class="card">
      <div class="node-badges">
        <span class="badge badge-type">${n.type.toUpperCase()}</span>${statusBadge}
      </div>
      <div class="node-title">${esc(n.title || n.id)}</div>
      <div class="node-id">${esc(n.id)}</div>
      ${n.chapter   ? `<div class="node-chapter">§ ${esc(n.chapter)}</div>` : ''}
      ${n.lean_name ? `<div class="lean-ref">Lean: <code>${esc(n.lean_name)}</code></div>` : ''}
      ${n.tex_file  ? `<div class="lean-ref">tex: <code>${esc(n.tex_file)}</code></div>` : ''}
      ${n.lean_file ? `<div class="lean-ref">file: <code>${esc(n.lean_file)}</code></div>` : ''}
      <button class="btn-focus" onclick="${focusCall}">⊙ ${focusLabel}</button>
    </div>

    <div class="card">
      <div class="card-title">Structure</div>
      <div class="degrees">
        <div class="degree">
          <span class="degree-val">${n.dep_count}</span>
          <span class="degree-label">direct deps</span>
        </div>
        <div class="degree">
          <span class="degree-val">${anc.size}</span>
          <span class="degree-label">total upstream</span>
        </div>
        <div class="degree">
          <span class="degree-val">${n.rdep_count}</span>
          <span class="degree-label">used by</span>
        </div>
      </div>
      <div class="deps-sub">direct dependencies</div>
      <div class="deps-list">${depsHtml}</div>
      <div class="deps-sub">indirect (transitive) dependencies</div>
      <div class="deps-list">${transHtml}</div>
    </div>

    <div class="card">
      <div class="card-title">Complexity</div>
      <div class="metrics-grid">
        <span></span>
        <span class="col-head">local</span>
        <span class="col-head">total</span>
        <span class="m-label">LaTeX ℓ</span>${charVal(n.proof_size_tex)}${charVal(n.proof_size_tex_total)}
        <span class="m-label">Lean ℓ</span>${charVal(n.proof_size_lean)}${charVal(n.proof_size_lean_total)}
        <span class="m-label">Effort</span>${workVal(n.effort_local)}${workVal(n.effort_total)}
      </div>
    </div>

    <div class="card">
      <div class="sec-hdr"><span class="card-title" style="margin:0">LaTeX statement</span></div>
      <div class="latex-rendered" id="latex-stmt"></div>
    </div>

    <div class="card">
      <div class="sec-hdr">
        <span class="card-title" style="margin:0">LaTeX proof</span>
        ${charsPair(n.proof_size_tex, n.proof_size_tex_total)}
      </div>
      <div class="latex-rendered" id="latex-proof"></div>
    </div>

    <div class="card">
      <div class="sec-hdr">
        <span class="card-title" style="margin:0">Lean code</span>
        ${charsPair(n.proof_size_lean, n.proof_size_lean_total)}
      </div>
      <pre class="code-block" id="lean-code"></pre>
    </div>
  `;

  renderLatex($('latex-stmt'),  n.statement);
  renderLatex($('latex-proof'), n.proof_tex ? n.proof_tex.trim() : '');

  const leanEl = $('lean-code');
  if (n.lean_source) {
    leanEl.innerHTML = highlightLean(n.lean_source);
  } else {
    leanEl.classList.add('empty');
    leanEl.textContent = 'declaration not found';
  }
}

// ── Cone highlighting on click ───────────────────────────────────────────────
// Selecting a node lights up its WHOLE transitive cone — every ancestor and
// descendant and the edges between them — while everything else fades back.

const baseNodeById = {};
for (const vn of graphData.nodes) baseNodeById[vn.id] = vn;

const EDGE_BASE = { color: "#cbd5e1", highlight: "#64748b" };

function highlightCone(id) {
  const cone = coneOf(id);   // {id} ∪ ancestors ∪ descendants
  nodesDS.update(nodesDS.getIds().map(nid =>
    cone.has(nid)
      ? baseNodeById[nid]                                   // full styling
      : { id: nid, color: { background: "#e5e7eb", border: "#d1d5db" },
          font: { color: "#cbd5e1" } }                      // faded
  ));
  edgesDS.update(edgesDS.get().map(e => {
    const on = cone.has(e.from) && cone.has(e.to);
    return { id: e.id,
             color: on ? { color: "#475569", highlight: "#334155" } : { color: "#edf0f4" },
             width: on ? 2.5 : 1 };
  }));
}

function clearHighlight() {
  nodesDS.update(nodesDS.getIds().map(nid => baseNodeById[nid]));
  edgesDS.update(edgesDS.get().map(e => ({ id: e.id, color: EDGE_BASE, width: 1 })));
}

network.on("click", params => {
  if (params.nodes.length) { renderNode(params.nodes[0]); highlightCone(params.nodes[0]); }
  else                     { clearHighlight(); }
});
network.on("doubleClick", params => { if (params.nodes.length) setFocus(params.nodes[0]); });

// ── Initial render ───────────────────────────────────────────────────────────

apply();
</script>
</body>
