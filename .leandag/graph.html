y\n  have hz : (∫ s in (δ / 2)..θ, tentBump δ 0 s) = 0 := by\n    apply tentBump_integral_zero_of_forall\n    intro s hs\n    rw [Set.uIcc_of_le (by linarith)] at hs\n    apply tentBump_eq_zero_of_cos_le hδ hδ'\n    rw [sub_zero]\n    exact cos_le_cos_half hδ hδ' hs.1 (by linarith [hs.2])\n  rw [← intervalIntegral.integral_add_adjacent_intervals (b := δ / 2)\n        ((tentBump_continuous δ 0).intervalIntegrable _ _)\n        ((tentBump_continuous δ 0).intervalIntegrable _ _),\n      tentBump_integral_right hδ hδ', hz]\n  ring\n\nprivate lemma tentBump_integral_period {δ : ℝ} (hδ : 0 < δ) (hδ' : δ < π) (τ : ℝ) :\n    (∫ θ in (τ - π)..(τ + π), tentBump δ τ θ) = δ / 2 := by\n  have hz1 : (∫ θ in (τ - π)..(τ - δ / 2), tentBump δ τ θ) = 0 := by\n    apply tentBump_integral_zero_of_forall\n    intro s hs\n    rw [Set.uIcc_of_le (by linarith)] at hs\n    apply tentBump_eq_zero_of_cos_le hδ hδ'\n    have habs : |s - τ| = τ - s := by rw [abs_of_nonpos (by linarith [hs.2])]; ring\n    rw [← Real.cos_abs, habs]\n    exact Real.cos_le_cos_of_nonneg_of_le_pi (by positivity) (by linarith [hs.1])\n      (by linarith [hs.2])\n  have hz2 : (∫ θ in (τ + δ / 2)..(τ + π), tentBump δ τ θ) = 0 := by\n    apply tentBump_integral_zero_of_forall\n    intro s hs\n    rw [Set.uIcc_of_le (by linarith)] at hs\n    apply tentBump_eq_zero_of_cos_le hδ hδ'\n    rw [← Real.cos_abs, abs_of_nonneg (by linarith [hs.1])]\n    exact Real.cos_le_cos_of_nonneg_of_le_pi (by positivity) (by linarith [hs.2])\n      (by linarith [hs.1])\n  rw [← intervalIntegral.integral_add_adjacent_intervals (b := τ - δ / 2)\n        ((tentBump_continuous δ τ).intervalIntegrable _ _)\n        ((tentBump_continuous δ τ).intervalIntegrable _ _),\n      ← intervalIntegral.integral_add_adjacent_intervals (a := τ - δ / 2) (b := τ + δ / 2)\n        ((tentBump_continuous δ τ).intervalIntegrable _ _)\n        ((tentBump_continuous δ τ).intervalIntegrable _ _),\n      tentBump_integral_support hδ hδ', hz1, hz2]\n  ring\n\nprivate lemma tentBump_integral_two_pi {δ : ℝ} (hδ : 0 < δ) (hδ' : δ < π) (τ : ℝ) :\n    (∫ θ in (0 : ℝ)..(2 * π), tentBump δ τ θ) = δ / 2 := by\n  have hper := (tentBump_periodic δ τ).intervalIntegral_add_eq 0 (τ - π)\n  rw [zero_add] at hper\n  rw [hper, show τ - π + 2 * π = τ + π by ring]\n  exact tentBump_integral_period hδ hδ' τ\n\nset_option maxHeartbeats 1600000 in", "proof_size_lean": 17507, "has_sorry": false, "tex_file": "chapters/Gluck_StepReduction.tex", "lean_file": "Gluck/StepReduction.lean", "dep_count": 0, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 949, "effort_local": 0, "proof_size_tex_total": 949, "proof_size_lean_total": 17507, "effort_total": 0}, "lem:exists_plateau_radius": {"id": "lem:exists_plateau_radius", "type": "lemma", "title": "Existence of a common plateau radius", "chapter": "Reduction to a four-arc step function", "statement": "Project-bespoke. Given four positive moduli $\\eta_1,\\eta_2,\\eta_3,\\eta_4>0$ and\n  four positive gaps $g_1,g_2,g_3,g_4>0$, there is a single positive radius\n  $\\eta>0$ with $\\eta\\le\\eta_i$ for every $i$ and $\\eta<g_j$ for every $j$.", "uses": [], "lean_name": "Gluck.exists_plateau_radius", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Take $\\eta=\\tfrac12\\min(\\eta_1,\\eta_2,\\eta_3,\\eta_4,g_1,g_2,g_3,g_4)$. The\n  minimum of finitely many positive numbers is positive, so $\\eta>0$. As $\\eta$\n  is half that minimum it satisfies $\\eta\\le\\min\\le\\eta_i$ for each $i$ and\n  $\\eta<\\min\\le g_j$ for each $j$ (the inequality against each $g_j$ is strict\n  because halving a positive number drops it strictly below itself).\n", "lean_source": "private lemma exists_plateau_radius {η₁ η₂ η₃ η₄ g₁ g₂ g₃ g₄ : ℝ}\n    (hη₁ : 0 < η₁) (hη₂ : 0 < η₂) (hη₃ : 0 < η₃) (hη₄ : 0 < η₄)\n    (hg₁ : 0 < g₁) (hg₂ : 0 < g₂) (hg₃ : 0 < g₃) (hg₄ : 0 < g₄) :\n    ∃ η : ℝ, 0 < η ∧ η ≤ η₁ ∧ η ≤ η₂ ∧ η ≤ η₃ ∧ η ≤ η₄ ∧\n      η < g₁ ∧ η < g₂ ∧ η < g₃ ∧ η < g₄ := by\n  set M : ℝ := min (min (min η₁ η₂) (min η₃ η₄)) (min (min g₁ g₂) (min g₃ g₄)) with hMdef\n  have hMle₁ : M ≤ η₁ := le_trans (min_le_left _ _) (le_trans (min_le_left _ _) (min_le_left _ _))\n  have hMle₂ : M ≤ η₂ := le_trans (min_le_left _ _) (le_trans (min_le_left _ _) (min_le_right _ _))\n  have hMle₃ : M ≤ η₃ := le_trans (min_le_left _ _) (le_trans (min_le_right _ _) (min_le_left _ _))\n  have hMle₄ : M ≤ η₄ := le_trans (min_le_left _ _) (le_trans (min_le_right _ _) (min_le_right _ _))\n  have hMg₁ : M ≤ g₁ := le_trans (min_le_right _ _) (le_trans (min_le_left _ _) (min_le_left _ _))\n  have hMg₂ : M ≤ g₂ := le_trans (min_le_right _ _) (le_trans (min_le_left _ _) (min_le_right _ _))\n  have hMg₃ : M ≤ g₃ := le_trans (min_le_right _ _) (le_trans (min_le_right _ _) (min_le_left _ _))\n  have hMg₄ : M ≤ g₄ := le_trans (min_le_right _ _) (le_trans (min_le_right _ _) (min_le_right _ _))\n  have hMpos : 0 < M := by\n    rw [hMdef]\n    exact lt_min (lt_min (lt_min hη₁ hη₂) (lt_min hη₃ hη₄))\n      (lt_min (lt_min hg₁ hg₂) (lt_min hg₃ hg₄))\n  exact ⟨M / 2, by linarith, by linarith, by linarith, by linarith, by linarith,\n    by linarith, by linarith, by linarith, by linarith⟩\n\nset_option maxHeartbeats 1000000 in", "proof_size_lean": 1513, "has_sorry": false, "tex_file": "chapters/Gluck_StepReduction.tex", "lean_file": "Gluck/StepReduction.lean", "dep_count": 0, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 378, "effort_local": 0, "proof_size_tex_total": 378, "proof_size_lean_total": 1513, "effort_total": 0}, "lem:plateau_union_measure": {"id": "lem:plateau_union_measure", "type": "lemma", "title": "Total measure of the four plateau intervals", "chapter": "Reduction to a four-arc step function", "statement": "Project-bespoke. For $0<\\delta<\\pi/2$ the four flanking plateau intervals\n  \\[\n    \\Bigl[\\tfrac{\\delta}{2},\\,\\tfrac{\\pi}{2}-\\tfrac{\\delta}{2}\\Bigr],\\quad\n    \\Bigl[\\tfrac{\\pi}{2}+\\tfrac{\\delta}{2},\\,\\pi-\\tfrac{\\delta}{2}\\Bigr],\\quad\n    \\Bigl[\\pi+\\tfrac{\\delta}{2},\\,\\tfrac{3\\pi}{2}-\\tfrac{\\delta}{2}\\Bigr],\\quad\n    \\Bigl[\\tfrac{3\\pi}{2}+\\tfrac{\\delta}{2},\\,2\\pi-\\tfrac{\\delta}{2}\\Bigr],\n  \\]\n  each of length $\\pi/2-\\delta$ and separated by the four $\\delta$-wide ``race''\n  sub-arcs, have total Lebesgue measure $2\\pi-4\\delta$.", "uses": [], "lean_name": "Gluck.plateau_union_measure", "proved": false, "mathlib_ok": false, "proof_tex": "\n  Since $0<\\delta<\\pi/2$, the right endpoint of each interval lies strictly below\n  the left endpoint of the next (the gap between consecutive intervals is exactly\n  $\\delta>0$), so the four intervals are pairwise disjoint. Each has length\n  $(\\tfrac{\\pi}{2}-\\tfrac{\\delta}{2})-\\tfrac{\\delta}{2}=\\tfrac{\\pi}{2}-\\delta\\ge0$,\n  hence by additivity of Lebesgue measure on disjoint sets the union has measure\n  $4\\bigl(\\tfrac{\\pi}{2}-\\delta\\bigr)=2\\pi-4\\delta$.\n", "lean_source": "private lemma plateau_union_measure {δ : ℝ} (hδpos : 0 < δ) (hδlt : δ < π / 2) :\n    MeasureTheory.volume\n        (Set.Icc (δ / 2) (π / 2 - δ / 2) ∪ Set.Icc (π / 2 + δ / 2) (π - δ / 2) ∪\n          Set.Icc (π + δ / 2) (3 * π / 2 - δ / 2) ∪\n          Set.Icc (3 * π / 2 + δ / 2) (2 * π - δ / 2))\n      = ENNReal.ofReal (2 * π - 4 * δ) := by\n  have hπ : 0 < π := Real.pi_pos\n  have hxpos : 0 ≤ π / 2 - δ := by linarith\n  have hvP1 : MeasureTheory.volume (Set.Icc (δ / 2) (π / 2 - δ / 2))\n      = ENNReal.ofReal (π / 2 - δ) := by rw [Real.volume_Icc]; congr 1; ring\n  have hvP2 : MeasureTheory.volume (Set.Icc (π / 2 + δ / 2) (π - δ / 2))\n      = ENNReal.ofReal (π / 2 - δ) := by rw [Real.volume_Icc]; congr 1; ring\n  have hvP3 : MeasureTheory.volume (Set.Icc (π + δ / 2) (3 * π / 2 - δ / 2))\n      = ENNReal.ofReal (π / 2 - δ) := by rw [Real.volume_Icc]; congr 1; ring\n  have hvP4 : MeasureTheory.volume (Set.Icc (3 * π / 2 + δ / 2) (2 * π - δ / 2))\n      = ENNReal.ofReal (π / 2 - δ) := by rw [Real.volume_Icc]; congr 1; ring\n  have hd12 : Disjoint (Set.Icc (δ / 2) (π / 2 - δ / 2))\n      (Set.Icc (π / 2 + δ / 2) (π - δ / 2)) := by\n    rw [Set.disjoint_left]; intro x hx hy\n    simp only [Set.mem_Icc] at hx hy; linarith\n  have hd123 : Disjoint (Set.Icc (δ / 2) (π / 2 - δ / 2) ∪ Set.Icc (π / 2 + δ / 2) (π - δ / 2))\n      (Set.Icc (π + δ / 2) (3 * π / 2 - δ / 2)) := by\n    rw [Set.disjoint_left]; intro x hx hy\n    rw [Set.mem_Icc] at hy\n    simp only [Set.mem_union, Set.mem_Icc] at hx\n    rcases hx with h | h <;> linarith [h.1, h.2]\n  have hd1234 : Disjoint (Set.Icc (δ / 2) (π / 2 - δ / 2) ∪\n      Set.Icc (π / 2 + δ / 2) (π - δ / 2) ∪ Set.Icc (π + δ / 2) (3 * π / 2 - δ / 2))\n      (Set.Icc (3 * π / 2 + δ / 2) (2 * π - δ / 2)) := by\n    rw [Set.disjoint_left]; intro x hx hy\n    rw [Set.mem_Icc] at hy\n    simp only [Set.mem_union, Set.mem_Icc] at hx\n    rcases hx with (h | h) | h <;> linarith [h.1, h.2]\n  rw [MeasureTheory.measure_union hd1234 measurableSet_Icc,\n      MeasureTheory.measure_union hd123 measurableSet_Icc,\n      MeasureTheory.measure_union hd12 measurableSet_Icc,\n      hvP1, hvP2, hvP3, hvP4,\n      ← ENNReal.ofReal_add hxpos hxpos,\n      ← ENNReal.ofReal_add (by linarith) hxpos,\n      ← ENNReal.ofReal_add (by linarith) hxpos]\n  congr 1; ring", "proof_size_lean": 2271, "has_sorry": false, "tex_file": "chapters/Gluck_StepReduction.tex", "lean_file": "Gluck/StepReduction.lean", "dep_count": 0, "rdep_count": 1, "descendant_count": 4, "proof_size_tex": 455, "effort_local": 0, "proof_size_tex_total": 455, "proof_size_lean_total": 2271, "effort_total": 0}, "lem:exists_preliminary_reparam": {"id": "lem:exists_preliminary_reparam", "type": "lemma", "title": "", "chapter": "Reduction to a four-arc step function", "statement": "ok\n[Existence of a step-approximating reparametrization]\n  \n  \n  \n  Let $\\kappa$ be a curvature function (continuous, $2\\pi$-periodic, strictly\n  positive) satisfying the four-vertex condition, with crossing data\n  $0<a<b$, $c_1<c_2<c_3<c_4<c_1+2\\pi$, $\\kappa(c_1,c_2,c_3,c_4)=(a,b,a,b)$ from\n  \\cref{lem:abab_values}. For every $\\varepsilon>0$ there is an orientation-preserving\n  circle reparametrization $h_1$ (a strictly increasing continuous\n  $h_1:\\mathbb{R}\\to\\mathbb{R}$ with $h_1(\\theta+2\\pi)=h_1(\\theta)+2\\pi$) such that,\n  with $\\kappa_0$ the canonical four-arc step curvature\n  (\\cref{def:four_arc_step_function}, breakpoints $(k-1)\\pi/2$, values $a,b,a,b$),\n  \\[\n    \\mathrm{vol}\\bigl(\\{\\theta\\in[0,2\\pi): \\lvert \\kappa(h_1(\\theta)) -\n      \\kappa_0(\\theta)\\rvert > \\varepsilon\\}\\bigr) < \\varepsilon .\n  \\]\n  Moreover $h_1$ is \\emph{continuously differentiable with strictly positive\n  derivative}: there is a continuous $v_1:\\mathbb{R}\\to\\mathbb{R}$ with\n  $v_1(\\theta)>0$ for all $\\theta$ and $h_1'(\\theta)=v_1(\\theta)$ for all $\\theta$\n  (so $h_1\\in C^1$ and $h_1$ is a $C^1$ diffeomorphism of the circle). This extra\n  regularity is what later lets the curve be reparametrized back to realize\n  $\\kappa$ intrinsically (\\cref{thm:gluck_converse}).", "uses": ["def:four_arc_step_function", "lem:abab_values", "lem:plateau_density", "lem:kappa_modulus_at", "lem:exists_plateau_radius", "lem:plateau_union_measure", "lem:step_curvature_canonical_values"], "lean_name": "Gluck.exists_preliminary_reparam", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:abab_values, lem:plateau_density, lem:kappa_modulus_at}\n  \\leanok\n  Let $m_k = (c_k + c_{k+1})/2$ be the midpoints between consecutive crossings\n  (cyclically, $m_4 = (c_4 + c_1 + 2\\pi)/2$), so the arcs $J_k = [m_{k-1}, m_k)$\n  partition the $\\kappa$-circle with $c_k \\in J_k$. By uniform continuity of\n  $\\kappa$ on the compact circle (\\cref{lem:kappa_modulus_at}) pick $\\eta>0$ with\n  $\\lvert\\kappa(t)-\\kappa(c_k)\\rvert \\le \\varepsilon$ whenever\n  $\\lvert t - c_k\\rvert \\le \\eta$, and small enough that\n  $[c_k-\\eta, c_k+\\eta] \\subset J_k$ for each $k$.\n\n  \\emph{The reparametrization is the antiderivative of a continuous density.}\n  Apply \\cref{lem:plateau_density} with these data and $m_0=(c_1+c_4)/2-\\pi$ to\n  obtain a \\emph{continuous, strictly positive}, $2\\pi$-periodic plateau density\n  $w$ with $\\int_0^{2\\pi} w = 2\\pi$ and, on the four central plateau sub-arcs of\n  the target circle, the calibration\n  $\\bigl\\lvert\\, m_0 + \\int_0^\\theta w - c_k \\,\\bigr\\rvert \\le \\eta$. Define\n  \\[\n    h_1(\\theta) \\;=\\; m_0 + \\int_0^\\theta w(s)\\,ds .\n  \\]\n  By the fundamental theorem of calculus $h_1$ is differentiable with\n  $h_1'(\\theta)=w(\\theta)=:v_1(\\theta)$; since $w$ is continuous and strictly\n  positive, $h_1\\in C^1$ with $v_1=w>0$ everywhere, proving the regularity claim.\n  Positivity of $w$ gives $h_1$ strictly increasing; the total-integral\n  normalization $\\int_0^{2\\pi}w=2\\pi$ together with $2\\pi$-periodicity of $w$ gives\n  $h_1(\\theta+2\\pi)=h_1(\\theta)+2\\pi$. Thus $h_1$ is an orientation-preserving\n  $C^1$ circle reparametrization.\n\n  \\emph{The measure bound.} On the union of the four plateau sub-arcs --- of total\n  $\\theta$-measure $\\ge 2\\pi-\\varepsilon$ --- the calibration gives\n  $h_1(\\theta)=m_0+\\int_0^\\theta w \\in [c_k-\\eta, c_k+\\eta]$, hence\n  $\\lvert\\kappa(h_1(\\theta)) - \\kappa(c_k)\\rvert \\le \\varepsilon$ by the choice of\n  $\\eta$; and on the target arc $I_k=[(k-1)\\pi/2,k\\pi/2)$ the step value is\n  $\\kappa_0=\\kappa(c_k)$, so $\\lvert\\kappa\\circ h_1 - \\kappa_0\\rvert \\le \\varepsilon$\n  there. The complement (the flanking ``race'' sub-arcs where $w$ ramps between\n  plateau heights) has total measure $<\\varepsilon$, which bounds the exceptional\n  set as claimed.\n", "lean_source": "theorem exists_preliminary_reparam {κ : ℝ → ℝ} (hκ : IsCurvatureFunction κ)\n    {a b c₁ c₂ c₃ c₄ : ℝ} (ha : 0 < a) (hab : a < b)\n    (h12 : c₁ < c₂) (h23 : c₂ < c₃) (h34 : c₃ < c₄) (h41 : c₄ < c₁ + 2 * π)\n    (hc₁ : κ c₁ = a) (hc₂ : κ c₂ = b) (hc₃ : κ c₃ = a) (hc₄ : κ c₄ = b)\n    {ε : ℝ} (h _trans hb hηle₁)\n        rw [hstep1 θ (by linarith) (by linarith), ← hc₁]; exact this\n      · obtain ⟨hl, hr⟩ := h\n        have hb : |h₁ θ - c₂| ≤ η := by simp only [hh₁def]; exact hpl2 θ hl hr\n        have := hm2 (h₁ θ) (le_trans hb hηle₂)\n        rw [hstep2 θ (by linarith) (by linarith), ← hc₂]; exact this\n      · obtain ⟨hl, hr⟩ := h\n        have hb : |h₁ θ - c₃| ≤ η := by simp only [hh₁def]; exact hpl3 θ hl hr\n        have := hm3 (h₁ θ) (le_trans hb hηle₃)\n        rw [hstep3 θ (by linarith) (by linarith), ← hc₃]; exact this\n      · obtain ⟨hl, hr⟩ := h\n        have hb : |h₁ θ - c₄| ≤ η := by simp only [hh₁def]; exact hpl4 θ hl hr\n        have := hm4 (h₁ θ) (le_trans hb hηle₄)\n        rw [hstep4 θ (by linarith) (by linarith), ← hc₄]; exact this\n\n    have hBsub : {θ : ℝ | θ ∈ Set.Ico (0 : ℝ) (2 * π) ∧\n        ε < |κ (h₁ θ) - stepCurvature b a 0 (π / 2) π (3 * π / 2) θ|}\n        ⊆ U \\ (P₁ ∪ P₂ ∪ P₃ ∪ P₄) := by\n      intro θ hθ\n      obtain ⟨hU, hbad⟩ := hθ\n      refine ⟨hU, fun hP => ?_⟩\n      exact absurd (hgood θ hP) (not_le.mpr hbad)\n\n    have hδle : δ ≤ π / 4 := by rw [hδdef]; exact min_le_right _ _\n    have h4δlt : 4 * δ < ε := by\n      rw [hδdef]; have := min_le_left (ε / 8) (π / 4); linarith\n    have hmeasP : MeasurableSet (P₁ ∪ P₂ ∪ P₃ ∪ P₄) :=\n      ((measurableSet_Icc.union measurableSet_Icc).union measurableSet_Icc).union\n        measurableSet_Icc\n    have hvP : MeasureTheory.volume (P₁ ∪ P₂ ∪ P₃ ∪ P₄)\n        = ENNReal.ofReal (2 * π - 4 * δ) := by\n      rw [hP1def, hP2def, hP3def, hP4def]\n      exact plateau_union_measure hδpos hδlt\n    have hvU : MeasureTheory.volume U = ENNReal.ofReal (2 * π) := by\n      rw [hUdef, Real.volume_Ico]; congr 1; ring\n    have hPU : (P₁ ∪ P₂ ∪ P₃ ∪ P₄) ⊆ U := by\n      rw [hUdef, hP1def, hP2def, hP3def, hP4def]\n      intro x hx\n      simp only [Set.mem_union, Set.mem_Icc] at hx\n      rw [Set.mem_Ico]\n      rcases hx with ((h | h) | h) | h <;> constructor <;> linarith [h.1, h.2]\n    calc MeasureTheory.volume {θ : ℝ | θ ∈ Set.Ico (0 : ℝ) (2 * π) ∧\n              ε < |κ (h₁ θ) - stepCurvature b a 0 (π / 2) π (3 * π / 2) θ|}\n        ≤ MeasureTheory.volume (U \\ (P₁ ∪ P₂ ∪ P₃ ∪ P₄)) := MeasureTheory.measure_mono hBsub\n      _ = MeasureTheory.volume U - MeasureTheory.volume (P₁ ∪ P₂ ∪ P₃ ∪ P₄) :=\n          MeasureTheory.measure_diff hPU hmeasP.nullMeasurableSet\n            (by rw [hvP]; exact ENNReal.ofReal_ne_top)\n      _ = ENNReal.ofReal (2 * π) - ENNReal.ofReal (2 * π - 4 * δ) := by rw [hvU, hvP]\n      _ = ENNReal.ofReal (4 * δ) := by\n          rw [← ENNReal.ofReal_sub _ (by linarith : (0:ℝ) ≤ 2 * π - 4 * δ)]; congr 1; ring\n      _ < ENNReal.ofReal ε := (ENNReal.ofReal_lt_ofReal_iff hε).mpr h4δlt", "proof_size_lean": 6888, "has_sorry": false, "tex_file": "chapters/Gluck_StepReduction.tex", "lean_file": "Gluck/StepReduction.lean", "dep_count": 7, "rdep_count": 3, "descendant_count": 3, "proof_size_tex": 2207, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 33187, "effort_total": 0}, "def:bicircle_error_vector": {"id": "def:bicircle_error_vector", "type": "definition", "title": "", "chapter": "Bicircle curves and their error vectors", "statement": "ok\n[Bicircle error vector]\n  \n  \n  \n  \\textit{Source: DeTurck--Gluck, Proposition 9.1 (§9).}\n  Fix $0 < a < b$ and breakpoints $0 \\le \\theta_1 < \\theta_2 < \\theta_3 <\n  \\theta_4 < 2\\pi$, and let $\\kappa_0$ be the four-arc step curvature\n  (\\cref{def:four_arc_step_function}) taking the value $b$ on\n  $[\\theta_1,\\theta_2)\\cup[\\theta_3,\\theta_4)$ and $a$ elsewhere. The\n  \\emph{bicircle error vector} is $E_{\\mathrm{bi}}(a,b,\\theta_1,\\dots,\\theta_4) =\n  E(1/\\kappa_0) = \\int_0^{2\\pi} e^{i\\theta}/\\kappa_0(\\theta)\\,d\\theta \\in\n  \\mathbb{C}$.", "uses": ["def:four_arc_step_function", "def:error_vector"], "lean_name": "Gluck.bicircleErrorVector", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def bicircleErrorVector (a b θ₁ θ₂ θ₃ θ₄ : ℝ) : ℂ :=\n  errorVector (radius (stepCurvature a b θ₁ θ₂ θ₃ θ₄))", "proof_size_lean": 121, "has_sorry": false, "tex_file": "chapters/Gluck_Bicircle.tex", "lean_file": "Gluck/Bicircle.lean", "dep_count": 2, "rdep_count": 2, "descendant_count": 13, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 640, "effort_total": 0}, "lem:error_vector_of_bicircle": {"id": "lem:error_vector_of_bicircle", "type": "lemma", "title": "", "chapter": "Bicircle curves and their error vectors", "statement": "ok\n[Explicit error vector of a bicircle]\n  \n  \n  \n  \\textit{Source: DeTurck--Gluck, Proposition 9.1 (§9), error-vector formula.}\n  With the notation of \\cref{def:bicircle_error_vector},\n  \\[\n    E_{\\mathrm{bi}}(a,b,\\theta_1,\\theta_2,\\theta_3,\\theta_4)\n      \\;=\\; \\Bigl(\\tfrac{1}{ib} - \\tfrac{1}{ia}\\Bigr)\n            \\Bigl(\\bigl[e^{i\\theta_2} - e^{i\\theta_1}\\bigr]\n                + \\bigl[e^{i\\theta_4} - e^{i\\theta_3}\\bigr]\\Bigr).\n  \\]", "uses": ["def:bicircle_error_vector"], "lean_name": "Gluck.bicircleErrorVector_eq", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:bicircle_error_vector, lem:bicircle_arc_integral, lem:bicircle_arc_integrable}\n  \\leanok\n  The weight $\\rho_0 = 1/\\kappa_0$ is piecewise constant: it equals $1/b$ on the\n  two arcs $[\\theta_1,\\theta_2)$ and $[\\theta_3,\\theta_4)$ and $1/a$ on the two\n  complementary arcs. Split the integral $E(\\rho_0) = \\int_0^{2\\pi}\n  e^{i\\theta}\\rho_0(\\theta)\\,d\\theta$ into the four arcs. On each arc $\\rho_0$ is\n  constant and $\\int_{c}^{d} e^{i\\theta}\\,d\\theta = \\frac{1}{i}\\bigl(e^{id} -\n  e^{ic}\\bigr)$. Summing,\n  \\[\n    E(\\rho_0)\n      = \\tfrac{1}{ib}\\bigl(e^{i\\theta_2}-e^{i\\theta_1}\\bigr)\n      + \\tfrac{1}{ia}\\bigl(e^{i\\theta_3}-e^{i\\theta_2}\\bigr)\n      + \\tfrac{1}{ib}\\bigl(e^{i\\theta_4}-e^{i\\theta_3}\\bigr)\n      + \\tfrac{1}{ia}\\bigl(e^{i(\\theta_1+2\\pi)}-e^{i\\theta_4}\\bigr).\n  \\]\n  Using $e^{i(\\theta_1+2\\pi)} = e^{i\\theta_1}$ and collecting the $1/(ia)$ and\n  $1/(ib)$ terms, the four $1/(ia)$ contributions sum to\n  $\\tfrac{1}{ia}\\bigl((e^{i\\theta_3}-e^{i\\theta_2}) +\n  (e^{i\\theta_1}-e^{i\\theta_4})\\bigr) = -\\tfrac{1}{ia}\\bigl((e^{i\\theta_2} -\n  e^{i\\theta_1}) + (e^{i\\theta_4} - e^{i\\theta_3})\\bigr)$, while the two $1/(ib)$\n  contributions sum to $\\tfrac{1}{ib}\\bigl((e^{i\\theta_2} - e^{i\\theta_1}) +\n  (e^{i\\theta_4} - e^{i\\theta_3})\\bigr)$. Hence the total is exactly\n  $\\bigl(\\tfrac{1}{ib} - \\tfrac{1}{ia}\\bigr)\\bigl([e^{i\\theta_2} - e^{i\\theta_1}]\n  + [e^{i\\theta_4} - e^{i\\theta_3}]\\bigr)$, the stated form. (The source's\n  $\\bigl(\\tfrac{1}{ia} - \\tfrac{1}{ib}\\bigr)$ is the same up to the overall sign,\n  which only reflects the opposite labelling of the two curvature values on the\n  arcs.)\n", "lean_source": "theorem bicircleErrorVector_eq (a b θ₁ θ₂ θ₃ θ₄ : ℝ)\n    (h1 : 0 ≤ θ₁) (h12 : θ₁ < θ₂) (h23 : θ₂ < θ₃) (h34 : θ₃ < θ₄) (h4 : θ₄ < 2 * π) :\n    bicircleErrorVector a b θ₁ θ₂ θ₃ θ₄\n      = (1 / (Complex.I * (b : ℂ)) - 1 / (Complex.I * (a : ℂ)))\n        * ((Complex.exp ((θ₂ : ℂ) * Complex.I) - Complex.exp ((θ₁ : ℂ) * Complex.I))\n          + (Complex.exp ((θ₄ : ℂ) * Complex.I) - Complex.exp ((θ₃ : ℂ) * Complex.I))) := by\n\n  have htm : ∀ θ : ℝ, θ₁ ≤ θ → θ < θ₁ + 2 * π →\n      toIcoMod Real.two_pi_pos θ₁ θ = θ :=\n    fun θ hl hr => (toIcoMod_eq_self Real.two_pi_pos).mpr ⟨hl, hr⟩\n\n  have hvP0 : ∀ θ ∈ Set.Ioo (0 : ℝ) θ₁, stepCurvature a b θ₁ θ₂ θ₃ θ₄ θ = a := by\n    intro θ hθ; obtain ⟨hl, hr⟩ := hθ\n    have htm0 : toIcoMod Real.two_pi_pos θ₁ θ = θ + 2 * π := by\n      rw [← toIcoMod_add_right Real.two_pi_pos θ₁ θ]\n      exact (toIcoMod_eq_self Real.two_pi_pos).mpr ⟨by linarith, by linarith⟩\n    simp only [stepCurvature, htm0]\n    rw [if_neg (by push_neg; exact ⟨by linarith, fun _ => by linarith⟩)]\n  have hvP1 : ∀ θ ∈ Set.Ioo θ₁ θ₂, stepCurvature a b θ₁ θ₂ θ₃ θ₄ θ = b := by\n    intro θ hθ; obtain ⟨hl, hr⟩ := hθ\n    have h := htm θ (le_of_lt hl) (by linarith)\n    simp only [stepCurvature, h]\n    rw [if_pos (Or.inl hr)]\n  have hvP2 : ∀ θ ∈ Set.Ioo θ₂ θ₃, stepCurvature a b θ₁ θ₂ θ₃ θ₄ θ = a := by\n    intro θ hθ; obtain ⟨hl, hr⟩ := hθ\n    have h := htm θ (by linarith) (by linarith)\n    simp only [stepCurvature, h]\n    rw [if_neg (by push_neg; exact ⟨by linarith, fun _ => by linarith⟩)]\n  have hvP3 : ∀ θ ∈ Set.Ioo θ₃ θ₄, stepCurvature a b θ₁ θ₂ θ₃ θ₄ θ = b := by\n    intro θ hθ; obtain ⟨hl, hr⟩ := hθ\n    have h := htm θ (by linarith) (by linarith)\n    simp only [stepCurvature, h]\n    rw [if_pos (Or.inr ⟨le_of_lt hl, hr⟩)]\n  have hvP4 : ∀ θ ∈ Set.Ioo θ₄ (2 * π), stepCurvature a b θ₁ θ₂ θ₃ θ₄ θ = a := by\n    intro θ hθ; obtain ⟨hl, hr⟩ := hθ\n    have h := htm θ (by linarith) (by linarith)\n    simp only [stepCurvature, h]\n    rw [if_neg (by push_neg; exact ⟨by linarith, fun _ => by linarith⟩)]\n\n  have hi0 := bicircle_arc_integrable a b θ₁ θ₂ θ₃ θ₄ a 0 θ₁ h1 hvP0\n  have hi1 := bicircle_arc_integrable a b θ₁ θ₂ θ₃ θ₄ b θ₁ θ₂ (le_of_lt h12) hvP1\n  have hi2 := bicircle_arc_integrable a b θ₁ θ₂ θ₃ θ₄ a θ₂ θ₃ (le_of_lt h23) hvP2\n  have hi3 := bicircle_arc_integrable a b θ₁ θ₂ θ₃ θ₄ b θ₃ θ₄ (le_of_lt h34) hvP3\n  have hi4 := bicircle_arc_integrable a b θ₁ θ₂ θ₃ θ₄ a θ₄ (2 * π) (le_of_lt h4) hvP4\n\n  rw [bicircleErrorVector, errorVector, reconstruct]\n\n  rw [← intervalIntegral.integral_add_adjacent_intervals hi0\n        (((hi1.trans hi2).trans hi3).trans hi4),\n      ← intervalIntegral.integral_add_adjacent_intervals hi1 ((hi2.trans hi3).trans hi4),\n      ← intervalIntegral.integral_add_adjacent_intervals hi2 (hi3.trans hi4),\n      ← intervalIntegral.integral_add_adjacent_intervals hi3 hi4]\n\n  rw [bicircle_arc_integral a b θ₁ θ₂ θ₃ θ₄ a 0 θ₁ h1 hvP0,\n      bicircle_arc_integral a b θ₁ θ₂ θ₃ θ₄ b θ₁ θ₂ (le_of_lt h12) hvP1,\n      bicircle_arc_integral a b θ₁ θ₂ θ₃ θ₄ a θ₂ θ₃ (le_of_lt h23) umber (g : C(I, Circle)) : ℝ :=\n  (angleLift g 1 - angleLift g 0) / (2 * π)", "proof_size_lean": 109, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 1, "rdep_count": 6, "descendant_count": 17, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 302, "effort_total": 0}, "lem:winding_number_const": {"id": "lem:winding_number_const", "type": "lemma", "title": "", "chapter": "The winding-number argument", "statement": "ok\n[A constant loop does not wind]\n  \n  \n  \n  Project-bespoke. $W$ of a constant loop is $0$.", "uses": ["def:winding_number"], "lean_name": "Gluck.windingNumber_const", "proved": true, "mathlib_ok": false, "proof_tex": "\n\n\\leanok\n  The lift of a constant loop is constant (\\texttt{liftPath\\_const}), so the\n  increment is $0$.\n", "lean_source": "private theorem windingNumber_const (c : Circle) :\n    windingNumber (ContinuousMap.const I c) = 0 := by\n  have hpe : (ContinuousMap.const I c) 0 =\n      Circle.exp (Circle.exp_surjective ((ContinuousMap.const I c) 0)).choose :=\n    (Circle.exp_surjective ((ContinuousMap.const I c) 0)).choose_spec.symm\n  unfold windingNumber angleLift\n  rw [Circle.isCoveringMap_exp.liftPath_const]\n  simp", "proof_size_lean": 390, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 1, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 104, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 692, "effort_total": 0}, "lem:int_valued_eq": {"id": "lem:int_valued_eq", "type": "lemma", "title": "", "chapter": "The winding-number argument", "statement": "ok\n[Integer-valued continuous functions on $[0,1]$ are constant]\n  \n  \n  Project-bespoke. A continuous $q : [0,1] \\to \\mathbb{R}$ taking only integer\n  values is constant.", "uses": [], "lean_name": "Gluck.int_valued_eq", "proved": true, "mathlib_ok": false, "proof_tex": "\n\n\\leanok\n  If $q(a) \\ne q(b)$, the intermediate value theorem (on the connected $[0,1]$)\n  forces $q$ to take the non-integer value halfway between two consecutive\n  integers, a contradiction.\n", "lean_source": "private theorem int_valued_eq {q : C(I, ℝ)} (hq : ∀ t, ∃ m : ℤ, q t = (m : ℝ))\n    (a b : I) : q a = q b := by\n  rcases lt_trichotomy (q a) (q b) with h | h | h\n  · exfalso\n    obtain ⟨ma, hma⟩ := hq a\n    obtain ⟨mb, hmb⟩ := hq b\n    have hmab : ma < mb := by\n      have hh := h; rw [hma, hmb] at hh; exact_mod_cast hh\n    have hv1 : q a ≤ (ma : ℝ) + 1 / 2 := by rw [hma]; linarith\n    have hv2 : (ma : ℝ) + 1 / 2 ≤ q b := by\n      rw [hmb]; have : (ma : ℝ) + 1 ≤ (mb : ℝ) := by exact_mod_cast hmab\n      linarith\n    obtain ⟨t, ht⟩ := intermediate_value_univ a b q.continuous ⟨hv1, hv2⟩\n    obtain ⟨m, hm⟩ := hq t\n    rw [hm] at ht\n    have hcontra : (2 * m : ℤ) = 2 * ma + 1 := by\n      have h2 : (2 : ℝ) * (m : ℝ) = 2 * (ma : ℝ) + 1 := by linarith\n      exact_mod_cast h2\n    omega\n  · exact h\n  · exfalso\n    obtain ⟨ma, hma⟩ := hq a\n    obtain ⟨mb, hmb⟩ := hq b\n    have hmab : mb < ma := by\n      have hh := h; rw [hma, hmb] at hh; exact_mod_cast hh\n    have hv1 : q b ≤ (mb : ℝ) + 1 / 2 := by rw [hmb]; linarith\n    have hv2 : (mb : ℝ) + 1 / 2 ≤ q a := by\n      rw [hma]; have : (mb : ℝ) + 1 ≤ (ma : ℝ) := by exact_mod_cast hmab\n      linarith\n    obtain ⟨t, ht⟩ := intermediate_value_univ b a q.continuous ⟨hv1, hv2⟩\n    obtain ⟨m, hm⟩ := hq t\n    rw [hm] at ht\n    have hcontra : (2 * m : ℤ) = 2 * mb + 1 := by\n      have h2 : (2 : ℝ) * (m : ℝ) = 2 * (mb : ℝ) + 1 := by linarith\n      exact_mod_cast h2\n    omega", "proof_size_lean": 1422, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 0, "rdep_count": 2, "descendant_count": 15, "proof_size_tex": 191, "effort_local": 0, "proof_size_tex_total": 191, "proof_size_lean_total": 1422, "effort_total": 0}, "lem:winding_number_eq_div_of_lift": {"id": "lem:winding_number_eq_div_of_lift", "type": "lemma", "title": "", "chapter": "The winding-number argument", "statement": "ok\n[Any lift computes the winding number]\n  \n  \n  \n  Project-bespoke. If $\\varphi : [0,1] \\to \\mathbb{R}$ is \\emph{any} continuous\n  lift of $g$ (i.e.\\ $\\mathrm{Circle.exp}\\circ\\varphi = g$), then $W(g) =\n  (\\varphi(1) - \\varphi(0))/(2\\pi)$.", "uses": ["def:winding_number", "lem:int_valued_eq", "lem:angle_lift_lifts"], "lean_name": "Gluck.windingNumber_eq_div_of_lift", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:int_valued_eq}\n  \\leanok\n  $\\varphi - \\widetilde g$ is continuous and $2\\pi\\mathbb{Z}$-valued (two lifts of\n  the same loop differ by a constant in the fibre, via \\texttt{Circle.exp\\_eq\\_exp}),\n  hence constant by \\cref{lem:int_valued_eq}; so the two increments agree.\n", "lean_source": "private theorem windingNumber_eq_div_of_lift (g : C(I, Circle)) (φ : C(I, ℝ))\n    (hφ : ∀ t, Circle.exp (φ t) = g t) :\n    windingNumber g = (φ 1 - φ 0) / (2 * π) := by\n  have hψ : ∀ t, Circle.exp (angleLift g t) = g t := angleLift_lifts g\n  have h2pi : (2 * π : ℝ) ≠ 0 := by positivity\n  have hcont : Continuous fun t : I => (φ t - angleLift g t) / (2 * π) :=\n    (φ.continuous.sub (angleLift g).continuous).div_const _\n  set q' : C(I, ℝ) := ⟨fun t => (φ t - angleLift g t) / (2 * π), hcont⟩ with hq'def\n  have hq'int : ∀ t, ∃ m : ℤ, q' t = (m : ℝ) := by\n    intro t\n    have hee : Circle.exp (φ t) = Circle.exp (angleLift g t) := (hφ t).trans (hψ t).symm\n    rw [Circle.exp_eq_exp] at hee\n    obtain ⟨m, hm⟩ := hee\n    refine ⟨m, ?_⟩\n    change (φ t - angleLift g t) / (2 * π) = (m : ℝ)\n    rw [hm]; field_simp; ring\n  have hend := int_valued_eq hq'int 0 1\n  have hkey : φ 0 - angleLift g 0 = φ 1 - angleLift g 1 := by\n    have h2 := hend\n    simp only [hq'def, ContinuousMap.coe_mk] at h2\n    rw [div_eq_div_iff h2pi h2pi] at h2\n    exact mul_right_cancel₀ h2pi h2\n  rw [windingNumber]\n  have hdiff : φ 1 - φ 0 = angleLift g 1 - angleLift g 0 := by linarith\n  rw [hdiff]", "proof_size_lean": 1173, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 3, "rdep_count": 3, "descendant_count": 14, "proof_size_tex": 278, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 3211, "effort_total": 0}, "lem:winding_number_eq_of_homotopy": {"id": "lem:winding_number_eq_of_homotopy", "type": "lemma", "title": "", "chapter": "The winding-number argument", "statement": "ok\n[Winding number is a free-homotopy invariant]\n  \n  \n  \n  Project-bespoke. If $H : [0,1]\\times[0,1] \\to S^1$ is a continuous homotopy\n  \\emph{through loops} (each slice $H(s,\\cdot)$ is a loop), then $W(H(0,\\cdot)) =\n  W(H(1,\\cdot))$.", "uses": ["def:winding_number", "lem:winding_number_eq_div_of_lift", "lem:int_valued_eq"], "lean_name": "Gluck.windingNumber_eq_of_homotopy", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{lem:winding_number_eq_div_of_lift, lem:int_valued_eq}\n  \\leanok\n  Lift $H$ along $\\mathrm{Circle.exp}$ to $\\widetilde H$ (Mathlib\n  \\texttt{IsCoveringMap.liftHomotopy}). For each $s$, $(\\widetilde H(s,1) -\n  \\widetilde H(s,0))/2\\pi$ equals $W(H(s,\\cdot))$ (by\n  \\cref{lem:winding_number_eq_div_of_lift}) and is integer-valued (loop condition\n  $H(s,0)=H(s,1)$), hence constant in $s$ by \\cref{lem:int_valued_eq}.\n", "lean_source": "private theorem windingNumber_eq_of_homotopy {g₀ g₁ : C(I, Circle)} (H : C(I × I, Circle))\n    (h0 : ∀ t, H (0, t) = g₀ t) (h1 : ∀ t, H (1, t) = g₁ t)\n    (hloop : ∀ s, H (s, 0) = H (s, 1)) :\n    windingNumber g₀ = windingNumber g₁ := by\n  have H_0 : ∀ t : I, H (0, t) = Circle.exp (angleLift g₀ t) := by\n    intro t; rw [h0 t]; exact (angleLift_lifts g₀ t).symm\n  set Ht := Circle.isCoveringMap_exp.liftHomotopy H (angleLift g₀) H_0 with hHt\n  have hlifts : ∀ st : I × I, Circle.exp (Ht st) = H st := by\n    intro st\n    have := congrFun (Circle.isCoveringMap_exp.liftHomotopy_lifts H (angleLift g₀) H_0) st\n    simpa [hHt, Function.comp] using this\n  have hWcont : Continuous fun s : I => (Ht (s, 1) - Ht (s, 0)) / (2 * π) := by\n    apply Continuous.div_const\n    exact (Ht.continuous.comp (continuous_id.prodMk continuous_const)).sub\n      (Ht.continuous.comp (continuous_id.prodMk continuous_const))\n  set W : C(I, ℝ) := ⟨fun s => (Ht (s, 1) - Ht (s, 0)) / (2 * π), hWcont⟩ with hWdef\n  have hWint : ∀ s, ∃ m : ℤ, W s = (m : ℝ) := by\n    intro s\n    have hee : Circle.exp (Ht (s, 1)) = Circle.exp (Ht (s, 0)) := by\n      rw [hlifts (s, 1), hlifts (s, 0)]; exact (hloop s).symm\n    rw [Circle.exp_eq_exp] at hee\n    obtain ⟨m, hm⟩ := hee\n    refine ⟨m, ?_⟩\n    change (Ht (s, 1) - Ht (s, 0)) / (2 * π) = (m : ℝ)\n    rw [hm]; field_simp; ring\n  have key : ∀ s : I, ∀ gs : C(I, Circle), (∀ t, H (s, t) = gs t) →\n      windingNumber gs = (Ht (s, 1) - Ht (s, 0)) / (2 * π) := by\n    intro s gs hgs\n    have hφcont : Continuous fun t : I => Ht (s, t) :=\n      Ht.continuous.comp (continuous_const.prodMk continuous_id)\n    have hlift := windingNumber_eq_div_of_lift gs ⟨fun t => Ht (s, t), hφcont⟩ (by\n      intro t; change Circle.exp (Ht (s, t)) = gs t; rw [hlifts (s, t), hgs t])\n    simpa using hlift\n  have hW0 := key 0 g₀ h0\n  have hW1 := key 1 g₁ h1\n  have hWeq : W 0 = W 1 := int_valued_eq hWint 0 1\n  rw [hW0, hW1]\n  simpa [hWdef] using hWeq", "proof_size_lean": 1947, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 3, "rdep_count": 2, "descendant_count": 7, "proof_size_tex": 418, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 5158, "effort_total": 0}, "lem:winding_number_mul": {"id": "lem:winding_number_mul", "type": "lemma", "title": "", "chapter": "The winding-number argument", "statement": "ok\n[Winding number is additive under pointwise product]\n  \n  \n  \n  Project-bespoke. For circle loops $g, h$, $W(g\\cdot h) = W(g) + W(h)$.", "uses": ["def:winding_number", "lem:winding_number_eq_div_of_lift", "lem:angle_lift_lifts"], "lean_name": "Gluck.windingNumber_mul", "proved": true, "mathlib_ok": false, "proof_tex": "\n\n\\leanok\n  $\\widetilde g + \\widetilde h$ is a continuous lift of $g\\cdot h$ (since\n  $\\mathrm{Circle.exp}(\\widetilde g + \\widetilde h) = \\mathrm{Circle.exp}\\,\n  \\widetilde g \\cdot \\mathrm{Circle.exp}\\,\\widetilde h = g\\cdot h$ by\n  \\texttt{Circle.exp\\_add} and \\cref{lem:angle_lift_lifts}); apply\n  \\cref{lem:winding_number_eq_div_of_lift} and split the increment.\n", "lean_source": "private theorem windingNumber_mul (g h : C(I, Circle)) :\n    windingNumber (g * h) = windingNumber g + windingNumber h := by\n  have hlift : ∀ t : I, Circle.exp ((angleLift g + angleLift h) t) = (g * h) t := by\n    intro t\n    change Circle.exp (angleLift g t + angleLift h t) = g t * h t\n    rw [Circle.exp_add, angleLift_lifts, angleLift_lifts]\n  rw [windingNumber_eq_div_of_lift (g * h) (angleLift g + angleLift h) hlift]\n  simp only [ContinuousMap.add_apply]\n  rw [windingNumber, windingNumber]\n  ring", "proof_size_lean": 504, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 3, "rdep_count": 1, "descendant_count": 1, "proof_size_tex": 362, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 3715, "effort_total": 0}, "def:circle_proj": {"id": "def:circle_proj", "type": "definition", "title": "", "chapter": "The winding-number argument", "statement": "ok\n[Radial projection to the circle]\n  \n  \n  Project-bespoke. For $z \\ne 0$, $\\mathrm{circleProj}(z) = z/\\lVert z\\rVert \\in\n  S^1$, the radial normalisation onto the unit circle.", "uses": [], "lean_name": "Gluck.circleProj", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "private noncomputable def circleProj (z : ℂ) (hz : z ≠ 0) : Circle :=\n  ⟨z / (‖z‖ : ℂ), by\n    rw [← SetLike.mem_coe, Submonoid.coe_unitSphere, mem_sphere_zero_iff_norm, norm_div,\n      Complex.norm_real, Real.norm_eq_abs, abs_of_pos (norm_pos_iff.2 hz),\n      div_self (norm_pos_iff.2 hz).ne']⟩", "proof_size_lean": 295, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 0, "rdep_count": 3, "descendant_count": 16, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 295, "effort_total": 0}, "lem:circle_proj_eq": {"id": "lem:circle_proj_eq", "type": "lemma", "title": "", "chapter": "The winding-number argument", "statement": "ok\n[Radial projection formula]\n  \n  \n  \n  Project-bespoke. As a complex number, $\\mathrm{circleProj}(z) = z/\\lVert z\\rVert$.", "uses": ["def:circle_proj"], "lean_name": "Gluck.circleProj_eq", "proved": true, "mathlib_ok": false, "proof_tex": "\n\n\\leanok\n  Unfolding the definition; membership in $S^1$ is $\\lVert z/\\lVert z\\rVert\\rVert = 1$.\n", "lean_source": "private theorem circleProj_eq (z : ℂ) (hz : z ≠ 0) : (circleProj z hz : ℂ) = z / (‖z‖ : ℂ) := rfl", "proof_size_lean": 97, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 1, "rdep_count": 1, "descendant_count": 11, "proof_size_tex": 95, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 392, "effort_total": 0}, "lem:circle_proj_helpers": {"id": "lem:circle_proj_helpers", "type": "lemma", "title": "Radial projection: congruence, coercion, multiplicativity", "chapter": "The winding-number argument", "statement": "Project-bespoke (private in-file helpers). (i) \\emph{congruence}\n  ($\\mathrm{circleProj\\_congr}$): $a=b \\Rightarrow \\mathrm{circleProj}(a) =\n  \\mathrm{circleProj}(b)$; (ii) \\emph{coercion} ($\\mathrm{circleProj\\_coe}$): for\n  $z\\in S^1$, $\\mathrm{circleProj}(z) = z$; (iii) \\emph{multiplicativity}\n  ($\\mathrm{circleProj\\_mul}$): $\\mathrm{circleProj}(c\\,z) =\n  \\mathrm{circleProj}(c)\\,\\mathrm{circleProj}(z)$ for $c,z\\ne 0$.", "uses": ["def:circle_proj", "lem:circle_proj_eq"], "lean_name": "Gluck.circleProj_mul, Gluck.circleProj_coe, Gluck.circleProj_congr", "proved": false, "mathlib_ok": false, "proof_tex": "\n\n  All three by unfolding \\cref{lem:circle_proj_eq} ($\\mathrm{circleProj}(z) =\n  z/\\lVert z\\rVert$): (i) is substitution; (ii) uses $\\lVert z\\rVert = 1$ on\n  $S^1$; (iii) uses $\\lVert c z\\rVert = \\lVert c\\rVert\\,\\lVert z\\rVert$.\n", "lean_source": "private theorem circleProj_mul (c z : ℂ) (hc : c ≠ 0) (hz : z ≠ 0) :\n    circleProj (c * z) (mul_ne_zero hc hz) = circleProj c hc * circleProj z hz := by\n  apply Subtype.ext\n  rw [Circle.coe_mul, circleProj_eq, circleProj_eq, circleProj_eq, norm_mul]\n  have hnc : (‖c‖ : ℂ) ≠ 0 := by exact_mod_cast norm_ne_zero_iff.2 hc\n  have hnz : (‖z‖ : ℂ) ≠ 0 := by exact_mod_cast norm_ne_zero_iff.2 hz\n  push_cast\n  field_simp\n\nprivate theorem circleProj_coe (z : Circle) (hz : (z : ℂ) ≠ 0) : circleProj (z : ℂ) hz = z := by\n  apply Subtype.ext\n  rw [circleProj_eq, Circle.norm_coe]\n  norm_num\n\nprivate theorem circleProj_congr {a b : ℂ} (ha : a ≠ 0) (hb : b ≠ 0) (h : a = b) :\n    circleProj a ha = circleProj b hb := by subst h; rfl", "proof_size_lean": 719, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 2, "rdep_count": 2, "descendant_count": 10, "proof_size_tex": 225, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 1111, "effort_total": 0}, "def:norm_loop": {"id": "def:norm_loop", "type": "definition", "title": "", "chapter": "The winding-number argument", "statement": "ok\n[Normalised loop of a $\\mathbb{C}$-loop]\n  \n  \n  \n  Project-bespoke. For a nonvanishing loop $\\gamma : [0,1] \\to \\mathbb{C}$,\n  $\\mathrm{normLoop}\\,\\gamma$ is the circle loop $t \\mapsto\n  \\mathrm{circleProj}(\\gamma(t))$.", "uses": ["def:circle_proj"], "lean_name": "Gluck.normLoop", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "private noncomputable def normLoop (γ : C(I, ℂ)) (h : ∀ t, γ t ≠ 0) : C(I, Circle) :=\n  ⟨fun t => circleProj (γ t) (h t), by\n    apply Continuous.subtype_mk\n    exact γ.continuous.div\n      (Complex.continuous_ofReal.comp (continuous_norm.comp γ.continuous))\n      (fun t => Complex.ofReal_ne_zero.2 (norm_ne_zero_iff.2 (h t)))⟩", "proof_size_lean": 328, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 1, "rdep_count": 5, "descendant_count": 13, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 623, "effort_total": 0}, "def:winding_number_c": {"id": "def:winding_number_c", "type": "definition", "title": "", "chapter": "The winding-number argument", "statement": "ok\n[Winding number of a $\\mathbb{C}$-loop]\n  \n  \n  \n  Project-bespoke. The winding number of a nonvanishing loop $\\gamma : [0,1] \\to\n  \\mathbb{C}$ is $W_{\\mathbb{C}}(\\gamma) = W(\\mathrm{normLoop}\\,\\gamma)$.", "uses": ["def:winding_number", "def:norm_loop"], "lean_name": "Gluck.windingNumberC", "proved": true, "mathlib_ok": false, "proof_tex": "", "lean_source": "noncomputable def windingNumberC (γ : C(I, ℂ)) (h : ∀ t, γ t ≠ 0) : ℝ :=\n  windingNumber (normLoop γ h)", "proof_size_lean": 103, "has_sorry": false, "tex_file": "chapters/Gluck_Winding.tex", "lean_file": "Gluck/Winding.lean", "dep_count": 2, "rdep_count": 5, "descendant_count": 12, "proof_size_tex": null, "effort_local": 0, "proof_size_tex_total": null, "proof_size_lean_total": 1028, "effort_total": 0}, "lem:winding_number_c_const_mul": {"id": "lem:winding_number_c_const_mul", "type": "lemma", "title": "", "chapter": "The winding-number argument", "statement": "ok\n[Scaling invariance of the $\\mathbb{C}$-winding number]\n  \n  \n  \n  Project-bespoke. For $c\\ne 0$ and a nonvanishing loop $\\gamma$,\n  $W_{\\mathbb{C}}(c\\cdot\\gamma) = W_{ th $c(t)>0$ for all $t$ (and $c$ a loop,\n  $c(0)=c(1)$). Then the scaled loop $t\\mapsto c(t)\\,\\gamma(t)$ is nowhere zero and\n  $W_{\\mathbb{C}}(c\\cdot\\gamma)=W_{\\mathbb{C}}(\\gamma)$. This generalises\n  \\cref{lem:winding_number_c_const_mul} from a constant scalar to a positive scalar\n  \\emph{field}; it is what lets a positive configuration-dependent prefactor\n  $c(z)=1/\\lambda(z)$ be stripped from the clean arc-length error map\n  (\\cref{lem:clean_error_winds}).", "uses": ["def:winding_number_c", "def:norm_loop", "lem:winding_number_eq_of_homotopy"], "lean_name": "Gluck.windingNumberC_posScalarField", "proved": true, "mathlib_ok": false, "proof_tex": "\n  \\uses{def:winding_number_c, lem:winding_number_eq_of_homotopy}\n  \\leanok\n  The straight-line scalar homotopy\n  $H(u,t)=\\bigl((1-u)+u\\,c(t)\\bigr)\\,\\gamma(t)$ connects $\\gamma$ ($u=0$) to\n  $c\\cdot\\gamma$ ($u=1$). Its scalar factor $(1-u)+u\\,c(t)$ is a convex combination\n  of $1>0$ and $c(t)>0$, hence $>0$ for all $(u,t)\\in[0,1]^2$; since\n  $\\gamma(t)\\neq0$, $H$ is nowhere zero. $H$ is continuous and, being a real-scalar\n  multiple of the loop $\\gamma$, a loop in $t$ at each $u$. Normalising and applying\n  \\cref{lem:winding_number_eq_of_homotopy} gives\n  $W_{\\mathbb{C}}(c\\cdot\\gamma)=W_{\\mathbb{C}}(\\gamma)$. Nowhere-vanishing of\n  $c\\cdot\\gamma$ is the $u=1$ slice.\n", "lean_source": "theorem windingNumberC_posScalarField (c : C(I, ℝ)) (hc : ∀ t, 0 < c t)\n    (γ : C(I, ℂ)) (hγ : ∀ t, γ t ≠ 0)\n    (hloopγ : γ 0 = γ 1) (hloopc : c 0 = c 1) :\n    windingNumberC ⟨fun t => (c t : ℂ) * γ t,\n        (Complex.continuous_ofReal.comp c.continuous).mul γ.continuous⟩\n      (fun t => mul_ne_zero (by exact_mod_cast (hc t).ne') (hγ t)) = windingNumberC γ hγ := by\n\n  set f : I × I → ℝ := fun st => (1 - (st.1 : ℝ)) + (st.1 : ℝ) * c st.2 with hfdef\n  have hfpos : ∀ st : I × I, 0 < f st := by\n    intro st\n    have hs0 : (0 : ℝ) ≤ (st.1 : ℝ) := st.1.2.1\n    have hs1 : (st.1 : ℝ) ≤ 1 := st.1.2.2\n    have hct := hc st.2\n    rw [hfdef]\n    nlinarith [mul_nonneg hs0 hct.le, mul_nonneg (sub_nonneg.2 hs1) hct.le]\n\n  set Hc : I × I → ℂ := fun st => (f st : ℂ) * γ st.2 with hHcdef\n  have hHccont : Continuous Hc := by\n    rw [hHcdef]\n    refine (Complex.continuous_ofReal.comp ?_).mul (γ.continuous.comp continuous_snd)\n    rw [hfdef]\n    exact (continuous_const.sub (continuous_subtype_val.comp continuous_fst)).add\n      ((continuous_subtype_val.comp continuous_fst).mul (c.continuous.comp continuous_snd))\n  have hHcne : ∀ st : I × I, Hc st ≠ 0 := by\n    intro st\n    rw [hHcdef]\n    exact mul_ne_zero (by exact_mod_cast (hfpos st).ne') (hγ st.2)\n\n  set H : C(I × I, Circle) :=\n    ⟨fun st => circleProj (Hc st) (hHcne st), by\n      apply Continuous.subtype_mk\n      exact hHccont.div (Complex.continuous_ofReal.comp (continuous_norm.comp hHccont))\n        (fun st => Complex.ofReal_ne_zero.2 (norm_ne_zero_iff.2 (hHcne st)))⟩ with hHdef\n\n  have h0 : ∀ t : I, H (0, t) = normLoop γ hγ t := by\n    intro t\n    change circleProj (Hc (0, t)) (hHcne (0, t)) = circleProj (γ t) (hγ t)\n    apply circleProj_congr\n    simp only [hHcdef, hfdef]\n    push_cast [Set.Icc.coe_zero]\n    ring\n\n  have h1 : ∀ t : I, H (1, t) =\n      normLoop ⟨fun t => (c t : ℂ) * γ t,\n        (Complex.continuous_ofReal.comp c.continuous).mul γ.continuous⟩\n        (fun t => mul_ne_zero (by exact_mod_cast (hc t).ne') (hγ t)) t := by\n    intro t\n    change circleProj (Hc (1, t)) (hHcne (1, t)) =\n      circleProj ((c t : ℂ) * γ t) (mul_ne_zero (by exact_mod_cast (hc t).ne') (hγ t))\n    apply circleProj_congr\n    simp only [hHcdef, hfdef]\n    push_cast [Set.Icc.coe_one]\n    ring\n\n  have hloop : ∀ s : I, H (s, 0) = H (s, 1) := by\n    intro s\n    change circleProj (Hc (s, 0)) (hHcne (s, 0)) = circleProj (Hc (s, 1)) (hHcne (s, 1))\n    apply circleProj_congr\n    simp only [hHcdef, hfdef]\n    rw [hloopγ, hloopc]\n  have hinv := windingNumber_eq_of_homotopy H
