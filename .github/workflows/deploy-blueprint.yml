name: Deploy Blueprint

# Builds the leanblueprint site from source (`blueprint/src/`) with plasTeX and
# publishes it to GitHub Pages. Web-only: the Lean project is NOT built here
# (`lean_action_ci.yml` does that on every push); plasTeX generates the site,
# including the dependency graph, directly from the LaTeX sources, so this
# workflow runs in a few minutes.
#
# The generated site (`blueprint/web/`) is no longer committed to the repo —
# this workflow is the single source of the published pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow deploying to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # texlive-binaries provides kpsewhich: WITHOUT it plasTeX silently drops
      # every subdirectory \input (chapters/...) and "successfully" builds a
      # skeleton site with no chapters. graphviz is for the dependency graph.
      - name: Install graphviz + kpsewhich (plasTeX input resolution)
        run: sudo apt-get update && sudo apt-get install -y graphviz libgraphviz-dev texlive-binaries
      - name: Install leanblueprint
        run: pip install leanblueprint
      - name: Build the blueprint site
        run: leanblueprint web
      - name: Sanity-check the generated site (chapters must exist)
        run: |
          n=$(ls blueprint/web/chap-*.html 2>/dev/null | wc -l)
          echo "chapter pages generated: $n"
          test "$n" -ge 20 || { echo "::error::blueprint build produced only $n chapter pages — \\input resolution failed"; exit 1; }
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: blueprint/web
      - id: deployment
        uses: actions/deploy-pages@v4
