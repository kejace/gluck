name: Deploy Blueprint

# Builds the leanblueprint site from source (`blueprint/src/`) with plasTeX and
# publishes it to GitHub Pages. Web-only: the Lean project is NOT built here
# (`lean_action_ci.yml` does that on every push); plasTeX generates the site,
# including the dependency graph, directly from the LaTeX sources, so this
# workflow runs in a few minutes.
#
# The generated site (`blueprint/web/`) is no longer committed to the repo —
# this workflow is the single source of the published pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow deploying to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install graphviz (needed by the dependency-graph plugin)
        run: sudo apt-get update && sudo apt-get install -y graphviz libgraphviz-dev
      - name: Install leanblueprint
        run: pip install leanblueprint
      - name: Build the blueprint site
        run: leanblueprint web
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: blueprint/web
      - id: deployment
        uses: actions/deploy-pages@v4
