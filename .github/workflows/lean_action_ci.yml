name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          # Fetch the prebuilt Mathlib oleans (`lake exe cache get`) instead of
          # recompiling Mathlib from source on every run.
          use-mathlib-cache: true
      # Blueprint pin gate: every \lean{...} pin in blueprint/src must name a
      # declaration in the built environment. blueprint/lean_decls is generated
      # (gitignored), so regenerate it from source first.
      - name: Install leanblueprint (for the declaration list)
        run: |
          # texlive-binaries provides kpsewhich: without it plasTeX silently
          # drops the chapter \input's and lean_decls comes out near-empty,
          # making the checkdecls gate pass vacuously.
          sudo apt-get update && sudo apt-get install -y graphviz libgraphviz-dev \
            dvisvgm latexmk texlive-binaries texlive-latex-extra texlive-pictures texlive-xetex
          pip install leanblueprint
      - name: Check generated figure assets
        run: scripts/build-figures --check
      - name: Generate blueprint declaration list
        run: |
          leanblueprint web
          n=$(wc -l < blueprint/lean_decls)
          echo "blueprint pins: $n"
          test "$n" -ge 200 || { echo "::error::lean_decls has only $n entries — blueprint build under-produced"; exit 1; }
      - name: Build printable blueprint
        run: leanblueprint pdf
      - name: Check blueprint pins against the Lean environment
        run: lake exe checkdecls blueprint/lean_decls
